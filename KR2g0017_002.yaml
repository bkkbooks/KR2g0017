body:
  text: 賢明傳第二惟若賢明廉正以方動作有節言成文章咸曉事理知世紀綱循法興居終身無殃妃后賢焉名號必揚周宣姜后周宣姜后者齊侯之女宣王之后也賢而有德事非禮不言行非禮不動宣王常早臥晏起后夫人不出房姜后既出乃脫簪珥待罪於永巷使其傅母通言于王曰妾不才妾之淫心見矣至使君王失禮而晏朝以見君王樂色而忘德也夫苟樂色必好奢窮欲亂之所興也原亂之興從婢子起敢請婢子之罪王曰寡人不德實自有過非夫人之罪也遂復姜后而勤于政事早朝晏退卒成中興之名君子謂姜后善于威儀而有德行夫禮后夫人御于君以燭進至于君所滅燭適房中脫朝服衣褻服然後進御于君雞鳴樂師擊鼓以告旦后夫人鳴佩而去詩曰威儀抑抑德音秩秩又曰隰桑有阿其葉有幽既見君子德音孔膠夫婦人以色親以德固姜氏之德行可謂孔膠也頌曰嘉茲姜后厥德孔賢由禮動作匡配周宣引過推讓宣王悟焉夙夜崇道為中興君齊桓衛姬衛姬者衛侯之女齊桓公之夫人也桓公好淫樂衛姬為之不聽鄭衛之音桓公用管仲寧戚行伯道諸侯皆朝而衛獨不至桓公與管仲謀伐衛罷朝入閨衛姬望見桓公脫簪珥解環佩下堂再拜曰願請衛之罪桓公曰吾與衛無故姬何請邪對曰妾聞之人君有三色顯然喜樂容貌淫樂者鐘鼓酒食之色寂然清靜意氣沉抑者喪禍之色忿然充滿手足矜動者攻伐之色今妾望君舉趾高色厲音揚意在衛也是以請也桓公許諾明日臨朝管仲趨進曰君之蒞朝也恭而氣下言則徐無伐國之志是釋衛也桓公曰善乃立衛姬為夫人號管仲為仲父曰夫人治內管仲治外寡人雖愚足以立于世矣君子謂衛姬信而有行詩曰展如之人兮邦之媛也頌曰齊桓衛姬忠款誠信公好淫樂姬為修身望色請罪桓公加焉厥使治內立為夫人晉文齊姜齊姜齊桓公之宗女晉文公之夫人也初文公父獻公納驪姬譖殺太子申生文公號公子重耳與舅犯奔狄適齊齊桓公以宗女妻之遇之甚善有馬二十乘將死于齊曰人生安樂而已誰知其他子犯知文公之安齊也欲行而患之與從者謀于桑下蠶妾在焉妾告姜氏姜氏殺之而言于公子曰從者將以子行聞者吾已除之矣公子必從不可以二二無成命自子去晉晉無寧歲天未亡晉有晉國者非子而誰子其勉之上帝臨子二必有咎公子曰吾不動必死於此矣姜曰不可周詩曰莘莘征夫每懷靡及夙夜征行猶恐無及況欲懷安將何及矣人不求及其能及乎亂不長世公子必有晉公子不聽姜與舅犯謀醉而載之以行酒醒公子以戈逐舅犯曰若事有濟則可若無所濟吾食舅氏之肉豈有饜哉遂行過曹邾鄭楚而入秦秦穆公乃以兵內之于晉晉人殺懷公而立公子重耳是為文公迎齊姜以為夫人遂伯天下為諸侯盟主君子謂齊姜潔而不瀆能育君子于善詩曰彼美孟姜可與寤言此之謂也頌曰齊姜公正言行不怠勸勉晉文反國無疑公子不聽姜與犯謀醉而載之卒成伯基秦穆公姬穆姬者秦穆公之夫人晉獻公之女太子申生之同母姊與惠公異母賢而有義獻公殺太子申生逐群公子惠公號公子夷吾奔梁及獻公卒得因秦立始即位穆姬使納群公子曰公族者君之根本惠公不用又背秦賂晉饑請粟于秦秦與之秦飢請粟于晉晉不與秦遂興兵與晉戰獲晉君以歸秦穆公曰掃除先人之廟寡人將以晉君見穆姬聞之乃與太子罃公子弘與簡璧衰絰履薪以迎且告穆公曰上天降災使兩君罷以玉帛相見乃以興戎婢子娣姒不能相教以辱君命晉君朝以入婢子夕以死惟君其圖之公懼乃舍諸靈臺大夫請以入公曰獲晉君以功歸今以喪歸將焉用遂改館晉君饋以七牢而遣之穆姬死穆姬之弟重耳入秦秦送之晉是為晉文公太子罃思母之恩而送其舅氏也作詩曰我送舅氏曰至渭陽何以贈之路車乘黃君子曰慈母生孝子詩云敬慎威儀維民之則穆姬之謂也頌曰秦穆夫人晉惠之姊秦執晉君夫人流涕痛不能救乃將赴死穆公義之遂釋其弟楚莊樊姬樊姬者楚莊王之夫人也莊王即位好狩獵樊姬諫不止乃不食禽獸之肉王改過勤於政事王嘗聽朝罷晏姬下殿迎曰何罷之晏也得無飢倦乎王曰與賢者俱不知飢倦也姬曰王之所謂賢者何也曰虞丘子也姬掩口而笑王曰姬之所笑何也曰虞丘子賢則賢矣未忠也王曰何謂也對曰妾執巾櫛十一年遣人之鄭衛求賢人進于王今賢于妾者二人同列者七人妾豈不欲擅王之愛寵乎妾聞堂上兼女所以觀人能也妾不能以私蔽公欲王多見知人能也妾聞虞丘子相楚十餘年所薦非子弟則族昆弟未聞進賢而退不肖是蔽君而塞賢路知賢不進是不忠不知其賢是不智也妾之所笑不亦可乎王悅明日朝王以姬之言告虞丘子丘子避席不知所對于是避舍使人迎孫叔敖而進之王以為令尹治楚三年而莊王以霸楚史書曰莊王之霸樊姬之力也詩曰大夫夙退無使君勞其君者謂女君也又曰溫恭朝夕執事有恪此之謂也頌曰樊姬謙讓靡有嫉妬薦進美人與己同處非刺虞丘蔽賢之路楚莊用焉功業遂伯周南之妻周南之妻者周南大夫之妻也大夫受命平治水土過時不來妻恐其懈于王事蓋與其鄰人陳素所與大夫言國家多難惟勉強之無有譴怒遺父母憂昔舜耕于歷山漁于雷澤陶于河濱非舜之事而舜為之者為養父母也家貧親老不擇官而仕親操井臼不擇妻而娶故父母在當與時小同無虧大義不罹患害而已夫鳳皇不罹于蔚羅麒麟不入于陷穽蛟龍不及于枯澤鳥獸之智猶知避害而況于人乎生于亂世不得道理而迫于暴虐不得行義然而仕者為父母在故也乃作詩曰魴魚頳尾王室如毀雖則如毀父母孔邇蓋不得已也君子以是知周南之妻而能匡夫也頌曰周大夫妻夫出治土維戒無怠勉為父母凡事遠害為親之在作詩魴魚以敕君子宋鮑女宗女宗者宋鮑蘇之妻也養姑甚謹鮑蘇仕衛三年而娶外妻女宗養姑愈敬因往來者請問其夫賂遺外妻甚厚女宗姒謂曰可以去矣女宗曰何故姒曰夫人既有所好子何留乎女宗曰婦人一醮不改夫死不嫁執麻枲治絲繭織紝組紃以供衣服以事夫室徹漠酒醴羞饋食以事舅姑以專一為貞以善從為順貞順婦人之至行也豈以專夫室之愛為善哉若其以淫意為心而扼夫室之好吾未知其善也夫禮天子十二諸侯九卿大夫三士二今吾夫誠士也有二不亦宜乎且婦人有七見去夫無一去義七去之道妬正為首淫僻竊盜長舌驕侮無子惡病皆在其後吾姒不教吾以居室之禮而反欲使吾為見棄之行將安所用此遂不聽事姑愈謹宋公聞之表其閭號曰女宗君子謂女宗謙而知禮詩云令儀令色小心翼翼古訓是式威儀是力此之謂也頌曰宋鮑女宗好禮知理夫有外妻不為變己稱引婦道不聽其姒宋公賢之表其閭里晉趙衰妻晉趙衰妻者晉文公之女也號趙姬初文公為公子時與趙衰奔狄狄人入其二女叔隗季隗于公子公以叔隗妻趙衰生盾及返國文公以其女趙姬妻趙衰生原同屏括樓嬰趙姬請迎盾與其母而納之趙衰辭而不敢姬曰不可夫得寵而忘舊舍義好新而嫚故無恩與人勤于隘厄富貴而不顧無禮君棄此三者何以使人雖妾亦無以侍執巾櫛詩不云乎采葑采菲無以下體德音莫違及爾同死與人同寒苦雖有小過猶與之同死而不去況于安新忘舊乎又曰宴爾新婚不我屑以蓋傷之也君其逆之無以新廢舊趙衰許諾乃逆叔隗與盾來姬以盾為賢請立為嫡子使三子下之以叔隗為內婦姬親下之及盾為正卿思趙姬之讓恩請以姬之中子屏括為公族大夫曰君姬氏之愛子也微君姬氏則臣狄人也何以至此成公許之屏括遂以其族為公族大夫君子謂趙姬恭而有讓詩曰溫溫恭人維德之基趙姬之謂也頌曰趙衰姬氏制行分明身雖尊貴不妬偏房躬事叔隗子盾為嗣君子美之厥行孔備陶答子妻陶太夫答子之妻也答子治陶三年名譽不興家富三倍其妻數諫不用居五年從車百乘歸休宗人擊牛而賀之其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之治國也家貧國富君敬民戴故福結于子孫名傳于後世今夫子不然貪富務大不顧後害妾聞南山有玄豹霧雨七日而不下食者何也欲以澤其毛而成文章也故藏而遠害犬彘不擇食以肥其身坐而須死耳今夫子治陶家富國貧君不敬民不戴敗亡之徵見矣願與少子俱脫姑怒遂棄之處朞年答子之家果以盜誅唯其母老以免婦乃與少子歸養姑終卒天年君子謂答子妻能以義易利雖違禮求去終以全身復禮可謂遠識矣詩曰百爾所思不如我所之此之謂也頌曰答子治陶家富三倍妻諫不聽知其不改獨泣姑怒送厥母家答子逢禍復歸養姑柳下惠妻魯大夫柳下惠之妻也柳下惠處魯三黜而不去憂民救亂妻曰無乃瀆乎君子有二恥國無道而貴恥也國有道而賤恥也今當亂世三黜而不去亦近恥也柳下惠曰油油之民將陷于害吾能以乎且彼為彼我為我彼雖裸裎安能污我油油然與之處仕于下位柳下既死門人將誄之妻曰將誄夫子之德耶則二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從容不強察兮蒙恥救民德彌大兮雖遇三黜紂不蔽兮愷悌君子永能厲兮嗟呼惜哉乃下世兮庶幾遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之諡宜為惠兮門人從之以為誄莫能竄一字君子謂柳下惠妻能光其夫矣詩曰人知其一莫知其他此之謂也頌曰下惠之妻賢明有文柳下既死門人必存將誄下惠妻為之辭陳列其行莫能易之魯黔婁妻魯黔婁先生之妻也先生死曾子與門人往弔之隱門而入立於堂下其妻出戶曾子弔之上堂見先生之尸在牖下枕墼席槀縕袍不表覆以布被首足不盡斂覆頭則足見覆足則頭見曾子曰斜引其被則斂矣妻曰斜而有餘不如正而不足也先生以不斜之故能至于此生時不邪死而邪之非先生意也曾子不能應遂哭之曰嗟乎先生之終也何以為諡其妻曰以康為諡曾子曰先生在時食不充虛衣不蓋形死則手足不斂旁無酒肉生不得其美死不得其榮何樂于此而諡為康乎其妻曰昔先生君嘗欲授之政以為國相辭而不為是有餘貴也君嘗賜之粟三十鍾先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚戚于貧賤不欣欣于富貴求仁而得仁求義而得義其諡為康不亦宜乎曾子曰唯斯人也而有斯婦君子謂黔婁妻為樂貧行道詩曰彼美淑姬可與窹言此之謂也頌曰黔婁既死妻獨主喪曾子弔焉布衣褐衾安賤甘淡不求豐美尸不掩蔽猶諡曰康齊相御妻齊相晏子僕御之妻也號曰命婦晏子將出命婦窺其夫為相御擁大蓋策駟馬意氣洋洋甚自得也既而歸其妻曰宜矣子之卑且賤也夫曰何也妻曰晏子長不滿三尺身相齊國名顯諸侯今者吾從門間觀其志氣恂恂自下思念深矣今子身長八尺乃為之僕御耳然子之意洋洋若自足者妾是以去也其夫謝曰請自改何如妻曰是懷晏子之智而加以八尺之長也夫躬仁義事明主其名必揚矣且吾聞寧榮于義而賤不虛驕以貴于是其夫乃深自責學道謙遜常若不足晏子怪而問其故具以實對于是晏子賢其能納善自改升諸景公以為大夫顯其妻以為命婦君子謂命婦知善故賢人之所以成者其道博矣非特師傅朋友相與切磋也妃匹亦居多焉詩云高山仰止景行行止言當常嚮為其善也頌曰齊相御妻匡夫以道明言驕恭恂恂自效夫改易行學問靡已晏子升之列于君子楚接輿妻楚狂接輿之妻也接輿躬耕以為食楚王使使者持金百鎰車二駟往聘迎之曰王願請先生治淮南接輿笑而不應使者遂不得與語而去妻從市來曰先生少而為義豈將老而遺之哉門外車跡何其深也接輿曰王不知吾不肖也欲使我治淮南遣使者持金駟來聘其妻曰得無許之乎接輿曰夫富貴者人之所欲也子何惡我許之矣妻曰義士非禮不動不為貧而易操不為賤而改行妾事先生躬耕以為食親績以為衣食飽衣暖據義而動其樂亦自足矣若受人重祿乘人堅良食人肥鮮而將何以待之接輿曰吾不許也妻曰君使不從非忠也從之又違非義也不如去之夫負釜甑妻戴紝器變名易姓而遠徙莫知所之君子謂接輿妻為樂道而遠害夫安貧賤而不怠于道者唯至德者能之詩曰肅肅兔罝椓之丁丁言不怠于道也頌曰接輿之妻亦安貧賤雖欲進仕見時暴亂楚聘接輿妻請避館戴紝易姓終不遭難楚老萊妻楚老萊子之妻也萊子逃世耕於蒙山之陽葭墻蓬室木床蓍席衣縕食菽墾山播種人或言之楚王曰老萊賢士也王欲聘以璧帛恐不來楚王駕至老萊之門老萊方織畚王曰寡人愚陋獨守宗廟願先生幸臨之老萊子曰僕山野之人不足守政王復曰守國之孤願變先生之志老萊子曰諾王去其妻戴畚萊挾薪樵而來曰何車迹之衆也老萊子曰楚王欲使吾守國之政妻曰許之乎曰然妻曰妾聞之可食以酒肉者可隨以鞭捶可授以官祿者可隨以鈇鉞今先生食人酒肉受人官祿為人所制也能免於患乎妾不能為人所制投其畚萊而去老萊子曰子還吾為子更慮遂行不顧至江南而止曰鳥獸之解毛可績而衣之据其遺粒足以食也老萊子乃隨其妻而居之民從而家者一年成落三年成聚君子謂老萊妻果於從善詩曰衡門之下可以棲遲泌之洋洋可以療飢此之謂也頌曰老萊與妻逃世山陽蓬蒿為室莞葭為蓋楚王聘之老萊將行妻曰世亂乃遂逃亡楚於陵妻楚於陵子終之妻也楚王聞於陵子終賢欲以為相使使者持金百鎰往聘迎之於陵子終曰僕有箕帚之妾請入與計之即入謂其妻曰楚王欲以我為相遣使者持金來今日為相明日結駟連騎食方丈於前可乎妻曰夫子織屨以為食非與物無治也左琴右書樂亦在其中矣夫結駟連騎所安不過容膝食方丈於前所甘不過一肉今以容膝之安一肉之味而懷楚國之憂其可樂乎亂世多害妾恐先生之不保命也于是子終出謝使者而不許也遂相與逃而為人灌園君子謂於陵妻為有德行詩云愔愔良人秩秩德音此之謂也頌曰於陵處楚王使聘焉入與妻謀懼世亂煩進往遇害不若身安左琴右書為人灌園
