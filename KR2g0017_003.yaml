body:
  text: 仁智傳第三惟若仁智豫識難易原度天理禍福所移歸義從安危險必避專專小心永懼匪懈夫人省茲榮名必利密康公母密康公之母姓隗氏周共王遊于涇上康公從有三女奔之其母曰必致之於王夫獸三為群人三為衆女三為粲王田不取群公行下衆王御不參一族夫粲美之物也衆以美物歸汝而何德以堪之王猶不堪況爾小醜乎康公不獻王滅密君子謂密母為能識微詩云無已太康職思其憂此之謂也頌曰密康之母先識盛衰非刺康公受粲不歸公行下衆物滿則損俾獻不聽密果滅殞楚武鄧曼鄧曼者武王之夫人也王使屈瑕為將伐羅屈瑕號莫敖與群帥悉楚師以行鬭伯比謂其御曰莫敖必敗舉趾高心不固矣見王曰必濟師王以告夫人鄧曼鄧曼曰大夫非衆之謂也其謂君撫小民以信訓諸司以德而威莫敖以刑也莫敖狃于蒲騷之役將自用也必小羅君若不鎮撫其不設備乎於是王使賴人追之不及莫敖令于軍中曰諫者有刑及鄢師次亂濟至羅羅與盧戎擊之大敗之莫敖自經荒谷群帥囚于冶父以待刑王曰孤之罪也皆免之君子謂鄧曼為知人詩云曾是莫聽大命以傾此之謂也王伐隨且行告鄧曼曰余心蕩何也鄧曼曰王德薄而祿厚施鮮而得多物盛必衰日中必移盈而蕩天之道也先王知之矣故臨武事將發大命而蕩王心焉若師徒毋虧王薨于行國之福也王遂行卒于樠木之下君子謂鄧曼為知天道易曰日中則昃月盈則虧天地盈虛與時消息此之謂也頌曰楚武鄧曼見事所興謂瑕軍敗知王將薨識彼天道盛而必衰終如其言君子揚稱許穆夫人許穆夫人者衛懿公之女許穆公之夫人也初許求之齊亦求之懿公將與許女因其傅母而言曰古者諸侯之有女子也所以苞苴玩弄繫援于大國也言今者許小而遠齊大而近若今之世強者為雄如使邊境有寇戎之事維是四方之故赴告大國妾在不猶愈乎今舍近而就遠離大而附小一旦有車馳之難孰可與慮社稷衛侯不聽而嫁之于許其後翟人攻衛大破之而許不能救衛侯遂奔走涉河而南至楚丘齊桓往而存之遂城楚丘以居衛侯於是悔不用其言當敗之時許夫人馳驅而弔唁衛侯因疾之而作詩云載馳載驅歸唁衛侯驅馬悠悠言至于曹大夫跋涉我心則憂既不我嘉不能旋反視爾不臧我思不遠君子善其慈惠而遠識也頌曰衛女未嫁謀許與齊女諷母曰齊大可依衛君不聽後果遁逃許不能救女作載馳曹僖氏妻曹大夫僖負羈之妻也晉公子重耳亡過曹恭公不禮焉聞其駢脅近其舍伺其將浴設帷薄而觀之負羈之妻言于夫曰吾觀晉公子賢人也其從者三人皆國相也以此三人者皆善戮力以輔人必得晉國若得反國必霸諸侯而討無禮曹必為首誅也若曹有難子必不免子胡不早自二焉且吾聞之不知其子者視其父不知其君者視其所使今其從者皆卿相之僕也則其君必伯王之主也若加禮焉必能報施矣若有罪焉必能討過子不早圖禍至不久矣負羈乃遺之壺餐加璧其上公子受餐反璧及公子反國伐曹乃表負羈之閭令兵士無敢入士民之扶老攜幼而赴其閭者門外成市君子謂僖氏之妻能遠識詩云既明且哲以保其身此之謂也頌曰僖氏之妻厥智孔白見晉公子知其興祚使夫饋餐且以自託文伐曹國卒獨見釋孫叔敖母楚令尹孫叔敖之母也叔敖為嬰兒之時出遊見兩頭蛇殺而埋之歸見其母而泣焉母問其故對曰吾聞見兩頭蛇者死今者出遊見之其母曰蛇今安在對曰吾恐他人復見之殺而埋之矣其母曰汝不死矣夫有陰德者天必陽報之德勝不祥仁除百禍天之處高而聽卑書不云乎皇天無親惟德是輔爾默矣必興于楚及叔敖長為楚令尹君子謂叔敖之母知道德之次詩云母氏聖善此之謂也頌曰叔敖之母深知天道叔敖見蛇兩頭岐首殺而埋之泣恐不及母曰陰德不死必壽晉伯宗妻晉大夫伯宗之妻也伯宗賢而好以直辨凌人每朝其妻常戒之曰盜憎主人民惡其上有愛好人者必有憎妬人者夫子好直言枉者惡之禍必及身矣伯宗不聽朝而以喜色歸其妻曰子貌有喜色何也伯宗曰吾言于朝諸大夫皆謂我知似陽子妻曰實穀不華至言不飾今陽子華而不實言而無謀是以禍及其身子何喜焉伯宗曰吾欲飲諸大夫酒而與之謀爾試聽之其妻曰諾于是為大會與諸大夫飲既飲而問妻曰何若對曰諸大夫莫子若也然而民之不能戴其上久矣難必及子子之性固不可易也且國家多二其危可立待也子何不預結賢大夫以託州犂焉伯宗曰諾乃得畢羊而交之及欒不忌之難三郤害伯宗譖而殺之畢羊乃送州犂于荊遂得免焉君子謂伯宗之妻知天道詩云多將熇熇不可救藥此之謂也頌曰伯宗凌人妻知且亡數諫伯宗厚許畢羊屬以州犂以免咎殃伯宗遇禍州犂奔荊衛靈夫人衛靈公之夫人也靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此謂誰夫人曰此必蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭信節不為冥冥惰行蘧伯玉衛之賢大夫也仁而有智敬以事上此其人必不以暗昧廢禮是以知之公使視之果伯玉也公反之以戲夫人曰非也夫人酌觴再拜賀公公曰子何以賀寡人夫人曰始妾獨以衛為有蘧伯玉爾今衛復有與之齊者是君有二賢臣也國多賢臣國之福也妾是以賀公驚曰善哉遂語夫人其實焉君子謂衛夫人明于知人道夫可欺而不可罔者其明智乎詩云我聞其聲不見其人此之謂也頌曰衛靈夜坐夫人與存有車轔轔中止闕門夫人知之必伯玉焉維知識賢問之信然齊靈仲子齊靈仲子者宋侯之女齊靈公之夫人也初靈公娶于魯聲姬生子光以為太子夫人仲子與其娣戎子皆嬖于公仲子生子牙戎子請以牙為太子代光公許之仲子曰不可夫廢常不祥聞諸侯之難失謀夫光之立也列于諸侯矣今無故而廢之是專絀諸侯而以難犯不祥也君必悔之公曰在我而已仲子曰妾非讓也誠禍之萌也以死爭之公終不聽遂逐太子光而立牙為太子高厚為傅靈公疾高厚欲迎牙及公薨崔杼立光而殺高厚以不用仲子之言禍至於此君子謂仲子明於事理詩云聽用我謀庶無大悔仲子之謂也頌曰齊靈仲子仁智顯明靈公立牙廢姬子光仲子強諫棄嫡不祥公既不聽果有禍殃魯臧孫母臧孫母者魯大夫臧文仲之母也文仲將為魯使至齊其母送之曰汝刻而無恩好盡人力窮人以為威魯國不容子矣而使子之齊凡姦將作必於變動害子者其于斯發事乎汝其戒之魯與齊通壁壁鄰之國也魯之寵臣多怨汝者又皆通于齊高子國子是必使齊圖魯而拘汝留之難乎其免也汝必施恩布惠而後出以求助焉于是文仲託于三家厚士大夫而後之齊齊果拘之而興兵欲襲魯文仲陰使人遺公書恐得其書乃謬其辭曰斂小器投諸台食獵犬組羊裘琴之合甚思之臧我羊羊有母食我以同魚冠纓不足帶有餘公及大夫相與議之莫能知之人有言臧孫母者世家子也君何不試召而問焉于是召而語之曰吾使臧子之齊今特書來云爾何也臧孫母泣下襟曰吾子拘有木治矣公曰何以知之對曰斂小器投諸台者言取郭外萌內之於城中也食獵犬組羊裘者言趣饗戰鬭之士而繕甲兵也琴之合甚思之者言思妻也臧我羊羊有母是善告妻善養母也食我以同魚同者其文錯錯者所以治鋸鋸者所以治木也是有木治係于獄矣冠纓不足帶有餘者頭亂不得梳飢不得食也故知吾子拘而有木治矣於是以臧孫母之言軍于境上齊方遣兵將以襲魯聞兵在境上乃還文仲而不伐魯君子謂臧孫母識高見遠詩云陟彼屺兮瞻望母兮此之謂也頌曰臧孫之母刺子好威必且遇害使援所危既厚三家果拘于齊母説其書子遂得歸晉羊叔姬叔姬者羊舌子之妻也叔向叔魚之母也一姓楊氏叔向名肹叔魚名鮒羊舌子好正不容于晉去而之三室之邑三室之邑人相與攘羊而遺之羊舌子不受叔姬曰夫子居晉不容去之三室之邑又不容于三室之邑是于夫子不容也不如受之羊舌子受之曰為肹與鮒亨之叔姬曰不可南方有鳥名曰乾吉食其子不擇肉子常不遂今肹與鮒童子也隨大夫而化者不可食以不義之肉不若埋之以明不與于是乃盛以甕埋壚陰後二年攘羊之事發都吏至羊舌子曰吾受之不敢食也發而視之則其骨存焉都吏曰君子哉羊舌子不與攘羊之事矣君子謂叔姬為能防害遠疑詩曰無曰不顯莫豫云覯此之謂也叔向欲娶于申公巫臣氏夏姬之女美而有色叔姬不欲娶其族叔向曰吾母之族貴而無庶吾懲舅氏矣叔姬曰子靈之妻殺三夫一君一子而亡一國兩卿矣爾不懲此而反懲吾族何也且吾聞之有奇福者必有奇禍而有甚美者必有甚惡今是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鐘美于是將必以是大有敗也昔有仍氏生女髮黑而甚美光可監人名曰玄妻樂正夔娶之生伯封宕有豕心貪婪毋期忿戾毋期貪婪無饜謂之封豕有窮后羿滅之夔是用不祀且三代之亡及恭太子之廢皆是物也汝何以為哉夫有美物足以移人苟非德義則必有禍也叔向懼而不敢娶平公強使娶之生楊食我食我號曰伯碩伯碩生時侍者謁之叔姬曰長姒産男叔姬往視之及堂聞其號也而還曰豺狼之聲也狼子野心今將滅羊舌氏者必是子也遂不肯見及長與祁勝為亂晉人殺食我羊舌氏由是遂滅君子謂叔姬為能推類詩云如彼泉流無淪胥以敗此之謂也叔姬之始生叔魚也而視之曰是虎目而豕喙鳶肩而牛腹溪壑可盈是不可饜也必以賂死遂不見及叔魚長為國贊理邢侯與雍子爭田雍子入其女於叔魚以求直邢侯殺叔魚與雍子于朝韓宣子患之叔向曰三姦同罪請殺其生者而戮其死者遂族邢侯氏而尸叔魚與雍子于市叔魚卒以貪死叔姬可謂知矣詩云貪人敗類此之謂也頌曰叔向之母察于情性知人之生以窮其命叔魚食我皆貪不正必以貨死果卒分爭晉范氏母晉范氏母者范獻子之妻也其三子遊于趙氏趙簡子乘馬園中園中多株問三子曰奈何長者曰明君不問不為亂君不問而為中者曰愛馬足則無愛民力愛民力則無愛馬足少者曰可以三德使民設令伐株于山將有馬為也已而開囿示之株夫山遠而囿近是民一悅矣夫險阻之山而伐平地之株民二悅矣既畢而賤賣民三悅矣簡子從之民果三悅少子伐其謀歸以告母母喟然嘆曰終滅范氏者必是子也夫伐功施勞鮮能布仁乘偽行詐莫能久長其後智伯滅范氏君子謂范氏母為知難本詩曰無忝皇祖式救爾後此之謂也頌曰范氏之母貴德尚信小子三悅以詐與民知其必滅鮮能有仁後果逢禍身死國分魯公乘姒魯公乘姒者魯公乘子皮之姒也其族人死姒哭之甚悲子皮止姒曰安之吾今嫁姊矣已過時子皮不復言也魯君欲以子皮為相子皮問姒曰魯君欲以我為相為之乎姒曰勿為也子皮曰何也姒曰夫臨喪而言嫁一何不習禮也後過時而不言一何不達人事也子內不習禮而外不達人事子不可以為相子皮曰姒欲嫁何不早言姒曰婦人之事唱而後和吾豈以欲嫁之故數子乎子誠不習於禮不達於人事以此相一國據大政何以理之譬猶掩目而別黑白也掩目而別黑白猶無患也不達人事而相國非有天咎必有人禍子其勿為也子皮不聽卒受為相居未期年果誅而死君子謂公乘姒緣事而知弟之遇禍也可謂智矣待禮然後動不苟觸情可謂貞矣詩云蘀兮蘀兮風其吹汝叔兮伯兮唱豫和汝又曰百爾所思不如我所之此之謂也頌曰子皮之姊明事分禮子皮相魯知其禍起姊諫子皮殆不如止子皮不聽卒為宗恥魯漆室女漆室女者魯漆室邑之女也過時未適人當穆公時君老大子幼女倚柱而嘯旁人聞之莫不為之慘者其鄰人婦從之遊謂曰何嘯之悲也子欲嫁耶吾為子求偶漆室女曰嗟乎始吾以子為有知今無識也吾豈為不嫁不樂而悲哉吾憂魯君老大子幼鄰婦笑曰此乃魯大夫之憂婦人何與焉漆室女曰不然非子所知也昔晉客舍吾家繫馬園中馬佚馳走踐吾葵使我終歲不食葵鄰人女奔隨人亡其家倩吾兄行追之逢霖水出溺流而死令吾終身無兄吾聞河潤九里漸洳三百步今魯君老悖太子少愚愚偽日起夫魯國有患者君臣父子皆被其辱禍及衆庶婦人獨安所避乎吾甚憂之子乃曰婦人無與者何哉鄰婦謝曰子之所慮非妾所及三年魯果亂齊楚攻之魯連有寇男子戰鬭婦人轉輸不得休息君子曰遠矣漆室女之思也詩云知我者謂我心憂不知我者謂我何求此之謂也頌曰漆室之女計慮甚妙維魯且亂倚柱而嘯君老嗣幼愚悖姦生魯果擾亂齊伐其城魏曲沃負曲沃負者魏大夫如耳母也秦立魏公子政為魏太子魏哀王使使者為太子納妃而美王將自納焉曲沃負謂其子如耳曰王亂于無別汝胡不匡之方今戰國強者為雄義者顯焉今魏不能強王又無義何以持國乎王中人也不知其為禍耳汝不言則魏必有禍矣有禍必及吾家汝言以盡忠忠以除禍不可失也如耳未遇間會使于齊負因款王門而上書曰曲沃之老婦也心有所懷願以聞於王王召入負曰妾聞男女之別國之大節也婦人脆于志窳于心不可以邪開也是故必十五而笄二十而嫁早成其號諡所以就之也聘則為妻奔則為妾所以開善遏淫也節成然後許嫁親迎然後隨從貞女之義也今大王為太子求妃而自納之于後宮此毀貞女之行而亂男女之別也自古聖王必正妃匹妃匹正則興不正則亂夏之興也以塗山亡也以末喜殷之興也以有姺亡也以妲己周之興也以大姒亡也以褒姒周之康王夫人晏出朝關雎起興思得淑女以配君子夫雎鳩之鳥猶未嘗見乘居而匹處也夫男女之盛合之以禮則父子生焉君臣成焉故為萬物始君臣父子夫婦三者天下之大綱紀也三者治則治亂則亂今大王亂人道之始棄綱紀之大大國五六南有強楚西有橫秦而魏國居其間可謂僅存矣王不憂此而從亂無別父子同女妾恐大王之國政危矣王曰然寡人不知也遂與太子妃而賞負粟三十鍾如耳還而爵之哀王勤行自修勞來國家而齊楚強秦不敢加兵焉君子謂魏負知禮詩云敬之敬之天維顯思此之謂也頌曰魏負聰達非刺哀王王子納妃禮別不明負款王門陳列紀綱王能自修卒無敵兵趙將括母趙將馬服君趙奢之妻趙括之母也秦攻趙孝成王使括代廉頗為將將行括母上書言于王曰括不可使將王曰何也曰始妾事其父父時為將身所奉飯飲而進食者以十數所友者以百數大王及宗室所賜幣者盡以與軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏吏無敢仰視之者王所賜金帛歸盡藏之乃日視便利田宅可買者買之王以為若其父乎父子不同執心各異願王勿遣王曰母置之吾計已決矣括母曰王終遣之即有如不稱妾得無隨坐乎王曰不也括既行代廉頗三十餘日趙兵果敗括死軍覆王以括母先言故卒不加誅君子謂括母為仁智詩曰老夫灌灌小子矯矯匪我言耄爾用憂謔此之謂也頌曰孝成用括代頗拒秦括母獻書知其覆軍願止不得請罪止身括死長平妻子得存
