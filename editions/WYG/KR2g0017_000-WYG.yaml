front:
  text: 御製古列女傳序劉向列女傳宋嘉定間閩中所刋圖書並列殆古遺製大内有顧愷之女史箴圖旁書箴文即董其昌所刻入鴻堂帖者不知蘇子容所見列女傳畫為墨跡耶抑刻本也
  hash: sha256:016ad21cf0acc11e0466a3b3461a30f5462f6127422e03543e4aebaa867977bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_WYG_000-1a, image: WYG0448/WYG0448-0001a.png}
body:
  text: 乾隆甲子秋九月欽定四庫全書史部七古列女傳傳記𩔖三總錄之屬提要臣等謹案古列女傳七巻續一巻列女傳漢劉向撰向字子政本名更生楚元王之後以父任為輦郎厯中壘校尉事蹟具漢書本傳漢書藝文志儒家𩔖傳向所序六十七篇注曰新序説苑世説列女傳頌圖也隋書經籍志雜傳𩔖載列女傳十五巻註曰劉向撰曹大家注其書屡經傳寫至宋代已非復古本故曽鞏序錄稱曹大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰毋及東漢以來凡十六事非向本書然也嘉祐中集賢校理蘇頌始以頌義篇次復定其書為八篇與十五篇者並藏於館閣是鞏校錄時已有二本也又王回序曰此書有母儀賢明仁智貞節慎義辨通嬖孽等目而各頌其義圖其狀總為卒篇傳如太史公記頌如詩之四言而圖為屏風然世所行向書乃分傳毎篇上下併頌為十五巻其十二巻無頌三傳同時人五傳其後人通題曰向撰題其頌曰向子歆撰與漢史不合故崇文總目以陳嬰母等十六傳為後人所附予以頌考之毎篇皆十五傳耳則凡無頌者宜皆非向所奏書不特自陳嬰母為斷也向所序書多散亡獨此幸存而復為他手所亂故併錄其目而以頌證之刪為八篇號古列女傳餘十二傳其文亦奥雅可喜故又以時次之别為一篇號續列女傳又稱直秘閣吕縉叔集賢校理蘓子容象山令林次中各言嘗見母儀賢明四傳於江南人家其書為古佩服而各題其頌像側是回所見一本所聞一本所刪定又一本也錢曽讀書敏求記曰此本始於有虞二妃至趙悼后號古列女傳周郊婦人至東漢梁嬺等以時次之别為一篇號續列女傳頌義大序列於目錄前小序七篇散見目錄中間頌見各人傳後而傳各有圖巻首標題晉大司馬參軍顧愷之圖畫蘓子容嘗見江南人家舊本其畫為古佩服各題其頌像側者與此恰相符合定為古本無疑云云此本即曽家舊物題識印記並存騐其板式紙色確為宋槧誠希覯之珍笈惟蘇頌等所見江南本在王回刪定以前而此本八篇之數與回本合古列女傳續列女傳之目亦與回本合即嘉祐八年回所重編之本曽據以為江南舊本則稍失之耳其頌本向所作曽鞏及回所言不誤而晁公武讀書志乃執隋志之文詆其誤信顔籀之註不知漢志舊註凡稱師古曰者乃籀註其不題姓氏者皆班固之自註以頌圖屬向乃固説非籀説也考顔氏家訓稱列女傳劉向所造其子歆又作頌是訛傳頌為歆作始於六朝修隋志時去之推僅四五十年襲其誤耳豈可遽以駁漢書乎續傳一巻曽鞏以為班眧作其説無證特以意為之晁公武竟以為項原作舛謬彌甚隋志載項原列女後傳十巻非一巻也必牽引旁文曲相符㑹則隋志又有趙母註列女傳七巻髙氏列女傳八巻皇甫謐列女傳六巻綦母䆳列女傳七巻又有曹植列女傳頌一巻繆襲列女讃一巻將續傳亦可牽為趙母等頌亦可牽為曹植等矣又豈止劉歆班昭項原乎今前七巻及頌題向名續傳一巻則不署撰人庶㡬核其實而闕所疑焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書古列女傳目録巻一母儀傳古列女傳頌義大序一篇小序七章頌一百單五章云劉歆撰大序見前惟若母儀賢聖有智行為儀表言則中義胎養子孫以漸教化既成以徳致其功業姑母察此不可不法右係頌義小序頌見逐傳篇末有虞二妃棄母姜嫄契母簡狄啓母塗山湯妃有㜪周室三母衛姑定姜齊女傅母魯季敬姜楚子發母鄒孟軻母魯之母師魏芒慈母齊田稷母巻二賢眀傳惟若賢明亷正以方動作有節言成文章咸曉事理知世紀綱循法興居終身無殃妃后賢焉名號必揚右頌義小序周宣姜后齊桓衛姬晉文齊姜秦穆公姬楚莊樊姬周南之妻宋鮑女宗晉趙衰妻陶荅子妻栁下惠妻魯黔婁妻齊相御妻楚接輿妻楚老萊妻楚於陵妻巻三仁智𫝊惟若仁智豫識難易原度天道禍福所移歸義從安危險必避專專小心永懼匪懈夫人省兹榮名必利宻康公母楚武鄧曼許穆夫人曹僖氏妻孫叔敖母晉伯宗妻衛靈夫人齊靈仲子魯臧孫母晉羊叔姬晉范氏母魯公乗姒魯漆室女魏曲沃婦趙將括母巻四貞順傳惟若貞順修道正進避嫌逺别為必可信終不更二天下之俊勤正潔行精專謹慎諸姬觀之以為法訓召南申女宋恭伯姬衛宣夫人蔡人之妻黎荘夫人齊孝孟姬息君夫人齊把梁妻楚平伯嬴楚昭貞姜楚白貞姬衛宗二順魯寡陶嬰梁寡髙行陳寡孝婦巻五節義傳惟若節義必死無避好善慕節終不背義誠信勇敢何有險詖義之所在赴之不疑姜姒法斯以為世基魯孝義保楚成鄭瞀晉圉懐嬴趙昭越姬蓋將之妻魯義姑姊代趙夫人齊義繼母魯秋潔婦周主忠妾魏節乳母梁節姑姊珠崖二義郃陽友娣京師節女巻六辯通傳惟若辯通文辭可從連類引譬以投禍凶推摧一切後不復重終能一心開意甚公妻妾則焉為世所誦齊管妾倩楚江乙母晉弓工女齊傷槐女楚野辯女阿谷處女趙津女娟趙佛肸母齊鍾離春無鹽齊威虞姬齊宿瘤女齊孤逐女楚處莊姪齊女徐吾齊太倉女巻七孽嬖傳惟若孽嬖亦甚嫚易淫妬熒惑背節棄義指是為非終被禍敗夏桀末喜殷紂妲巳周幽襃姒衛宣公姜魯桓文姜魯荘哀姜晉獻驪姬魯宣穆姜陳女夏姬齊靈聲姬齊東郭姬衛二亂女趙靈吳女楚考李后趙悼倡女巻八續列女傳周郊婦人續仁智第十二陳國辯女續辯通第七聶政之姊續節義第十三王孫氏母續節義第十四陳嬰之母續賢明第十六王陵之母續節義第十九張湯之母續仁智第十八雋不疑母續母儀第十七漢楊夫人續賢明第十八漢霍夫人綺孽嬖第十七嚴延年母續仁智第十七漢馮昭儀續節義第十八右十二傳漢成帝前人而無頌王章妻女續仁智第十九班女媫妤續辯通第十七漢趙飛燕續孽嬖第四孝平王后續貞順第十一更始夫人續孽嬖第十八梁鴻之妻續賢明第十七明德馬后續母儀第七梁夫人嬺續辯通第十八右三傳成帝同時人五傳後時人而皆班氏前人或同時人並無頌崇文總目序右列女傳劉向撰後漢班氏注按向作列女傳八篇一曰母儀二曰賢明三曰仁智四曰貞順五曰節義六曰辯通七曰孽嬖八曰傳頌謹按列女傳頌義大序小序及頌或者皆以為劉向子劉歆作驥謹按隋書崇文總目及本朝曽校書序則非歆作明矣然崇文總目則以續二十傳無頌附入向七篇中分上下為一十四篇并傳頌一篇共成一十五篇今人則以向所撰列女傳七篇并續列女傳二十傳為一篇共計八篇今止依此将頌義大序列於目錄前小序七篇散見目錄中間頌見各人傳後觀者宜詳察焉嘉定七年甲戌十二月初五日武夷蔡驥孔良拜手謹書欽定四庫全書古列女傳巻一漢
