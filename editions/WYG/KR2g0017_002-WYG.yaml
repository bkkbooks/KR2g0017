body:
  text: 古列女傳巻二漢劉向撰賢明傳周宣姜后周宣姜后者齊侯之女也賢而有徳事非禮不言行非禮不動宣王常早卧晏起后夫人不出房姜后脫簮珥待罪於永巷使其傅母通言於王曰妾之不才妾之淫心見矣至使君王失禮而晏朝以見君王樂色而忘徳也夫茍樂色必好奢窮欲亂之所興也原亂之興從婢子起敢請婢子之罪王曰寡人不徳實自生過非夫人之罪也遂復姜后而勤於政事早朝晏退卒成中興之名君子謂姜后善於威儀而有徳行夫禮后夫人御於君以燭進至於君所滅燭適房中脫朝服衣䙝服然後進御於君雞鳴樂師擊鼓以告旦后夫人鳴珮而去詩曰威儀抑抑徳音秩秩又曰隰桑有阿其葉有幽既見君子徳音孔膠夫婦人以色親以徳固姜氏之徳行可謂孔膠也頌曰嘉兹姜后厥徳孔賢由禮動作匹配周宣引過推譲宣王悟焉夙夜崇道為中興君齊桓衛姬衛姬者衛侯之女齊桓公之夫人也桓公好淫樂衛姬為之不聽鄭衛之音桓公用管仲寗戚行霸道諸侯皆朝而衛獨不至桓公與管仲謀伐衛罷朝入閨衛姬望見桓公脫簮珥解環佩下堂再拜曰願請衛之罪桓公曰吾與衛無故姬何請耶對曰妾聞之人君有三色顯然喜樂容貌淫樂者鐘鼓酒食之色寂然清静意氣沈抑者䘮禍之色忿然充滿手足矜動者攻伐之色今妾望君舉趾髙色厲音揚意在衛也是以請之桓公許諾眀日臨朝管仲趨進曰君之􅊩朝也恭而氣下言則徐無伐國之志是釋衛也桓公曰善乃立衛姬為夫人號管仲為仲父曰夫人治内管仲治外寡人雖愚足以立於世矣君子謂衛姬信而有行詩曰展如之人兮邦之媛也頌曰齊桓衛姬忠欵誠信公好淫樂姬為修身望色請罪桓公嘉焉厥使治内立為夫人晉文齊姜齊姜者齊桓公之宗女晉文公之夫人也初文公父獻公納驪姬譛殺太子申生文公號公子重耳與舅犯奔狄適齊齊桓公以宗女妻之遇之甚善有馬二十乗将死於齊曰人生安樂而巳誰知其他子犯知文公之安齊也欲行而患之與從者謀於桑下蠶妾在焉妾告姜氏姜殺之而言於公子曰從者将以子行聞者吾巳除之矣公子必從不可以貳貳無成命自子去晉晉無寧嵗天未亡晉有晉國非子而誰子其勉之上帝臨子貳必有咎公子曰吾不動必死於此矣姜曰不可周詩曰莘莘征夫毎懐靡及夙夜征行猶恐無及况欲懐安将何及矣人不求及其能及乎亂不長世公子必有晉公子不聽姜與舅犯謀醉載之以行酒醒公子以戈逐舅犯曰若事有濟則可無所濟吾食舅氏之肉豈有饜哉遂行過曹宋鄭楚而入秦秦穆公乃以兵内之於晉晉人殺懐公而立公子重耳是為文公迎齊姜以為夫人遂霸天下為諸侯盟主君子謂齊姜潔而不瀆能育君子於善詩云彼美孟姜可與寤言此之謂也頌曰齊姜公正言行不怠勸勉晉文反國無疑公子不聽姜與犯謀醉而載之卒成霸基秦穆公姬穆姬者秦穆公之夫人晉獻公之女太子申生之同母姊與惠公異母賢而有義獻公殺太子申生逐羣公子惠公號公子夷吾奔梁及獻公卒得因秦立始即位穆姬使納羣公子曰公族者君之根本惠公不用又背秦賂晉饑請粟於秦秦與之秦饑請粟於晋晉不與秦遂興兵與晉戰獲晉君以歸秦穆公曰掃除先人之廟寡人将以晉君見穆姬聞之乃與太子罃公子𢎞與簡璧衰絰履薪以迎且告穆公曰上天降災使兩君匪以玉帛相見乃以興戎婢子娣姒不能相教以辱君命晉君朝以入婢子夕以死惟君其圖之公懼乃舍諸靈臺大夫請以入公曰獲晉公以功歸今以䘮歸将焉用遂改館晉君饋以七牢而遣之穆姬死穆姬之弟重耳入秦秦送之晉是為晉文公太子罃思母之恩而送其舅氏也作詩曰我送舅氏曰至渭陽何以贈之路車乗黄君子曰慈母生孝子詩云敬慎威儀維民之則穆姬之謂也頌曰秦穆夫人晉惠之姊秦執晉君夫人流涕痛不能救乃将赴死穆公義之遂釋其弟楚荘樊姬樊姬楚荘王之夫人也荘王即位好狩獵樊姬諌不止乃不食禽獸之肉王改過勤於政事王嘗聽朝罷晏姬下殿迎曰何罷晏也得無飢倦乎王曰與賢者語不知飢倦也姬曰王之所謂賢者何也曰虞丘子也姬掩口而笑王曰姬之所笑何也曰虞丘子賢則賢矣未忠也王曰何謂也對曰妾執巾櫛十一年遣人之鄭衛求美人進於王今賢於妾者二人同列者七人妾豈不欲擅王之愛寵哉妾聞堂上兼女所以觀人能也妾不能以私蔽公欲王多見知人能也今虞丘子相楚十餘年所薦非子弟則族昆弟未聞進賢退不肖是蔽君而塞賢路知賢不進是不忠不知其賢是不智也妾之所笑不亦可乎王悅眀日王以姬言告虞丘子丘子避席不知所對於是避舍使人迎孫叔敖而進之王以為令尹治楚三年而荘王以霸楚史書曰荘王之霸樊姬之力也詩曰大夫夙退無使君勞其君者謂女君也又曰温恭朝夕執事有恪此之謂也頌曰樊姬謙譲靡有嫉妬薦進美人與巳同處非刺虞丘蔽賢之路楚荘用焉功業遂霸周南之妻周南之妻者周南大夫之妻也大夫受命平治水土過時不来妻恐其懈於王事盖與其鄰人陳素所與大夫言國家多難惟勉强之無有譴怒遺父母憂昔舜耕於歴山漁於雷澤陶於河濵非舜之事而舜為之者為養父母也家貧親老不擇官而仕親操井臼不擇妻而娶故父母在當與時小同無虧大義不罹患害而巳夫鳯凰不離於蔚羅麒麟不入於陷穽蛟龍不及於枯澤鳥獸之智猶知避害而況於人乎生於亂世不得道理而迫於暴虐不得行義然而仕者為父母在故也乃作詩曰魴魚赬尾王室如毁雖則如毁父母孔邇盖不得巳也君子以是知周南之妻而能匡夫也頌曰周大夫妻夫出治土維戒無怠勉為父母凡事逺慮為親之在作詩魴魚以敕君子宋鮑女宗女宗者宋鮑蘇之妻也養姑甚謹鮑蘇仕衛三年而娶外妻女宗養姑愈敬因往来者請問其夫賂遺外妻甚厚女宗姒謂曰可以去矣女宗曰何故姒曰夫人既有所好子何留乎女宗曰婦人一醮不改夫死不嫁執麻枲治絲繭織紝組紃以供衣服以事夫室澈漠酒醴羞饋食以事舅姑以專一為貞以善從為順豈以專夫室之愛為善哉若其以淫意為心而扼夫室之好吾未知其善也夫禮天子十二諸侯九卿大夫三士二今吾夫誠士也有二不亦宜乎且婦人有七見去夫無一去義七去之道妬正為首淫僻竊盜長舌驕侮無子惡病皆在其後吾姒不教吾以居室之禮而反欲使吾為見棄之行将安所用此遂不聽事姑愈敬宋公聞之表其閭號曰女宗君子謂女宗謙而知禮詩云令儀令色小心翼翼古訓是式威儀是力此之謂也頌曰宋鮑女宗好禮知理夫有外妻不為變巳稱引婦道不聽其姒宋公賢之表其閭里晉趙衰妻晉趙衰妻者晉文公之女也號趙姬初文公為公子時與趙衰奔狄狄人入其二女叔隗季隗於公子公以叔隗妻趙衰生盾及返國文公以其女趙姬妻趙衰生原同屏括樓嬰趙姬請迎盾與其母而納之趙衰辭而不敢姬曰不可夫得寵而忘舊舍義好新而嫚故無恩與人勤於隘厄富貴而不顧無禮君棄此三者何以使人雖妾亦無以侍執巾櫛詩不云乎采葑采菲無以下體徳音莫違及爾同死與人同寒苦雖有小過猶與之同死而不去况於安新忘舊乎又曰讌爾新婚不我屑以盖傷之也君其逆之無以新廢舊趙衰許諾乃逆叔隗與盾来姬以盾為賢請立為嫡子使三子下之以叔隗為内婦姬親下之及盾為正卿思趙姬之讓恩請以姬之中子屏括為公族大夫曰君姬氏之愛子也㣲君姬氏則臣狄人也何以至此成公許之屏括遂以其族為公族大夫君子謂趙姬恭而有讓詩曰温温恭人維徳之基趙姬之謂也頌曰趙衰姬氏制行分眀身雖尊貴不妬偏房躬事叔隗子盾為嗣君子美之厥行孔備陶答子妻陶大夫荅子妻也答子治陶三年名譽不興家富三倍其妻數諫不用居五年從車百乗歸休宗人擊牛而賀之其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之治國也家貧國富君敬民戴故福結於子孫名埀於後世今夫子不然貪富務大不顧後害妾聞南山有𤣥豹霧雨七日而不下食何也欲以澤其毛而成文章也故藏而逺害犬彘不擇食以肥其身坐而須死耳今夫子治陶家富國貧君不敬民不戴敗忘之徴見矣願與少子俱脫姑怒遂棄之處期年答子之家果以盜誅唯其母老以免婦乃與少子歸養姑終卒天年君子謂答子妻能以義易利雖違禮求去終以全身復禮可謂遠識矣詩曰百爾所思不如我所之此之謂也頌曰答子治陶家富三倍妻諫不聽知其不改獨泣姑怒送厥母家答子逢禍復歸養姑栁下惠妻魯大夫栁下惠之妻也栁下惠處魯三黜而不去憂民救亂妻曰無乃瀆乎君子有二恥國無道而貴恥也國有道而賤恥也今當亂世三黜而不去亦近恥也栁下惠曰油油之民将陷於害吾能巳乎且彼為彼我為我彼雖祼䄇安能汚我油油然與之處仕於下位栁下既死門人将誄之妻曰将誄夫子之徳耶則二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從俗不強察兮䝉恥救民徳彌大兮雖遇三黜終不蔽兮愷悌君子永能厲兮嗟呼惜哉乃下世兮庶㡬遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之諡宜為惠兮門人從之以為誄莫能竄一字君子謂栁下惠妻能光其夫矣詩曰人知其一莫知其他此之謂也頌曰下惠之妻賢眀有文栁下既死門人必存将誄下惠妻為之辭陳列其行莫能易之魯黔婁妻魯黔婁先生之妻也先生死曽子與門人往弔之其妻出户曽子弔之上堂見先生之尸在牖下枕墼席槀緼袍不表覆以布被手足不盡斂覆頭則足見覆足則頭見曽子曰斜引其被則斂矣妻曰斜而有餘不如正而不足也先生以不斜之故能至於此生時不邪死而邪之非先生意也曽子不能應遂哭之曰嗟乎先生之終也何以為諡其妻曰以康為諡曽子曰先生在時食不充口衣不盖形死則手足不斂旁無酒肉生不得其美死不得其榮何樂於此而諡為康乎其妻曰昔先生君嘗欲授之政以為國相辭而不為是有餘貴也君嘗賜之粟三十鍾先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不忻忻於富貴求仁而得仁求義而得義其諡曰康不亦宜乎曽子曰唯斯人也而有斯婦君子謂黔婁妻為樂貧行道詩曰彼美淑姬可與寤言此之謂也頌曰黔婁既死妻獨主䘮曽子弔焉布衣褐衾安賤甘淡不求豐美尸不揜蔽猶諡曰康齊相御妻齊相晏子僕御之妻也號曰命婦晏子将出命婦窺其夫為相御擁大盖䇿駟馬意氣洋洋甚自得也既歸其妻曰宜矣子之卑且賤也夫曰何也妻曰晏子長不滿三尺身相齊國名顯諸侯今者吾從門間觀其志氣恂恂自下思念深矣今子身長八尺乃為之僕御耳然子之意洋洋若自足者妾是以去也其夫謝曰請自改何如妻曰是懐晏子之智而加以八尺之長也夫躬仁義事眀主其名必揚矣且吾聞寧榮於義而賤不虚驕以貴於是其夫乃深自責學道謙遜常若不足晏子怪而問其故具以實對於是晏子賢其能納善自改升諸景公以為大夫顯其妻以為命婦君子謂命婦知善故賢人之所以成者其道博矣非特師傅朋友相與切磋也妃匹亦居多焉詩云髙山仰止景行行止言當常嚮為其善也頌曰齊相御妻匡夫以道眀言驕恭恂恂自效夫改易行學問靡巳晏子升之列於君子楚接輿妻楚狂接輿之妻也接輿躬耕以為食楚王使使者持金百鎰車二駟往聘迎之曰王願請先生治淮南接輿笑而不應使者遂不得與語而去妻從市来曰先生少而為義豈将老而遺之哉門外車跡何其深也接輿曰王不知吾不肖也欲使我治淮南遣使者持金駟来聘其妻曰得無許之乎接輿曰夫富貴者人之所欲也子何惡我許之矣妻曰義士非禮不動不為貧而易操不為賤而改行妾事先生躬耕以為食親績以為衣食飽衣暖據義而動其樂亦自足矣若受人重禄乗人堅良食人肥鮮而将何以待之接輿曰吾不許也妻曰君使不從非忠也從之又違非義也不如去之夫負釜甑妻戴紅器變名易姓而逺徙莫知所之君子謂接輿妻為樂道而逺害夫安貧賤而不怠於道者唯至徳者能之詩曰肅肅􅊵置㭬之丁丁言以怠於道也頌曰接輿之妻亦安貧賤雖欲進仕見時暴亂楚聘接輿妻請避館載紝易姓終不遭難楚老莱妻楚老莱子之妻也莱子逃世耕於䝉山之陽葭墻蓬室木牀蓍席衣緼食菽墾山播種人或言之楚王曰老莱賢士也王欲聘以璧帛恐不来楚王駕至老莱之門老莱方織畚王曰寡人愚陋獨守宗廟願先生幸臨之老莱子曰僕山野之人不足守政王復曰守國之孤願變先生之志老莱子曰諾王去其妻戴畚菜挾薪樵而来曰何車迹之衆也老莱子曰楚王欲使吾守國之政妻曰許之乎曰然妻曰妾聞之可食以酒肉者可隨以鞭捶可授以官禄者可隨以鈇鉞今先生食人酒肉受人官禄為人所制也能免於患乎妾不能為人所制投其畚菜而去老莱子曰子還吾為子更慮遂行不顧至江南而止曰鳥獸之解毛可績而衣之据其遺粒足以食也老莱子乃隨其妻而居之民從而家者一年成落三年成聚君子謂老莱妻果於從善詩曰衡門之下可以棲遲泌之洋洋可以療饑此之謂也頌曰老莱與妻逃世山陽蓬蒿為室莞葭為盖楚王聘之老莱将行妻曰世亂乃遂逃亡楚於陵妻楚於陵子終之妻也楚王聞於陵子終賢欲以為相使使者持金百鎰往聘迎之於陵子終曰僕有箕箒之妾請入與計之即入謂其妻曰楚王欲以我為相遣使者持金来今日為相眀日結駟連騎食方丈於前可乎妻曰夫子織屨以為食非與物無治也左琴右書樂亦在其中矣夫結駟連騎所安不過容膝食方丈於前甘不過一肉今以容膝之安一肉之味而懐楚國之憂其可乎亂世多害妾恐先生之不保命也於是子終出謝使者而不許也遂相與逃而為人灌園君子謂於陵妻為有徳行詩云愔愔良人秩秩徳音此之謂也頌曰於陵處楚王使聘焉入與妻謀懼世亂煩進往遇害不若身安左琴右書為人灌園古列女傳巻二
