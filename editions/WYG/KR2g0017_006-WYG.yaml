body:
  text: 古列女傳卷五欽定四庫全書古列女傳巻六漢劉向撰辯通傳齊管妾婧妾婧者齊相管仲之妾也甯戚欲見桓公道无從乃為人僕將車宿齊東門之外桓公因出甯戚擊牛角而商歌甚悲桓公異之使管仲迎之甯戚稱曰浩浩乎白水管仲不知所謂不朝五日而有憂色其妾婧進曰今君不朝五日而有憂色敢問國家之事耶君之謀也管仲曰非汝所知也婧曰妾聞之也毋老老毋賤賤毋少少毋弱弱管仲曰何謂也婧曰昔者太公望年七十屠牛於朝歌市八十為天子師九十而封於齊由是觀之老可老耶夫伊尹有㜪氏之媵臣也湯立以為三公天下之治太平由是觀之賤可賤耶睪子生五嵗而贊禹由是觀之少可少耶駃騠生七日而超其母由是觀之弱可弱耶於是管仲乃下席而謝曰吾請語子其故昔日公使迎甯戚甯戚曰浩浩乎白水吾不知其所謂是故憂之其妾笑曰人已語君矣君不知識耶古有白水之詩詩不云乎浩浩白水鯈鯈之魚君來召我我將安居國家未定從我焉如此甯戚之欲得仕國家也管仲大悦以報桓公桓公乃修官府齊戒五日見甯子因以為佐齊國以治君子謂妾婧為可與謀詩曰先民有言詢於芻蕘此之謂也頌曰桓遇甯戚命管迎之甯稱白水管仲憂疑妾進問焉為説其詩管嘉報公齊得以治楚江乙母楚大夫江乙之母也當恭王之時乙為郢大夫有入王宫中盗者令尹以罪乙請於王而絀之處家無幾何其母亡布八尋乃往言於王曰妾夜亡布八尋令尹盗之王方在小曲之臺令尹侍焉王謂母曰令尹信盗之寡人不為其富貴而不行法焉若不盗而誣之楚國有常法母曰令尹不身盗之也乃使人盗之王曰其使人盗奈何對曰昔孫叔敖之為令尹也道不拾遺門不閉關而盗賊自息今令尹之治也耳目不眀盗賊公行是故使盗得盗妾之布是與使人盗何以異也王曰令尹在上冦盗在下令尹不知有何罪焉母曰吁何大王之言過也昔日妾之子為郢大夫有盗王宫中之物者妾子坐而絀妾子亦豈知之哉然終坐之令尹獨何人而不以是為過也昔者周武王有言曰百姓有過在予一人上不明則下不治相不賢則國不寧所謂國无人者非無人也無理人者也王其察之王曰善非徒譏令尹又譏寡人命吏償母之布因賜金千鎰母讓金布曰妾豈貪貨而矢大王哉怨令尹之治也遂去不肯受王曰母智若此其子必不愚乃復召江乙而用之君子謂乙母善以徴喻詩云猷之未逺是用大諌此之謂也頌曰江乙失位乙母動心既歸家處亡布八尋指責令尹辭甚有度王復用乙賜母金布晉弓工妻弓工妻者晉繁人之女也當平公之時使其夫為弓三年乃成平公引弓而射不穿一札平公怒將殺弓人弓人之妻請見曰繁人之子弓人之妻也願有謁於君平公見之妻曰君聞昔者公劉之行乎羊牛踐葭葦惻然為民痛之恩及草木豈欲殺不辜者乎秦穆公有盗食其駿馬之肉反飲之以酒楚莊王臣援其夫人之衣而絶纓與飲大樂此三君者仁著於天下卒享其報名埀至今昔帝堯茅茨不剪采椽不斵土階三等猶以為為之者勞居之者逸也今妾之夫治造此弓其為之亦勞其幹生於太山之阿一日三覩隂三覩陽傳以燕牛之角纒以荆麋之筋糊以阿魚之膠此四者皆天下之妙選也而君不能以穿一札是君之不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此盖射之道也平公以其言而射穿七札繁人之夫立得出而賜金三鎰君子謂弓工妻可與處難詩曰敦弓既堅舍矢既鈞言射有法也頌曰晉平作弓三年乃成公怒弓工將加以刑妻往説公陳其幹材列其勞苦公遂釋之齊傷槐女齊傷槐女者傷槐衍之女也名倩景公有所愛槐使人守之植木懸之下令曰犯槐者刑傷槐者死於是衍醉而傷槐景公聞之曰是先犯我令使吏拘之且加罪焉倩懼乃造於相晏子之門曰賤妾不勝其欲願得備數於下晏子聞之笑曰嬰其有滛色乎何為老而見奔殆有説内之至哉既入門晏子望見之曰怪哉有深憂進而問焉對曰妾父衍幸得充城郭為公民見隂陽不調風雨不時五榖不滋之故禱祠於名山神水不勝麴糵之味先犯君令醉至於此罪故當死妾聞眀君之莅國也不損禄而加刑又不以私恚害公法不為六畜傷民人不為野草傷禾苗昔者宋景公之時大旱三年不雨召太卜而卜之曰當以人祀之景公乃降堂北面稽首曰吾所以請雨者乃為吾民也今必當以人祀寡人請自當之言未卒天大雨方千里所以然者何也以能順天慈民也今吾君樹槐令犯者死欲以槐之故殺倩之父孤妾之身妾恐傷執政之法而害眀君之義也鄰國聞之皆謂君愛樹而賤人其可乎晏子惕然而悟明日朝謂景公曰嬰聞之窮民財力謂之暴崇玩好威嚴令謂之逆刑殺不正謂之賊夫三者守國之大殃也今君窮民財力以美飲食之具繁鐘鼓之樂極宫室之觀行暴之大者也崇玩好威嚴令是逆民之明者也犯槐者刑傷槐者死刑殺不正賊民之深者也公曰寡人敬受命晏子出景公即時命罷守槐之役㧞植懸之木廢傷槐之法出犯槐之囚君子曰傷槐女能以辭免詩云是䆒是圖亶其然乎此之謂也頌曰景公愛槐民醉折傷景公將殺其女悚惶奔吿晏子稱説先王晏子為言遂免父殃楚野辯女楚野辯女者昭氏之妻也鄭簡公使大夫聘於荆至於狹路有一婦人乘車與大夫轂擊而折大夫車軸大夫怒將執而鞭之婦人曰君子不遷怒不貳過今於狹路之中妾巳極矣而子大夫之僕不肯少引是以敗子大夫之車而反執妾豈不遷怒哉既不怒僕而反怨妾豈不貳過哉周書曰毋侮鰥寡而畏髙明今子列大夫而不為之表而遷怒貳過釋僕執妾輕其微弱豈可謂不侮鰥寡乎吾鞭則鞭耳惜子大夫之䘮善也大夫慚而無以應遂釋之而問之對曰妾楚野之鄙人也大夫曰盍從我於鄭乎對曰既有狂夫昭氏在内矣遂去君子曰辯女能以倖免詩云惟號斯言有倫有脊此之謂也頌曰辯女獨乗遇鄭使者鄭使折軸執女忿怒女陳其寃亦有其序鄭使慙去不敢談語阿谷處女阿谷處女者阿谷之隧浣者也孔子南遊過阿谷之隧見處子佩瑱而浣孔子謂子貢曰彼浣者其可與言乎抽觴以授子貢曰為之辭以觀其志子貢曰我北鄙之人也自北徂南將欲之楚逢天之暑我思闕願乞一飲以伏我心處子曰阿谷之陽隱曲之地其水一清一濁流入於海欲飲則飲何問乎婢子授子貢觴迎流而挹之投而棄之從流而挹之滿而溢之跪置沙上曰禮不親授子貢還報其辭孔子曰丘已知之矣抽琴去其軫以授子貢曰為之辭子貢往曰嚮者聞子之言穆如清風不拂不寤私復我心有琴無軫願借子調其音處子曰我鄙野之人也陋固無心五音不知安能調琴子貢以報孔子孔子曰丘巳知之矣遇賢則賔抽絺綌五兩以授子貢曰為之辭子貢往曰吾北鄙之人也自北徂南將欲之楚有絺綌五兩非敢以當子之身也願注之水旁處子曰行客之人流連永久分其資財棄於野鄙妾年甚少何敢受子子不早命竊有狂夫名之者矣子貢以吿孔子孔子曰丘巳知之矣斯婦人逹於人情而知禮詩云南有喬木不可休息漢有游女不可求思此之謂也頌曰孔子出逰阿谷之南異其處子欲觀其志子貢三反女辭辨深子曰達情知禮不滛趙津女娟趙津女娟者趙河津吏之女趙簡子之夫人也初簡子南擊楚與津吏期簡子至津吏醉卧不能渡簡子欲殺之娟懼持檝而走簡子曰女子走何為對曰津吏息女妾父聞主君來渡不測之水恐風波之起水神動駭故禱祀九江三淮之神供具備禮御釐受福不勝至祝杯酌餘瀝醉至於此君欲殺之妾願以鄙軀易父之死簡子曰非女之罪也娟曰主君欲因其醉而殺之妾恐其身之不知痛而心不知罪也若不知罪殺之是殺不辜也願醒而殺之使知其罪簡子曰善遂釋不誅簡子將渡用檝者少一人娟攘捲摻檝而請曰妾願備父持檝簡子曰不榖將行選士大夫齋戒沐浴義不與婦人同舟而渡也娟對曰妾聞昔者湯伐夏左驂驪右驂牝靡而遂放桀武王伐殷左驂牝騏右驂牝䮲而遂克紂至於華山之陽主君不欲渡則巳與妾同舟又何傷乎簡子悦遂與渡中流為簡子發河邀之歌其辭曰升彼阿兮面觀清水揚波兮杳㝠㝠禱求福兮醉不醒誅將加兮妾心驚罰既釋兮凟乃清妾持檝兮操其維蛟龍助兮主將歸呼來櫂兮行勿疑簡子大悅曰昔者不榖夢娶妻豈此女乎將使人祝祓以為夫人娟乃再拜而辭曰夫婦人之禮非媒不嫁嚴親在内不敢聞命遂辭而去簡子歸乃納幣於父母而立以為夫人君子曰女娟通典而有辭詩云來游來歌以矢其音此之謂也頌曰趙簡渡河津吏醉荒將欲加誅女娟恐惶操檝進説父得不䘮維女難蔽終遂發揚趙佛肹母趙佛肹母者趙之中牟宰佛肹之母也佛肹以中牟畔趙之法以城叛者身死家收佛肹之母將論自言曰我不當死士長問其故母曰為我通於主君乃言不通則老婦死而巳士長為之言於襄子襄子出問其故母曰不得見主君則不言於是襄子見而問之曰不當死何也母曰妾之當死亦何也襄子曰而子反母曰子反母何為當死襄子曰母不能教子故使至於反母何為不當死也母曰吁以主君殺妾為有説也乃以母無教耶妾之職盡久矣此乃在於主君妾聞子少而慢者母之罪也長而不能使者父之罪也今妾之子少而不慢長又能使妾何負哉妾聞之少則為子長則為友夫死從子妾能為君長子君自擇以為臣妾之子與在論中此君之臣非妾之子君有暴臣妾無暴子是以言妾無罪也襄子曰善夫佛肹之反寡人之罪也遂釋之君子曰佛肹之母一言而發襄子之意使行不遷怒之徳以免其身詩云既見君子我心冩兮此之謂也頌曰佛肹既叛其母任理將就於論自言襄子陳列母職子長在君襄子説之遂釋不論齊威虞姬虞姬者名娟之齊威王之姬也威王即位九年不治委政大臣佞臣周破胡專權擅勢嫉賢妬能即墨大夫賢而日毁之阿大夫不肖反日譽之虞姬謂王曰破胡讒䛕之臣也不可不退齊有北郭先生者賢明有道可置左右破胡聞之乃惡虞姬曰其幼弱在於閭巷之時嘗與北郭先生通王疑之乃閉虞姬於九層之臺而使有司即窮騐問破胡賂執事者使竟其罪執事者誣其辭而上之王視其辭不合於意乃召虞姬而自問焉虞姬對曰妾娟之幸得蒙先人之遺體生於天壤之間去蓬廬之下侍眀王之讌泥附王著薦牀蔽席供職掃除掌奉湯沐至今十餘年矣惓惓之心兾幸補一言而為邪臣所擠湮於百重之下不意大王乃復見而與之語妾聞玉石墜泥不為汚柳下覆寒女不為亂積之於素雅故不見疑也經𤓰田不躡履過李園不正冠妾不避此罪一也既陷難中有司受賂聼用邪人卒見覆冒不能自明妾聞寡婦哭城城為之崩亡士嘆市市為之罷誠信發内感動城市妾之寃明於白日雖獨號於九層之内而衆人莫為毫釐此妾之罪二也既有汚名而加此二罪義固不可以生所以生者為莫白妾之汚名也且自古有之伯竒放野申生被患孝順至明反以為殘妾既當死不復重陳然願戒大王羣臣為邪破胡最甚王不執政國殆危矣於是王大寤出虞姬顯之於朝市封即墨大夫以萬户烹阿大夫與周破胡遂起兵收故侵地齊國震懼人知烹阿大夫不敢飾非務盡其職齊國大治君子謂虞姬好善詩云既見君子我心則降此之謂也頌曰齊威惰政不治九年虞姬譏刺反害其身姬列其事上指皇天威王覺寤卒距强秦齊鍾離春鍾離春者齊無鹽邑之女宣王之正后也其為人極醜無雙臼頭深目長指大節卬鼻結喉肥頂少髮折腰出胸皮膚若漆行年四十無所容入􅃷嫁不售流棄莫執於是乃拂拭短褐自詣宣王謂謁者曰妾齊之不售女也聞君王之聖徳願備後宫之掃除頓首司馬門外唯王幸許之謁者以聞宣王方置酒於漸臺左右聞之莫不掩口大笑曰此天下强顔女子也豈不異哉於是宣王乃召見之謂曰昔者先王為寡人娶妃匹皆巳備有列位矣今夫人不容於鄉里布衣而欲干萬乘之主亦有何竒能哉鍾離春對曰無有特竊慕大王之美義耳王曰雖然何喜良久曰竊嘗喜隱宣王曰隱固寡人之所願也試一行之言未卒忽然不見宣王大驚立發隱書而讀之退而推之又未能得明日又更召而問之不以隱對但揚目衘齒舉手拊膝對曰今大王之君國也西有衡秦之患南有强楚之讎外有二國之難内聚姦臣衆人不附春秋四十壯男不立不務衆子而務衆婦尊所好忽所恃一旦山陵崩弛社稷不定此一殆也漸臺五重黄金白玉琅玕籠䟽翡翠珠璣幕絡連飾萬民罷極此二殆也賢者匿於山林諂諛强於左右邪偽立於本朝諫者不得通入此三殆也飲酒沈湎以夜繼晝女樂俳優縱横大笑外不修諸侯之禮内不秉國家之治此四殆也故曰殆哉殆哉於是宣王喟然而嘆曰痛乎無鹽君之言乃今一聞於是拆漸臺罷女樂退諂諛去雕琢選兵馬實府庫四辟公門招進直言延及側陋卜擇吉日立太子進慈母拜無鹽君為后而齊國大安者醜女之力也君子謂鍾離春正而有辭詩云既見君子我心則喜此之謂也頌曰無鹽之女干説齊宣分别四殆稱國亂煩宣王從之四辟公門遂立太子拜無鹽君齊宿瘤女宿瘤女者齊東郭採桑之女閔王之后也項有大瘤故號曰宿瘤初閔王出遊至東郭百姓盡觀宿瘤採桑如故王怪之召問曰寡人出遊車騎甚衆百姓無少長皆棄事來觀汝採桑道旁曾不一視何也對曰妾受父母教採桑不受教觀大王王曰此竒女也惜哉宿瘤女曰婢妾之職屬之不二予之不忘中心謂何宿瘤何傷王大悦之曰此賢女也命後乘載之女曰頼大王之力父母在内使妾不受父母之教而随大王是奔女也大王又安用之王大慙曰寡人失之又曰貞女一禮不備雖死不從於是王遣歸使使者加金百鎰往聘迎之父母驚惶欲洗沐加衣裳女曰如是見王則變容更服不見識也請死不往於是如故隨使者閔王歸見諸夫人吿曰今日出遊得一聖女今至斥汝屬矣諸夫人皆怪之盛服而衛遲其至也宿瘤駭宫中諸夫人皆掩口而笑左右失貎不能自止王大慙曰且無笑不飾耳夫飾與不飾固相去十百也女曰夫飾相去千萬尚不足言何獨十百也王曰何以言之對曰性相近習相逺也昔者堯舜桀紂俱天子也堯舜自飾以仁義雖為天子安於節儉茅茨不剪采椽不斵後宫衣不重采食不重味至今數千嵗天下歸善焉桀紂不自飾以仁義習為苛文造為髙臺深池後宫蹈綺縠弄珠玉意非有饜時也身死國亡為天下笑至今千餘嵗天下歸惡焉由是觀之飾與不飾相去千萬尚不足言何獨十百也於是諸夫人皆大慙閔王大感瘤女以為后出令卑宫室填池澤損膳减樂後宫不得重采期月之間化行鄰國諸侯朝之侵三晉懼秦楚一立帝號閔王至於此也宿瘤女有力焉及女死之後燕遂屠齊閔王逃亡而弑死於外君子謂宿瘤女通而有禮詩云菁菁者莪在彼中阿既見君子樂且有儀此之謂也頌曰齊女宿瘤東郭採桑閔王出遊不為變常王召與語諌辭甚明卒升后位名聲光榮齊孤逐女孤逐女者齊即墨之女齊相之妻也初逐女孤無父母狀甚醜三逐於鄉五逐於里過時無所容齊相婦死逐女造襄王之門而見謁者曰妾三逐於鄉五逐於里孤無父母擯棄於野无所容止願當君王之盛顔盡其愚辭左右復於王王輟食吐哺而起左右曰三逐於鄉者不忠也五逐於里者少禮也不忠少禮之人王何為遽王曰子不識也夫牛鳴而馬不應非不聞牛聲也異類故也此人必有與人異者矣遂見與之語三日始一日曰大王知國之柱乎王曰不知也逐女曰柱相國是也夫柱不正則棟不安棟不安則榱橑墮則屋幾覆矣王則棟矣庶民榱橑也國家屋也夫屋堅與不堅在乎柱國家安與不安在乎相今大王既有明知而國相不可不審也王曰諾其二日王曰吾國相奚若對曰王之國相比目之魚也外比内比然後能成其事就其功王曰何謂也逐女曰朋其左右賢其夫妻是外比内比也王曰吾相其可易乎逐女對曰中才也求之未可得也如有過之者何為不可也今則未有妾聞明王之用人也推一而用之故楚用虞丘子而得孫叔敖燕用郭隗而得樂毅大王誠能厲之則此可用矣王曰吾用之奈何逐女對曰昔者齊桓公尊九九之人而有道之士歸之越王敬螳蜋之怒而勇士死之葉公好龍而龍為暴下物之所徴固不須頃王曰善遂尊相敬而事之以逐女妻之齊國以治詩曰既見君子並坐歌瑟此之謂也頌曰齊孤逐女造襄王門女雖五逐王猶見焉談國之政亦甚有文與語三日遂配相君楚處莊姪楚處莊姪者楚頃襄王之夫人縣邑之女也初頃襄王好臺榭出入不時行年四十不立太子諫者蔽塞屈原放逐國既殆矣秦欲襲其國乃使張儀間之使其左右謂王曰南遊於唐五百里有樂焉王將往是時莊姪年十二謂其母曰王好滛樂出入不時春秋既盛不立太子今秦又使人重賂左右以惑我王使遊五百里之外以觀其勢王巳遊姦臣必倚敵國而發謀王必不能反國姪願往諫之其母曰汝嬰兒也安知諫不遣姪乃逃以緹竿為幟姪持幟伏南郊道旁王車至姪舉其幟王見之而止使人往問之使者報曰有一女童伏於幟下願有謁於王王曰召之姪至王曰女何為者也姪對曰妾縣邑之女也欲言隱事於王恐壅閼蔽塞而不得見聞大王出遊五百里因以幟見王曰子何以戒寡人姪對曰大魚失水有龍无尾墻欲内崩而王不視王曰不知也姪對曰大魚失水者王離國五百里也樂之於前不思禍之起於後也有龍无尾者年既四十无太子也國无强輔必且殆也墻欲内崩而王不視者禍亂且成而王不改也王曰何謂也姪曰王好臺榭不恤衆庶出入不時耳目不聰明春秋四十不立太子國無强輔外内崩壊强秦使人内間王左右使王不改滋日以甚今禍且搆王遊於五百里之外王必遂往國非王之國也王曰何也姪曰王之致此三難也以五患王曰何謂五患姪曰宫室相望城郭濶逹一患也宫垣衣綉民人無褐二患也奢侈無度國且虚竭三患也百姓饑餓馬有餘秣四患也邪臣在側賢者不逹五患也王有五患故及三難王曰善命後車載之立還反國門已閉反者巳定王乃發鄢郢之師以擊之僅能勝之乃立姪為夫人位在鄠子袖之右為王陳節儉愛民之事楚國復强君子謂莊姪雖違於禮而終守以正詩云北風其喈雨雪霏霏惠而好我携手同歸此之謂也頌曰楚處莊姪雖為女童以幟見王陳國禍凶設王三難五患累重王載以歸終卒有功齊女徐吾齊女徐吾者齊東海上貧婦人也與鄰婦李吾之屬㑹燭相從夜績徐吾最貧而燭數不屬李吾謂其屬曰徐吾燭數不屬請無與夜也徐吾曰是何言與妾以貧燭不屬之故起常先息常後洒掃陳席以待來者自與蔽薄坐常處下凡為貧燭不屬故也夫一室之中益一人燭不為暗損一人燭不為明何愛東壁之餘光不使貧妾得蒙見哀之恩長為妾役之事使諸君常有惠施於妾不亦可乎李吾莫能應遂復與夜終無後言君子曰婦人以辭不見棄於鄰則辭安可以巳乎哉詩曰辭之輯矣民之洽矣此之謂也頌曰齊女徐吾㑹績獨貧夜托燭明李吾絶焉徐吾自列辭語甚分卒得容人終没後言齊太倉女齊太倉女者漢太倉令淳于公之少女也名緹縈淳于公無男有女五人孝文皇帝時淳于公有罪當刑是時肉刑尚在詔獄繫長安當行㑹逮公罵其女曰生子不生男緩急非有益緹營自悲泣而随其父至長安上書曰妾父為吏齊中皆稱亷平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無由也妾願入身為官婢以贖父罪使得自新書奏天子憐悲其意乃下詔曰葢聞有虞之時畫衣冠異章服以為戮而民不犯何其至治也今法有肉刑三而姦不止其咎安在非朕徳薄而教之不明歟吾甚自媿夫訓道不純而愚民陷焉詩云愷悌君子民之父母今人有過教未施而刑巳加焉或欲改行為善而其道毋繇朕甚憐之夫刑者至斷支體刻肌膚終身不息何其痛而不徳也豈稱為民父母之意哉其除肉刑自是之後鑿顛者髠抽脅者笞刖足者鉗淳于公遂得免焉君子謂緹縈一言發聖王之意可謂得事之宜矣詩云辭之懌矣民之莫矣此之謂也頌曰緹縈訟父亦孔有識推誠上書文雅甚備小女之言乃感聖意終除肉刑以免父事古列女傳巻六
