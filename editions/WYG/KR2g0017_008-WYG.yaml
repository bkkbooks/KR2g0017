body:
  text: 乾隆甲子秋九月欽定四庫全書史部七古列女傳傳記𩔖三總錄之屬提要臣等謹案古列女傳七巻續一巻列女傳漢劉向撰向字子政本名更生楚元王之後以父任為輦郎厯中壘校尉事蹟具漢書本傳漢書藝文志儒家𩔖傳向所序六十七篇注曰新序説苑世説列女傳頌圖也隋書經籍志雜傳𩔖載列女傳十五巻註曰劉向撰曹大家注其書屡經傳寫至宋代已非復古本故曽鞏序錄稱曹大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰毋及東漢以來凡十六事非向本書然也嘉祐中集賢校理蘇頌始以頌義篇次復定其書為八篇與十五篇者並藏於館閣是鞏校錄時已有二本也又王回序曰此書有母儀賢明仁智貞節慎義辨通嬖孽等目而各頌其義圖其狀總為卒篇傳如太史公記頌如詩之四言而圖為屏風然世所行向書乃分傳毎篇上下併頌為十五巻其十二巻無頌三傳同時人五傳其後人通題曰向撰題其頌曰向子歆撰與漢史不合故崇文總目以陳嬰母等十六傳為後人所附予以頌考之毎篇皆十五傳耳則凡無頌者宜皆非向所奏書不特自陳嬰母為斷也向所序書多散亡獨此幸存而復為他手所亂故併錄其目而以頌證之刪為八篇號古列女傳餘十二傳其文亦奥雅可喜故又以時次之别為一篇號續列女傳又稱直秘閣吕縉叔集賢校理蘓子容象山令林次中各言嘗見母儀賢明四傳於江南人家其書為古佩服而各題其頌像側是回所見一本所聞一本所刪定又一本也錢曽讀書敏求記曰此本始於有虞二妃至趙悼后號古列女傳周郊婦人至東漢梁嬺等以時次之别為一篇號續列女傳頌義大序列於目錄前小序七篇散見目錄中間頌見各人傳後而傳各有圖巻首標題晉大司馬參軍顧愷之圖畫蘓子容嘗見江南人家舊本其畫為古佩服各題其頌像側者與此恰相符合定為古本無疑云云此本即曽家舊物題識印記並存騐其板式紙色確為宋槧誠希覯之珍笈惟蘇頌等所見江南本在王回刪定以前而此本八篇之數與回本合古列女傳續列女傳之目亦與回本合即嘉祐八年回所重編之本曽據以為江南舊本則稍失之耳其頌本向所作曽鞏及回所言不誤而晁公武讀書志乃執隋志之文詆其誤信顔籀之註不知漢志舊註凡稱師古曰者乃籀註其不題姓氏者皆班固之自註以頌圖屬向乃固説非籀説也考顔氏家訓稱列女傳劉向所造其子歆又作頌是訛傳頌為歆作始於六朝修隋志時去之推僅四五十年襲其誤耳豈可遽以駁漢書乎續傳一巻曽鞏以為班眧作其説無證特以意為之晁公武竟以為項原作舛謬彌甚隋志載項原列女後傳十巻非一巻也必牽引旁文曲相符㑹則隋志又有趙母註列女傳七巻髙氏列女傳八巻皇甫謐列女傳六巻綦母䆳列女傳七巻又有曹植列女傳頌一巻繆襲列女讃一巻將續傳亦可牽為趙母等頌亦可牽為曹植等矣又豈止劉歆班昭項原乎今前七巻及頌題向名續傳一巻則不署撰人庶㡬核其實而闕所疑焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書古列女傳目録巻一母儀傳古列女傳頌義大序一篇小序七章頌一百單五章云劉歆撰大序見前惟若母儀賢聖有智行為儀表言則中義胎養子孫以漸教化既成以徳致其功業姑母察此不可不法右係頌義小序頌見逐傳篇末有虞二妃棄母姜嫄契母簡狄啓母塗山湯妃有㜪周室三母衛姑定姜齊女傅母魯季敬姜楚子發母鄒孟軻母魯之母師魏芒慈母齊田稷母巻二賢眀傳惟若賢明亷正以方動作有節言成文章咸曉事理知世紀綱循法興居終身無殃妃后賢焉名號必揚右頌義小序周宣姜后齊桓衛姬晉文齊姜秦穆公姬楚莊樊姬周南之妻宋鮑女宗晉趙衰妻陶荅子妻栁下惠妻魯黔婁妻齊相御妻楚接輿妻楚老萊妻楚於陵妻巻三仁智𫝊惟若仁智豫識難易原度天道禍福所移歸義從安危險必避專專小心永懼匪懈夫人省兹榮名必利宻康公母楚武鄧曼許穆夫人曹僖氏妻孫叔敖母晉伯宗妻衛靈夫人齊靈仲子魯臧孫母晉羊叔姬晉范氏母魯公乗姒魯漆室女魏曲沃婦趙將括母巻四貞順傳惟若貞順修道正進避嫌逺别為必可信終不更二天下之俊勤正潔行精專謹慎諸姬觀之以為法訓召南申女宋恭伯姬衛宣夫人蔡人之妻黎荘夫人齊孝孟姬息君夫人齊把梁妻楚平伯嬴楚昭貞姜楚白貞姬衛宗二順魯寡陶嬰梁寡髙行陳寡孝婦巻五節義傳惟若節義必死無避好善慕節終不背義誠信勇敢何有險詖義之所在赴之不疑姜姒法斯以為世基魯孝義保楚成鄭瞀晉圉懐嬴趙昭越姬蓋將之妻魯義姑姊代趙夫人齊義繼母魯秋潔婦周主忠妾魏節乳母梁節姑姊珠崖二義郃陽友娣京師節女巻六辯通傳惟若辯通文辭可從連類引譬以投禍凶推摧一切後不復重終能一心開意甚公妻妾則焉為世所誦齊管妾倩楚江乙母晉弓工女齊傷槐女楚野辯女阿谷處女趙津女娟趙佛肸母齊鍾離春無鹽齊威虞姬齊宿瘤女齊孤逐女楚處莊姪齊女徐吾齊太倉女巻七孽嬖傳惟若孽嬖亦甚嫚易淫妬熒惑背節棄義指是為非終被禍敗夏桀末喜殷紂妲巳周幽襃姒衛宣公姜魯桓文姜魯荘哀姜晉獻驪姬魯宣穆姜陳女夏姬齊靈聲姬齊東郭姬衛二亂女趙靈吳女楚考李后趙悼倡女巻八續列女傳周郊婦人續仁智第十二陳國辯女續辯通第七聶政之姊續節義第十三王孫氏母續節義第十四陳嬰之母續賢明第十六王陵之母續節義第十九張湯之母續仁智第十八雋不疑母續母儀第十七漢楊夫人續賢明第十八漢霍夫人綺孽嬖第十七嚴延年母續仁智第十七漢馮昭儀續節義第十八右十二傳漢成帝前人而無頌王章妻女續仁智第十九班女媫妤續辯通第十七漢趙飛燕續孽嬖第四孝平王后續貞順第十一更始夫人續孽嬖第十八梁鴻之妻續賢明第十七明德馬后續母儀第七梁夫人嬺續辯通第十八右三傳成帝同時人五傳後時人而皆班氏前人或同時人並無頌崇文總目序右列女傳劉向撰後漢班氏注按向作列女傳八篇一曰母儀二曰賢明三曰仁智四曰貞順五曰節義六曰辯通七曰孽嬖八曰傳頌謹按列女傳頌義大序小序及頌或者皆以為劉向子劉歆作驥謹按隋書崇文總目及本朝曽校書序則非歆作明矣然崇文總目則以續二十傳無頌附入向七篇中分上下為一十四篇并傳頌一篇共成一十五篇今人則以向所撰列女傳七篇并續列女傳二十傳為一篇共計八篇今止依此将頌義大序列於目錄前小序七篇散見目錄中間頌見各人傳後觀者宜詳察焉嘉定七年甲戌十二月初五日武夷蔡驥孔良拜手謹書欽定四庫全書古列女傳巻一漢劉向撰母儀傳有虞二妃有虞二妃者帝堯之二女也長娥皇次女英舜父頑母嚚父號瞽瞍弟曰象敖游於嫚舜能諧柔之承事瞽䏂以孝母憎舜而愛象舜猶内治靡有姦意四嶽薦之於堯堯乃妻以二女以觀厥内二女承事舜於畎畝之中不以天子之女故而驕盈怠嫚猶謙謙恭儉思盡婦道瞽瞍與象謀殺舜使塗廩舜歸告二女曰父母使我塗廩我其往二女曰往哉舜既治廩乃捐階瞽瞍焚廩舜往飛出象復與父母謀使舜浚井舜乃告二女二女曰俞往哉舜往浚井格其出入從掩舜潜出時既不能殺舜瞽瞍又使舜飲酒醉将殺之舜告二女二女乃與舜藥浴汪遂往舜終日飲酒不醉舜之女弟繫憐之與二嫂諧父母欲殺舜怒之不已舜猶不怨舜往于田號泣日呼旻天呼父母惟害若兹思慕不巳不怨其弟篤厚不怠既納于百揆賔于四門選于林木入于大麓堯試之百方毎事常謀于二女舜既嗣位升為天子娥皇為后女英為妃封象于有庳事瞽瞍猶若焉天下稱二妃聰眀貞仁舜陟方死於蒼梧號曰重華二妃死於江湘之間俗謂之湘君君子曰二妃徳純而行篤詩云不顯惟徳百辟其型之此之謂也頌曰元始二妃帝堯之女嬪列有虞承舜於下以尊事卑終能勞苦瞽瞍和寧卒享福祐棄母姜嫄棄母姜嫄者邰侯之母也當堯之時行見巨人跡好而履之歸而有娠浸以益大心怪惡之卜筮禋祀以求無子終生子以為不祥而棄之隘巷牛羊避而不踐乃送之平林之中後伐平林者咸薦之覆之乃取置寒氷之上飛鳥傴翼之姜嫄以為異乃收以歸因命曰棄姜嫄之性清静專一好種稼穡及棄長而教之種樹桑麻棄之性眀而仁能育其教卒致其名堯使棄居稷官更國邰地遂封棄於邰號曰后稷及堯崩舜即位乃命之曰棄黎民阻饑汝后稷播時百榖其後世世居稷至周文武而興為天子君子謂姜嫄静而有化詩云赫赫姜嫄其德不囘上帝是依又曰思文后稷克配彼天立我蒸民此之謂也頌曰棄母姜嫄清静專一履跡而孕懼棄於野鳥獸覆翼乃復收恤卒為帝佐母道既畢契母簡狄契母簡狄者有娀氏之長女也當堯之時與其妹娣浴於𤣥丘之水有𤣥鳥衘卵過而墜之五色甚好簡狄與其妹娣競往取之簡狄得而含之誤而吞之遂生契焉簡狄性好人事之治上知天文樂於施惠及契長而教之理順之序契之性聰眀而仁能育其教卒致其名堯使為司徒封之於亳及堯崩舜即位乃勅之曰契百姓不親五品不遜汝作司徒而敬敷五教在寛其後世世居亳至殷湯興為天子君子謂簡狄仁而有禮詩云有娀方将立子生商又曰天命𤣥鳥降而生商此之謂也頌曰契母簡狄敦仁勵翼吞卵産子遂自修飾教以事理推恩有德契為帝輔盖母有力啓母塗山啓母者塗山氏長女也夏禹娶以為妃既生啓辛壬癸甲啓呱呱泣禹去而治水惟荒度土功三過其家不入其門塗山獨眀教訓而致其化焉及啓長化其徳而從其教卒致令名禹為天子而啓為嗣持禹之功而不殞君子謂塗山彊於教誨詩云釐爾士女從以孫子此之謂也頌曰啓母塗山維配帝禹辛壬癸甲禹往敷土啓呱呱泣母獨論序教訓以善卒繼其父湯妃有㜪湯妃有㜪者有㜪氏之女也殷湯娶以為妃生仲壬外丙亦眀教訓致其功有㜪之妃湯也統領九嬪後宫有序咸無妬媢逆理之人卒致王功君子謂妃眀而有序詩云窈窕淑女君子好逑言賢女能為君子和好衆妾其有㜪之謂也頌曰湯妃有㜪質行聰眀媵從伊尹自夏適殷勤慤洽中九嬪有行化訓内外亦無愆殃周室三母三母者太姜太任太姒太姜者王季之母有吕氏之女太王娶以為妃生太伯仲雍王季貞順率導靡有過失太王謀事遷徙必與太姜君子謂太姜廣於徳教太任者文王之母摯任氏中女也王季娶為妃太任之性端一誠荘惟徳之行及其有娠目不視惡色耳不聽淫聲口不出敖言能以胎教溲於豕牢而生文王文王生而眀聖太任教之以一而識百君子謂太任為能胎教古者婦人姙子寝不側坐不邉立不蹕不食邪味割不正不食席不正不坐目不視於邪色耳不聽於淫聲夜則令瞽誦詩道正事如此則生子形容端正才德必過人矣故姙子之時必慎所感感於善則善感於惡則惡人生而肖萬物者皆其母感於物故形音肖之文王母可謂知肖化矣太姒者武王之母禹後有莘姒氏之女仁而眀道文王嘉之親迎於渭造舟為梁及入太姒思媚太姜太任旦夕勤勞以進婦道太姒號曰文母文王治外文母治内太姒生十男長伯邑考次武王發次周公旦次管叔鮮次蔡叔度次曹叔振鐸次霍叔武次成叔處次康叔封次聃季載太姒教誨十子自少及長未嘗見邪僻之事及其長文王繼而教之卒成武王周公之德君子謂太姒仁眀而有德詩曰大邦有子俔天之妹文定厥祥親迎於渭造舟為梁不顯其光又曰太姒嗣徽音則百斯男此之謂也頌曰周室三母太姜任姒文武之興盖由斯起太姒最賢號曰文母三姑之德亦甚大矣衛姑定姜衛姑定姜者衛定公之夫人公子之母也公子既娶而死其婦無子畢三年之䘮定姜歸其婦自送之至於野㤙愛哀思悲心感慟立而望之揮泣埀涕乃賦詩曰燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨送去婦泣而望之又作詩曰先君之思以畜寡人君子謂定姜為慈姑過而之厚定公惡孫林父孫林父奔晉晉侯使郤犫為請還定公欲辭定姜曰不可是先君宗卿之嗣也大國又以為請而弗許将亡雖惡之不猶愈於亡乎君其忍之夫安民而宥宗卿不亦可乎定公遂復之君子謂定姜能逺患難詩曰其儀不忒正是四國此之謂也定公卒立敬姒之子衎為君是為獻公獻公居䘮而慢定姜既哭而息見獻公之不哀也不内食飲嘆曰是将敗衛國必先害善人夫禍衞國也夫吾不獲鱄也使主社稷大夫聞之皆懼孫文子自是不敢舍其重器於衛鱄者獻公弟子鮮也賢而定姜欲立之而不得後獻公暴虐慢侮定姜卒見逐走出亡至境使祝宗告亡且告無罪於廟定姜曰不可若令無神不可誣有罪若何告無罪也且公之行舎大臣而與小臣謀一罪也先君有家卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而巳無告無罪其後頼鱄力獻公復得反國君子謂定姜能以辭教詩云我言惟服此之謂也鄭皇耳率師侵衛孫文子卜追之獻兆於定姜曰兆如山林有夫出征而䘮其雄定姜曰征者䘮雄禦冦之利也大夫圖之衛人追之獲皇耳於大丘君子謂定姜達於事情詩云左之左之君子宜之此之謂也頌曰衞姑定姜送婦作詩㤙愛慈惠泣而望之數諫獻公得其罪尤聰眀逺識䴡於文辭齊女傅母傅母者齊女之傅母也女為衛荘公夫人號曰荘姜姜交好始往􅋵行衰惰有冶容之行淫泆之心傅母見其婦道不正諭之云子之家世世尊榮當為民法則子之質聰達於事當為人表式儀貎壮䴡不可不自修整衣錦絅裳飾在輿馬是不貴德也乃作詩曰碩人其頎衣錦絅衣齊侯之子衛侯之妻東宫之妹邢侯之姨譚公維私砥厲女之心以髙節以為人君之子弟為國之夫人尤不可有邪僻之行焉女遂感而自修君子善傅母之防未然也荘姜者東宫得臣之妹也無子姆戴媯之子桓公公子州吁嬖人之子也有寵驕而好兵荘公弗禁後州吁果殺桓公詩曰無教猱升木此之謂也頌曰齊女傅母防女未然稱列先祖莫不尊榮作詩眀指使無辱先荘姜姆妹卒能脩身魯季敬姜魯季敬姜者莒女也號戴巳魯大夫公父穆伯之妻文伯之母季康子之從祖叔母也博達知禮穆伯先死敬姜守養文伯出學而還歸敬姜側目而盼之見其友上堂從後堦降而却行奉劒而正履若事父兄文伯自以為成人矣敬姜召而數之曰昔者武王罷朝而結絲􅙋絶左右顧無可使結之者俯而自申之故能成王道桓公坐友三人諫臣五人日舉過者三十人故能成霸業周公一食而三吐哺一沐而三握髪所執贄而見於窮閭隘巷者七十餘人故能存周室彼二聖一賢者皆霸王之君也而下人如此其所與逰者皆過已者也是以日益而不自知也今以子年之少而位之卑所與逰者皆為服役子之不益亦以眀矣文伯乃謝罪於是乃擇嚴師賢友而事之所與逰處者皆黄耄倪齒也文伯引祍攘捲而親饋之敬姜曰子成人矣君子謂敬姜偹於教化詩云濟濟多士文王以寧此之謂也文伯相魯敬姜謂之曰吾語汝治國之要盡在經矣夫幅者所以正曲枉也不可不彊故幅可以為将畫者所以均不均服不服也故畫可以為正物者所以治蕪與莫也故物可以為都大夫持交而不失出入不絶者梱也梱可以為大行人也推而往引而来者綜也綜可以為闗内之師主多少之數者均也均可以為内史服重任行逺道正直而固者軸也軸可以為相舒而無窮者摘也摘可以為三公文伯再拜受教文伯退朝朝敬姜敬姜方績文伯曰以􅢴之家而主猶績懼干季孫之怒其以􅢴為不能事主乎敬姜嘆曰魯其亡乎使吾子備官而未之聞耶居吾語女昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民嚮義勞也是故天子大采朝日與三公九卿祖識地徳日中考政與百官之政事使師尹維旅牧宣敬民事少采夕月與太史司載糾䖍天刑日入監九御使潔奉禘郊之粢盛而後即安諸侯朝修天子之業令晝考其國夕省其典刑夜儆百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而講肄夕而習復夜而計過無憾而後即安自庶人巳下眀而動晦而休無日以怠王后親織𤣥紞公侯之夫人加之以紘綖卿之内子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事烝而獻功男女効績否則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以辟吾兾汝朝夕修我曰必無廢先人爾今也曰胡不自安以是承君之官余懼穆伯之絶祀也仲尼聞之曰弟子記之季氏之婦不淫矣詩曰婦無公事休其蠶織言婦人以蠶織為公事者也休之非禮也文伯飲南宫敬叔酒以露堵父為客羞鼈焉小堵父怒相延食鼈堵父辭曰将使鼈長而食之遂出敬姜聞之怒曰吾聞之先子曰祭養尸饗養上賔鼈於人何何有而使夫人怒遂逐文伯五日魯大夫辭而復之君子謂敬姜為慎㣲詩曰我有㫖酒嘉賔式燕以樂言尊賔也文伯卒敬姜戒其妾曰吾聞之好内女死之好外士死之今吾子夭死吾惡其以好内聞也二三婦之辱共祀先祀者請毋瘠色毋揮涕毋陷膺毋憂容有降服毋加服從禮而静是昭吾子仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知矣欲眀其子之令德詩曰君子有穀貽厥孫子此之謂也敬姜之處䘮也朝哭穆伯暮哭文伯仲尼聞之曰季氏之婦可謂知禮矣愛而無私上下有章敬姜嘗如季氏康子在朝與之言不應從之及寝門不應而入康子辭於朝而入見曰肥也不得聞命毋乃罪耶敬姜對曰子不聞耶天子及諸侯合民事於内朝自卿大夫以下合官職於外朝合家事於内朝寝門之内婦人治其職焉上下同之夫外朝子将業君之官職焉内朝子将庀季氏之政焉皆非吾所敢言也康子嘗至敬姜䦱門而與之言皆不踰閾祭悼子康子與焉酢不受徹俎不讌宗不具不繹繹不盡飲則不退仲尼謂敬姜别於男女之禮矣詩曰女也不爽此之謂也頌曰文伯之母號曰敬姜通達知禮德行光眀匡子過失教以法理仲尼賢焉列為慈母楚子發母楚将子發之母也子發攻秦絶粮使人請於王因歸問其母母問使者曰士卒得無恙乎對曰士卒并分菽粒而食之又問将軍得無恙乎對曰将軍朝夕芻豢黍粱子發破秦而歸其母閉門而不内使人數之曰子不聞越王勾踐之伐吳客有獻醇酒一器王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一􅇸糗糒者王又以賜軍士分而食之甘不踰嗌而戰自十也今子為将士卒并分菽粒而食之子獨朝夕芻豢黍粱何也詩不云乎好樂無荒良士休休言不失和也夫使人入於死地而自康樂於其上雖有以得勝非其術也子非吾子也無入吾門子發於是謝其母然後内之君子謂子發母能以教誨詩云教誨爾子式榖似之此之謂也頌曰子發之母刺子驕泰将軍稻粱士卒菽粒責以無禮不得人力君子嘉焉編於母德鄒孟軻母鄒孟軻之母也號孟母其舍近墓孟子之少也嬉逰為墓間之事踴躍築埋孟母曰此非吾所以居處子乃去舎市傍其嬉戱為賈人衒賣之事孟母又曰此非吾所以居處子也復徙舎學宫之旁其嬉逰乃設俎豆揖譲進退孟母曰真可以居吾子矣遂居及孟子長學六藝卒成大儒之名君子謂孟母善以漸化詩云彼姝者子何以予之此之謂也孟子之少也既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀斷其織孟子懼而問其故孟母曰子之廢學若吾㫁斯織也夫君子學以立名問則廣知是以居則安寧動則逺害今而廢之是不免於厮役而無以離於禍患也何以異於織績而食中道廢而不為寧能衣其夫子而長不乏粮食哉女則廢其所食男則墮於修德不為竊盗則為虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知為人母之道矣詩云彼姝者子何以告之此之謂也孟子既娶将入私室其婦􅃝而在内孟子不悅遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊惰在室而夫子見妾勃然不恱是客妾也婦人之義盖不客宿請歸父母於是孟母召孟子而謂之曰夫禮将入門問孰存所以致敬也将上堂聲必揚所以戒人也将入户視必下恐見人過也今子不察於禮而責禮於人不亦逺乎孟子謝遂留其婦君子謂孟母知禮而眀於姑母之道孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敢異日閒居擁楹而嘆孟母見之曰鄉見子有憂色曰不也今擁楹而嘆何也孟子對曰軻聞之君子稱身而就位不為茍得而受賞不貪榮禄諸侯不聽則不達其土聽而不用則不踐其朝今道不用於齊願行而母老是以憂也孟母曰夫婦人之禮精五飰羃酒漿養舅姑縫衣裳而巳矣故有閨内之修而無境外之志易曰在中饋无攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三從之道也故年少則從乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒伊教此之謂也頌曰孟子之母教化列分處子擇藝使從大倫子學不進斷機示焉子遂成德為當世冠魯之母師母師者魯九子之寡母也臘日休作者嵗祀禮事畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多㓜稚嵗時禮不理吾從汝謁往監之諸子皆頓首許諾又召諸婦曰婦人有三從之義而無專制之行少繫父母長繫於夫老繫於子今諸子許我歸視私家雖踰正禮願與少子俱以備婦人出入之制諸婦其慎房户之守吾夕而返於是使少子僕歸辦家事天隂還失早至閭外而止夕而入魯大夫從䑓上見而怪之使人間視其居處禮節甚修家事甚理使者還以狀對於是大夫召母而問之曰一日從北方来至閭而止良久乃入吾不知其故甚怪之是以問也母對曰妾不幸早失夫獨與九子居臘月禮畢事閒從諸子謁歸視私家與諸婦孺子期夕而返妾恐其酺醵醉飽人情所有也妾返太早不敢復返故止閭外期盡而入大夫美之言於穆公賜母尊號曰母師使眀請夫人夫人諸姬皆師之君子謂母師能以身教夫禮婦人未嫁則以父母為天既嫁則以夫為天其䘮父母則降服一等無二天之義也詩云出宿于濟飲餞于禰女子有行逺父母兄弟頌曰九子之母誠知禮經謁歸還反不揜人情德行既備卒䝉其榮魯君賢之號以尊名魏芒慈母魏芒慈母者魏孟陽氏之女芒夘之後妻也有三子前妻之子有五人皆不愛慈母遇之甚異猶不愛慈母乃令其三子不得與前妻子齊衣服飲食起居進退甚相逺前妻之子猶不愛於是前妻中子犯魏王令當死慈母憂戚悲哀帶圍减尺朝夕勤勞以救其罪人有謂慈母曰人不愛母至甚也何為勤勞憂懼如此慈母曰如妾親子雖不愛妾猶救其禍而除其害獨於假子而不為何以異於凡母其父為其孤也而使妾為其繼母繼母如母為人母而不能愛其子可謂慈乎親其親而偏其假可謂義乎不慈且無義何以立於世彼雖不愛妾安可以忘義乎遂訟之魏安釐王聞之髙其義曰慈母如此可不救其子乎乃赦其子復其家自此五子親附慈母雍雍若一慈母以禮義之漸率導八子咸為魏大夫卿士各成於禮義君子謂慈母一心詩云尸鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮言心之均一也尸鳩以一心養七子君子以一儀養萬物一心可以事百君百心不可以事一君此之謂也頌曰芒夘之妻五子後母慈惠仁義扶養假子雖不吾愛拳拳若親繼母若斯亦誠可尊齊田稷母齊田稷子之母也田稷子相齊受下吏之貨金百鎰以遺其母母曰子為相三年矣禄未嘗多若此也豈修士大夫之費哉安所得此對曰誠受之於下其母曰吾聞士修身潔行不為茍得竭情盡實不行詐偽非義之事不計於心非理之利不入於家言行若一情貎相副今君設官以待子厚禄以奉子言行則可以報君夫為人臣而事其君猶為人子而事其父也盡力竭能忠信不欺務在効忠必死奉命亷潔公正故遂而无患今子反是逺忠矣夫為人臣不忠是為人子不孝也不義之財非吾有也不孝之子非吾子也子起田稷子慙而出反其金自歸罪於宣王請就誅焉宣王聞之大賞其母之義遂舍稷子之罪復其相位而以公金賜母君子謂稷母亷而有化詩曰彼君子兮不素飱兮無功而食禄不為也況於受金乎頌曰田稷之母亷潔正直責子受金以為不德忠孝之事盡材竭力君子受禄終不素食古列女傳巻一欽定四庫全書古列女傳巻二漢劉向撰賢明傳周宣姜后周宣姜后者齊侯之女也賢而有徳事非禮不言行非禮不動宣王常早卧晏起后夫人不出房姜后脫簮珥待罪於永巷使其傅母通言於王曰妾之不才妾之淫心見矣至使君王失禮而晏朝以見君王樂色而忘徳也夫茍樂色必好奢窮欲亂之所興也原亂之興從婢子起敢請婢子之罪王曰寡人不徳實自生過非夫人之罪也遂復姜后而勤於政事早朝晏退卒成中興之名君子謂姜后善於威儀而有徳行夫禮后夫人御於君以燭進至於君所滅燭適房中脫朝服衣䙝服然後進御於君雞鳴樂師擊鼓以告旦后夫人鳴珮而去詩曰威儀抑抑徳音秩秩又曰隰桑有阿其葉有幽既見君子徳音孔膠夫婦人以色親以徳固姜氏之徳行可謂孔膠也頌曰嘉兹姜后厥徳孔賢由禮動作匹配周宣引過推譲宣王悟焉夙夜崇道為中興君齊桓衛姬衛姬者衛侯之女齊桓公之夫人也桓公好淫樂衛姬為之不聽鄭衛之音桓公用管仲寗戚行霸道諸侯皆朝而衛獨不至桓公與管仲謀伐衛罷朝入閨衛姬望見桓公脫簮珥解環佩下堂再拜曰願請衛之罪桓公曰吾與衛無故姬何請耶對曰妾聞之人君有三色顯然喜樂容貌淫樂者鐘鼓酒食之色寂然清静意氣沈抑者䘮禍之色忿然充滿手足矜動者攻伐之色今妾望君舉趾髙色厲音揚意在衛也是以請之桓公許諾眀日臨朝管仲趨進曰君之􅊩朝也恭而氣下言則徐無伐國之志是釋衛也桓公曰善乃立衛姬為夫人號管仲為仲父曰夫人治内管仲治外寡人雖愚足以立於世矣君子謂衛姬信而有行詩曰展如之人兮邦之媛也頌曰齊桓衛姬忠欵誠信公好淫樂姬為修身望色請罪桓公嘉焉厥使治内立為夫人晉文齊姜齊姜者齊桓公之宗女晉文公之夫人也初文公父獻公納驪姬譛殺太子申生文公號公子重耳與舅犯奔狄適齊齊桓公以宗女妻之遇之甚善有馬二十乗将死於齊曰人生安樂而巳誰知其他子犯知文公之安齊也欲行而患之與從者謀於桑下蠶妾在焉妾告姜氏姜殺之而言於公子曰從者将以子行聞者吾巳除之矣公子必從不可以貳貳無成命自子去晉晉無寧嵗天未亡晉有晉國非子而誰子其勉之上帝臨子貳必有咎公子曰吾不動必死於此矣姜曰不可周詩曰莘莘征夫毎懐靡及夙夜征行猶恐無及况欲懐安将何及矣人不求及其能及乎亂不長世公子必有晉公子不聽姜與舅犯謀醉載之以行酒醒公子以戈逐舅犯曰若事有濟則可無所濟吾食舅氏之肉豈有饜哉遂行過曹宋鄭楚而入秦秦穆公乃以兵内之於晉晉人殺懐公而立公子重耳是為文公迎齊姜以為夫人遂霸天下為諸侯盟主君子謂齊姜潔而不瀆能育君子於善詩云彼美孟姜可與寤言此之謂也頌曰齊姜公正言行不怠勸勉晉文反國無疑公子不聽姜與犯謀醉而載之卒成霸基秦穆公姬穆姬者秦穆公之夫人晉獻公之女太子申生之同母姊與惠公異母賢而有義獻公殺太子申生逐羣公子惠公號公子夷吾奔梁及獻公卒得因秦立始即位穆姬使納羣公子曰公族者君之根本惠公不用又背秦賂晉饑請粟於秦秦與之秦饑請粟於晋晉不與秦遂興兵與晉戰獲晉君以歸秦穆公曰掃除先人之廟寡人将以晉君見穆姬聞之乃與太子罃公子𢎞與簡璧衰絰履薪以迎且告穆公曰上天降災使兩君匪以玉帛相見乃以興戎婢子娣姒不能相教以辱君命晉君朝以入婢子夕以死惟君其圖之公懼乃舍諸靈臺大夫請以入公曰獲晉公以功歸今以䘮歸将焉用遂改館晉君饋以七牢而遣之穆姬死穆姬之弟重耳入秦秦送之晉是為晉文公太子罃思母之恩而送其舅氏也作詩曰我送舅氏曰至渭陽何以贈之路車乗黄君子曰慈母生孝子詩云敬慎威儀維民之則穆姬之謂也頌曰秦穆夫人晉惠之姊秦執晉君夫人流涕痛不能救乃将赴死穆公義之遂釋其弟楚荘樊姬樊姬楚荘王之夫人也荘王即位好狩獵樊姬諌不止乃不食禽獸之肉王改過勤於政事王嘗聽朝罷晏姬下殿迎曰何罷晏也得無飢倦乎王曰與賢者語不知飢倦也姬曰王之所謂賢者何也曰虞丘子也姬掩口而笑王曰姬之所笑何也曰虞丘子賢則賢矣未忠也王曰何謂也對曰妾執巾櫛十一年遣人之鄭衛求美人進於王今賢於妾者二人同列者七人妾豈不欲擅王之愛寵哉妾聞堂上兼女所以觀人能也妾不能以私蔽公欲王多見知人能也今虞丘子相楚十餘年所薦非子弟則族昆弟未聞進賢退不肖是蔽君而塞賢路知賢不進是不忠不知其賢是不智也妾之所笑不亦可乎王悅眀日王以姬言告虞丘子丘子避席不知所對於是避舍使人迎孫叔敖而進之王以為令尹治楚三年而荘王以霸楚史書曰荘王之霸樊姬之力也詩曰大夫夙退無使君勞其君者謂女君也又曰温恭朝夕執事有恪此之謂也頌曰樊姬謙譲靡有嫉妬薦進美人與巳同處非刺虞丘蔽賢之路楚荘用焉功業遂霸周南之妻周南之妻者周南大夫之妻也大夫受命平治水土過時不来妻恐其懈於王事盖與其鄰人陳素所與大夫言國家多難惟勉强之無有譴怒遺父母憂昔舜耕於歴山漁於雷澤陶於河濵非舜之事而舜為之者為養父母也家貧親老不擇官而仕親操井臼不擇妻而娶故父母在當與時小同無虧大義不罹患害而巳夫鳯凰不離於蔚羅麒麟不入於陷穽蛟龍不及於枯澤鳥獸之智猶知避害而況於人乎生於亂世不得道理而迫於暴虐不得行義然而仕者為父母在故也乃作詩曰魴魚赬尾王室如毁雖則如毁父母孔邇盖不得巳也君子以是知周南之妻而能匡夫也頌曰周大夫妻夫出治土維戒無怠勉為父母凡事逺慮為親之在作詩魴魚以敕君子宋鮑女宗女宗者宋鮑蘇之妻也養姑甚謹鮑蘇仕衛三年而娶外妻女宗養姑愈敬因往来者請問其夫賂遺外妻甚厚女宗姒謂曰可以去矣女宗曰何故姒曰夫人既有所好子何留乎女宗曰婦人一醮不改夫死不嫁執麻枲治絲繭織紝組紃以供衣服以事夫室澈漠酒醴羞饋食以事舅姑以專一為貞以善從為順豈以專夫室之愛為善哉若其以淫意為心而扼夫室之好吾未知其善也夫禮天子十二諸侯九卿大夫三士二今吾夫誠士也有二不亦宜乎且婦人有七見去夫無一去義七去之道妬正為首淫僻竊盜長舌驕侮無子惡病皆在其後吾姒不教吾以居室之禮而反欲使吾為見棄之行将安所用此遂不聽事姑愈敬宋公聞之表其閭號曰女宗君子謂女宗謙而知禮詩云令儀令色小心翼翼古訓是式威儀是力此之謂也頌曰宋鮑女宗好禮知理夫有外妻不為變巳稱引婦道不聽其姒宋公賢之表其閭里晉趙衰妻晉趙衰妻者晉文公之女也號趙姬初文公為公子時與趙衰奔狄狄人入其二女叔隗季隗於公子公以叔隗妻趙衰生盾及返國文公以其女趙姬妻趙衰生原同屏括樓嬰趙姬請迎盾與其母而納之趙衰辭而不敢姬曰不可夫得寵而忘舊舍義好新而嫚故無恩與人勤於隘厄富貴而不顧無禮君棄此三者何以使人雖妾亦無以侍執巾櫛詩不云乎采葑采菲無以下體徳音莫違及爾同死與人同寒苦雖有小過猶與之同死而不去况於安新忘舊乎又曰讌爾新婚不我屑以盖傷之也君其逆之無以新廢舊趙衰許諾乃逆叔隗與盾来姬以盾為賢請立為嫡子使三子下之以叔隗為内婦姬親下之及盾為正卿思趙姬之讓恩請以姬之中子屏括為公族大夫曰君姬氏之愛子也㣲君姬氏則臣狄人也何以至此成公許之屏括遂以其族為公族大夫君子謂趙姬恭而有讓詩曰温温恭人維徳之基趙姬之謂也頌曰趙衰姬氏制行分眀身雖尊貴不妬偏房躬事叔隗子盾為嗣君子美之厥行孔備陶答子妻陶大夫荅子妻也答子治陶三年名譽不興家富三倍其妻數諫不用居五年從車百乗歸休宗人擊牛而賀之其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之治國也家貧國富君敬民戴故福結於子孫名埀於後世今夫子不然貪富務大不顧後害妾聞南山有𤣥豹霧雨七日而不下食何也欲以澤其毛而成文章也故藏而逺害犬彘不擇食以肥其身坐而須死耳今夫子治陶家富國貧君不敬民不戴敗忘之徴見矣願與少子俱脫姑怒遂棄之處期年答子之家果以盜誅唯其母老以免婦乃與少子歸養姑終卒天年君子謂答子妻能以義易利雖違禮求去終以全身復禮可謂遠識矣詩曰百爾所思不如我所之此之謂也頌曰答子治陶家富三倍妻諫不聽知其不改獨泣姑怒送厥母家答子逢禍復歸養姑栁下惠妻魯大夫栁下惠之妻也栁下惠處魯三黜而不去憂民救亂妻曰無乃瀆乎君子有二恥國無道而貴恥也國有道而賤恥也今當亂世三黜而不去亦近恥也栁下惠曰油油之民将陷於害吾能巳乎且彼為彼我為我彼雖祼䄇安能汚我油油然與之處仕於下位栁下既死門人将誄之妻曰将誄夫子之徳耶則二三子不如妾知之也乃誄曰夫子之不伐兮夫子之不竭兮夫子之信誠而與人無害兮屈柔從俗不強察兮䝉恥救民徳彌大兮雖遇三黜終不蔽兮愷悌君子永能厲兮嗟呼惜哉乃下世兮庶㡬遐年今遂逝兮嗚呼哀哉魂神泄兮夫子之諡宜為惠兮門人從之以為誄莫能竄一字君子謂栁下惠妻能光其夫矣詩曰人知其一莫知其他此之謂也頌曰下惠之妻賢眀有文栁下既死門人必存将誄下惠妻為之辭陳列其行莫能易之魯黔婁妻魯黔婁先生之妻也先生死曽子與門人往弔之其妻出户曽子弔之上堂見先生之尸在牖下枕墼席槀緼袍不表覆以布被手足不盡斂覆頭則足見覆足則頭見曽子曰斜引其被則斂矣妻曰斜而有餘不如正而不足也先生以不斜之故能至於此生時不邪死而邪之非先生意也曽子不能應遂哭之曰嗟乎先生之終也何以為諡其妻曰以康為諡曽子曰先生在時食不充口衣不盖形死則手足不斂旁無酒肉生不得其美死不得其榮何樂於此而諡為康乎其妻曰昔先生君嘗欲授之政以為國相辭而不為是有餘貴也君嘗賜之粟三十鍾先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不忻忻於富貴求仁而得仁求義而得義其諡曰康不亦宜乎曽子曰唯斯人也而有斯婦君子謂黔婁妻為樂貧行道詩曰彼美淑姬可與寤言此之謂也頌曰黔婁既死妻獨主䘮曽子弔焉布衣褐衾安賤甘淡不求豐美尸不揜蔽猶諡曰康齊相御妻齊相晏子僕御之妻也號曰命婦晏子将出命婦窺其夫為相御擁大盖䇿駟馬意氣洋洋甚自得也既歸其妻曰宜矣子之卑且賤也夫曰何也妻曰晏子長不滿三尺身相齊國名顯諸侯今者吾從門間觀其志氣恂恂自下思念深矣今子身長八尺乃為之僕御耳然子之意洋洋若自足者妾是以去也其夫謝曰請自改何如妻曰是懐晏子之智而加以八尺之長也夫躬仁義事眀主其名必揚矣且吾聞寧榮於義而賤不虚驕以貴於是其夫乃深自責學道謙遜常若不足晏子怪而問其故具以實對於是晏子賢其能納善自改升諸景公以為大夫顯其妻以為命婦君子謂命婦知善故賢人之所以成者其道博矣非特師傅朋友相與切磋也妃匹亦居多焉詩云髙山仰止景行行止言當常嚮為其善也頌曰齊相御妻匡夫以道眀言驕恭恂恂自效夫改易行學問靡巳晏子升之列於君子楚接輿妻楚狂接輿之妻也接輿躬耕以為食楚王使使者持金百鎰車二駟往聘迎之曰王願請先生治淮南接輿笑而不應使者遂不得與語而去妻從市来曰先生少而為義豈将老而遺之哉門外車跡何其深也接輿曰王不知吾不肖也欲使我治淮南遣使者持金駟来聘其妻曰得無許之乎接輿曰夫富貴者人之所欲也子何惡我許之矣妻曰義士非禮不動不為貧而易操不為賤而改行妾事先生躬耕以為食親績以為衣食飽衣暖據義而動其樂亦自足矣若受人重禄乗人堅良食人肥鮮而将何以待之接輿曰吾不許也妻曰君使不從非忠也從之又違非義也不如去之夫負釜甑妻戴紅器變名易姓而逺徙莫知所之君子謂接輿妻為樂道而逺害夫安貧賤而不怠於道者唯至徳者能之詩曰肅肅􅊵置㭬之丁丁言以怠於道也頌曰接輿之妻亦安貧賤雖欲進仕見時暴亂楚聘接輿妻請避館載紝易姓終不遭難楚老莱妻楚老莱子之妻也莱子逃世耕於䝉山之陽葭墻蓬室木牀蓍席衣緼食菽墾山播種人或言之楚王曰老莱賢士也王欲聘以璧帛恐不来楚王駕至老莱之門老莱方織畚王曰寡人愚陋獨守宗廟願先生幸臨之老莱子曰僕山野之人不足守政王復曰守國之孤願變先生之志老莱子曰諾王去其妻戴畚菜挾薪樵而来曰何車迹之衆也老莱子曰楚王欲使吾守國之政妻曰許之乎曰然妻曰妾聞之可食以酒肉者可隨以鞭捶可授以官禄者可隨以鈇鉞今先生食人酒肉受人官禄為人所制也能免於患乎妾不能為人所制投其畚菜而去老莱子曰子還吾為子更慮遂行不顧至江南而止曰鳥獸之解毛可績而衣之据其遺粒足以食也老莱子乃隨其妻而居之民從而家者一年成落三年成聚君子謂老莱妻果於從善詩曰衡門之下可以棲遲泌之洋洋可以療饑此之謂也頌曰老莱與妻逃世山陽蓬蒿為室莞葭為盖楚王聘之老莱将行妻曰世亂乃遂逃亡楚於陵妻楚於陵子終之妻也楚王聞於陵子終賢欲以為相使使者持金百鎰往聘迎之於陵子終曰僕有箕箒之妾請入與計之即入謂其妻曰楚王欲以我為相遣使者持金来今日為相眀日結駟連騎食方丈於前可乎妻曰夫子織屨以為食非與物無治也左琴右書樂亦在其中矣夫結駟連騎所安不過容膝食方丈於前甘不過一肉今以容膝之安一肉之味而懐楚國之憂其可乎亂世多害妾恐先生之不保命也於是子終出謝使者而不許也遂相與逃而為人灌園君子謂於陵妻為有徳行詩云愔愔良人秩秩徳音此之謂也頌曰於陵處楚王使聘焉入與妻謀懼世亂煩進往遇害不若身安左琴右書為人灌園古列女傳巻二欽定四庫全書古列女傳巻三漢劉向撰仁智傳密康公母密康公之母姓魏氏周共王逰於涇上康公従有三女奔之其母曰必致之王夫獸三為羣人三為衆女三為粲王田不取羣公行下衆王御不參一族夫粲美之物歸汝而何徳以堪之王猶不堪况爾小醜乎康公不獻王滅密君子謂密母為能識微詩曰無已太康職思其憂此之謂也頌曰密康之母先識盛衰非刺康公受粲不歸公行下衆物滿則損俾獻不聽密果滅殞楚武鄧曼鄧曼者武王之夫人也王使屈瑕為將伐羅屈瑕號莫敖與羣帥悉楚師以鬪伯比謂其御曰莫敖必敗舉趾髙心不固矣見王曰必濟師王以告夫人鄧曼曰大夫非衆之謂也其謂君撫小民以信訓諸司以徳而威莫敖以刑也莫敖狃於蒲騷之役將自用也必小羅君若不鎮撫其不設備乎於是王使賴人追之不及莫敖令於軍中曰諫者有刑及鄢師次亂濟至羅羅與盧戎擊之大敗莫敖自經荒谷羣帥囚於冶父以待刑王曰孤之罪也皆免之君子謂鄧曼為知人詩曰曽是莫聽大命以傾此之謂也王伐隨且行告鄧曼曰余心蕩何也鄧曼曰王徳薄而禄厚施鮮而得多物盛必衰日中必移盈而蕩天之道也先王知之矣故臨武事將發大命而蕩王心焉若師徒毋虧王薨於行國之福也王遂行卒於樠木之下君子謂鄧曼為知天道易曰日中則昃月盈則虧天地盈虚與時消息此之謂也頌曰楚武鄧曼見事所興謂瑕軍敗知王将薨識彼天道盛而必衰終如其言君子揚稱許穆夫人許穆夫人者衛懿公之女許穆公之夫人也初許求之齊亦求之懿公將與許女因其傅母而言曰古者諸侯之有女子也所以苞苴玩弄繫援於大國也言今者許小而逺齊大而近若今之世强者為雄如使邊境有冦戎之事維是四方之故赴告大國妾在不猶愈乎今舎近而就逺離大而附小一旦有車馳之難孰可與慮社稷衛侯不聽而嫁之於許其後翟人攻衛大破之而許不能救衛侯遂奔走渉河而南至楚丘齊桓往而存之遂城楚丘以居衛侯於是悔不用其言當敗之時許夫人馳驅而弔唁衛侯因疾之而作詩云載馳載驅歸唁衛侯驅馬悠悠言至於漕大夫跋渉我心則憂既不我嘉不能旋反視爾不臧我思不逺君子善其慈惠而逺識也頌曰衛女未嫁謀許與齊女諷母曰齊大可依衛君不聽後果遁逃許不能救女作載馳曹僖氏妻曹大夫僖負羈之妻也晉公子重耳亡過曹恭公不禮焉聞其駢脅近其舍伺其将浴薄而觀之負羈之妻言於夫曰吾觀晉公子其従者三人皆國相也以此三人者皆善戮力以輔人必得晉國若得反國必霸諸侯而討無禮曹必為首若曹有難子必不免子胡不早自貳焉且吾聞之不知其子者視其父不知其君者視其所使今其従者皆卿相之僕也則其君必霸王之主也若加禮焉必能報施矣若有罪焉必能討過子不早圖禍至不久矣負羈乃遺之壺飡加璧其上公子受飡反璧及公子反國伐曹乃表負羈之閭令兵士無敢入士民之扶老擕弱而赴其閭者門外成市君子謂僖氏之妻能逺識詩曰旣眀且哲以保其身此之謂也頌曰僖氏之妻厥智孔白見晉公子知其興作使夫饋飡且以自託文伐曹國卒獨見釋孫叔敖母楚令尹孫叔敖之母也叔敖為嬰兒之時出㳺見兩頭虵殺而埋之歸見其母而泣焉母問其故對曰吾聞見兩頭虵者死今者出逰見之其母曰虵今安在對曰吾恐他人復見之殺而埋之矣其母曰汝不死矣夫有隂徳者陽報之徳勝不祥仁除百禍天之處髙而聽卑書不云乎皇天無親惟徳是輔爾嘿矣必興於楚及叔敖長為令尹君子謂叔敖之母知道徳之次詩云母氏聖善此之謂也頌曰叔敖之母深知天道叔敖見虵兩頭岐首殺而埋之泣恐不及母曰隂徳不死必夀晉伯宗妻晉大夫伯宗之妻也伯宗賢而好以直辯凌人每朝其妻常戒之曰盜憎主人民惡其上有愛好人者必有憎妬人者夫子好直言枉者惡之禍必及身矣伯宗不聽朝而以喜色歸其妻曰子貎有喜色何也伯宗曰吾言於朝諸大夫皆謂我知似陽子妻曰實榖不華至言不飾今陽子華而不實言而無謀是以禍及其身子何喜焉伯宗曰吾欲飲諸大夫酒而與之語爾試聽之其妻曰諾於是為大㑹與諸大夫飲既飲而問妻曰何若對曰諸大夫慕子若也然而民之不能戴其上久矣難必及子子之仕固不可易也且國家多貳其危可立待也子何不預結賢大夫以託州犂焉伯宗曰諾乃得畢羊而交之及欒不忌之難郤害伯宗譛而殺之畢羊乃送州犂於荆遂得免焉君子謂伯宗之妻知天道詩云多将熇熇不可救藥伯宗之謂也頌曰伯宗凌人妻知其亡數諫伯宗厚許畢羊屬以州犂以免咎殃伯宗遇禍州犂奔荆衛靈夫人衛靈公之夫人也靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭變節不為冥冥惰行蘧伯玉衛之賢大夫也仁而有智敬於事上此其人必不以闇昧廢禮是以知之公使視之果伯玉也公反之以戲夫人曰非也夫人酌觴再拜賀公公曰子何以賀寡人夫人曰始妾獨以衛為有蘧伯玉耳今衛復有與之齊者是君有二臣也國多賢臣國之福也妾是以賀公驚曰善哉遂語夫人其實焉君子謂衛夫人眀於知人道夫可欺而不可㒺者其眀智乎詩曰我聞其聲不見其人此之謂也頌曰衛靈夜坐夫人與存有車轔轔中止闕門夫人知之必伯玉焉維知識賢問之信然齊靈仲子齊靈仲子者宋公之女齊靈公之夫人也初靈公娶於魯聲姬生子光以為太子夫人仲子與其娣戎子皆嬖於公仲子生子牙戎子請以牙為太子代光公許之仲子曰不可夫廢常不祥聞諸侯之難失謀夫光之立也列於諸侯矣今無故而廢之是專絀諸侯而以難犯不祥也君心悔之在我而已仲子曰妾非譲也誠禍之萌也以死争之公終不聽遂逐太子光而立牙為太子髙厚為傅靈公疾髙厚微迎光及公薨崔杼立光而殺髙厚以不用仲子之言禍至於此君子謂仲子眀於事理詩云聽用我謀庻無大悔仲子之謂也頌曰齊靈仲子仁智顯眀靈公立牙廢姬子光仲子强諫棄適不祥公旣不聽果有禍殃魯臧孫母臧孫母者魯大夫臧文仲之母也文仲将為魯使至齊其母送之曰汝刻而無恩好盡人力窮人以威魯國不容子矣而使子之齊凡奸將作必於變動害子者其於斯發事乎汝其戒之魯與齊通壁壁鄰之國也魯之寵臣多怨汝者又皆通於齊髙子國子必使齊圖魯而拘汝留之難乎其免也汝必施恩布惠而後出以求助焉於是文仲託於三家厚士大夫而後之齊齊果拘之而興兵欲襲魯文仲㣲使人遺公書恐得其書乃謬其辭曰斂小器投諸台食獵犬組羊裘琴之合甚思之臧我羊羊有母食我以同魚冠纓不足帶有餘公及大夫相與議之莫能知之人有言臧孫母者世家子也君何不試召而問焉於是召而語之曰吾使臧子之齊今持書来云爾何也臧孫母泣下襟曰吾子拘有木治矣公曰何以知之對曰斂小器投諸台者言取郭外萌内之於城中也食獵犬組羊裘者言趣饗戰鬪之士而繕甲兵也琴之合甚思之者言思妻也臧我羊羊有母是葢告妻善飬母也食我以同魚同者其文錯錯者所以治鋸鋸者所以治木也是有木治繋於獄矣冠纓不足帶有餘者頭亂不得梳飢不得食也故知吾子拘而有木治者於是以臧孫母之言軍於境上齊方發兵將以襲魯聞兵在境上乃還文仲而不伐魯君子謂臧孫母識微見逺詩云陟彼屺兮瞻望母兮此之謂也頌曰臧孫之母刺子好威必且遇害使援所依旣厚三家果拘於齊母説其書子遂得歸晉羊叔姬叔姬者羊舌子之妻也叔向叔魚之母也一姓楊氏叔向名肸叔魚名鮒羊舌子好正不容於晉去而之三室之邑三室之邑人相與攘羊而遺之羊舌子不受叔姬曰夫子居晉不容去之三室之邑又不容於三室之邑是於夫子不容也不如受之羊舌子受之曰為肸與鮒亨之叔姬曰不可南方有鳥名曰乾吉食其子不擇肉子常不遂今肸與鮒童子也隨大夫而化者不可食以不義之肉不若埋之以眀不與於是乃盛以甕埋壚隂後二年攘羊之事發都吏至羊舌子曰吾受之不敢食也發而視之則其骨存焉都吏曰君子哉羊舌子不與攘羊之事矣君子謂叔姬為能防害逺疑詩曰無曰不顯莫予云覯此之謂也叔向欲娶于申公巫臣氏夏姬之女美而有色叔姬不欲娶其族叔向曰吾母之族貴而無庶吾懲舅氏矣叔姬曰子靈之妻殺三夫一君一子而亡一國兩卿矣爾不懲此而反懲吾族何也且吾聞之有竒福者必有竒禍有甚美者必有甚惡今是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是大有敗也昔有仍氏生女髪黒而甚美光可鑑人名曰𤣥妻樂正蘷娶之生伯封實有豕心貪惏毋期忿戾無饜謂之封豕有窮后羿滅之蘷是用不祀且三代之亡及恭太子之廢皆是物也汝何以為哉夫有美物足以移人茍其徳義則必有禍也叔向懼而不敢娶平公强使娶之生楊食我食我號曰伯碩伯碩生時侍者謁之叔姬曰長姒産男叔姬往視之及堂聞其號也而還曰豺狼之聲也狼子野心今將滅羊舌氏者必是子也遂不肯見及長與祁勝為亂晉人殺食我羊舌氏由是遂滅君子謂叔姬為能推類詩云如彼泉流無淪胥以敗此之謂也叔姬之始生叔魚也而視之曰是虎目而豕喙鳶肩而牛腹谿壑可盈是不可饜也必以賂死遂不見及叔魚長為國贊理邢侯與雍子爭田雍子入其女於叔魚以求直邢侯殺叔魚與雍子於朝韓宣子患之叔向曰三姦同罪請殺其生者而戮其死者遂族邢侯氏而尸叔魚與雍子于市叔魚卒以貪死叔姬可謂智矣詩云貪人敗類此之謂也頌曰叔向之母察于情性推人之生以窮其命叔魚食我皆貪不正必以貨死果卒分争晉范氏母晉范氏母者范獻子之妻也其三子逰於趙氏趙簡子乗馬園中園中多株問三子曰奈何長者曰眀君不問不為亂君不問而為中者曰愛馬足則無愛民力愛民力則無愛馬足少者曰可以三徳使民設令伐株於山将有馬為也已而開囿示之株夫山逺而囿近是民一悦矣去險阻之山而伐平地之株民二悦矣旣畢而賤賣民三悦矣簡子從之民果三悦少子伐其謀歸以告母母喟然歎曰終㓕范氏者必是子也夫伐功施勞鮮能布仁乗偽行詐莫能久長其後智伯㓕范氏君子謂范氏母為知難本詩曰無念爾祖式救爾訛此之謂也頌曰范氏之母貴徳尚信少子三徳以諫與民知其必㓕鮮能布仁後果遭禍身死國分魯公乗姒魯公乗姒者魯公乗子皮之姒也其族人死姒哭之甚悲子皮止姒曰安之吾今嫁姊矣已過時子皮不復言也魯君欲以子皮為相子皮問姒曰魯君欲以我為相為之乎姒曰勿為也子皮曰何也姒曰夫臨䘮而言嫁一何不習禮也後過時而不言一何不達人事也子内不習禮而外不達人事子不可以為相子皮曰姒欲嫁何不早言姒曰婦人之事唱而後和吾豈以欲嫁之故數子乎子誠不習於禮不達於人事以此相一國據大衆何以理之譬猶揜目而别黒白也揜目而别黒白猶無患也不達人事而相國非有天咎必有人禍子其勿為也子皮不聼卒受為相居未期年果誅而死君子謂公乗姒縁事而知弟之遇禍也可謂智矣待禮而後動不茍觸情可謂貞矣詩云籜兮籜兮風其吹女叔兮伯兮唱予和女又曰百爾所思不如我所之此之謂也頌曰子皮之姊縁事分理子皮相魯知其禍起姊諫子皮殆不如止子皮不聽卒為宗恥魯漆室女漆室女者魯漆室邑之女也過時未適人當穆公時君老太子㓜女倚柱而笑旁人聞之莫不為之􅃤者其鄰人婦從之逰謂曰何嘯之悲也子欲嫁耶吾為子求偶漆室女曰嗟乎始吾以子為有知今無識也吾豈為不嫁不樂而悲哉吾憂魯君老太子㓜鄰婦笑曰此乃魯大夫之憂婦人何與焉漆室女曰不然非子所知也昔晉客舎吾家繫馬園中馬佚馳走踐吾葵使我終嵗不食葵鄰人女奔随人亡其家倩吾兄行追之逢霖水出溺流而死今吾終身無兄吾聞河潤九里漸洳三百歩今魯君老悖太子少愚愚偽日起夫魯國有患者君臣父子皆被其辱禍及衆庶婦人獨安所避乎吾甚憂之子乃曰婦人無與者何哉鄰婦謝曰子之所慮非妾所及三年魯果亂齊楚攻之魯連有冦男子戰鬪婦人轉輸不得休息君子曰逺矣漆室女之思也詩云知我者謂我心憂不知我者謂我何求此之謂也頌曰漆室之女計慮甚妙維魯且亂倚柱而嘯君老嗣㓜愚悖姦生魯果擾亂齊伐其地魏曲沃負曲沃負者魏大夫如耳母也秦立魏公子政為魏太子魏哀王使使者為太子納妃而美王将自納焉曲沃負謂其子如耳曰王亂于無别汝胡不匡之方今戰國强者為雄義者顯焉今魏不能强王又無義何以持國乎王中人也不知其為禍耳汝不言則魏必有禍矣有禍必及吾家汝言以盡忠忠以除禍不可失也如耳未遇間㑹使於齊負因欵王門而上書曰曲沃之老婦也心有所懐願以聞於王王召入負曰妾聞男女之别國之大節也婦人脆於志窳於心不可以邪開也是故必十五而笄二十而嫁早成其號諡所以就之也聘則為妻奔則為妾所以開善遏淫也節成然後許嫁親迎然後隨従貞女之義也今大王為太子求妃而自納于後宫此毁貞女之行而亂男女之别也自古聖王必正妃匹妃匹正則興不正則亂夏之興也以塗山亡也以妺喜殷之興也以有㜪亡也以妲已周之興也以太姒亡也以褒姒周之康王夫人晏出朝關雎起興思得淑女以配君子夫雎鳩之鳥猶未嘗見乗居而匹處也夫男女之盛合之以禮則父子生焉君臣成焉故為萬物始君臣父子夫婦三者天下之大綱紀也三者治則治亂則亂今大王亂人道之始棄綱紀之務敵國五六南有從楚西有横秦而魏國居其間可謂僅存矣王不憂此而從亂無别父子同女妾恐大王之國政危矣王曰然寡人不知也遂與太子妃而賜負三十鍾如耳還而爵之王勤行自修勞来國家而齊楚强秦不敢加兵焉君子謂魏負知禮詩云敬之敬之天惟顯思此之謂也頌曰魏負聰達非刺哀王王子納妃禮别不眀負欵王門陳列紀綱王監自修卒却敵兵趙将括母趙将馬服君趙奢之妻趙括之母也秦攻趙孝成王使括代亷頗為將將行括母上書言于王曰括不可使將王曰何以曰始妾事其父父時為将身所奉飯者以十數所友者以百數大王及宗室所賜幣者盡以與軍吏士大夫受命之日不問家事今括一旦為将東向而朝軍吏吏無敢仰視之者王所賜金帛歸盡藏之乃日視便利田宅可買者王以為若其父乎父子不同執心各異願勿遣王曰母置之吾計已决矣括母曰王終遣之即有不稱妾得無隨坐王曰不也括既行代亷頗三十餘日趙兵果敗括死軍覆王以括母先言故卒不加誅君子謂括母為仁智詩曰老夫灌灌小子蹻蹻匪我言耄爾用憂謔此之謂也頌曰孝成用括代頗距秦括母獻書知其覆軍願止不得請罪止身括死長平妻子得存古列女傳巻三欽定四庫全書古列女傳巻四漢劉向撰貞順傳召南申女召南申女者申人之女也既許嫁於酆夫家禮不備而欲迎之女與其人言以為夫婦者人倫之始也不可不正傳曰正其本則萬物理失之毫釐差之千里是以本立而道生源治而流清故嫁娶者所以傳重承業繼續先祖為宗廟主也夫家輕禮違制不可以行遂不肯往夫家訟之於理致之於獄女終以一物不具一禮不備守節持義必死不往而作詩曰雖速我獄室家不足言夫家之禮不備足也君子以為得婦道之儀故舉而揚之傳而法之以絶無禮之求防淫慾之行焉又曰雖速我訟亦不汝從此之謂也頌曰召南申女貞一修容夫禮不備終不肯從要以必死遂至獄訟作詩明意後世稱誦宋恭伯姬伯姬者魯宣公之女成公之妹也其母曰繆姜嫁伯姬於宋恭公恭公不親逆伯姬迫於父母之命而行既入宋三月廟見當行夫婦之道伯姬以恭公不親逆故不肯聽命宋人告魯魯使大夫季文子如宋致命於伯姬還復命公享之繆姜出於房再拜曰大夫勤勞於逺道辱送小子不忘先君以及後嗣使下而有知先君猶有望也敢再拜大夫之辱伯姬既嫁於恭公十年恭公卒伯姬寡至景公時伯姬常遇夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保𫝊來也保母至矣傅母未至也左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可下堂越義而生不如守義而死遂逮於火而死春秋詳錄其事為賢伯姬以為婦人以貞為行者也伯姬之婦道盡矣當此之時諸侯聞之莫不痛悼以為死者不可以生財物猶可復故相與聚㑹於澶淵償宋之所喪春秋善之君子曰禮婦人不得傅母夜不下堂行必以燭伯姬之謂也詩云淑慎爾止不愆於儀伯姬可謂不失儀矣頌曰伯姬心專守禮一意宫夜失火保傅不備逮火而死厥心靡悔春秋賢之詳錄其事衛宣夫人夫人者齊侯之女也嫁於衛至城門而衛君死保母曰可以還矣女不聽遂入持三年之喪畢弟立請曰衛小國也不容二庖請願同庖終不聽衛君使人愬於齊兄弟齊兄弟皆欲與君使人告女女終不聽乃作詩曰我心匪石不可轉也我心匪席不可巻也厄窮而不閔勞辱而不茍然後能自致也言不失也然後可以濟難矣詩曰威儀棣棣不可選也言其左右無賢臣皆順其君之意也君子美其貞壹故舉而列之於詩也頌曰齊女嫁衛厥至城門公薨不反遂入三年後君欲同女終不渾作詩譏刺卒守死君蔡人之妻蔡人之妻者宋人之女也既嫁於蔡而夫有惡疾其母将改嫁之女曰夫不幸乃妾之不幸也奈何去之適人之道壹與之醮終身不改不幸遇惡疾不改其意且夫采采芣苢之草雖其臭惡猶始於捋采之終於懷擷之浸以益親况於夫婦之道乎彼無大故又不遣妾何以得去終不聽其母乃作芣苢之詩君子曰宋女之意甚貞而壹也頌曰宋女專静持心不傾夫有惡疾意猶一精母勸去歸作詩不聽蔡人美之以為順貞黎荘夫人黎荘夫人者衛侯之女黎莊公之夫人也既往而不同欲所務者異未嘗得見甚不得意其傅母閔夫人賢公反不納憐其失意又恐其巳見遣而不以時去謂夫人曰夫婦之道有義則合無義則去今不得意胡不去乎乃作詩曰式㣲式㣲胡不歸夫人曰婦人之道壹而巳矣彼雖不吾以吾何可以離於婦道乎乃作詩曰㣲君之故胡為乎中路終執貞壹不違婦道以俟君命君子故序之以編詩頌曰黎荘夫人執行不衰荘公不偶行節及乖傅母勸去作詩式㣲夫人守壹終不肯歸齊孝孟姬孟姬者華氏之長女齊孝公之夫人也好禮貞壹過時不嫁齊中求之禮不備終不往躡男席語不及外逺别避嫌齊中莫能備禮求焉齊國稱其貞孝公聞之乃修禮親迎於華氏之室父母送孟姬不下堂母醮房之中結其衿縭誡之曰必敬必戒無違宫事父誡之東階之上曰必夙興夜寐無違命其有大妨於王命者亦勿從也諸母誡之兩階之間曰敬之敬之必終父母之命夙夜無怠視之衿縭父母之言謂何姑姊妹誡之門内曰夙夜無愆爾之衿鞶無忘父母之言孝公親迎孟姬於其父母三顧而出親迎之綏自御輪三曲顧姬與遂納於宫三月廟見而後行夫婦之道既居乆之公遊於琅邪華孟姬從車奔姬墮車碎孝公使駟馬立車載姬以歸姬使侍御者舒帷以自障蔽而使傅母應使者曰妾聞妃后踰閾必乗安車輜輧下堂必從傅母保阿進退則鳴玉環佩内飾則結紐綢繆野處則帷裳擁蔽所以正心壹意自歛制也今立車無軿非所敢受命也野處無衛非所敢乆居也二者失禮多矣夫無禮而生不若早死使者馳以告公更取安車比其反也則自經矣傅母救之不絶傅母曰使者至輜輧巳具姬氏蘇然後乗而歸君子謂孟姬好禮禮婦人出必輜輧衣服綢繆既嫁歸問女昆弟不問男昆弟所以逺别也詩曰彼君子女綢直如髮此之謂也頌曰孟姬好禮執節甚公避嫌逺别終不冶容載不並乗非禮不從君子闕同息君夫人夫人者息君之夫人也楚伐息破之虜其君使守門将妻其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而巳何至自苦妾無須臾而忘君也終不以身更貳醮生離於地上豈如死歸於地下哉乃作詩曰榖則異室死則同穴謂予不信有如皦日息君止之夫人不聽遂自殺息君亦自殺同日俱死楚王賢其夫人守節有義乃以諸侯之禮合而葬之君子謂夫人說於行善故序之於詩夫義動君子利動小人息君夫人不為利動矣詩云德音莫違及爾同死此之謂也頌曰楚虜息君納其適妃夫人持固彌乆不衰作詩同穴思故忘新遂死不顧列於貞賢齊杞梁妻齊杞梁殖之妻也荘公襲莒殖戰而死荘公歸遇其妻使使者弔之於路杞梁妻曰今殖有罪君何辱命焉若令殖免於罪則賤妾有先人之敝廬在下妾不得與郊弔於是莊公乃還車詣其室成禮然後去杞梁之妻無子内外皆無五屬之親既無所歸乃枕其夫之屍於城下而哭内誠動人道路過者莫不為之揮涕十日而城為之崩既葬曰吾何歸矣夫婦人必有所倚者也父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子内無所倚以見吾誠外無所倚以立吾節吾豈能更二哉亦死而巳遂赴淄水而死君子謂杞梁之妻貞而知禮詩云我心傷悲聊與子同歸此之謂也頌曰杞梁戰死其妻收喪齊荘道弔避不敢當哭夫於城城為之崩自以無親赴淄而薨楚平伯嬴伯嬴者秦穆公之女楚平王之夫人昭王之母也當昭王時楚與吳為柏舉之戰吳勝楚遂入至郢昭王亡吳王闔閭盡妻其後宫次至伯嬴伯嬴持刃曰妾聞天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失節則其國危夫婦之道固人倫之始王教之端是以眀王之制使男女不親授坐不同席食不共器殊椸枷異巾櫛所以施之也若諸侯外淫者絶卿大夫外淫者放士庻人外淫者宫割夫然者以為仁失可復以義義失可復以禮男女之失亂亡興焉夫造亂亡之端公侯之所絶天子之所誅也今君王棄儀表之行縱亂亡之欲犯誅絶之事何以行令訓民且妾聞生而辱不若死而榮若使君王棄其儀表則無以臨國妾有淫端則無以生世一舉而兩辱妾以死守之不敢承命且凡所欲妾者為樂也近妾而死何樂之有如先殺妾又何益於君王於是吳王慙遂退舎伯嬴與其保阿閉永巷之門皆不釋兵三旬秦救至昭王乃復矣君子謂伯嬴勇而精一詩曰莫莫葛纍施于條梅豈弟君子求福不囘此之謂也頌曰闔閭勝楚入厥宫室盡妻後宫莫不戰慄伯嬴自守堅固專一君子美之以為有節楚昭貞姜貞姜者齊侯之女楚昭王之夫人也王出逰留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符使者至請夫人出夫人曰王與宫人約令召宫人必以符今使者不持符妾不敢從使者行使者曰今水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不犯約勇者不畏死守一節而巳妾知從使者必生留必死然棄約越義而求生不若留而死耳於是使者取符則水大至臺崩夫人流而死王曰嗟夫守義死節不為茍生處約持信以成其貞乃號曰貞姜君子謂貞姜有婦節詩云淑人君子其儀不忒此之謂也頌曰楚昭出逰留姜漸臺江水大至無符不來夫人守節流死不疑君子序焉上配伯姬楚白貞姬貞姬者楚白公勝之妻也白公死其妻紡績不嫁吳王聞其美且有行使大夫持金百鎰白璧一雙以聘焉以輜軿三十乗迎之将以為夫人大夫致幣白妻辭之曰白公生之時妾幸得充後宫執箕箒掌衣履拂枕席託為妃匹白公不幸而死妾願守其墳墓以終天年今王賜金璧之聘夫人之位非愚妾之所聞也且夫棄義從欲者汚也見利忘死者貪也夫貪汙之人王何以為哉妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死者亦然妾既不仁不能從死今又去而嫁不亦太甚乎遂辭聘而不行吳王賢其守節有義號曰貞姬楚君子謂貞姬㢘潔而誠信夫任重而道逺仁以為巳任不亦重乎死而後巳不亦逺乎詩云彼美孟姜德音不忘此之謂也頌曰白公之妻守寡紡績吳王美之聘以金璧妻操固行雖死不易君子大之美其嘉績衛宗二順衛宗二順者衛宗室靈王之夫人而及其傅妾也秦滅衛君乃封靈王世家使奉其祀靈王死夫人無子而守寡傅妾有子傅妾事夫人八年不衰供養愈謹夫人謂傅妾曰孺子養我甚謹子奉祀而妾事我我不聊也且吾聞主君之母不妾事人今我無子於禮斥絀之人也而得留以盡其節是我幸也今又煩孺子不改故節我甚内慙吾願出居外以時相見我甚便之傅妾泣而對曰夫人欲使靈氏受三不祥耶不幸早終是一不祥也夫人無子而婢妾有子是二不祥也夫人欲出居外使婢子居内是三不祥也妾聞忠臣事君無懈倦時孝子養親患無日也妾豈敢以少貴之故變妾之節哉供養固妾之職也夫人又何勤乎夫人曰無子之人而辱主君之母雖子欲爾衆人謂我不知禮也吾終願居外而巳傅妾退而謂其子曰吾聞君子處順奉上下之儀脩先古之禮此順道也今夫人難我将欲居外使我居内此逆也處逆而生豈若守順而死哉遂欲自殺其子泣而守之不聽夫人聞之懼遂許傅妾㽞終年供養不衰君子曰二女相讓亦誠君子可謂行成於内而名立於後世矣詩云我心匪石不可轉也此之謂也頌曰衛宗二順執行成固闕子雖成供養如故主婦慙退請求出舎終不肯聽闕甚魯寡陶嬰陶嬰者魯陶門之女也少寡養㓜孤無强昆弟紡績為産魯人或聞其義将求焉嬰聞之恐不得免作歌眀巳之不更二也其歌曰黄鵠之早寡兮七年不雙鵷頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼哀哉兮死者不可忘飛鳥尚然兮況於貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得巳遂不敢復求嬰寡終身不改君子謂陶嬰貞一而思詩云心之憂矣我歌且謡此之謂也頌曰陶嬰少寡紡績養子或欲取焉乃自修理作歌自眀求者乃止君子稱揚以為女紀梁寡髙行高行者梁之寡婦也其為人榮於色而美於行夫死早寡不嫁梁貴人多爭欲娶之者不能得梁王聞之使相聘焉高行曰妾夫不幸早死先狗馬填溝壑妾守養其幼孤曾不得專意貴人多求妾者幸而得免今王又重之妾聞婦人之義一往而不改以全貞信之節念忘死而趨生是不信也貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刀以割其鼻曰妾巳刑矣所以不死者不忍幼弱之重孤也王之求妾者以其色也今刑餘之人殆可釋矣於是相以報王大其義高其行乃復其身尊其號曰高行君子謂高行節禮專精詩云謂予不信有如皦日此之謂也頌曰高行處梁貞專精純不貪行貴務在一信不受梁聘劓鼻刑身君子高之顯示後人陳寡孝婦孝婦者陳之少寡婦也年十六而嫁未有子其夫當行戌夫且行時屬孝婦曰我生死未可知幸有老母無他兄弟若吾不還汝肯養吾母乎婦應曰諾夫果死不還婦養姑不衰慈愛愈固紡績以為家業終無嫁意居喪三年其父母哀其年少無子而早寡也将取而嫁之孝婦曰妾聞之信者人之榦也義者行之節也妾幸得離襁褓受嚴命而事夫夫且行時屬妾以其老母既許諾之夫受人之託豈可棄哉棄託不信背死不義不可也母曰吾憐汝少年早寡也孝婦曰妾聞寧載於義而死不載於地而生且夫養人老母而不能卒許人以諾而不能信将何以立於世夫為人婦固養其舅姑者也夫不幸先死不得盡為人子之禮今又使妾去之莫養老母是明夫之不肖而著妾之不孝不孝不信且無義何以生哉因欲自殺其父母懼而不敢嫁也遂使養其姑二十八年姑死葬之終奉祭祀淮陽太守以聞漢孝文皇帝高其義貴其信美其行使使者賜之黄金四十斤復之終身號曰孝婦君子謂孝婦備於婦道詩云匪直也人秉心塞淵此之謂也頌曰孝婦處陳夫死無子比将嫁之終不聽母專心養姑一醮不改聖王嘉之號曰孝婦古列女傳巻四欽定四庫全書古列女傳卷五漢劉向撰節義傳魯孝義保孝義保者魯孝公稱之保母臧氏之寡也初孝公父武公與其二子長子括中子戲朝周宣王宣王立戲為魯太子武公薨戲立是為懿公孝公時號公子稱最少義保與其子俱入宫養公子稱括之子伯御與魯人作亂攻殺懿公而自立求公子稱於宫將殺之義保聞伯御将殺稱乃衣其子以稱之衣卧於稱之處伯御殺之義保遂抱稱以出遇稱舅魯大夫於外舅問稱死乎義保曰不死在此舅曰何以得免義保曰以吾子代之義保遂以逃十一年魯大夫皆知稱之在保於是請周天子殺伯御立稱是為孝公魯人高之論語曰可以託六尺之孤其義保之謂也頌曰伯御作亂由魯宫起孝公乳保臧氏之母逃匿孝公易以其子保母若斯亦誠足恃楚成鄭瞀鄭瞀者鄭女之嬴媵楚成王之夫人也初成王登臺臨後宫宫人皆傾觀子瞀直行不顧徐歩不變王曰行者顧子瞀不顧王曰顧吾以女為夫人子瞀復不顧王曰顧吾又與女千金而封若父兄子瞀遂一顧於是王下臺而問曰夫人重位也封爵厚禄也一顧可以得之已得而遂不顧何也子瞀曰妾聞婦人以端正和顔為容今者大王在臺上而妾顧則是失儀節也不顧告以夫人之尊示以封爵之重而後顧則是妾貪貴樂利以忘義理也茍忘義理何以事主王曰善遂立以為夫人處期年王將立公子商臣以為太子王問之於令尹子上子上曰君之齒末也而又多寵子既置而黜之必為亂矣且其人蜂目而豺聲忍人也不可立也王退而問於夫人子瞀曰令尹之言信可従也王不聽遂立之其後商臣以子上救蔡之事譖子上而殺之子瞀謂其保曰吾聞婦人之事在於饋食之間而已雖然心之所見吾不能藏夫昔日子上言太子之不可立也太子怨之譖而殺之王不明察遂辜無罪是白黑顛倒上下錯謬也王多寵子皆欲得國太子貪忍恐失其所王又不明無以照之庶嫡分爭禍必興焉後王又欲立公子職職商臣庶弟也子瞀退而與其保言曰吾聞信不見疑今者王必將以職易太子吾懼禍亂之作也而言之于王王不吾應其以太子為非吾子疑吾譖之者乎夫見疑而生衆人孰知其不然與其無義而生不如死以明之且王聞吾死必寤太子之不可釋也遂自殺保母以其言通於王是時太子知王之欲廢之也遂興師作亂圍王宫王請食熊蹯而死不可得也遂自經君子曰非至仁孰能以身讓詩曰舍命不渝此之謂也頌曰子瞀先識執節有常興於不顧卒配成王知商臣亂言之甚强自讓非子以殺身盟晉圉懐嬴懐嬴者秦穆之女晉惠公太子之妃也圉質於秦穆公以嬴妻之六年圉將逃歸謂嬴氏曰吾去國數年子父之接忘而秦晉之友不加親也夫鳥飛反鄉狐死首丘我其首晉而死子其與我行乎嬴氏對曰子晉太子也辱于秦子之欲去不亦宜乎雖然寡君使婢子侍執巾櫛以固子也今吾不足以結子是吾不肖也従子而歸是棄君也言子之謀是負妻之義也三者無一可行雖吾不従子也子行矣吾不敢泄言亦不敢従也子圉遂逃歸君子謂懐嬴善處夫婦之間頌曰晉圉質秦配以懐嬴圉將與逃嬴不肯聴亦不泄言操心甚平不告所従無所阿傾楚昭越姬楚昭越姬者越王句踐之女楚昭王之姬也昭王讌遊蔡姬在左越姬㕘右王親乗駟以馳逐遂登附社之臺以望雲夢之囿觀士大夫逐者既驩乃顧謂二姬曰樂乎蔡姬對曰樂王曰吾願與子生若此死又若此蔡姬曰昔弊邑寡君固以其黎民之役事君王之馬足故以婢子之身為苞苴玩好今乃比于妃嬪固願生俱樂死同時王顧謂史書之蔡姬許従孤死矣乃復謂越姬越姬對曰樂則樂矣然而不可久也王曰吾願與子生若此死若此其不可得乎越姬對曰昔吾先君荘公淫樂三年不聴政事終而能改卒霸天下妾以君王為能法吾先君將改斯樂而勤於政也今則不然而要婢子以死其可得乎且君王以束帛乘馬取婢子於弊邑寡君受之太廟也不約死妾聞之諸姑婦人以死彰君之善益君之寵不聞其以茍従其闇死為榮妾不敢聞命於是王寤敬越姬之言而猶親嬖蔡姬也居二十五年王救陳二姬従王病在軍中有赤雲夾日如鳥飛王問周史史曰是害王身然可以移于將相將相聞之將請以身禱於神王曰將相之於孤猶股肱也今移禍焉庸為去是身乎不聴越姬曰大哉君王之徳以是妾願従王矣昔日之遊淫樂也是以不敢許及君王復於禮國人皆將為君王死而况於妾乎請願先驅狐狸於地下王曰昔之遊樂吾戱耳若將必死是彰弧之不徳也越姬曰昔日妾雖口不言心既許之矣妾聞信者不負其心義者不虚設其事妾死王之義不死王之好也遂自殺王病甚讓位於三弟三弟不聽王薨於軍中蔡姬竟不能死王弟子閭與子西子期謀曰母信者其子必仁乃伏師閉壁迎越姬之子熊章立是為惠王然後罷兵歸葬昭王君子謂越姬信能死義詩曰徳音莫違及爾同死越姬之謂也頌曰楚昭遊樂要姬従死蔡姬許王越姬執禮終獨死節羣臣嘉美維斯兩姬其徳不比蓋將之妻蓋之偏將丘子之妻也戎伐蓋殺其君令於蓋羣臣曰敢有自殺者妻子盡誅丘子自殺人救之不得死既歸其妻謂之曰吾聞將節勇而不果生故士民盡力而不畏死是以戰勝攻取故能存國安君夫戰而忘勇非孝也君忘不死非忠也今軍敗君死子獨何生忠孝忘於身何忍以歸丘子曰蓋小戎大吾力畢能盡君不幸而死吾固自殺也以救故不得死其妻曰曩日有救今又何也丘子曰吾非愛身也戎令曰自殺者誅及妻子是以不死死又無益於君其妻曰吾聞之主憂臣辱主辱臣死今君死而子不死可謂義乎多殺士民不能存國而自活可謂仁乎憂妻子而忘仁義背故君而事暴强可謂忠乎人無忠臣之道仁義之行可謂賢乎周書曰先君而後臣先父母而後兄弟先兄弟而後交友先交友而後妻子妻子私愛也事君公義也今子以妻子之故失人臣之節無事君之禮棄忠臣之公道榮妻子之私愛偷生茍活妾等恥之况於子乎吾不能與子蒙恥而生焉遂自殺戎君賢之祠以太牢而以將禮葬之賜其弟金百鎰以為卿而使别治蓋君子謂蓋將之妻潔而好義詩曰淑人君子其徳不回此之謂也頌曰蓋將之妻據節鋭精戎既滅蓋丘子獨生妻恥不死陳設闕榮為夫先死卒遺顯名魯義姑姊魯義姑姊者魯野之婦人也齊攻魯至郊望見一婦人抱一兒攜一兒而行軍且及之棄其所抱抱其所攜而走於山兒隨而啼婦人遂行不顧齊將問兒曰走者爾母耶曰是也母所抱者誰也曰不知也齊將乃追之軍士引弓將射之曰止不止吾將射爾婦人乃還齊將問所抱者誰也所棄者誰也對曰所抱者妾兄之子也所棄者妾之子也見軍之至力不能兩䕶故棄妾之子齊將曰子之於母其親愛也痛甚於心今釋之而反抱兄之子何也婦人曰己之子私愛也兄之子公義也夫背公義而嚮私愛亡兄子而存妾子幸而得幸則魯君不吾畜大夫不吾養庶民國人不吾與也夫如是則脅肩無所容而累足無所履也子雖痛乎獨謂義何故忍棄子而行義不能無義而視魯國於是齊将按兵而止使人言于齊君曰魯未可伐也乃至於境山澤之婦人耳猶知持節行義不以私害公而况於朝臣士大夫乎請還齊君許之魯君聞之賜婦人束帛百端號曰義姑姊公正誠信果於行義夫義其大哉雖在匹婦國猶賴之况以禮義治國乎詩云有覺徳行四國順之此之謂也頌曰齊君攻魯義姑有節見軍走山棄子抱姪齊將問之賢其推理一婦為義齊兵遂止代趙夫人代趙夫人者趙簡子之女襄子之姊代王之夫人也簡子既葬襄子未除服地登夏屋誘代王使厨人持斗以食代王及従者行斟隂令宰人各以一斗擊殺代王及従者因舉兵平代地而迎其姊趙夫人夫人曰吾受先君之命事代之王今十有餘年矣代無大故而主君殘之今代巳亡吾將奚歸且吾聞之婦人執義無二夫吾豈有二夫哉欲迎我何之以弟慢夫非義也以夫怨弟非仁也吾不敢怨然亦不歸遂泣而呼天自殺於靡笄之地代人皆懐之君子謂趙夫人善處夫婦之間詩云不僣不賊鮮不為則此之謂也頌曰惟趙襄子代夫人弟襲滅代王迎取其姊姊引義理稱引節禮不歸不怨遂留野死齊義繼母齊義繼母者齊二子之母也當宣王時有人鬪死於道者吏訊之被一創二子兄弟立其傍吏問之兄曰我殺之弟曰非兄也乃我殺之期年吏不能決言之於相相不能決言之於王王曰今皆赦之是縦有罪也皆殺之是誅無辜也寡人度其母能知子善惡試問其母聽其所欲殺活相召其母問之曰母之子殺人兄弟欲相代死吏不能決言之於王王有仁惠故問母何所欲殺活其母泣而對曰殺其少者相受其言因而問之曰夫少子者人之所愛也今欲殺之何也其母對曰少者妾之子也長者前妻之子也其父疾且死之時屬之于妾曰善養視之妾曰諾今既受人之託許人以諾豈可以忘人之託而不信其諾耶且殺兄活弟是以私愛廢公義也背言忘信是欺死者也夫言不約束已諾不分何以居於世哉子雖痛乎獨謂行何泣下沾襟相入言於王王美其義高其行皆赦不殺而尊其母號曰義母君子謂義母信而好義潔而有讓詩曰愷悌君子四方為則此之謂也頌曰義繼信誠公正知禮親假有罪相讓不已吏不能決王以問母據信行義卒免二子魯秋潔婦潔婦者魯秋胡子妻也既納之五日去而官于陳五年乃歸未至家見路傍婦人採桑秋胡子悦之下車謂曰若曝採桑吾行道逺願託桑䕃下飡下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢豐年力桑不如見國卿吾有金願以與夫人婦人曰嘻夫採桑力作紡績織紝以供衣食奉二親養夫子吾不願金所願卿無有外意妾亦無淫泆之志収子之齎與笥金秋胡子遂去至家奉金遺母使人喚婦至乃嚮採桑者也秋胡子慚婦曰子束髮辭親往仕五年乃還當所居馳驟揚塵疾至今也乃悦路傍婦人下子之粮以金予之是忘母也忘母不孝好色淫泆是汙行也汙行不義夫事親不孝則事君不忠處家不義則治官不理孝義並亡必不遂矣妾不忍見子改娶矣妾亦不嫁遂去而東走投河而死君子曰潔婦精於善夫不孝莫大于不愛其親而愛其人秋胡子有之矣君子曰見善如不及見不善如探湯秋胡子婦之謂也詩云惟是褊心是以為刺此之謂也頌曰秋胡西仕五年乃歸遇妻不識心有淫思妻執無二歸而相知恥夫無義遂東赴河周主忠妾周主忠妾者周大夫妻之媵妾也大夫號主父自衞仕於周二年且歸其妻淫于鄰人恐主父覺其淫者憂之妻曰無憂也吾為毒酒封以待之矣三日主父至其妻曰吾為子勞封酒相待使媵婢取酒而進之媵婢心知其毒酒也計念進之則殺主父不義言之又殺主母不忠猶豫因陽僵覆酒主大怒而笞之既已妻恐媵婢言之因以他過笞欲役之媵知將死終不言主父弟聞其事具以告主父主父驚乃免媵婢而笞殺其妻使人隂問媵婢曰汝知其事何以不言而反幾死乎媵婢曰殺主以自生又有辱主之名吾死則死耳豈言之哉主父髙其義貴其意將納以為妻媵婢辭曰主辱而死而妾獨生是無禮也代主之處是逆理也無禮逆理有一猶愈今盡有之難以生矣欲自殺主聞之乃厚幣而嫁之四鄰爭娶之君子謂忠妾為仁厚夫名無細而不聞行無隠而不彰詩云無言不醻無徳不報此之謂也頌曰周主忠妾慈惠有序主妻淫僻藥酒毒主使妾奉進僵以除賊忠全其主終䝉其福魏節乳母魏節乳母者魏公子之乳母秦攻魏破之殺魏王瑕誅諸公子而一公子不得令魏國曰得公子者賜金千鎰匿之者罪至夷節乳母與公子俱逃魏之故臣見乳母而識之曰乳母無恙乎乳母曰嗟乎吾奈公子何故臣曰今公子安在吾聞秦令曰有能得公子者賜金千鎰匿之者罪至夷乳母儻言之則可以得千金知而不言則昆弟無賴矣乳母曰吁我不知公子之處故臣曰我聞公子與乳母俱逃母曰我雖知之亦終不可以言故臣曰今魏國已破亡族滅子匿之尚誰為乎母吁而言曰夫見利而反上者逆也畏死而棄義者亂也今持逆亂而以求利吾不為也且夫凡為人養子者務生之非為殺之也豈可利賞畏誅之故廢正義而行逆節哉妾不能生而令公子擒也遂抱公子逃于深澤之中故臣以告秦軍秦軍追見爭射之乳母以身為公子蔽矢著身者數十與公子俱死秦王聞之貴其守忠死義乃以卿禮葬之祠以太牢寵其兄為五大夫賜金百鎰君子謂節乳母慈惠敦厚重義輕財禮為孺子室於宫擇諸母及阿者必求其寛裕慈恵温良恭敬慎而寡言者使為子師次為慈母次為保母皆居子室以養全之他人无事不得往夫慈故能愛乳狗摶虎伏鷄搏狸恩出于中心也詩云行有死人尚或墐之此之謂也頌曰秦既滅魏購其子孫公子乳母與俱遁逃守節執事不為利違遂死不顧名號顯遺梁節姑姊梁節姑姊者梁之婦人也因失火兄子與其己子在内中欲取兄子輒得其子獨不得兄子火盛不得復入婦人將自趣火其友止之曰子本欲取兄之子惶恐卒誤得爾子中心謂何何至自赴火婦人曰梁國豈可户告人曉也被不義之名何面目以見兄弟國人哉吾欲復投吾子為失母之恩吾勢不可以生遂赴火而死君子謂節姑姊潔而不汚詩曰彼其之子舎命不渝此之謂也頌曰梁節姑姊據義執理子姪同内火大發起欲出其姪輙得厥子火盛自投明不私己珠崖二義二義者珠崖令之後妻及前妻之女也女名初年十三珠崖多珠繼母連大珠以為繫臂及令死當送喪法内珠入於闗者死繼母棄其繫臂珠其子男年九嵗好而取之置之母鏡奩中皆莫之知遂奉喪歸至海闗闗侯士吏搜索得珠十枚于繼母鏡奩中吏曰嘻此值法無可奈何誰當坐者初在左右顧心恐母云置鏡奩中乃曰初當坐之吏曰其狀何如對曰君不幸夫人解繫臂棄之初心惜之取而置夫人鏡奩中夫人不知也繼母聞之遽疾行問初初曰夫人所棄珠初復取之置夫人奩中初當坐之母意亦以初為實然憐之乃因謂吏曰願且待幸無劾兒兒誠不知也此珠妾之繫臂也君不幸妾解去之而置奩中迫奉喪道逺與弱小俱忽然忘之妾當坐之初固曰實初取之繼母又曰兒但讓耳實妾取之因涕泣不能自禁女亦曰夫人哀初之孤欲強活初身夫人實不知也又因哭泣泣下交頸送葬者盡哭哀慟傍人莫不為酸鼻揮涕闗吏執筆書劾不能就一字闗侯垂泣終日不能忍決乃曰母子有義如此吾寧坐之不忍加文且又相讓安知孰是遂棄珠而遣之既去後乃知男獨取之也君子謂二義慈孝論語曰父為子隠子為父隠直在其中矣若繼母與假女推讓爭死哀感傍人可謂直耳頌曰珠崖夫人甚有母恩假繼相讓維女亦賢納珠於闗各自伏愆二義如此為世所傳郃陽友娣友娣者郃陽邑任延壽之妻也字季兒有三子季兒兄季宗與延壽爭葬父事延壽與其友田建隂殺季宗建獨坐死延壽㑹赦乃以告季兒季兒曰嘻獨今乃語我乎遂振衣欲去問曰所與共殺吾兄者為誰延壽曰田建田建已死獨我當坐之汝殺我而已季兒曰殺夫不義事兄之讐亦不義延壽曰吾不敢留汝願以車馬及家中財物盡以送汝聴汝所之季兒曰吾當安之兄死而讐不報與子同枕席而使殺吾兄内不能和夫家又縦兄之仇何面目以生而戴天履地乎延壽慚而去不敢見季兒季兒乃告其大女曰汝父殺吾兄義不可以留又終不復嫁矣吾去汝而死善視汝兩弟遂以繦自經而死馮翊王讓聞之大其義令縣復其三子而表其墓君子謂友娣善復兄仇詩曰不僣不賊鮮不為則季兒可以為則矣頌曰季兒樹義夫殺其兄欲復兄讐義不可行不留不去遂以自殃馮翊表墓嘉其義明京師節女京師節女者長安大昌里人之妻也其夫有仇人欲報其夫而無道徑聞其妻之仁孝有義乃劫其妻之父使要其女為中譎父呼其女告之女計念不聽之則殺父不孝聽之則殺夫不義不孝不義雖生不可以行于世欲以身當之乃且許諾曰旦日在樓上新沐東首卧則是矣妾請開户牖待之還其家乃告其夫他卧他所因自沐居樓上東首開户牖而卧夜半仇家果至斷頭持去明而視之乃其妻之頭也仇人哀痛之以為有義遂釋不殺其夫君子謂節女仁孝厚于恩義也夫重仁義輕死亡行之高者也論語曰君子殺身以成仁無求生以害仁此之謂也頌曰京師節女夫仇劫父要女間之不敢不許期處既闕乃易其所殺身成仁義冠天下古列女傳卷五欽定四庫全書古列女傳巻六漢劉向撰辯通傳齊管妾婧妾婧者齊相管仲之妾也甯戚欲見桓公道无從乃為人僕將車宿齊東門之外桓公因出甯戚擊牛角而商歌甚悲桓公異之使管仲迎之甯戚稱曰浩浩乎白水管仲不知所謂不朝五日而有憂色其妾婧進曰今君不朝五日而有憂色敢問國家之事耶君之謀也管仲曰非汝所知也婧曰妾聞之也毋老老毋賤賤毋少少毋弱弱管仲曰何謂也婧曰昔者太公望年七十屠牛於朝歌市八十為天子師九十而封於齊由是觀之老可老耶夫伊尹有㜪氏之媵臣也湯立以為三公天下之治太平由是觀之賤可賤耶睪子生五嵗而贊禹由是觀之少可少耶駃騠生七日而超其母由是觀之弱可弱耶於是管仲乃下席而謝曰吾請語子其故昔日公使迎甯戚甯戚曰浩浩乎白水吾不知其所謂是故憂之其妾笑曰人已語君矣君不知識耶古有白水之詩詩不云乎浩浩白水鯈鯈之魚君來召我我將安居國家未定從我焉如此甯戚之欲得仕國家也管仲大悦以報桓公桓公乃修官府齊戒五日見甯子因以為佐齊國以治君子謂妾婧為可與謀詩曰先民有言詢於芻蕘此之謂也頌曰桓遇甯戚命管迎之甯稱白水管仲憂疑妾進問焉為説其詩管嘉報公齊得以治楚江乙母楚大夫江乙之母也當恭王之時乙為郢大夫有入王宫中盗者令尹以罪乙請於王而絀之處家無幾何其母亡布八尋乃往言於王曰妾夜亡布八尋令尹盗之王方在小曲之臺令尹侍焉王謂母曰令尹信盗之寡人不為其富貴而不行法焉若不盗而誣之楚國有常法母曰令尹不身盗之也乃使人盗之王曰其使人盗奈何對曰昔孫叔敖之為令尹也道不拾遺門不閉關而盗賊自息今令尹之治也耳目不眀盗賊公行是故使盗得盗妾之布是與使人盗何以異也王曰令尹在上冦盗在下令尹不知有何罪焉母曰吁何大王之言過也昔日妾之子為郢大夫有盗王宫中之物者妾子坐而絀妾子亦豈知之哉然終坐之令尹獨何人而不以是為過也昔者周武王有言曰百姓有過在予一人上不明則下不治相不賢則國不寧所謂國无人者非無人也無理人者也王其察之王曰善非徒譏令尹又譏寡人命吏償母之布因賜金千鎰母讓金布曰妾豈貪貨而矢大王哉怨令尹之治也遂去不肯受王曰母智若此其子必不愚乃復召江乙而用之君子謂乙母善以徴喻詩云猷之未逺是用大諌此之謂也頌曰江乙失位乙母動心既歸家處亡布八尋指責令尹辭甚有度王復用乙賜母金布晉弓工妻弓工妻者晉繁人之女也當平公之時使其夫為弓三年乃成平公引弓而射不穿一札平公怒將殺弓人弓人之妻請見曰繁人之子弓人之妻也願有謁於君平公見之妻曰君聞昔者公劉之行乎羊牛踐葭葦惻然為民痛之恩及草木豈欲殺不辜者乎秦穆公有盗食其駿馬之肉反飲之以酒楚莊王臣援其夫人之衣而絶纓與飲大樂此三君者仁著於天下卒享其報名埀至今昔帝堯茅茨不剪采椽不斵土階三等猶以為為之者勞居之者逸也今妾之夫治造此弓其為之亦勞其幹生於太山之阿一日三覩隂三覩陽傳以燕牛之角纒以荆麋之筋糊以阿魚之膠此四者皆天下之妙選也而君不能以穿一札是君之不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此盖射之道也平公以其言而射穿七札繁人之夫立得出而賜金三鎰君子謂弓工妻可與處難詩曰敦弓既堅舍矢既鈞言射有法也頌曰晉平作弓三年乃成公怒弓工將加以刑妻往説公陳其幹材列其勞苦公遂釋之齊傷槐女齊傷槐女者傷槐衍之女也名倩景公有所愛槐使人守之植木懸之下令曰犯槐者刑傷槐者死於是衍醉而傷槐景公聞之曰是先犯我令使吏拘之且加罪焉倩懼乃造於相晏子之門曰賤妾不勝其欲願得備數於下晏子聞之笑曰嬰其有滛色乎何為老而見奔殆有説内之至哉既入門晏子望見之曰怪哉有深憂進而問焉對曰妾父衍幸得充城郭為公民見隂陽不調風雨不時五榖不滋之故禱祠於名山神水不勝麴糵之味先犯君令醉至於此罪故當死妾聞眀君之莅國也不損禄而加刑又不以私恚害公法不為六畜傷民人不為野草傷禾苗昔者宋景公之時大旱三年不雨召太卜而卜之曰當以人祀之景公乃降堂北面稽首曰吾所以請雨者乃為吾民也今必當以人祀寡人請自當之言未卒天大雨方千里所以然者何也以能順天慈民也今吾君樹槐令犯者死欲以槐之故殺倩之父孤妾之身妾恐傷執政之法而害眀君之義也鄰國聞之皆謂君愛樹而賤人其可乎晏子惕然而悟明日朝謂景公曰嬰聞之窮民財力謂之暴崇玩好威嚴令謂之逆刑殺不正謂之賊夫三者守國之大殃也今君窮民財力以美飲食之具繁鐘鼓之樂極宫室之觀行暴之大者也崇玩好威嚴令是逆民之明者也犯槐者刑傷槐者死刑殺不正賊民之深者也公曰寡人敬受命晏子出景公即時命罷守槐之役㧞植懸之木廢傷槐之法出犯槐之囚君子曰傷槐女能以辭免詩云是䆒是圖亶其然乎此之謂也頌曰景公愛槐民醉折傷景公將殺其女悚惶奔吿晏子稱説先王晏子為言遂免父殃楚野辯女楚野辯女者昭氏之妻也鄭簡公使大夫聘於荆至於狹路有一婦人乘車與大夫轂擊而折大夫車軸大夫怒將執而鞭之婦人曰君子不遷怒不貳過今於狹路之中妾巳極矣而子大夫之僕不肯少引是以敗子大夫之車而反執妾豈不遷怒哉既不怒僕而反怨妾豈不貳過哉周書曰毋侮鰥寡而畏髙明今子列大夫而不為之表而遷怒貳過釋僕執妾輕其微弱豈可謂不侮鰥寡乎吾鞭則鞭耳惜子大夫之䘮善也大夫慚而無以應遂釋之而問之對曰妾楚野之鄙人也大夫曰盍從我於鄭乎對曰既有狂夫昭氏在内矣遂去君子曰辯女能以倖免詩云惟號斯言有倫有脊此之謂也頌曰辯女獨乗遇鄭使者鄭使折軸執女忿怒女陳其寃亦有其序鄭使慙去不敢談語阿谷處女阿谷處女者阿谷之隧浣者也孔子南遊過阿谷之隧見處子佩瑱而浣孔子謂子貢曰彼浣者其可與言乎抽觴以授子貢曰為之辭以觀其志子貢曰我北鄙之人也自北徂南將欲之楚逢天之暑我思闕願乞一飲以伏我心處子曰阿谷之陽隱曲之地其水一清一濁流入於海欲飲則飲何問乎婢子授子貢觴迎流而挹之投而棄之從流而挹之滿而溢之跪置沙上曰禮不親授子貢還報其辭孔子曰丘已知之矣抽琴去其軫以授子貢曰為之辭子貢往曰嚮者聞子之言穆如清風不拂不寤私復我心有琴無軫願借子調其音處子曰我鄙野之人也陋固無心五音不知安能調琴子貢以報孔子孔子曰丘巳知之矣遇賢則賔抽絺綌五兩以授子貢曰為之辭子貢往曰吾北鄙之人也自北徂南將欲之楚有絺綌五兩非敢以當子之身也願注之水旁處子曰行客之人流連永久分其資財棄於野鄙妾年甚少何敢受子子不早命竊有狂夫名之者矣子貢以吿孔子孔子曰丘巳知之矣斯婦人逹於人情而知禮詩云南有喬木不可休息漢有游女不可求思此之謂也頌曰孔子出逰阿谷之南異其處子欲觀其志子貢三反女辭辨深子曰達情知禮不滛趙津女娟趙津女娟者趙河津吏之女趙簡子之夫人也初簡子南擊楚與津吏期簡子至津吏醉卧不能渡簡子欲殺之娟懼持檝而走簡子曰女子走何為對曰津吏息女妾父聞主君來渡不測之水恐風波之起水神動駭故禱祀九江三淮之神供具備禮御釐受福不勝至祝杯酌餘瀝醉至於此君欲殺之妾願以鄙軀易父之死簡子曰非女之罪也娟曰主君欲因其醉而殺之妾恐其身之不知痛而心不知罪也若不知罪殺之是殺不辜也願醒而殺之使知其罪簡子曰善遂釋不誅簡子將渡用檝者少一人娟攘捲摻檝而請曰妾願備父持檝簡子曰不榖將行選士大夫齋戒沐浴義不與婦人同舟而渡也娟對曰妾聞昔者湯伐夏左驂驪右驂牝靡而遂放桀武王伐殷左驂牝騏右驂牝䮲而遂克紂至於華山之陽主君不欲渡則巳與妾同舟又何傷乎簡子悦遂與渡中流為簡子發河邀之歌其辭曰升彼阿兮面觀清水揚波兮杳㝠㝠禱求福兮醉不醒誅將加兮妾心驚罰既釋兮凟乃清妾持檝兮操其維蛟龍助兮主將歸呼來櫂兮行勿疑簡子大悅曰昔者不榖夢娶妻豈此女乎將使人祝祓以為夫人娟乃再拜而辭曰夫婦人之禮非媒不嫁嚴親在内不敢聞命遂辭而去簡子歸乃納幣於父母而立以為夫人君子曰女娟通典而有辭詩云來游來歌以矢其音此之謂也頌曰趙簡渡河津吏醉荒將欲加誅女娟恐惶操檝進説父得不䘮維女難蔽終遂發揚趙佛肹母趙佛肹母者趙之中牟宰佛肹之母也佛肹以中牟畔趙之法以城叛者身死家收佛肹之母將論自言曰我不當死士長問其故母曰為我通於主君乃言不通則老婦死而巳士長為之言於襄子襄子出問其故母曰不得見主君則不言於是襄子見而問之曰不當死何也母曰妾之當死亦何也襄子曰而子反母曰子反母何為當死襄子曰母不能教子故使至於反母何為不當死也母曰吁以主君殺妾為有説也乃以母無教耶妾之職盡久矣此乃在於主君妾聞子少而慢者母之罪也長而不能使者父之罪也今妾之子少而不慢長又能使妾何負哉妾聞之少則為子長則為友夫死從子妾能為君長子君自擇以為臣妾之子與在論中此君之臣非妾之子君有暴臣妾無暴子是以言妾無罪也襄子曰善夫佛肹之反寡人之罪也遂釋之君子曰佛肹之母一言而發襄子之意使行不遷怒之徳以免其身詩云既見君子我心冩兮此之謂也頌曰佛肹既叛其母任理將就於論自言襄子陳列母職子長在君襄子説之遂釋不論齊威虞姬虞姬者名娟之齊威王之姬也威王即位九年不治委政大臣佞臣周破胡專權擅勢嫉賢妬能即墨大夫賢而日毁之阿大夫不肖反日譽之虞姬謂王曰破胡讒䛕之臣也不可不退齊有北郭先生者賢明有道可置左右破胡聞之乃惡虞姬曰其幼弱在於閭巷之時嘗與北郭先生通王疑之乃閉虞姬於九層之臺而使有司即窮騐問破胡賂執事者使竟其罪執事者誣其辭而上之王視其辭不合於意乃召虞姬而自問焉虞姬對曰妾娟之幸得蒙先人之遺體生於天壤之間去蓬廬之下侍眀王之讌泥附王著薦牀蔽席供職掃除掌奉湯沐至今十餘年矣惓惓之心兾幸補一言而為邪臣所擠湮於百重之下不意大王乃復見而與之語妾聞玉石墜泥不為汚柳下覆寒女不為亂積之於素雅故不見疑也經𤓰田不躡履過李園不正冠妾不避此罪一也既陷難中有司受賂聼用邪人卒見覆冒不能自明妾聞寡婦哭城城為之崩亡士嘆市市為之罷誠信發内感動城市妾之寃明於白日雖獨號於九層之内而衆人莫為毫釐此妾之罪二也既有汚名而加此二罪義固不可以生所以生者為莫白妾之汚名也且自古有之伯竒放野申生被患孝順至明反以為殘妾既當死不復重陳然願戒大王羣臣為邪破胡最甚王不執政國殆危矣於是王大寤出虞姬顯之於朝市封即墨大夫以萬户烹阿大夫與周破胡遂起兵收故侵地齊國震懼人知烹阿大夫不敢飾非務盡其職齊國大治君子謂虞姬好善詩云既見君子我心則降此之謂也頌曰齊威惰政不治九年虞姬譏刺反害其身姬列其事上指皇天威王覺寤卒距强秦齊鍾離春鍾離春者齊無鹽邑之女宣王之正后也其為人極醜無雙臼頭深目長指大節卬鼻結喉肥頂少髮折腰出胸皮膚若漆行年四十無所容入􅃷嫁不售流棄莫執於是乃拂拭短褐自詣宣王謂謁者曰妾齊之不售女也聞君王之聖徳願備後宫之掃除頓首司馬門外唯王幸許之謁者以聞宣王方置酒於漸臺左右聞之莫不掩口大笑曰此天下强顔女子也豈不異哉於是宣王乃召見之謂曰昔者先王為寡人娶妃匹皆巳備有列位矣今夫人不容於鄉里布衣而欲干萬乘之主亦有何竒能哉鍾離春對曰無有特竊慕大王之美義耳王曰雖然何喜良久曰竊嘗喜隱宣王曰隱固寡人之所願也試一行之言未卒忽然不見宣王大驚立發隱書而讀之退而推之又未能得明日又更召而問之不以隱對但揚目衘齒舉手拊膝對曰今大王之君國也西有衡秦之患南有强楚之讎外有二國之難内聚姦臣衆人不附春秋四十壯男不立不務衆子而務衆婦尊所好忽所恃一旦山陵崩弛社稷不定此一殆也漸臺五重黄金白玉琅玕籠䟽翡翠珠璣幕絡連飾萬民罷極此二殆也賢者匿於山林諂諛强於左右邪偽立於本朝諫者不得通入此三殆也飲酒沈湎以夜繼晝女樂俳優縱横大笑外不修諸侯之禮内不秉國家之治此四殆也故曰殆哉殆哉於是宣王喟然而嘆曰痛乎無鹽君之言乃今一聞於是拆漸臺罷女樂退諂諛去雕琢選兵馬實府庫四辟公門招進直言延及側陋卜擇吉日立太子進慈母拜無鹽君為后而齊國大安者醜女之力也君子謂鍾離春正而有辭詩云既見君子我心則喜此之謂也頌曰無鹽之女干説齊宣分别四殆稱國亂煩宣王從之四辟公門遂立太子拜無鹽君齊宿瘤女宿瘤女者齊東郭採桑之女閔王之后也項有大瘤故號曰宿瘤初閔王出遊至東郭百姓盡觀宿瘤採桑如故王怪之召問曰寡人出遊車騎甚衆百姓無少長皆棄事來觀汝採桑道旁曾不一視何也對曰妾受父母教採桑不受教觀大王王曰此竒女也惜哉宿瘤女曰婢妾之職屬之不二予之不忘中心謂何宿瘤何傷王大悦之曰此賢女也命後乘載之女曰頼大王之力父母在内使妾不受父母之教而随大王是奔女也大王又安用之王大慙曰寡人失之又曰貞女一禮不備雖死不從於是王遣歸使使者加金百鎰往聘迎之父母驚惶欲洗沐加衣裳女曰如是見王則變容更服不見識也請死不往於是如故隨使者閔王歸見諸夫人吿曰今日出遊得一聖女今至斥汝屬矣諸夫人皆怪之盛服而衛遲其至也宿瘤駭宫中諸夫人皆掩口而笑左右失貎不能自止王大慙曰且無笑不飾耳夫飾與不飾固相去十百也女曰夫飾相去千萬尚不足言何獨十百也王曰何以言之對曰性相近習相逺也昔者堯舜桀紂俱天子也堯舜自飾以仁義雖為天子安於節儉茅茨不剪采椽不斵後宫衣不重采食不重味至今數千嵗天下歸善焉桀紂不自飾以仁義習為苛文造為髙臺深池後宫蹈綺縠弄珠玉意非有饜時也身死國亡為天下笑至今千餘嵗天下歸惡焉由是觀之飾與不飾相去千萬尚不足言何獨十百也於是諸夫人皆大慙閔王大感瘤女以為后出令卑宫室填池澤損膳减樂後宫不得重采期月之間化行鄰國諸侯朝之侵三晉懼秦楚一立帝號閔王至於此也宿瘤女有力焉及女死之後燕遂屠齊閔王逃亡而弑死於外君子謂宿瘤女通而有禮詩云菁菁者莪在彼中阿既見君子樂且有儀此之謂也頌曰齊女宿瘤東郭採桑閔王出遊不為變常王召與語諌辭甚明卒升后位名聲光榮齊孤逐女孤逐女者齊即墨之女齊相之妻也初逐女孤無父母狀甚醜三逐於鄉五逐於里過時無所容齊相婦死逐女造襄王之門而見謁者曰妾三逐於鄉五逐於里孤無父母擯棄於野无所容止願當君王之盛顔盡其愚辭左右復於王王輟食吐哺而起左右曰三逐於鄉者不忠也五逐於里者少禮也不忠少禮之人王何為遽王曰子不識也夫牛鳴而馬不應非不聞牛聲也異類故也此人必有與人異者矣遂見與之語三日始一日曰大王知國之柱乎王曰不知也逐女曰柱相國是也夫柱不正則棟不安棟不安則榱橑墮則屋幾覆矣王則棟矣庶民榱橑也國家屋也夫屋堅與不堅在乎柱國家安與不安在乎相今大王既有明知而國相不可不審也王曰諾其二日王曰吾國相奚若對曰王之國相比目之魚也外比内比然後能成其事就其功王曰何謂也逐女曰朋其左右賢其夫妻是外比内比也王曰吾相其可易乎逐女對曰中才也求之未可得也如有過之者何為不可也今則未有妾聞明王之用人也推一而用之故楚用虞丘子而得孫叔敖燕用郭隗而得樂毅大王誠能厲之則此可用矣王曰吾用之奈何逐女對曰昔者齊桓公尊九九之人而有道之士歸之越王敬螳蜋之怒而勇士死之葉公好龍而龍為暴下物之所徴固不須頃王曰善遂尊相敬而事之以逐女妻之齊國以治詩曰既見君子並坐歌瑟此之謂也頌曰齊孤逐女造襄王門女雖五逐王猶見焉談國之政亦甚有文與語三日遂配相君楚處莊姪楚處莊姪者楚頃襄王之夫人縣邑之女也初頃襄王好臺榭出入不時行年四十不立太子諫者蔽塞屈原放逐國既殆矣秦欲襲其國乃使張儀間之使其左右謂王曰南遊於唐五百里有樂焉王將往是時莊姪年十二謂其母曰王好滛樂出入不時春秋既盛不立太子今秦又使人重賂左右以惑我王使遊五百里之外以觀其勢王巳遊姦臣必倚敵國而發謀王必不能反國姪願往諫之其母曰汝嬰兒也安知諫不遣姪乃逃以緹竿為幟姪持幟伏南郊道旁王車至姪舉其幟王見之而止使人往問之使者報曰有一女童伏於幟下願有謁於王王曰召之姪至王曰女何為者也姪對曰妾縣邑之女也欲言隱事於王恐壅閼蔽塞而不得見聞大王出遊五百里因以幟見王曰子何以戒寡人姪對曰大魚失水有龍无尾墻欲内崩而王不視王曰不知也姪對曰大魚失水者王離國五百里也樂之於前不思禍之起於後也有龍无尾者年既四十无太子也國无强輔必且殆也墻欲内崩而王不視者禍亂且成而王不改也王曰何謂也姪曰王好臺榭不恤衆庶出入不時耳目不聰明春秋四十不立太子國無强輔外内崩壊强秦使人内間王左右使王不改滋日以甚今禍且搆王遊於五百里之外王必遂往國非王之國也王曰何也姪曰王之致此三難也以五患王曰何謂五患姪曰宫室相望城郭濶逹一患也宫垣衣綉民人無褐二患也奢侈無度國且虚竭三患也百姓饑餓馬有餘秣四患也邪臣在側賢者不逹五患也王有五患故及三難王曰善命後車載之立還反國門已閉反者巳定王乃發鄢郢之師以擊之僅能勝之乃立姪為夫人位在鄠子袖之右為王陳節儉愛民之事楚國復强君子謂莊姪雖違於禮而終守以正詩云北風其喈雨雪霏霏惠而好我携手同歸此之謂也頌曰楚處莊姪雖為女童以幟見王陳國禍凶設王三難五患累重王載以歸終卒有功齊女徐吾齊女徐吾者齊東海上貧婦人也與鄰婦李吾之屬㑹燭相從夜績徐吾最貧而燭數不屬李吾謂其屬曰徐吾燭數不屬請無與夜也徐吾曰是何言與妾以貧燭不屬之故起常先息常後洒掃陳席以待來者自與蔽薄坐常處下凡為貧燭不屬故也夫一室之中益一人燭不為暗損一人燭不為明何愛東壁之餘光不使貧妾得蒙見哀之恩長為妾役之事使諸君常有惠施於妾不亦可乎李吾莫能應遂復與夜終無後言君子曰婦人以辭不見棄於鄰則辭安可以巳乎哉詩曰辭之輯矣民之洽矣此之謂也頌曰齊女徐吾㑹績獨貧夜托燭明李吾絶焉徐吾自列辭語甚分卒得容人終没後言齊太倉女齊太倉女者漢太倉令淳于公之少女也名緹縈淳于公無男有女五人孝文皇帝時淳于公有罪當刑是時肉刑尚在詔獄繫長安當行㑹逮公罵其女曰生子不生男緩急非有益緹營自悲泣而随其父至長安上書曰妾父為吏齊中皆稱亷平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無由也妾願入身為官婢以贖父罪使得自新書奏天子憐悲其意乃下詔曰葢聞有虞之時畫衣冠異章服以為戮而民不犯何其至治也今法有肉刑三而姦不止其咎安在非朕徳薄而教之不明歟吾甚自媿夫訓道不純而愚民陷焉詩云愷悌君子民之父母今人有過教未施而刑巳加焉或欲改行為善而其道毋繇朕甚憐之夫刑者至斷支體刻肌膚終身不息何其痛而不徳也豈稱為民父母之意哉其除肉刑自是之後鑿顛者髠抽脅者笞刖足者鉗淳于公遂得免焉君子謂緹縈一言發聖王之意可謂得事之宜矣詩云辭之懌矣民之莫矣此之謂也頌曰緹縈訟父亦孔有識推誠上書文雅甚備小女之言乃感聖意終除肉刑以免父事古列女傳巻六欽定四庫全書古列女傳巻七漢劉向撰孽嬖傳夏桀末喜末喜者夏桀之妃也美於色薄於徳亂孽無道女子行丈夫心佩劒帶冠桀既棄禮義淫於婦人求美女積之於後宫收倡優侏儒狎徒能為竒偉戯者聚之於旁造爛漫之樂日夜與末喜及宫女飲酒無有休時置末喜於膝上聽用其言昏亂天道驕奢自恣為酒池可以運舟一鼓而牛飲者三千人䩭其頭而飲之於酒池醉而溺死者末喜笑之以為樂龍逢進諌曰君無道必亡矣桀曰日有亡乎日亡而我亡不聼以為妖言而殺之造瓊室瑶臺以臨雲雨殫財盡幣意尚不饜召湯囚之於夏臺巳而釋之諸侯大叛於是湯受命而伐之戰於鳴條桀師不戰湯遂放桀與末喜嬖妾同舟流於海死於南巢之山詩曰懿厥哲婦為梟為鴟此之謂也頌曰末喜配桀維亂驕揚桀既無道又重其荒姦軌是用不恤法常夏后之國遂反為商殷紂妲己妲己者殷紂之妃也嬖幸於紂紂材力過人手格猛獸智足以拒諌辯足以飾非矜人臣以能髙天下以聲以為人皆出己之下好酒淫樂不離妲己妲己之所譽貴之妲己之所憎誅之作新淫之聲北鄙之舞靡靡之樂收珍物積之於後宫諛臣羣女咸獲所欲積糟為丘流酒為池懸肉為林使人祼形相逐其間為長夜之飲妲己好之百姓怨望諸侯有畔者紂乃為炮烙之法膏銅柱加之炭令有罪者行其上輙墮炭中妲己乃笑比干諫曰不修先王之典法而用婦言禍至無日紂怒以為妖言妲己曰吾聞聖人之心有七竅於是剖心而觀之囚箕子㣲子去之武王遂受命興師伐紂戰於牧野紂師倒戈紂乃登鹿臺衣寳玉衣而自殺於是武王遂致天之罰斬妲己頭懸於小白旗以為亡紂者是女也書曰牝雞無晨牝雞之晨惟家之索詩云君子信盗亂是用暴匪其止共維王之卭此之謂也頌曰妲己配紂惑亂是修紂既無道又重相謬指笑炮炙諫士刳囚遂敗牧野反商為周周幽褒姒褒姒者童妾之女周幽王之后也初夏之衰也褒人之神化為二龍同於王庭而言曰余褒之二君也夏后卜殺之與去莫吉卜請其漦藏之而吉乃布幣焉龍忽不見而藏漦櫝中乃置之郊至周莫之敢發也及周厲王之末發而觀之漦流於庭不可除也王使婦人祼而譟之化為𤣥黿入後宫宫之童妾未齓而遭之既笄而孕當宣王之時産無夫而乳懼而棄之先是有童謡曰檿弧箕服實亡周國宣王聞之後有人夫妻賣檿弧箕服之噐者王使執而戮之夫妻夜逃聞童妾遭棄而夜號哀而取之遂竄於褒長而美好褒人姁有獄獻之以贖幽王受而嬖之遂釋褒姁故號曰褒姒既生子伯服幽王乃廢后申侯之女而立褒姒為后廢太子宜臼而立伯服為太子幽王惑於褒姒出入與之同乘不䘏國事驅馳弋獵不時以適褒姒之意飲酒流湎倡優在前以夜續晝褒姒不笑幽王乃欲其笑萬端故不笑幽王為熢燧大鼓有寇至則舉諸侯悉至而無冦褒姒乃大笑幽王欲悦之數為舉熢火其後不信諸侯不至忠諫者誅唯褒姒言是從上下相間百姓乖離申侯乃與繒西夷犬戎共攻幽王幽王舉熢燧徵兵莫至遂殺幽王於驪山之下虜褒姒盡取周賂而去於是諸侯乃即申侯而共立故太子宜臼是為平王自是之後周與諸侯無異詩云赫赫宗周褒姒烕之此之謂也頌曰褒神龍變實生褒姒與配幽王廢后太子舉烽致兵笑冦不至申侯伐周果滅其祀衛宣公姜宣姜者齊侯之女衛宣公之夫人也初宣公夫人夷姜生伋子以為太子又娶於齊曰宣姜生夀及朔夷姜既死宣姜欲立夀乃與夀弟朔謀搆伋子公使伋子之齊宣姜乃隂使力士待之界上而殺之曰有四馬白旄至者必要殺之夀聞之以告太子曰太子其避之伋子曰不可夫棄父之命則惡用子也夀度太子必行乃與太子飲奪之旄而行盗殺之伋子醒求旄不得遽往追之夀巳死矣伋子痛夀為己死乃謂盗曰所欲殺者乃我也此何罪請殺我盗又殺之二子既死朔遂立為太子宣公薨朔立是為惠公竟終無後亂及五世至戴公而後寧詩云乃如之人徳音無良此之謂也頌曰衛之宣姜譛危太子欲立子夀隂設力士夀乃俱死衛果危殆五世不寧亂由姜起魯桓文姜文姜者齊侯之女魯桓公之夫人也内亂其兄齊襄公桓公將伐鄭納厲公既行與夫人俱將如齊也申繻曰不可女有家男有室無相瀆也謂之有禮易此必敗且禮婦人無大故則不歸桓公不聼遂與如齊文姜與襄公通桓公怒禁之不止文姜以告襄公襄公享桓公酒醉之使公子彭生抱而乘之因拉其脅而殺之遂死於車魯人求彭生以除恥齊人殺彭生詩曰亂匪降自天生自婦人此之謂也頌曰文姜淫亂配魯桓公與俱歸齊齊襄淫通俾厥彭生摧幹拉胷維女為亂卒成禍凶魯莊哀姜哀姜者齊侯之女莊公之夫人也初哀姜未入時公數如齊與哀姜淫既入與其弟叔姜俱公使大夫宗婦用幣見大夫夏甫不忌曰婦贄不過棗栗以致禮也男贄不過玉帛禽鳥以彰物也今婦贄用幣是男女無别也男女之别國之大節也無乃不可乎公不聼又丹其父桓公廟宫之楹刻其桷以夸哀姜哀姜驕滛通於二叔公子慶父公子牙哀姜欲立慶父公薨子般立慶父與哀姜謀遂殺子般於黨氏立叔姜之子是為閔公閔公既立慶父與哀姜淫益甚又與慶父謀殺閔公而立慶父遂使卜齮襲弑閔公於武闈將自立魯人謀之慶父恐奔莒哀姜奔邾齊桓公立僖公聞哀姜與慶父通以危魯召哀姜酖而殺之魯遂殺慶父詩云啜其泣矣何嗟及矣此之謂也頌曰哀姜好邪淫於魯莊延及二叔驕妬縱横慶父是依國適以亡齊桓征伐酖殺哀姜晉獻驪姬驪姬者驪戎之女晉獻公之夫人也初獻公娶於齊生秦穆夫人及太子申生又娶二女於戎生公子重耳夷吾獻公伐驪戎克之獲驪姬以歸生奚齊卓子驪姬嬖於獻公齊姜先死公乃立驪姬以為夫人驪姬欲立奚齊乃與弟謀曰一朝不朝其間容刀逐太子與二公子而可間也於是驪姬乃説公曰曲沃君之宗邑也蒲與二屈君之境也不可以無主宗邑無主則民不畏邊境無主則開冦心夫冦生其心民嫚其政國之患也若使太子主曲沃二公子主蒲與二屈則可以威民而懼冦矣遂使太子居曲沃重耳居蒲夷吾居二屈闕驪姬既逺太子乃夜泣公問其故對曰吾聞申生為人甚好仁而强甚寛惠而慈於民今謂君惑於我必亂國無乃以國民之故行强於君君未終命而歿君其奈何胡不殺我無以一妾亂百姓公曰惠其民而不惠其父乎驪姬曰為民與為父異夫殺君利民民孰不戴茍民利而得寵除亂而衆説孰不欲焉雖其愛君欲不勝也若紂有良子而先殺紂毋彰其惡鈞死也毋必假手於武王以廢其祀自吾先君武公兼翼而楚穆弑成此皆為民而不顧親君不早圖禍且及矣公懼曰奈何而可驪姬曰君何不老而授之政彼得政而治之殆將釋君乎公曰不可吾將圖之由此疑太子驪姬乃使人以公命告太子曰君夢見齊姜亟往祀焉申生祭於曲沃歸福於絳公田不在驪姬受福乃寘鴆於酒施毒於脯公至召申生將胙驪姬曰食自外來不可不試也覆酒於地地墳申生恐而出驪姬與犬犬死與小臣小臣亦死驪姬乃仰天叩心而泣見申生哭曰嗟乎國子之國子何遲為君有父恩忍之况國人乎弑父以求利人孰利之獻公使人謂太子曰爾其圖之太傅里克曰太子入自明可以生不則不可以生太子曰吾君老矣若入而自明則驪姬死吾君不安遂自經於新城廟遂殺少傅杜原欵使閹楚刺重耳重耳奔狄使賈華刺夷吾夷吾奔梁盡逐羣公子乃立奚齊獻公卒奚齊立里克殺之卓子立又殺之乃戮驪姬鞭而殺之於是秦立夷吾是為惠公惠公死子圉立是為懷公晉人殺懷公於髙梁立重耳是為文公亂及五世然後定詩曰婦有長舌惟厲之階又曰哲婦傾城此之謂也頌曰驪姬繼母惑亂晉獻謀譛太子毒酒為闕果殺申生公子出奔身又伏辜五世亂昏魯宣繆姜繆姜者齊侯之女魯宣公之夫人成公母也聰惠而行亂故諡曰繆初成公幼繆姜通於叔孫宣伯名喬如喬如與繆姜謀去季孟而擅魯國晉楚戰於鄢陵公出佐晉將行姜告公必逐季孟是背君也公辭以晉難請反聼命又貨晉大夫使執季孫行父而止之許殺仲孫蔑以魯士晉為内臣魯人不順喬如明而逐之喬如奔齊魯逐擯繆姜於東宫始往繆姜使筮之遇艮之六史曰是為艮之隨隨其出也君必速出姜曰亡是於周易曰隨元亨利貞无咎元善之長也亨嘉之㑹也利義之和也貞事之幹也終故不可誣也是以雖随无咎今我婦人而與於亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而放不可謂貞有四徳者隨而无咎我皆無之豈隨也哉我則取惡能无咎乎必死於此不得出矣卒薨於東宫君子曰惜哉繆姜雖有聰慧之質終不得掩其淫亂之罪詩曰士之躭兮猶可説也女之躭兮不可説也此之謂也頌曰繆姜淫泆宣伯是阻謀逐季孟欲使專魯既廢見擯心意摧下後聼善言終不能補陳女夏姬陳女夏姬者大夫夏徴舒之母也其狀美好无匹内挾伎術葢老而復壯者三為王后七為夫人公侯爭之莫不迷惑失意夏姬之子徵舒為大夫公孫寧儀行父與陳靈公皆通於夏姬或衣其衣以戯於朝泄冶見之謂曰君有不善子宜掩之今自子率居而為之不待幽間於朝廷以戯士民其謂爾何二人以吿靈公靈公曰衆人知之吾不善无害也泄冶知之寡人恥焉乃使人徵賊泄冶而殺之靈公與二子飲於夏氏召徵舒靈公戱二子曰徵舒似汝二子亦曰不若其似公也徵舒疾此言靈公罷酒出徵舒伏弩廐門射殺靈公公孫寧儀行父皆奔楚靈公太子午奔晉其明年楚莊王舉兵誅徵舒定陳國立午是為成公莊王見夏姬美好將納之申公巫臣諌曰不可王討罪也而納夏姬是貪色也貪色為淫淫為大罰願王圖之王從之使壞後垣而出之將軍子反見美又欲取之巫臣諌曰是不祥人也殺御叔弑靈公戮夏南出孔儀喪陳國天下多美婦女何必取是子反乃止莊王以夏姬與連尹襄老襄老死於邲亡其尸其子黒要又通於夏姬巫臣見夏姬謂曰子歸我將娉汝及恭王即位巫臣娉於齊盡與其室俱至鄭使人召夏姬曰尸可得也夏姬從之巫臣使介歸幣於楚而與夏姬奔晉大夫子反怨之遂與子重殺巫臣之族而分其室詩云乃如之人兮懷婚姻也大無信也不知命也言嬖色殞命也頌曰夏姬好美㓕國破陳走二大夫殺子之身殆誤楚莊敗亂巫臣子反悔懼申公族分齊靈聲姬聲姬者魯侯之女靈公之夫人太子光之母也號孟子淫通於大夫慶尅與之䝉衣乘輦而入於閎鮑牽見之以告國佐國佐召慶尅將詢之慶尅久不出以告孟子曰國佐非我孟子怒時國佐相靈公㑹諸侯於柯陵髙子鮑子處内守及還將至閉門而索客孟子訴之曰髙鮑將不内君而欲立公子角國佐知之公怒刖鮑牽而逐髙子國佐佐入奔莒更以崔杼為大夫使慶尅佐之乃帥師圍莒不勝國佐使人殺慶尅靈公與佐盟而復之孟子又愬而殺之及靈公薨髙鮑皆復遂殺孟子齊亂乃息詩云匪教匪誨時維婦寺此之謂也頌曰齊靈聲姬厥行亂失淫於慶尅鮑牽是疾譛愬髙鮑遂以奔亡好禍用亡亦以事䘮齊東郭姜齊東郭姜者棠公之妻齊崔杼御東郭偃之姊也美而有色棠公死崔子弔而説姜遂與偃謀娶之既居其室比於公宫莊公通焉驟如崔氏崔子知之異日公以崔子之冠賜侍人崔子愠告有疾不出公登臺以臨崔子之宫由臺上與東郭姜戯公下從之東郭姜奔入户而閉之公推之曰開余東郭姜曰老夫在此未及收髪公曰余聞崔子之疾也不聞崔子與姜自側亡出閉門聚衆鳴鼓公恐擁柱而歌公請于崔氏曰孤知有罪矣請改心事吾子若不信請盟崔子曰臣不敢聞命乃避之公又請於崔氏之宰曰請就先君之廟而死焉崔氏之宰曰君之臣杼有疾不在侍臣不敢聞命公踰墻而逃崔氏射公中踵公反墮遂弑公先是時東郭姜與前夫子棠毋咎俱入崔子愛之使為相室崔子前妻子二人大子城少子彊及姜入後生二子明成成有疾崔子廢成而以眀為後成使人請崔邑以老崔子哀而許之棠毋咎與東郭偃爭而不與成與彊怒將欲殺之以告慶封慶封齊大夫也隂與崔氏爭權欲其相滅也謂二子曰殺之於是二子歸殺棠毋咎東郭偃於崔子之庭崔子怒愬之於慶氏曰吾不肖有子不能教也以至於此吾事夫子國人之所知也唯辱使者不可以巳慶封乃使盧蒲嫳帥徒衆與國人焚其庫廐而殺成彊崔子之妻曰生若此不若死遂自經而死崔子歸見庫廐皆焚妻子皆死又自經而死君子曰東郭姜殺一國君而滅三室又殘其身可謂不祥矣詩曰枝葉未有害本寔先撥此之謂也頌曰齊東郭姜崔杼之妻惑亂莊公毋咎是依禍及眀成爭邑相殺父母无聊崔氏遂滅衛二亂女衛二亂女者南子及衛伯姬也南子者宋女衛靈公之夫人通於宋子朝太子蒯瞶知而惡之南子讒太子於靈公曰太子欲殺我靈公大怒蒯瞶蒯瞶奔宋靈公薨蒯瞶之子輙立是為出公衛伯姬者蒯瞶之姊也孔文子之妻孔悝之母也悝相出公文子卒姬與孔氏之豎渾良夫滛姬使良夫於蒯瞶蒯瞶曰子茍能内我於國報子以乘軒免子三死與盟許以姬為良夫妻良夫喜以告姬姬大悦良夫乃與蒯瞶入舍孔子之圃昏時二人䝉衣而乘遂入至姬所巳食姬杖戈先太子與五介胄之士迫其子悝於厠强盟之出公奔魯子路死之蒯瞶遂立是為莊公殺夫人南子又殺渾良夫莊公以戎州之亂又出奔四年而出公復入將入大夫殺孔悝之母而迎公二女為亂五世至悼公而後定詩云相䑕有皮人而無儀人而無儀不死何為此之謂也頌曰南子惑淫宋朝是親譛彼蒯瞶使之出奔悝母亦嬖出入兩君二亂交錯咸以滅身趙靈呉女趙靈呉女者號孟姚呉廣之女趙武靈王之后也初武靈王娶韓王女為夫人生子章立以為后章為太子王嘗夢見處女鼓瑟而歌曰美人熒熒兮顔若苕之榮命兮命兮逢天時而生曾莫我嬴嬴異日王飲酒樂數言所夢想見其人呉廣聞之乃因后而入其女孟姚甚有色焉王愛幸之不能離數年生子何孟姚數㣲言后有淫意太子無慈孝之行王乃廢后與太子而立孟姚為惠后以何為王是為惠文王武靈王自號主父封章於代號安陽君四年朝羣臣安陽君來朝主父從旁觀窺羣臣宗室見章儽然也反屈於弟心憐之是時惠后死久恩衰乃欲分趙而王章於代計未决而輟主父遊沙丘宫章以其徒作亂李兑乃起四邑之兵擊章章走主父主父閉之兌因圍主父宫既殺章乃相與謀曰以章圍主父即觧兵吾屬夷矣乃遂圍主父主父欲出不得又不得食乃探雀鷹而食之三月餘遂餓死沙丘宫詩曰流言以對冦攘式内言不善之從内出也頌曰呉女苕顔神寤趙靈既見嬖近惑心乃生廢后興戎子何是成主閉沙丘國以亂傾楚考李后楚考李后者趙人李園之女弟楚考烈王之后也初考烈王無子春申君患之李園為春申君舍人乃取其女弟與春申君知有身園女弟承間謂春申君曰楚王之貴幸君雖兄弟不如今君相楚三十餘年而王無子即百嵗後將立兄弟兄弟誠立禍且及身何以保相印江東之封乎今妾知有身矣而人莫知妾之幸君未久誠以君之重而進妾於楚王楚王必幸妾妾頼天有子男則是君之子為王也楚國盡可得孰與身臨不測之罪乎春申君大然之乃出園女弟謹舍之言之考烈王考烈王召而幸之生子悼立為太子園女弟為后而李園貴用事養士欲殺春申君以滅口及考烈王死園乃殺春申君滅其家悼立是為幽王后有考烈王遺腹子猶立是為哀王考烈王弟公子負芻之徒聞知幽王非考烈王子疑哀王乃襲殺哀王及太后盡滅李園之家而立負芻為王五年而秦滅之詩云盗言孔甘亂是用餤此之謂也頌曰李園女弟發迹春申考烈無子果得納身知重而入遂得為嗣既立畔本宗族滅弑趙悼倡后倡后者趙悼襄王之后也闕而亂一宗之族既寡悼襄王以其美而取之李牧諌曰不可女之不正國家所以覆而不安也此女亂一宗大王不畏乎王曰亂與不亂在寡人為政遂娶之初悼襄王后生子嘉為太子倡后既入為姬生子遷倡后既嬖幸於王隂譛后及太子於王使人犯太子而陷之於罪王遂廢嘉而立遷黜后而立倡姬為后及悼襄王薨遷立是為幽閔王倡后淫泆不正通於春平君多受秦賂而使王誅其良將武安君李牧其後秦兵徑入莫能距遷遂見虜於秦趙亡大夫怨倡后之譛太子及殺李牧乃殺倡后而滅其家共立嘉於代七年不能勝秦趙遂滅為郡詩云人而無禮不死何俟此之謂也頌曰趙悼倡后貪饕無足隳廢后適執詐不慤淫亂春平窮意所欲受賂亡趙身死滅國古列女傳巻七欽定四庫全書續古列女傳卷八漢劉向撰周郊婦人周郊婦人者周大夫尹固所遇於郊之婦人也周敬王之時王子朝怙寵為亂與敬王爭立敬王不得入尹固與召伯盈原伯魯附於子朝春秋魯昭二十六年晉師納王尹固與子朝奉周之典籍出奔楚數日道還周郊婦人遇郊尤之曰處則勸人為禍行則數日而反是其過三嵗乎至昭公二十九年京師果殺尹固君子謂周郊婦人惡尹氏之助亂知天道之不祐示以大期終如其言詩云取辟不逺昊天不忒此之謂也陳辯女辯女者陳國採桑之女也晉大夫解居甫使于宋道過陳遇採桑之女止而戲之曰女為我歌我將舍汝採桑女乃為之歌曰墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣大夫又曰為我歌其二女曰墓門有梅有鴞萃止夫也不良歌以訊之訊予不顧顛倒思予大夫曰其梅則有其鴞安在女曰陳小國也攝乎大國之間因之以饉饑加之以師旅其人且亡而况鴞乎大夫乃服而釋之君子謂辯女勇正而有辭柔順而有守詩云既見君子樂且有儀此之謂也聶政姊齊勇士聶政之姊也聶政母既終獨有姊在及為濮陽嚴仲子刺韓相俠累所殺者數十人恐禍及姊因自破其面抉其目自屠腸而死韓暴其尸于市購問以千金莫知為誰姊曰弟至賢愛妾之軀滅吾之弟名非弟意也乃之韓哭聶政尸謂吏曰殺韓相者妾之弟軹深井里聶政也亦自殺于尸下晉楚齊衞聞之曰非獨聶政之勇乃其姊者烈女也君子謂聶政姊仁而有勇不去死以滅名詩云死䘮之威兄弟孔懐言死可畏之事唯兄弟甚相懐此之謂也王孫氏母王孫氏之母者齊大夫王孫賈之母也賈年十五事齊閔王國亂閔王出見弑國人不討賊王孫母謂賈曰汝朝出而晚來則吾倚門而望汝汝暮出而不還則吾倚閭而望汝今汝事王王出走汝不知其處汝尚何歸乎王孫賈乃入市中而令百姓曰淖齒亂齊國弑閔王欲與我誅之者袒右市人従者四百人與之誅淖齒刺而殺之君子謂王孫母義而能教詩云教誨爾子式穀似之此之謂也陳嬰母漢棠邑侯陳嬰之母也始嬰為東陽令史居縣素信為長者秦二世之時東陽少年殺縣令相聚數千人欲立長帥未有所用乃請陳嬰嬰謝不能遂强立之縣中従之得一萬人欲立嬰為王嬰母曰我為子家婦聞先故不甚貴今暴得大名不祥不如以兵有所属事成猶得封侯敗則易以亡可無為人所指名也嬰従其言以兵属項梁梁以為上柱國後項氏敗嬰歸漢以功封棠邑侯君子曰嬰母知天命又能守先故之業流祚後世謀慮深矣詩曰貽厥孫謀以燕翼子此之謂也王陵母漢丞相安國侯王陵之母也陵始為縣邑豪高祖微時兄事陵及高祖起沛陵亦聚黨數千以兵属漢王項羽與漢為敵國得陵母置軍中陵使至則東嚮坐陵母欲以招陵陵母既而私送使者泣曰為老妾語陵善事漢王漢王長者無以老妾故懐二心言妾已死也乃伏劍而死以固勉陵項羽怒烹之陵志益感終與高祖定天下位至丞相封侯傳爵五世君子謂王陵母能棄身立義以成其子詩云我躬不閲遑恤我後終身之仁也陵母之仁及五世矣張湯母漢御史大夫張湯之母也湯以文法事漢孝武帝為御史大夫好勝陵人母數責怒性不能悛改後果為丞相嚴青翟及三長史所怨㑹趙王上書言湯罪繫廷尉丞相及三長史共致其罪遂自殺昆弟諸子欲厚葬之母曰湯為天子大臣被惡言而死亦何厚葬載以牛車有棺而無槨天子聞之曰非此母不生此子乃盡案誅三長史丞相嚴青翟自殺君子謂張湯母能克己感悟時主詩云彼美孟姜徳音不忘此之謂也雋不疑母漢京兆尹雋不疑之母也仁而善教不疑為京兆尹行縣錄囚徒還其母輒問所平反活幾何人即不疑多所平反母喜笑飲食言語異于他時或無所出母怒為之不食由是故不疑為吏嚴而不殘君子謂不疑母能以仁教詩云昊天疾威敷于下土言天道好生疾威虐之行於下土也楊夫人楊夫人者漢丞相安平侯楊敞之妻也漢昭帝崩昌邑王賀即帝位淫亂大将軍霍光與車騎将軍張安世謀欲廢賀更立帝議已定使大司農田延年報敞敞驚懼不知所言汗出浹背徒曰唯唯而已延年出更衣夫人遽従東廂謂敞曰此國之大事今大將軍議已定使九卿來報君侯君侯不疾應與大将軍同心猶與無決先事誅矣延年從更衣還敞夫人與延年㕘語許諾請奉大将軍教令遂共廢昌邑王立宣帝居月餘敞薨益封三千五百户君子謂敞夫人可謂知事之機者矣詩云辰彼碩女令徳來教此之謂也霍夫人顯霍夫人顯者漢大将軍博陸侯霍光之妻也奢淫虐害不循軌度光以忠慎受孝武皇帝遺詔輔翼少主當孝宣帝時又以立帝之功甚見尊寵人臣無二顯有小女字成君欲貴之其道无由㑹宣帝許后當産疾顯乃謂女監淳於衍曰婦人㝃乳大故十死一生今皇后當㝃身可因投藥去之使我女得為后富貴共之衍承其言擣附子碎太醫大丸中持入遂藥弑許后事急顯以情告光光驚愕業已治衍奏因令上署勿論顯遂為成君衣補治入宫具果立為后是時許后之子以正適立為太子顯怒歐血不食曰此乃帝在民間時子安得為太子即我女有子反當為王耶復教皇后令毒殺太子皇后數召太子食保阿輒先嘗之光既薨子禹嗣為博陸侯顯改更光時所造塋而侈大之築神道為輦閣幽閉良人奴婢又治第宅作乘輿輦盡繡絪黄金塗為薦輪侍婢以五采系輓顯遊戲又與監奴馮子都淫亂禹等縦弛日甚宣帝既聞霍氏不道又弑許后事泄顯恐怖乃謀為逆欲廢天子而立禹發覺霍氏中外皆腰斬而顯棄市后廢處昭臺宫詩云廢為殘賊莫知其尤言習於惡不知其為過霍夫人顯之謂也嚴延年母河南太守東海嚴延年之母也生五男皆有吏材至二千石東海號曰萬石嚴嫗延年為河南太守所在名為嚴能冬月傳属縣囚論府下流血數里河南號曰屠伯其母常従東海來欲就延年臘到洛陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母閉閣不見延年免冠頓首閤下母乃見之因責數延年曰幸備郡守専治千里不聞仁義教化有以全安愚民顧乘刑罰多刑殺人欲以致威豈為民父母之意哉延年服罪頓首謝因為御歸府舍母畢正臘己謂延年曰天道神明人不可獨殺我不自意老當見壯子被刑戮也行矣去汝東歸掃除墓地耳遂去歸郡見昆弟宗族復為言之後嵗餘為府丞疏章結延年罪名十事下御史案驗遂棄延年於市東海莫不稱母賢智君子謂嚴母仁智信道詩云心之憂矣寧自今矣其嚴母之謂也漢馮昭儀漢馮昭儀者孝元帝之昭儀右将軍光禄勲馮奉世之女也元帝二年昭儀以選入後宫始為長使數月為美人生男是為中山孝王美人為婕妤建昭中上幸虎圏鬪獸後宫皆従熊逸出圏攀檻欲上殿左右貴人傅昭儀皆驚走而馮婕妤直當熊而立左右格殺熊天子問媫妤人情皆驚懼何故當熊對曰妾聞猛獸得人而止妾恐至御坐故以身當之元帝嗟嘆以此敬重焉傅昭儀等皆慚明年中山王封乃立媫妤為昭儀隨王之國號中山太后君子謂昭儀勇而慕義詩云公之媚子従公于狩論語曰見義不為無勇也昭儀兼之矣王章妻女王章妻女漢京兆尹王仲卿之妻及其女也仲卿為書生學於長安獨與妻居疾病无被卧牛衣中與妻訣泣涕妻呵怒曰仲卿尊貴在朝廷誰愈於仲卿者今疾病困厄不自激昂乃反涕泣何鄙也後章仕宦至京兆尹成帝舅大将軍王鳯秉政専權章雖為鳯所舉意不肯附㑹有日食之變章上封事言鳯不可任用事成當上妻止之曰人當知足獨不念牛衣中流涕時耶章曰非女子所知書遂上天子不忍退鳯章由是為鳯所陷事至大逆収繫下獄章有小女年十二夜號哭曰平日坐獄上聞呼囚數常至九今八而止我君素剛先死者必我君也明日問之果死妻子皆徙合浦鳯薨後成都侯王商為大將軍閔章无罪白還其妻子財産田宅衆庻給之君子謂王章妻知卷舒之節詩云昊天已威予慎无罪言王為威虐之政則无罪而遘咎也班婕妤班婕妤者左曹越騎班况之女漢孝成皇帝之婕妤也賢才通辯始選入後宫為小使俄而大幸為婕妤成帝遊於後庭嘗欲與婕妤同輦辭曰觀古圗畫賢聖之君皆有名臣在側三代之末主乃有女嬖今欲同輦得无似之乎上善其言而止太后聞而喜曰古有樊姬今有班婕妤每誦詩及窈窕徳家女師之篇必三復之每進見上疏依古禮自鴻嘉之後成帝稍隆于女寵婕妤進侍者李平平得幸立為婕妤帝曰始衞皇后亦従微起乃賜平姓曰衞所謂衞婕妤也其後趙飛燕姊妹有寵驕妬譖訴班婕妤云挾邪詛祝上考問班婕妤曰妾聞死生有命富貴在天修正尚未䝉福為邪欲以何望且使鬼神有知不受不臣之訴如其无知訴之何益故弗為也上善其對而憐憫之賜黄金百斤時飛燕驕妬婕妤恐久見危求供養皇太后於長信宫上許焉婕妤退處東宫作賦自傷曰承祖考之遺徳兮荷性命之淑靈登薄軀於宫闕兮充下陳於後庭䝉聖皇之渥惠兮當日月之盛明揚光烈之翕赫兮奉隆寵於層城既過幸於非位兮竊庶幾乎嘉時毎寤寐而累息兮申佩離以自思陳女圖而鏡鑑兮顧女史而問詩悲晨婦之作戒兮哀褒妃之為尤美皇英之女舜兮榮任姒之母周雖愚陋其靡及乎敢舍心而忘茲厯年嵗而悼懼兮閔繁華之不滋痛陽禄與祐覩兮仍襁褓而離灾豈妄人之殃咎兮将天命之不可求白日忽以移光兮遂奄莫而昧幽猶被覆載之厚徳兮不廢捐於罪尤奉供養於東宫兮託長信之末流供洒掃於帷幄兮永終死以為期願歸骨於山足兮依松栢之餘休重日潛𤣥宫兮幽以清應門閉兮禁闥扃華殿塵兮玉階苔中庭萋兮緑草生廣屋䕃兮幨帷腌房櫳虚兮風泠泠感帷裳兮發紅羅紛綷縩兮紈素聲神眇眇兮宻靖處君不御兮誰為榮俯視兮丹墀思君兮履綦仰視兮雲屋雙涕下兮横流顧左右兮和顔酌羽觴兮銷憂惟人生兮一世忽一過兮若浮已獨嚮兮高明處生民兮極休勉娛情兮極樂與福禄兮無期緑衣白華自古兮有之至成帝崩婕妤充奉園陵薨因葬園中君子謂班婕妤辭同輦之言盖宣后之志也進李平於同列樊姬之徳也釋詛祝之譖定姜之知也求供養於東宫寡李之行也及其作賦哀而不傷歸命不怨詩云有斐君子如切如瑳如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可諼兮其班婕妤之謂也趙飛燕姊娣趙飛燕姊娣者成陽侯趙臨之女孝成皇帝之寵姬也飛燕初生父母不舉三日不死乃収養之成帝常微行出過河陽主樂作上見飛燕而悦之召入宫大幸有女弟復召入俱為婕妤貴傾後宫乃封父臨為成陽侯有頃立飛燕為皇后其弟為昭儀飛燕為后而寵衰昭儀寵无比居昭陽舍其中廷彤朱殿上漆砌皆銅㳫黄金塗白玉階壁往往為黄金釭函藍田璧玉明珠翠羽飾之後宫未嘗有焉姊娣專寵而悉无子嬌媚不遜嫉妬後宫帝幸許美人有子昭儀聞之謂帝曰常紿我従中宫來今許美人子何従生懟手自𢷬以頭擊壁從牀上自投地涕泣不食曰今當安置我我欲歸爾帝曰我故語之反怒為亦不食昭儀曰陛下自知食不食何為陛下常言約不負汝今許美人有子竟負約謂何帝曰約以趙氏故不立許氏使人不無出趙氏之上者無憂也乃詔許氏夫人令殺所生兒革篋盛緘之帝與昭儀共視復緘封以御史中丞印出埋獄垣下中宫史曹宫字偉能御幸生子復用昭儀之言勿問男女殺之宫未殺昭儀怒掖庭獄丞籍武因中黄門奏事曰陛下無繼嗣子無貴賤唯留意帝不聴時兒生八九日遂取去殺之昭儀與偉能書及藥令自死偉能得書曰果欲姊娣擅天下且我兒額上有壯髪似元帝今兒安在已殺之乎乃飲藥死自後御幸有子者輒死或飲藥自墮由是使成帝無嗣成帝既崩援立外蕃仍不繁育君子謂趙昭儀之凶嬖與褒姒同行成帝之惑亂與周幽王同風詩云池之竭矣不云自濵泉之竭矣不云自中成帝之時舅氏擅外趙氏專内其自竭極盖亦池泉之勢也漢孝平皇后漢孝平皇后者安漢公太傅大司馬王莽之女孝平皇帝之后也為人婉淑有節行平帝即位后年九嵗莽秉政欲只依霍光故事以女配帝設詐以成其禮諷皇太后遣長樂少府宗政尚書令納采太師大司徒大司空以下四十人皮弁素積而告宗廟明年春遣司徒司空左右將軍奉乗轝法駕迎皇后於安漢公第司徒授璽綬登車稱警蹕時自上林延壽門入未央前殿羣臣就位行禮畢大赦天下賜公卿下至騶宰執事等有差后立嵗餘平帝崩後數年莽簒漢位后年十八自劉氏廢常稱疾不朝㑹莽敬憚哀傷意欲嫁之令立國将軍孫建世子豫将醫往問疾后大怒笞鞭旁侍御因廢疾不肯起莽遂不敢强也及漢兵誅莽燔燒未央后曰何面目以見漢家自投火中而死君子謂平后體自然貞淑之行不為存亡改意可謂節行不虧汙者矣詩曰髧彼兩髦實惟我儀之死矢靡他此之謂也更始韓夫人漢更始韓夫人者更始皇帝劉聖公之夫人也佞諂邪媚嗜酒無禮初王莽之末更始以新市平林下江之衆起自立為更始将軍兵威日甚遂自立為帝以紹漢統及申屠建討莽首詣宛更始視之曰不如此當與霍光等韓夫人曰不如此帝那得之其佞巧得更始意如此更始既隳於政事而韓夫人嗜酒淫色日與更始醉飽沈湎乃令侍中於幃幕之内詐為更始與羣臣語羣臣知非更始聲莫不怨恨尚書奏事韓夫人曰帝方對我飲樂正用是時來奏事由是綱紀不攝諸侯離叛赤眉入闗不能制乃將妻子奉天子璽綬降於赤眉為赤眉所殺詩云彼昏不知一醉日富其更始與韓夫人之謂也梁鴻妻梁鴻妻者右扶風梁伯鸞之妻同郡孟氏之女其姿貌甚醜而徳行甚修鄉里多求者而女輒不肯行年三十父母問其所欲對曰欲節操如梁鴻者時鴻未娶扶風世家多願妻者亦不許聞孟氏女言遂求納之孟氏盛飾入門七日而禮不成妻跪問曰竊聞夫子高義斥數妻妾亦已偃蹇數夫今來而見擇請問其故鴻曰吾欲得衣裘褐之人與共逃世避時今若衣綺綉傅粉墨非鴻所願妻曰幸有隠居之具矣乃更麄衣椎髻而前鴻喜曰若此者誠鴻妻也字之曰徳曜名孟光自名曰運期字俟光共遯逃霸陵山中此時王莽新敗之後也鴻與妻深隠耕耘織作以供衣食誦書彈琴忘富貴之樂後復相将至㑹稽賃舂為事雖雜庸保之中妻每進食舉案齊眉不敢正視以禮修身所在敬而慕之君子謂梁鴻妻好道安貧不汲汲於榮樂論語曰不義而富且貴於我如浮雲此之謂也明徳馬后明徳馬后者漢明帝之后伏波将軍新息忠成侯馬援之女也少有岐薿之性年十三以選入太子家接待同列如承至尊先人後己發於至誠由此見寵時及政事后推心以對無不當理意有所未安則明陳其故是時後宫未有妊育者常言繼嗣當時而立薦達左右如恐弗及其後宫有進見者輒奉養慰納之其寵益進者與之愈隆是時宫中尚無人事皆自為舞衣袿裁成手皆瘃裂終未嘗與侍御者私語防僮御雜錯或因有所訴恐萬分見於顔色故預絶其漸其慎微如是永平三年有司奏立長秋官以率八妾上未有所言皇太后曰馬貴人徳冠後宫即其人也遂登后位身衣大練御者秃裙不縁率皆羌胡倭越未嘗請舊人僮使諸王親家朝請望見后袍極麄疏及以為綺就視乃笑后曰此繒染色好故用之耳老人知者無不嗟息性不喜出入遊觀未嘗臨御窗又不好音樂上時幸苑囿離宫以故希従輒戒言不宜晨起及禽因陳風邪霧露之戒辭意甚備上納焉誦易經習詩論春秋略説大義讀楚辭不竟賦誦過耳疾浮華聴言觀論輒擿發其要讀光武皇帝本紀至於獻千里馬寳劍者上以馬駕鼓車劍賜騎士手不持珠玉后未嘗不嘆息時有楚獄因證相引繫者甚多后恐有單辭妄相覆冒承間為上言之惻然感動於是上衣夜起彷徨思論所納非臣下得聞后志在克己輔佐不以私家干朝廷兄為虎賁中郎弟黄門侍郎訖永平世不遷明帝體不安召黄門侍郎防奉參醫藥夙夜勤勞及帝崩后作起居注省去防參醫藥事公卿諸侯上書言宜遵舊典封舅氏太后詔曰外戚横恣為世所傳永平中帝自簡練知舅氏不可恣不令在樞機之位今水旱連年民流滿道至有飢餓而死封拜失宜不可且先帝言諸王封令半楚淮陽王吾子不當與光武帝子等今奈何欲以馬氏比隂氏乎吾自束脩異欲上不負先帝下不虧先人之徳身服大練縑裙食不求所甘左右傍人皆無香薫之飾但布帛耳如是者欲身帥衆也以為外親見之當傷心自克但反共言太后素自喜儉前過濯龍門上見外家問起居車如流水馬如游龍所隨從蒼頭皆衣緑褠領袖正白顧視旁御者逺不及也亦不遣怒但絶其嵗用冀以黙止讙耳知臣莫若君况親屬乎人之所以欲封侯者欲以禄食養其親奉脩祭祀身温飽耳今祭祀則受太官之牲郡國既珍司農黍稷身則衣御府之餘繒尚未足耶必當得一縣上令長樂官有負言之責内亦不愧於世俗乎是時城門越騎校尉治母䘮起墳微大後太后以為言惶懼即時削減成墳上下相承俱奉法度王主諸家莫敢犯禁廣平鉅鹿樂成王入間起居見車騎鞍勒皆純黑無金銀采飾馬不踰六尺章帝縁太后意白賜錢五百萬新平主衣組縞直領讁以不得厚賜於是親戚被服如一教化不嚴而従以躬親率先之故也置織室蠶室濯龍中后親往來觀視於内以為娛樂教諸小王試其誦論衎衎和樂日夕論道以終厥身其視養章帝過所生章帝奉之竭盡孝道君子謂徳后在家則可為衆女師範在國則可為皇后表儀詩云惟此惠君民人所瞻秉心宣猷考慎其相此之謂也梁夫人嬺梁夫人嬺者梁竦之女樊調之妻漢孝和皇帝之姨恭懐皇后之同産姊也初恭懐后以選入掖庭進御於孝章皇帝有寵生和帝立為太子竇后母養焉和帝之生梁氏喜相慶賀聞竇后竇后驕恣欲專恣害外家乃誣陷梁氏時竦在本郡安定詔書収殺之家厲移九真後和帝立竇后崩諸竇以罪惡誅放嬺従民間上書自訟曰妾同産女弟貴人前充後宫䝉先帝厚恩得見乘龍皇天授命育生明聖託體陛下為竇憲兄弟所譖訴而破亡父竦寃死於獄體骨不掩老母孤弟逺徙萬里獨妾脱身竄伏草野嘗恐歿命无由自達今遭陛下神聖之徳攬統萬里憲兄弟奸惡伏誅海内曠然各得其所妾幸蘇息拭目更視敢昧死自陳父既湮沒不可復生母埀年七十弟棠等逺在絶域不知死生願乞母弟還本郡収葬竦枯骨妾聞文帝即位薄氏蒙達宣帝紀統史氏復興妾自悲既有薄史之親獨不得蒙外戚餘恩章疏上天子感悟使中常侍掖庭令雜訊問知事明審引見嬺對上泣涕賞賜義妃嬺既素有節行又首建此事上嘉寵之稱梁夫人擢嬺夫樊調為郎中遷羽林郎将恭懐后遂乃改殯於承天宫葬西陵追諡竦為褒親愍侯徴還母及弟等棠既到増封侯食邑五千户君子謂梁夫人以哀辭發家開悟時主榮父之闕還母萬里為家門開三國之祚使天子成母子之禮詩云世之不顯厥猶翼翼思皇多士生此王國此之謂也續古列女傳卷八
