body:
  text: 古列女傳卷五漢劉向撰節義傳魯孝義保孝義保者魯孝公稱之保母臧氏之寡也初孝公父武公與其二子長子括中子戲朝周宣王宣王立戲為魯太子武公薨戲立是為懿公孝公時號公子稱最少義保與其子俱入宫養公子稱括之子伯御與魯人作亂攻殺懿公而自立求公子稱於宫將殺之義保聞伯御将殺稱乃衣其子以稱之衣卧於稱之處伯御殺之義保遂抱稱以出遇稱舅魯大夫於外舅問稱死乎義保曰不死在此舅曰何以得免義保曰以吾子代之義保遂以逃十一年魯大夫皆知稱之在保於是請周天子殺伯御立稱是為孝公魯人高之論語曰可以託六尺之孤其義保之謂也頌曰伯御作亂由魯宫起孝公乳保臧氏之母逃匿孝公易以其子保母若斯亦誠足恃楚成鄭瞀鄭瞀者鄭女之嬴媵楚成王之夫人也初成王登臺臨後宫宫人皆傾觀子瞀直行不顧徐歩不變王曰行者顧子瞀不顧王曰顧吾以女為夫人子瞀復不顧王曰顧吾又與女千金而封若父兄子瞀遂一顧於是王下臺而問曰夫人重位也封爵厚禄也一顧可以得之已得而遂不顧何也子瞀曰妾聞婦人以端正和顔為容今者大王在臺上而妾顧則是失儀節也不顧告以夫人之尊示以封爵之重而後顧則是妾貪貴樂利以忘義理也茍忘義理何以事主王曰善遂立以為夫人處期年王將立公子商臣以為太子王問之於令尹子上子上曰君之齒末也而又多寵子既置而黜之必為亂矣且其人蜂目而豺聲忍人也不可立也王退而問於夫人子瞀曰令尹之言信可従也王不聽遂立之其後商臣以子上救蔡之事譖子上而殺之子瞀謂其保曰吾聞婦人之事在於饋食之間而已雖然心之所見吾不能藏夫昔日子上言太子之不可立也太子怨之譖而殺之王不明察遂辜無罪是白黑顛倒上下錯謬也王多寵子皆欲得國太子貪忍恐失其所王又不明無以照之庶嫡分爭禍必興焉後王又欲立公子職職商臣庶弟也子瞀退而與其保言曰吾聞信不見疑今者王必將以職易太子吾懼禍亂之作也而言之于王王不吾應其以太子為非吾子疑吾譖之者乎夫見疑而生衆人孰知其不然與其無義而生不如死以明之且王聞吾死必寤太子之不可釋也遂自殺保母以其言通於王是時太子知王之欲廢之也遂興師作亂圍王宫王請食熊蹯而死不可得也遂自經君子曰非至仁孰能以身讓詩曰舍命不渝此之謂也頌曰子瞀先識執節有常興於不顧卒配成王知商臣亂言之甚强自讓非子以殺身盟晉圉懐嬴懐嬴者秦穆之女晉惠公太子之妃也圉質於秦穆公以嬴妻之六年圉將逃歸謂嬴氏曰吾去國數年子父之接忘而秦晉之友不加親也夫鳥飛反鄉狐死首丘我其首晉而死子其與我行乎嬴氏對曰子晉太子也辱于秦子之欲去不亦宜乎雖然寡君使婢子侍執巾櫛以固子也今吾不足以結子是吾不肖也従子而歸是棄君也言子之謀是負妻之義也三者無一可行雖吾不従子也子行矣吾不敢泄言亦不敢従也子圉遂逃歸君子謂懐嬴善處夫婦之間頌曰晉圉質秦配以懐嬴圉將與逃嬴不肯聴亦不泄言操心甚平不告所従無所阿傾楚昭越姬楚昭越姬者越王句踐之女楚昭王之姬也昭王讌遊蔡姬在左越姬㕘右王親乗駟以馳逐遂登附社之臺以望雲夢之囿觀士大夫逐者既驩乃顧謂二姬曰樂乎蔡姬對曰樂王曰吾願與子生若此死又若此蔡姬曰昔弊邑寡君固以其黎民之役事君王之馬足故以婢子之身為苞苴玩好今乃比于妃嬪固願生俱樂死同時王顧謂史書之蔡姬許従孤死矣乃復謂越姬越姬對曰樂則樂矣然而不可久也王曰吾願與子生若此死若此其不可得乎越姬對曰昔吾先君荘公淫樂三年不聴政事終而能改卒霸天下妾以君王為能法吾先君將改斯樂而勤於政也今則不然而要婢子以死其可得乎且君王以束帛乘馬取婢子於弊邑寡君受之太廟也不約死妾聞之諸姑婦人以死彰君之善益君之寵不聞其以茍従其闇死為榮妾不敢聞命於是王寤敬越姬之言而猶親嬖蔡姬也居二十五年王救陳二姬従王病在軍中有赤雲夾日如鳥飛王問周史史曰是害王身然可以移于將相將相聞之將請以身禱於神王曰將相之於孤猶股肱也今移禍焉庸為去是身乎不聴越姬曰大哉君王之徳以是妾願従王矣昔日之遊淫樂也是以不敢許及君王復於禮國人皆將為君王死而况於妾乎請願先驅狐狸於地下王曰昔之遊樂吾戱耳若將必死是彰弧之不徳也越姬曰昔日妾雖口不言心既許之矣妾聞信者不負其心義者不虚設其事妾死王之義不死王之好也遂自殺王病甚讓位於三弟三弟不聽王薨於軍中蔡姬竟不能死王弟子閭與子西子期謀曰母信者其子必仁乃伏師閉壁迎越姬之子熊章立是為惠王然後罷兵歸葬昭王君子謂越姬信能死義詩曰徳音莫違及爾同死越姬之謂也頌曰楚昭遊樂要姬従死蔡姬許王越姬執禮終獨死節羣臣嘉美維斯兩姬其徳不比蓋將之妻蓋之偏將丘子之妻也戎伐蓋殺其君令於蓋羣臣曰敢有自殺者妻子盡誅丘子自殺人救之不得死既歸其妻謂之曰吾聞將節勇而不果生故士民盡力而不畏死是以戰勝攻取故能存國安君夫戰而忘勇非孝也君忘不死非忠也今軍敗君死子獨何生忠孝忘於身何忍以歸丘子曰蓋小戎大吾力畢能盡君不幸而死吾固自殺也以救故不得死其妻曰曩日有救今又何也丘子曰吾非愛身也戎令曰自殺者誅及妻子是以不死死又無益於君其妻曰吾聞之主憂臣辱主辱臣死今君死而子不死可謂義乎多殺士民不能存國而自活可謂仁乎憂妻子而忘仁義背故君而事暴强可謂忠乎人無忠臣之道仁義之行可謂賢乎周書曰先君而後臣先父母而後兄弟先兄弟而後交友先交友而後妻子妻子私愛也事君公義也今子以妻子之故失人臣之節無事君之禮棄忠臣之公道榮妻子之私愛偷生茍活妾等恥之况於子乎吾不能與子蒙恥而生焉遂自殺戎君賢之祠以太牢而以將禮葬之賜其弟金百鎰以為卿而使别治蓋君子謂蓋將之妻潔而好義詩曰淑人君子其徳不回此之謂也頌曰蓋將之妻據節鋭精戎既滅蓋丘子獨生妻恥不死陳設闕榮為夫先死卒遺顯名魯義姑姊魯義姑姊者魯野之婦人也齊攻魯至郊望見一婦人抱一兒攜一兒而行軍且及之棄其所抱抱其所攜而走於山兒隨而啼婦人遂行不顧齊將問兒曰走者爾母耶曰是也母所抱者誰也曰不知也齊將乃追之軍士引弓將射之曰止不止吾將射爾婦人乃還齊將問所抱者誰也所棄者誰也對曰所抱者妾兄之子也所棄者妾之子也見軍之至力不能兩䕶故棄妾之子齊將曰子之於母其親愛也痛甚於心今釋之而反抱兄之子何也婦人曰己之子私愛也兄之子公義也夫背公義而嚮私愛亡兄子而存妾子幸而得幸則魯君不吾畜大夫不吾養庶民國人不吾與也夫如是則脅肩無所容而累足無所履也子雖痛乎獨謂義何故忍棄子而行義不能無義而視魯國於是齊将按兵而止使人言于齊君曰魯未可伐也乃至於境山澤之婦人耳猶知持節行義不以私害公而况於朝臣士大夫乎請還齊君許之魯君聞之賜婦人束帛百端號曰義姑姊公正誠信果於行義夫義其大哉雖在匹婦國猶賴之况以禮義治國乎詩云有覺徳行四國順之此之謂也頌曰齊君攻魯義姑有節見軍走山棄子抱姪齊將問之賢其推理一婦為義齊兵遂止代趙夫人代趙夫人者趙簡子之女襄子之姊代王之夫人也簡子既葬襄子未除服地登夏屋誘代王使厨人持斗以食代王及従者行斟隂令宰人各以一斗擊殺代王及従者因舉兵平代地而迎其姊趙夫人夫人曰吾受先君之命事代之王今十有餘年矣代無大故而主君殘之今代巳亡吾將奚歸且吾聞之婦人執義無二夫吾豈有二夫哉欲迎我何之以弟慢夫非義也以夫怨弟非仁也吾不敢怨然亦不歸遂泣而呼天自殺於靡笄之地代人皆懐之君子謂趙夫人善處夫婦之間詩云不僣不賊鮮不為則此之謂也頌曰惟趙襄子代夫人弟襲滅代王迎取其姊姊引義理稱引節禮不歸不怨遂留野死齊義繼母齊義繼母者齊二子之母也當宣王時有人鬪死於道者吏訊之被一創二子兄弟立其傍吏問之兄曰我殺之弟曰非兄也乃我殺之期年吏不能決言之於相相不能決言之於王王曰今皆赦之是縦有罪也皆殺之是誅無辜也寡人度其母能知子善惡試問其母聽其所欲殺活相召其母問之曰母之子殺人兄弟欲相代死吏不能決言之於王王有仁惠故問母何所欲殺活其母泣而對曰殺其少者相受其言因而問之曰夫少子者人之所愛也今欲殺之何也其母對曰少者妾之子也長者前妻之子也其父疾且死之時屬之于妾曰善養視之妾曰諾今既受人之託許人以諾豈可以忘人之託而不信其諾耶且殺兄活弟是以私愛廢公義也背言忘信是欺死者也夫言不約束已諾不分何以居於世哉子雖痛乎獨謂行何泣下沾襟相入言於王王美其義高其行皆赦不殺而尊其母號曰義母君子謂義母信而好義潔而有讓詩曰愷悌君子四方為則此之謂也頌曰義繼信誠公正知禮親假有罪相讓不已吏不能決王以問母據信行義卒免二子魯秋潔婦潔婦者魯秋胡子妻也既納之五日去而官于陳五年乃歸未至家見路傍婦人採桑秋胡子悦之下車謂曰若曝採桑吾行道逺願託桑䕃下飡下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢豐年力桑不如見國卿吾有金願以與夫人婦人曰嘻夫採桑力作紡績織紝以供衣食奉二親養夫子吾不願金所願卿無有外意妾亦無淫泆之志収子之齎與笥金秋胡子遂去至家奉金遺母使人喚婦至乃嚮採桑者也秋胡子慚婦曰子束髮辭親往仕五年乃還當所居馳驟揚塵疾至今也乃悦路傍婦人下子之粮以金予之是忘母也忘母不孝好色淫泆是汙行也汙行不義夫事親不孝則事君不忠處家不義則治官不理孝義並亡必不遂矣妾不忍見子改娶矣妾亦不嫁遂去而東走投河而死君子曰潔婦精於善夫不孝莫大于不愛其親而愛其人秋胡子有之矣君子曰見善如不及見不善如探湯秋胡子婦之謂也詩云惟是褊心是以為刺此之謂也頌曰秋胡西仕五年乃歸遇妻不識心有淫思妻執無二歸而相知恥夫無義遂東赴河周主忠妾周主忠妾者周大夫妻之媵妾也大夫號主父自衞仕於周二年且歸其妻淫于鄰人恐主父覺其淫者憂之妻曰無憂也吾為毒酒封以待之矣三日主父至其妻曰吾為子勞封酒相待使媵婢取酒而進之媵婢心知其毒酒也計念進之則殺主父不義言之又殺主母不忠猶豫因陽僵覆酒主大怒而笞之既已妻恐媵婢言之因以他過笞欲役之媵知將死終不言主父弟聞其事具以告主父主父驚乃免媵婢而笞殺其妻使人隂問媵婢曰汝知其事何以不言而反幾死乎媵婢曰殺主以自生又有辱主之名吾死則死耳豈言之哉主父髙其義貴其意將納以為妻媵婢辭曰主辱而死而妾獨生是無禮也代主之處是逆理也無禮逆理有一猶愈今盡有之難以生矣欲自殺主聞之乃厚幣而嫁之四鄰爭娶之君子謂忠妾為仁厚夫名無細而不聞行無隠而不彰詩云無言不醻無徳不報此之謂也頌曰周主忠妾慈惠有序主妻淫僻藥酒毒主使妾奉進僵以除賊忠全其主終䝉其福魏節乳母魏節乳母者魏公子之乳母秦攻魏破之殺魏王瑕誅諸公子而一公子不得令魏國曰得公子者賜金千鎰匿之者罪至夷節乳母與公子俱逃魏之故臣見乳母而識之曰乳母無恙乎乳母曰嗟乎吾奈公子何故臣曰今公子安在吾聞秦令曰有能得公子者賜金千鎰匿之者罪至夷乳母儻言之則可以得千金知而不言則昆弟無賴矣乳母曰吁我不知公子之處故臣曰我聞公子與乳母俱逃母曰我雖知之亦終不可以言故臣曰今魏國已破亡族滅子匿之尚誰為乎母吁而言曰夫見利而反上者逆也畏死而棄義者亂也今持逆亂而以求利吾不為也且夫凡為人養子者務生之非為殺之也豈可利賞畏誅之故廢正義而行逆節哉妾不能生而令公子擒也遂抱公子逃于深澤之中故臣以告秦軍秦軍追見爭射之乳母以身為公子蔽矢著身者數十與公子俱死秦王聞之貴其守忠死義乃以卿禮葬之祠以太牢寵其兄為五大夫賜金百鎰君子謂節乳母慈惠敦厚重義輕財禮為孺子室於宫擇諸母及阿者必求其寛裕慈恵温良恭敬慎而寡言者使為子師次為慈母次為保母皆居子室以養全之他人无事不得往夫慈故能愛乳狗摶虎伏鷄搏狸恩出于中心也詩云行有死人尚或墐之此之謂也頌曰秦既滅魏購其子孫公子乳母與俱遁逃守節執事不為利違遂死不顧名號顯遺梁節姑姊梁節姑姊者梁之婦人也因失火兄子與其己子在内中欲取兄子輒得其子獨不得兄子火盛不得復入婦人將自趣火其友止之曰子本欲取兄之子惶恐卒誤得爾子中心謂何何至自赴火婦人曰梁國豈可户告人曉也被不義之名何面目以見兄弟國人哉吾欲復投吾子為失母之恩吾勢不可以生遂赴火而死君子謂節姑姊潔而不汚詩曰彼其之子舎命不渝此之謂也頌曰梁節姑姊據義執理子姪同内火大發起欲出其姪輙得厥子火盛自投明不私己珠崖二義二義者珠崖令之後妻及前妻之女也女名初年十三珠崖多珠繼母連大珠以為繫臂及令死當送喪法内珠入於闗者死繼母棄其繫臂珠其子男年九嵗好而取之置之母鏡奩中皆莫之知遂奉喪歸至海闗闗侯士吏搜索得珠十枚于繼母鏡奩中吏曰嘻此值法無可奈何誰當坐者初在左右顧心恐母云置鏡奩中乃曰初當坐之吏曰其狀何如對曰君不幸夫人解繫臂棄之初心惜之取而置夫人鏡奩中夫人不知也繼母聞之遽疾行問初初曰夫人所棄珠初復取之置夫人奩中初當坐之母意亦以初為實然憐之乃因謂吏曰願且待幸無劾兒兒誠不知也此珠妾之繫臂也君不幸妾解去之而置奩中迫奉喪道逺與弱小俱忽然忘之妾當坐之初固曰實初取之繼母又曰兒但讓耳實妾取之因涕泣不能自禁女亦曰夫人哀初之孤欲強活初身夫人實不知也又因哭泣泣下交頸送葬者盡哭哀慟傍人莫不為酸鼻揮涕闗吏執筆書劾不能就一字闗侯垂泣終日不能忍決乃曰母子有義如此吾寧坐之不忍加文且又相讓安知孰是遂棄珠而遣之既去後乃知男獨取之也君子謂二義慈孝論語曰父為子隠子為父隠直在其中矣若繼母與假女推讓爭死哀感傍人可謂直耳頌曰珠崖夫人甚有母恩假繼相讓維女亦賢納珠於闗各自伏愆二義如此為世所傳郃陽友娣友娣者郃陽邑任延壽之妻也字季兒有三子季兒兄季宗與延壽爭葬父事延壽與其友田建隂殺季宗建獨坐死延壽㑹赦乃以告季兒季兒曰嘻獨今乃語我乎遂振衣欲去問曰所與共殺吾兄者為誰延壽曰田建田建已死獨我當坐之汝殺我而已季兒曰殺夫不義事兄之讐亦不義延壽曰吾不敢留汝願以車馬及家中財物盡以送汝聴汝所之季兒曰吾當安之兄死而讐不報與子同枕席而使殺吾兄内不能和夫家又縦兄之仇何面目以生而戴天履地乎延壽慚而去不敢見季兒季兒乃告其大女曰汝父殺吾兄義不可以留又終不復嫁矣吾去汝而死善視汝兩弟遂以繦自經而死馮翊王讓聞之大其義令縣復其三子而表其墓君子謂友娣善復兄仇詩曰不僣不賊鮮不為則季兒可以為則矣頌曰季兒樹義夫殺其兄欲復兄讐義不可行不留不去遂以自殃馮翊表墓嘉其義明京師節女京師節女者長安大昌里人之妻也其夫有仇人欲報其夫而無道徑聞其妻之仁孝有義乃劫其妻之父使要其女為中譎父呼其女告之女計念不聽之則殺父不孝聽之則殺夫不義不孝不義雖生不可以行于世欲以身當之乃且許諾曰旦日在樓上新沐東首卧則是矣妾請開户牖待之還其家乃告其夫他卧他所因自沐居樓上東首開户牖而卧夜半仇家果至斷頭持去明而視之乃其妻之頭也仇人哀痛之以為有義遂釋不殺其夫君子謂節女仁孝厚于恩義也夫重仁義輕死亡行之高者也論語曰君子殺身以成仁無求生以害仁此之謂也頌曰京師節女夫仇劫父要女間之不敢不許期處既闕乃易其所殺身成仁義冠天下
