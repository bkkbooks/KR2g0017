body:
  text: 古列女傳巻四漢劉向撰貞順傳召南申女召南申女者申人之女也既許嫁於酆夫家禮不備而欲迎之女與其人言以為夫婦者人倫之始也不可不正傳曰正其本則萬物理失之毫釐差之千里是以本立而道生源治而流清故嫁娶者所以傳重承業繼續先祖為宗廟主也夫家輕禮違制不可以行遂不肯往夫家訟之於理致之於獄女終以一物不具一禮不備守節持義必死不往而作詩曰雖速我獄室家不足言夫家之禮不備足也君子以為得婦道之儀故舉而揚之傳而法之以絶無禮之求防淫慾之行焉又曰雖速我訟亦不汝從此之謂也頌曰召南申女貞一修容夫禮不備終不肯從要以必死遂至獄訟作詩明意後世稱誦宋恭伯姬伯姬者魯宣公之女成公之妹也其母曰繆姜嫁伯姬於宋恭公恭公不親逆伯姬迫於父母之命而行既入宋三月廟見當行夫婦之道伯姬以恭公不親逆故不肯聽命宋人告魯魯使大夫季文子如宋致命於伯姬還復命公享之繆姜出於房再拜曰大夫勤勞於逺道辱送小子不忘先君以及後嗣使下而有知先君猶有望也敢再拜大夫之辱伯姬既嫁於恭公十年恭公卒伯姬寡至景公時伯姬常遇夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保𫝊來也保母至矣傅母未至也左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可下堂越義而生不如守義而死遂逮於火而死春秋詳錄其事為賢伯姬以為婦人以貞為行者也伯姬之婦道盡矣當此之時諸侯聞之莫不痛悼以為死者不可以生財物猶可復故相與聚㑹於澶淵償宋之所喪春秋善之君子曰禮婦人不得傅母夜不下堂行必以燭伯姬之謂也詩云淑慎爾止不愆於儀伯姬可謂不失儀矣頌曰伯姬心專守禮一意宫夜失火保傅不備逮火而死厥心靡悔春秋賢之詳錄其事衛宣夫人夫人者齊侯之女也嫁於衛至城門而衛君死保母曰可以還矣女不聽遂入持三年之喪畢弟立請曰衛小國也不容二庖請願同庖終不聽衛君使人愬於齊兄弟齊兄弟皆欲與君使人告女女終不聽乃作詩曰我心匪石不可轉也我心匪席不可巻也厄窮而不閔勞辱而不茍然後能自致也言不失也然後可以濟難矣詩曰威儀棣棣不可選也言其左右無賢臣皆順其君之意也君子美其貞壹故舉而列之於詩也頌曰齊女嫁衛厥至城門公薨不反遂入三年後君欲同女終不渾作詩譏刺卒守死君蔡人之妻蔡人之妻者宋人之女也既嫁於蔡而夫有惡疾其母将改嫁之女曰夫不幸乃妾之不幸也奈何去之適人之道壹與之醮終身不改不幸遇惡疾不改其意且夫采采芣苢之草雖其臭惡猶始於捋采之終於懷擷之浸以益親况於夫婦之道乎彼無大故又不遣妾何以得去終不聽其母乃作芣苢之詩君子曰宋女之意甚貞而壹也頌曰宋女專静持心不傾夫有惡疾意猶一精母勸去歸作詩不聽蔡人美之以為順貞黎荘夫人黎荘夫人者衛侯之女黎莊公之夫人也既往而不同欲所務者異未嘗得見甚不得意其傅母閔夫人賢公反不納憐其失意又恐其巳見遣而不以時去謂夫人曰夫婦之道有義則合無義則去今不得意胡不去乎乃作詩曰式㣲式㣲胡不歸夫人曰婦人之道壹而巳矣彼雖不吾以吾何可以離於婦道乎乃作詩曰㣲君之故胡為乎中路終執貞壹不違婦道以俟君命君子故序之以編詩頌曰黎荘夫人執行不衰荘公不偶行節及乖傅母勸去作詩式㣲夫人守壹終不肯歸齊孝孟姬孟姬者華氏之長女齊孝公之夫人也好禮貞壹過時不嫁齊中求之禮不備終不往躡男席語不及外逺别避嫌齊中莫能備禮求焉齊國稱其貞孝公聞之乃修禮親迎於華氏之室父母送孟姬不下堂母醮房之中結其衿縭誡之曰必敬必戒無違宫事父誡之東階之上曰必夙興夜寐無違命其有大妨於王命者亦勿從也諸母誡之兩階之間曰敬之敬之必終父母之命夙夜無怠視之衿縭父母之言謂何姑姊妹誡之門内曰夙夜無愆爾之衿鞶無忘父母之言孝公親迎孟姬於其父母三顧而出親迎之綏自御輪三曲顧姬與遂納於宫三月廟見而後行夫婦之道既居乆之公遊於琅邪華孟姬從車奔姬墮車碎孝公使駟馬立車載姬以歸姬使侍御者舒帷以自障蔽而使傅母應使者曰妾聞妃后踰閾必乗安車輜輧下堂必從傅母保阿進退則鳴玉環佩内飾則結紐綢繆野處則帷裳擁蔽所以正心壹意自歛制也今立車無軿非所敢受命也野處無衛非所敢乆居也二者失禮多矣夫無禮而生不若早死使者馳以告公更取安車比其反也則自經矣傅母救之不絶傅母曰使者至輜輧巳具姬氏蘇然後乗而歸君子謂孟姬好禮禮婦人出必輜輧衣服綢繆既嫁歸問女昆弟不問男昆弟所以逺别也詩曰彼君子女綢直如髮此之謂也頌曰孟姬好禮執節甚公避嫌逺别終不冶容載不並乗非禮不從君子闕同息君夫人夫人者息君之夫人也楚伐息破之虜其君使守門将妻其夫人而納之於宫楚王出遊夫人遂出見息君謂之曰人生要一死而巳何至自苦妾無須臾而忘君也終不以身更貳醮生離於地上豈如死歸於地下哉乃作詩曰榖則異室死則同穴謂予不信有如皦日息君止之夫人不聽遂自殺息君亦自殺同日俱死楚王賢其夫人守節有義乃以諸侯之禮合而葬之君子謂夫人說於行善故序之於詩夫義動君子利動小人息君夫人不為利動矣詩云德音莫違及爾同死此之謂也頌曰楚虜息君納其適妃夫人持固彌乆不衰作詩同穴思故忘新遂死不顧列於貞賢齊杞梁妻齊杞梁殖之妻也荘公襲莒殖戰而死荘公歸遇其妻使使者弔之於路杞梁妻曰今殖有罪君何辱命焉若令殖免於罪則賤妾有先人之敝廬在下妾不得與郊弔於是莊公乃還車詣其室成禮然後去杞梁之妻無子内外皆無五屬之親既無所歸乃枕其夫之屍於城下而哭内誠動人道路過者莫不為之揮涕十日而城為之崩既葬曰吾何歸矣夫婦人必有所倚者也父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子内無所倚以見吾誠外無所倚以立吾節吾豈能更二哉亦死而巳遂赴淄水而死君子謂杞梁之妻貞而知禮詩云我心傷悲聊與子同歸此之謂也頌曰杞梁戰死其妻收喪齊荘道弔避不敢當哭夫於城城為之崩自以無親赴淄而薨楚平伯嬴伯嬴者秦穆公之女楚平王之夫人昭王之母也當昭王時楚與吳為柏舉之戰吳勝楚遂入至郢昭王亡吳王闔閭盡妻其後宫次至伯嬴伯嬴持刃曰妾聞天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失節則其國危夫婦之道固人倫之始王教之端是以眀王之制使男女不親授坐不同席食不共器殊椸枷異巾櫛所以施之也若諸侯外淫者絶卿大夫外淫者放士庻人外淫者宫割夫然者以為仁失可復以義義失可復以禮男女之失亂亡興焉夫造亂亡之端公侯之所絶天子之所誅也今君王棄儀表之行縱亂亡之欲犯誅絶之事何以行令訓民且妾聞生而辱不若死而榮若使君王棄其儀表則無以臨國妾有淫端則無以生世一舉而兩辱妾以死守之不敢承命且凡所欲妾者為樂也近妾而死何樂之有如先殺妾又何益於君王於是吳王慙遂退舎伯嬴與其保阿閉永巷之門皆不釋兵三旬秦救至昭王乃復矣君子謂伯嬴勇而精一詩曰莫莫葛纍施于條梅豈弟君子求福不囘此之謂也頌曰闔閭勝楚入厥宫室盡妻後宫莫不戰慄伯嬴自守堅固專一君子美之以為有節楚昭貞姜貞姜者齊侯之女楚昭王之夫人也王出逰留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符使者至請夫人出夫人曰王與宫人約令召宫人必以符今使者不持符妾不敢從使者行使者曰今水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不犯約勇者不畏死守一節而巳妾知從使者必生留必死然棄約越義而求生不若留而死耳於是使者取符則水大至臺崩夫人流而死王曰嗟夫守義死節不為茍生處約持信以成其貞乃號曰貞姜君子謂貞姜有婦節詩云淑人君子其儀不忒此之謂也頌曰楚昭出逰留姜漸臺江水大至無符不來夫人守節流死不疑君子序焉上配伯姬楚白貞姬貞姬者楚白公勝之妻也白公死其妻紡績不嫁吳王聞其美且有行使大夫持金百鎰白璧一雙以聘焉以輜軿三十乗迎之将以為夫人大夫致幣白妻辭之曰白公生之時妾幸得充後宫執箕箒掌衣履拂枕席託為妃匹白公不幸而死妾願守其墳墓以終天年今王賜金璧之聘夫人之位非愚妾之所聞也且夫棄義從欲者汚也見利忘死者貪也夫貪汙之人王何以為哉妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死者亦然妾既不仁不能從死今又去而嫁不亦太甚乎遂辭聘而不行吳王賢其守節有義號曰貞姬楚君子謂貞姬㢘潔而誠信夫任重而道逺仁以為巳任不亦重乎死而後巳不亦逺乎詩云彼美孟姜德音不忘此之謂也頌曰白公之妻守寡紡績吳王美之聘以金璧妻操固行雖死不易君子大之美其嘉績衛宗二順衛宗二順者衛宗室靈王之夫人而及其傅妾也秦滅衛君乃封靈王世家使奉其祀靈王死夫人無子而守寡傅妾有子傅妾事夫人八年不衰供養愈謹夫人謂傅妾曰孺子養我甚謹子奉祀而妾事我我不聊也且吾聞主君之母不妾事人今我無子於禮斥絀之人也而得留以盡其節是我幸也今又煩孺子不改故節我甚内慙吾願出居外以時相見我甚便之傅妾泣而對曰夫人欲使靈氏受三不祥耶不幸早終是一不祥也夫人無子而婢妾有子是二不祥也夫人欲出居外使婢子居内是三不祥也妾聞忠臣事君無懈倦時孝子養親患無日也妾豈敢以少貴之故變妾之節哉供養固妾之職也夫人又何勤乎夫人曰無子之人而辱主君之母雖子欲爾衆人謂我不知禮也吾終願居外而巳傅妾退而謂其子曰吾聞君子處順奉上下之儀脩先古之禮此順道也今夫人難我将欲居外使我居内此逆也處逆而生豈若守順而死哉遂欲自殺其子泣而守之不聽夫人聞之懼遂許傅妾㽞終年供養不衰君子曰二女相讓亦誠君子可謂行成於内而名立於後世矣詩云我心匪石不可轉也此之謂也頌曰衛宗二順執行成固闕子雖成供養如故主婦慙退請求出舎終不肯聽闕甚魯寡陶嬰陶嬰者魯陶門之女也少寡養㓜孤無强昆弟紡績為産魯人或聞其義将求焉嬰聞之恐不得免作歌眀巳之不更二也其歌曰黄鵠之早寡兮七年不雙鵷頸獨宿兮不與衆同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼哀哉兮死者不可忘飛鳥尚然兮況於貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得巳遂不敢復求嬰寡終身不改君子謂陶嬰貞一而思詩云心之憂矣我歌且謡此之謂也頌曰陶嬰少寡紡績養子或欲取焉乃自修理作歌自眀求者乃止君子稱揚以為女紀梁寡髙行高行者梁之寡婦也其為人榮於色而美於行夫死早寡不嫁梁貴人多爭欲娶之者不能得梁王聞之使相聘焉高行曰妾夫不幸早死先狗馬填溝壑妾守養其幼孤曾不得專意貴人多求妾者幸而得免今王又重之妾聞婦人之義一往而不改以全貞信之節念忘死而趨生是不信也貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刀以割其鼻曰妾巳刑矣所以不死者不忍幼弱之重孤也王之求妾者以其色也今刑餘之人殆可釋矣於是相以報王大其義高其行乃復其身尊其號曰高行君子謂高行節禮專精詩云謂予不信有如皦日此之謂也頌曰高行處梁貞專精純不貪行貴務在一信不受梁聘劓鼻刑身君子高之顯示後人陳寡孝婦孝婦者陳之少寡婦也年十六而嫁未有子其夫當行戌夫且行時屬孝婦曰我生死未可知幸有老母無他兄弟若吾不還汝肯養吾母乎婦應曰諾夫果死不還婦養姑不衰慈愛愈固紡績以為家業終無嫁意居喪三年其父母哀其年少無子而早寡也将取而嫁之孝婦曰妾聞之信者人之榦也義者行之節也妾幸得離襁褓受嚴命而事夫夫且行時屬妾以其老母既許諾之夫受人之託豈可棄哉棄託不信背死不義不可也母曰吾憐汝少年早寡也孝婦曰妾聞寧載於義而死不載於地而生且夫養人老母而不能卒許人以諾而不能信将何以立於世夫為人婦固養其舅姑者也夫不幸先死不得盡為人子之禮今又使妾去之莫養老母是明夫之不肖而著妾之不孝不孝不信且無義何以生哉因欲自殺其父母懼而不敢嫁也遂使養其姑二十八年姑死葬之終奉祭祀淮陽太守以聞漢孝文皇帝高其義貴其信美其行使使者賜之黄金四十斤復之終身號曰孝婦君子謂孝婦備於婦道詩云匪直也人秉心塞淵此之謂也頌曰孝婦處陳夫死無子比将嫁之終不聽母專心養姑一醮不改聖王嘉之號曰孝婦古列女傳巻四
