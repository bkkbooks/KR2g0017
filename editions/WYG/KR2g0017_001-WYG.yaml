front:
  text: 劉向撰
  hash: sha256:e5c035bd8075bd0ffae9bc113603c787a86369d4a2cf1007ba9f3ee37581f79a
body:
  text: 母儀傳有虞二妃有虞二妃者帝堯之二女也長娥皇次女英舜父頑母嚚父號瞽瞍弟曰象敖游於嫚舜能諧柔之承事瞽䏂以孝母憎舜而愛象舜猶内治靡有姦意四嶽薦之於堯堯乃妻以二女以觀厥内二女承事舜於畎畝之中不以天子之女故而驕盈怠嫚猶謙謙恭儉思盡婦道瞽瞍與象謀殺舜使塗廩舜歸告二女曰父母使我塗廩我其往二女曰往哉舜既治廩乃捐階瞽瞍焚廩舜往飛出象復與父母謀使舜浚井舜乃告二女二女曰俞往哉舜往浚井格其出入從掩舜潜出時既不能殺舜瞽瞍又使舜飲酒醉将殺之舜告二女二女乃與舜藥浴汪遂往舜終日飲酒不醉舜之女弟繫憐之與二嫂諧父母欲殺舜怒之不已舜猶不怨舜往于田號泣日呼旻天呼父母惟害若兹思慕不巳不怨其弟篤厚不怠既納于百揆賔于四門選于林木入于大麓堯試之百方毎事常謀于二女舜既嗣位升為天子娥皇為后女英為妃封象于有庳事瞽瞍猶若焉天下稱二妃聰眀貞仁舜陟方死於蒼梧號曰重華二妃死於江湘之間俗謂之湘君君子曰二妃徳純而行篤詩云不顯惟徳百辟其型之此之謂也頌曰元始二妃帝堯之女嬪列有虞承舜於下以尊事卑終能勞苦瞽瞍和寧卒享福祐棄母姜嫄棄母姜嫄者邰侯之母也當堯之時行見巨人跡好而履之歸而有娠浸以益大心怪惡之卜筮禋祀以求無子終生子以為不祥而棄之隘巷牛羊避而不踐乃送之平林之中後伐平林者咸薦之覆之乃取置寒氷之上飛鳥傴翼之姜嫄以為異乃收以歸因命曰棄姜嫄之性清静專一好種稼穡及棄長而教之種樹桑麻棄之性眀而仁能育其教卒致其名堯使棄居稷官更國邰地遂封棄於邰號曰后稷及堯崩舜即位乃命之曰棄黎民阻饑汝后稷播時百榖其後世世居稷至周文武而興為天子君子謂姜嫄静而有化詩云赫赫姜嫄其德不囘上帝是依又曰思文后稷克配彼天立我蒸民此之謂也頌曰棄母姜嫄清静專一履跡而孕懼棄於野鳥獸覆翼乃復收恤卒為帝佐母道既畢契母簡狄契母簡狄者有娀氏之長女也當堯之時與其妹娣浴於𤣥丘之水有𤣥鳥衘卵過而墜之五色甚好簡狄與其妹娣競往取之簡狄得而含之誤而吞之遂生契焉簡狄性好人事之治上知天文樂於施惠及契長而教之理順之序契之性聰眀而仁能育其教卒致其名堯使為司徒封之於亳及堯崩舜即位乃勅之曰契百姓不親五品不遜汝作司徒而敬敷五教在寛其後世世居亳至殷湯興為天子君子謂簡狄仁而有禮詩云有娀方将立子生商又曰天命𤣥鳥降而生商此之謂也頌曰契母簡狄敦仁勵翼吞卵産子遂自修飾教以事理推恩有德契為帝輔盖母有力啓母塗山啓母者塗山氏長女也夏禹娶以為妃既生啓辛壬癸甲啓呱呱泣禹去而治水惟荒度土功三過其家不入其門塗山獨眀教訓而致其化焉及啓長化其徳而從其教卒致令名禹為天子而啓為嗣持禹之功而不殞君子謂塗山彊於教誨詩云釐爾士女從以孫子此之謂也頌曰啓母塗山維配帝禹辛壬癸甲禹往敷土啓呱呱泣母獨論序教訓以善卒繼其父湯妃有㜪湯妃有㜪者有㜪氏之女也殷湯娶以為妃生仲壬外丙亦眀教訓致其功有㜪之妃湯也統領九嬪後宫有序咸無妬媢逆理之人卒致王功君子謂妃眀而有序詩云窈窕淑女君子好逑言賢女能為君子和好衆妾其有㜪之謂也頌曰湯妃有㜪質行聰眀媵從伊尹自夏適殷勤慤洽中九嬪有行化訓内外亦無愆殃周室三母三母者太姜太任太姒太姜者王季之母有吕氏之女太王娶以為妃生太伯仲雍王季貞順率導靡有過失太王謀事遷徙必與太姜君子謂太姜廣於徳教太任者文王之母摯任氏中女也王季娶為妃太任之性端一誠荘惟徳之行及其有娠目不視惡色耳不聽淫聲口不出敖言能以胎教溲於豕牢而生文王文王生而眀聖太任教之以一而識百君子謂太任為能胎教古者婦人姙子寝不側坐不邉立不蹕不食邪味割不正不食席不正不坐目不視於邪色耳不聽於淫聲夜則令瞽誦詩道正事如此則生子形容端正才德必過人矣故姙子之時必慎所感感於善則善感於惡則惡人生而肖萬物者皆其母感於物故形音肖之文王母可謂知肖化矣太姒者武王之母禹後有莘姒氏之女仁而眀道文王嘉之親迎於渭造舟為梁及入太姒思媚太姜太任旦夕勤勞以進婦道太姒號曰文母文王治外文母治内太姒生十男長伯邑考次武王發次周公旦次管叔鮮次蔡叔度次曹叔振鐸次霍叔武次成叔處次康叔封次聃季載太姒教誨十子自少及長未嘗見邪僻之事及其長文王繼而教之卒成武王周公之德君子謂太姒仁眀而有德詩曰大邦有子俔天之妹文定厥祥親迎於渭造舟為梁不顯其光又曰太姒嗣徽音則百斯男此之謂也頌曰周室三母太姜任姒文武之興盖由斯起太姒最賢號曰文母三姑之德亦甚大矣衛姑定姜衛姑定姜者衛定公之夫人公子之母也公子既娶而死其婦無子畢三年之䘮定姜歸其婦自送之至於野㤙愛哀思悲心感慟立而望之揮泣埀涕乃賦詩曰燕燕于飛差池其羽之子于歸逺送于野瞻望弗及泣涕如雨送去婦泣而望之又作詩曰先君之思以畜寡人君子謂定姜為慈姑過而之厚定公惡孫林父孫林父奔晉晉侯使郤犫為請還定公欲辭定姜曰不可是先君宗卿之嗣也大國又以為請而弗許将亡雖惡之不猶愈於亡乎君其忍之夫安民而宥宗卿不亦可乎定公遂復之君子謂定姜能逺患難詩曰其儀不忒正是四國此之謂也定公卒立敬姒之子衎為君是為獻公獻公居䘮而慢定姜既哭而息見獻公之不哀也不内食飲嘆曰是将敗衛國必先害善人夫禍衞國也夫吾不獲鱄也使主社稷大夫聞之皆懼孫文子自是不敢舍其重器於衛鱄者獻公弟子鮮也賢而定姜欲立之而不得後獻公暴虐慢侮定姜卒見逐走出亡至境使祝宗告亡且告無罪於廟定姜曰不可若令無神不可誣有罪若何告無罪也且公之行舎大臣而與小臣謀一罪也先君有家卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而巳無告無罪其後頼鱄力獻公復得反國君子謂定姜能以辭教詩云我言惟服此之謂也鄭皇耳率師侵衛孫文子卜追之獻兆於定姜曰兆如山林有夫出征而䘮其雄定姜曰征者䘮雄禦冦之利也大夫圖之衛人追之獲皇耳於大丘君子謂定姜達於事情詩云左之左之君子宜之此之謂也頌曰衞姑定姜送婦作詩㤙愛慈惠泣而望之數諫獻公得其罪尤聰眀逺識䴡於文辭齊女傅母傅母者齊女之傅母也女為衛荘公夫人號曰荘姜姜交好始往􅋵行衰惰有冶容之行淫泆之心傅母見其婦道不正諭之云子之家世世尊榮當為民法則子之質聰達於事當為人表式儀貎壮䴡不可不自修整衣錦絅裳飾在輿馬是不貴德也乃作詩曰碩人其頎衣錦絅衣齊侯之子衛侯之妻東宫之妹邢侯之姨譚公維私砥厲女之心以髙節以為人君之子弟為國之夫人尤不可有邪僻之行焉女遂感而自修君子善傅母之防未然也荘姜者東宫得臣之妹也無子姆戴媯之子桓公公子州吁嬖人之子也有寵驕而好兵荘公弗禁後州吁果殺桓公詩曰無教猱升木此之謂也頌曰齊女傅母防女未然稱列先祖莫不尊榮作詩眀指使無辱先荘姜姆妹卒能脩身魯季敬姜魯季敬姜者莒女也號戴巳魯大夫公父穆伯之妻文伯之母季康子之從祖叔母也博達知禮穆伯先死敬姜守養文伯出學而還歸敬姜側目而盼之見其友上堂從後堦降而却行奉劒而正履若事父兄文伯自以為成人矣敬姜召而數之曰昔者武王罷朝而結絲􅙋絶左右顧無可使結之者俯而自申之故能成王道桓公坐友三人諫臣五人日舉過者三十人故能成霸業周公一食而三吐哺一沐而三握髪所執贄而見於窮閭隘巷者七十餘人故能存周室彼二聖一賢者皆霸王之君也而下人如此其所與逰者皆過已者也是以日益而不自知也今以子年之少而位之卑所與逰者皆為服役子之不益亦以眀矣文伯乃謝罪於是乃擇嚴師賢友而事之所與逰處者皆黄耄倪齒也文伯引祍攘捲而親饋之敬姜曰子成人矣君子謂敬姜偹於教化詩云濟濟多士文王以寧此之謂也文伯相魯敬姜謂之曰吾語汝治國之要盡在經矣夫幅者所以正曲枉也不可不彊故幅可以為将畫者所以均不均服不服也故畫可以為正物者所以治蕪與莫也故物可以為都大夫持交而不失出入不絶者梱也梱可以為大行人也推而往引而来者綜也綜可以為闗内之師主多少之數者均也均可以為内史服重任行逺道正直而固者軸也軸可以為相舒而無窮者摘也摘可以為三公文伯再拜受教文伯退朝朝敬姜敬姜方績文伯曰以􅢴之家而主猶績懼干季孫之怒其以􅢴為不能事主乎敬姜嘆曰魯其亡乎使吾子備官而未之聞耶居吾語女昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民嚮義勞也是故天子大采朝日與三公九卿祖識地徳日中考政與百官之政事使師尹維旅牧宣敬民事少采夕月與太史司載糾䖍天刑日入監九御使潔奉禘郊之粢盛而後即安諸侯朝修天子之業令晝考其國夕省其典刑夜儆百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而講肄夕而習復夜而計過無憾而後即安自庶人巳下眀而動晦而休無日以怠王后親織𤣥紞公侯之夫人加之以紘綖卿之内子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事烝而獻功男女効績否則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業况有怠惰其何以辟吾兾汝朝夕修我曰必無廢先人爾今也曰胡不自安以是承君之官余懼穆伯之絶祀也仲尼聞之曰弟子記之季氏之婦不淫矣詩曰婦無公事休其蠶織言婦人以蠶織為公事者也休之非禮也文伯飲南宫敬叔酒以露堵父為客羞鼈焉小堵父怒相延食鼈堵父辭曰将使鼈長而食之遂出敬姜聞之怒曰吾聞之先子曰祭養尸饗養上賔鼈於人何何有而使夫人怒遂逐文伯五日魯大夫辭而復之君子謂敬姜為慎㣲詩曰我有㫖酒嘉賔式燕以樂言尊賔也文伯卒敬姜戒其妾曰吾聞之好内女死之好外士死之今吾子夭死吾惡其以好内聞也二三婦之辱共祀先祀者請毋瘠色毋揮涕毋陷膺毋憂容有降服毋加服從禮而静是昭吾子仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知矣欲眀其子之令德詩曰君子有穀貽厥孫子此之謂也敬姜之處䘮也朝哭穆伯暮哭文伯仲尼聞之曰季氏之婦可謂知禮矣愛而無私上下有章敬姜嘗如季氏康子在朝與之言不應從之及寝門不應而入康子辭於朝而入見曰肥也不得聞命毋乃罪耶敬姜對曰子不聞耶天子及諸侯合民事於内朝自卿大夫以下合官職於外朝合家事於内朝寝門之内婦人治其職焉上下同之夫外朝子将業君之官職焉内朝子将庀季氏之政焉皆非吾所敢言也康子嘗至敬姜䦱門而與之言皆不踰閾祭悼子康子與焉酢不受徹俎不讌宗不具不繹繹不盡飲則不退仲尼謂敬姜别於男女之禮矣詩曰女也不爽此之謂也頌曰文伯之母號曰敬姜通達知禮德行光眀匡子過失教以法理仲尼賢焉列為慈母楚子發母楚将子發之母也子發攻秦絶粮使人請於王因歸問其母母問使者曰士卒得無恙乎對曰士卒并分菽粒而食之又問将軍得無恙乎對曰将軍朝夕芻豢黍粱子發破秦而歸其母閉門而不内使人數之曰子不聞越王勾踐之伐吳客有獻醇酒一器王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一􅇸糗糒者王又以賜軍士分而食之甘不踰嗌而戰自十也今子為将士卒并分菽粒而食之子獨朝夕芻豢黍粱何也詩不云乎好樂無荒良士休休言不失和也夫使人入於死地而自康樂於其上雖有以得勝非其術也子非吾子也無入吾門子發於是謝其母然後内之君子謂子發母能以教誨詩云教誨爾子式榖似之此之謂也頌曰子發之母刺子驕泰将軍稻粱士卒菽粒責以無禮不得人力君子嘉焉編於母德鄒孟軻母鄒孟軻之母也號孟母其舍近墓孟子之少也嬉逰為墓間之事踴躍築埋孟母曰此非吾所以居處子乃去舎市傍其嬉戱為賈人衒賣之事孟母又曰此非吾所以居處子也復徙舎學宫之旁其嬉逰乃設俎豆揖譲進退孟母曰真可以居吾子矣遂居及孟子長學六藝卒成大儒之名君子謂孟母善以漸化詩云彼姝者子何以予之此之謂也孟子之少也既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀斷其織孟子懼而問其故孟母曰子之廢學若吾㫁斯織也夫君子學以立名問則廣知是以居則安寧動則逺害今而廢之是不免於厮役而無以離於禍患也何以異於織績而食中道廢而不為寧能衣其夫子而長不乏粮食哉女則廢其所食男則墮於修德不為竊盗則為虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知為人母之道矣詩云彼姝者子何以告之此之謂也孟子既娶将入私室其婦􅃝而在内孟子不悅遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊惰在室而夫子見妾勃然不恱是客妾也婦人之義盖不客宿請歸父母於是孟母召孟子而謂之曰夫禮将入門問孰存所以致敬也将上堂聲必揚所以戒人也将入户視必下恐見人過也今子不察於禮而責禮於人不亦逺乎孟子謝遂留其婦君子謂孟母知禮而眀於姑母之道孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敢異日閒居擁楹而嘆孟母見之曰鄉見子有憂色曰不也今擁楹而嘆何也孟子對曰軻聞之君子稱身而就位不為茍得而受賞不貪榮禄諸侯不聽則不達其土聽而不用則不踐其朝今道不用於齊願行而母老是以憂也孟母曰夫婦人之禮精五飰羃酒漿養舅姑縫衣裳而巳矣故有閨内之修而無境外之志易曰在中饋无攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三從之道也故年少則從乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒伊教此之謂也頌曰孟子之母教化列分處子擇藝使從大倫子學不進斷機示焉子遂成德為當世冠魯之母師母師者魯九子之寡母也臘日休作者嵗祀禮事畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多㓜稚嵗時禮不理吾從汝謁往監之諸子皆頓首許諾又召諸婦曰婦人有三從之義而無專制之行少繫父母長繫於夫老繫於子今諸子許我歸視私家雖踰正禮願與少子俱以備婦人出入之制諸婦其慎房户之守吾夕而返於是使少子僕歸辦家事天隂還失早至閭外而止夕而入魯大夫從䑓上見而怪之使人間視其居處禮節甚修家事甚理使者還以狀對於是大夫召母而問之曰一日從北方来至閭而止良久乃入吾不知其故甚怪之是以問也母對曰妾不幸早失夫獨與九子居臘月禮畢事閒從諸子謁歸視私家與諸婦孺子期夕而返妾恐其酺醵醉飽人情所有也妾返太早不敢復返故止閭外期盡而入大夫美之言於穆公賜母尊號曰母師使眀請夫人夫人諸姬皆師之君子謂母師能以身教夫禮婦人未嫁則以父母為天既嫁則以夫為天其䘮父母則降服一等無二天之義也詩云出宿于濟飲餞于禰女子有行逺父母兄弟頌曰九子之母誠知禮經謁歸還反不揜人情德行既備卒䝉其榮魯君賢之號以尊名魏芒慈母魏芒慈母者魏孟陽氏之女芒夘之後妻也有三子前妻之子有五人皆不愛慈母遇之甚異猶不愛慈母乃令其三子不得與前妻子齊衣服飲食起居進退甚相逺前妻之子猶不愛於是前妻中子犯魏王令當死慈母憂戚悲哀帶圍减尺朝夕勤勞以救其罪人有謂慈母曰人不愛母至甚也何為勤勞憂懼如此慈母曰如妾親子雖不愛妾猶救其禍而除其害獨於假子而不為何以異於凡母其父為其孤也而使妾為其繼母繼母如母為人母而不能愛其子可謂慈乎親其親而偏其假可謂義乎不慈且無義何以立於世彼雖不愛妾安可以忘義乎遂訟之魏安釐王聞之髙其義曰慈母如此可不救其子乎乃赦其子復其家自此五子親附慈母雍雍若一慈母以禮義之漸率導八子咸為魏大夫卿士各成於禮義君子謂慈母一心詩云尸鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮言心之均一也尸鳩以一心養七子君子以一儀養萬物一心可以事百君百心不可以事一君此之謂也頌曰芒夘之妻五子後母慈惠仁義扶養假子雖不吾愛拳拳若親繼母若斯亦誠可尊齊田稷母齊田稷子之母也田稷子相齊受下吏之貨金百鎰以遺其母母曰子為相三年矣禄未嘗多若此也豈修士大夫之費哉安所得此對曰誠受之於下其母曰吾聞士修身潔行不為茍得竭情盡實不行詐偽非義之事不計於心非理之利不入於家言行若一情貎相副今君設官以待子厚禄以奉子言行則可以報君夫為人臣而事其君猶為人子而事其父也盡力竭能忠信不欺務在効忠必死奉命亷潔公正故遂而无患今子反是逺忠矣夫為人臣不忠是為人子不孝也不義之財非吾有也不孝之子非吾子也子起田稷子慙而出反其金自歸罪於宣王請就誅焉宣王聞之大賞其母之義遂舍稷子之罪復其相位而以公金賜母君子謂稷母亷而有化詩曰彼君子兮不素飱兮無功而食禄不為也況於受金乎頌曰田稷之母亷潔正直責子受金以為不德忠孝之事盡材竭力君子受禄終不素食古列女傳巻一
