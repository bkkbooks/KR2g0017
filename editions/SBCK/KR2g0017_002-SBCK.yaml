front:
  text: 劉向古列女傳􅃃之二
  hash: sha256:7f89853f85b9bcf4fccd81cefc5293a596ff79546ad6a8ee6c232c6aa460a6ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_002-1a}
body:
  text: 賢眀傳周宣姜后周宣姜后者齊侯之女也賢而有徳事非禮不言行非禮不動宣王常早卧晏起后夫人不出房姜后脕簮珥待罪扵永巷使其􅀓母通言于王曰妾之不才妾之􅁋心見矣至使君王失禮而晏朝以見君王樂色而忘徳也夫苟樂色必好奢窮欲􅅍之􅀁興也原亂之興從婢子􅁸敢請婢子之罪王曰寡人不徳寔自有過非夫人之罪也遂復姜后而勤于政事早朝晏退䘚成中興之名君子謂姜后善于威儀而有徳行夫禮后夫人御于君以燭進至于君􅀁㓕燭適房中脫朝服衣褻服然後進御于君鷄鳴樂師撃鼓以告旦后夫人鳴佩而去詩曰威儀抑抑徳音秩秩又曰隰桑有阿其葉有幽既見君子徳音孔膠夫婦人以色親以徳固姜氏之徳行可謂孔膠也頌曰嘉兹姜后厥徳孔賢由禮動作匡配周宣引過推譲宣王悟焉夙夜崇道為中興君齊桓衞􅁎衛􅁎者衞侯之女齊桓公之夫人也桓公好􅁋樂衛􅁎為之不聴鄭衛之音桓公用管仲寗戚行伯道諸侯皆朝而衞獨不至桓公與管仲謀伐衞朝入閨衞姫望見桓公脕簮珥觧環珮下堂􅂯拜曰􅂅請衞之罪桓公曰吾與衞無故姫何請邪對曰妾聞之人君有三色􅂋然喜樂容貌淫樂者鐘鼓酒食之色􅄫然清静意􅂔沉抑者䘮禍之色忿然充滿手􅁕矜動者攻伐之色今妾望君舉趾髙色厲音􅀭意在衞也是以請也桓公許諾眀日臨朝管仲趨進曰君之􅊩朝也恭而氣下言則徐無伐國之志是釋衞也桓公曰善乃立衛􅁎為夫人號管仲為仲父曰夫人治内管仲治外寡人雖愚􅁕以立于世矣君子謂衛􅁎信而有行詩曰展如之人􅀆􅀖之媛也頌曰齊桓衞􅁎忠欵誠信公好淫樂􅁎為修身望色請罪桓公加焉厥使治内立為夫人晉文齊姜齊姜齊桓公之宗女晉文公之夫人也􅀄文公父獻公納􅌐􅁎譛殺太子申生文公號公子重耳與舅犯奔狄適齊齊桓公以宗女妻之遇之甚善有馬二十乗􅀅死于齊曰人生安樂而巳誰知其他子犯知文公之安齊也欲行而患之與従者謀于桑下􅁞妾在焉妾告姜氏姜殺之而言于公子曰従者􅀅以子行䎹者吾巳除之矣公子必従不可以貳二無成命自子去晉晉無寕歳天未亡晉有晉國者非子而誰子其勉之上帝臨子貳必有咎公子曰吾不動必死扵此矣姜曰不可周詩曰莘莘征夫毎懐靡及夙夜征行猶􅂲無及况􅁒懐安􅀅何及矣人不求及其䏻及􅅍不長世公子必有晉公子不聴姜與舅犯謀􅋨載之以行酒醒公子以戈逐舅犯曰若事有濟則可無􅀁濟吾食舅氏之􅁏豈有饜㢤遂行過曹邾鄭椘而入秦秦穆公乃以兵内之于晉晉人殺懐公而立公子重耳是為文公迎齊姜以為夫人遂伯天下為諸侯􅉀主君子謂齊姜㓗而不瀆䏻育君子于善詩曰彼姜孟姜可與寤言此之謂也頌曰齊姜公正言行不怠勸勉晉文反國無疑公子不聴姜興犯謀􅋨而載之䘚成伯基秦穆公􅁎穆姬者秦穆公之夫人晉獻公之女太子申生之同母姊與恵公異母賢而有義獻公殺太子申生逐群公子恵公號公子夷吾奔梁及獻公䘚得因秦立始即位穆􅁎使納羣公子曰公族者君之根本恵公不用又背秦賂晉饑請粟于秦秦與之秦飢請粟于晉晉不與秦遂興兵與晉􅀾􅀗晉君以歸秦穆公曰掃除先人之廟寡人􅀅以晉君見穆􅁎聞之乃與太子罃公子􅀪與簡璧衰絰􅂂薪以迎旦告穆公曰上天降災使両君罷以玉帛相見乃以興戎婢子娣姒不􅀎相教以辱君命晉君朝以入婢子夕以死惟君其圗之公懼乃舎諸靈臺大夫請以入公曰􅀗晉君以功歸今以䘮歸􅀅焉用遂改舘晉君饋以七牢而遣之穆姫死穆􅁎之弟重耳入秦秦送之晉是為晉文公太子罃思母之恩而送其舅氏也作詩曰我送舅氏曰至渭陽何以贈之路車乗黄君子曰慈母生孝子詩云敬慎威儀維民之則穆􅁎之謂也頌曰秦穆夫人晉恵之姊秦執晉君夫人流涕痛不䏻救乃􅀅赴死穆公義之遂釋其弟椘荘樊􅁎楚􅁎者椘荘王之夫人也荘王即位好狩獵樊􅁎諌不止乃不食禽獸之􅁏王改過勤扵政事王嘗聽朝罷晏􅁎下殿迎曰何罷晏也得無飢􅌒乎王曰與賢者俱不知飢􅌒也􅁎曰王之􅀁謂賢者何也曰虞丘子也􅁎掩口而笑王曰􅁎之􅀁笑何也曰虞丘子賢則賢矣未忠也王曰何謂也對曰妾執巾􅌨十一年遣人之鄭衞求賢人進于王今賢于妾者二人同列者七人妾豈不􅁒擅王之爱寵乎妾聞堂上兼女􅀁以觀人䏻也妾不䏻以私蔽公欲王多見知人䏻也妾聞虞丘子相椘十餘年􅀁薦非子弟則族昆弟未聞進賢退不肖是蔽君而塞賢路知賢不進是不忠不知其賢是不智也妾之􅀁笑不亦可乎王恱眀曰王以􅁎言告虞丘子丘子避席不知􅀁對于是避舎使人迎孫叔敖而進之王以為令尹治椘三季而荘王以覇椘史書曰荘王之覇樊姫之力也詩曰大夫夙夜無使君勞其君者謂女者也又曰温恭朝夕執事有恪此之謂也頌曰樊􅁎謙譲靡有嫉妬廌進羙人與已同䖏非刺虞丘蔽賢之路椘荘用焉功業遂伯周南之妻周南之妻者周南大夫之妻也大夫受命平治水土過時不来妻􅂲其􅈈于王事盖與其隣人陳素􅀁與大夫言國家多難惟勉強之無有譴怒遺父母􅁨昔舜耕于厯山漁于雷澤陶于河濱非舜之事而舜為之者為養父母也家貧親老不擇官而仕親操井臼不擇妻而娶故父母在當與時小同無􅉻大義不罹患害而巳夫鳯皇不罹于蔚羅麒麟不入于䧟穽蛟龍不及于枯澤鳥獸之智猶知避害而况于人乎生于亂丗不得道理而迫于􅁀虐不得行義然而仕者為父母在故也乃作詩曰魴魚頳尾王室如毁雖則如毀父母孔邇盖不得巳也君子以是知周南之妻而䏻匡夫也頌曰周大夫妻夫出治土維戒無怠勉為父母凡事逺周為親之在作詩魴魚以勅君子宋􅇹女宗女宗者宋鮑蘇之妻也養姑甚謹鮑蘇仕衛三年而娶外妻女宗養姑愈敬因徃来者請問其夫賂遺外妻甚厚女宗姒謂曰可以去矣女宗曰何故姒曰夫人既有􅀁好子何留乎女宗曰婦人一醮不改夫死不嫁執麻枲治絲繭織紝組紃以供衣服以事夫室澈漠酒醴羞饋食以事舅姑以專一為貞以善従為順豈以專夫室之爱為善㢤若其以淫意為心而扼夫室之好吾未知其善也夫禮天子十二諸侯九卿大夫三士二今吾夫誠士也有二不亦冝乎且婦人有七見去方無一去義七去之道妬正為首淫僻􅀼盗長舌驕侮無子􅁖病皆在其後吾姒不教吾以居室之禮而反􅁒使吾為見棄之行􅀅安􅀁用此遂不聴事姑愈謹宋公聞之表其閭號曰女宗君子謂女宗謙而知禮詩云令儀令色小心翼翼古訓是式威儀是力此之謂也頌曰宋􅇹女宗好禮知理夫有外妻不為変巳􅁛引婦道不聴其姒宋公賢之表其閭里晉趙衰妻晉趙衰妻者晉文公之女也號趙􅁎􅀄文公為公子時與趙衰奔狄狄人入其二女叔隈季隗于公子公以叔隈妻趙衰生盾及及國文公以其女趙􅁎妻趙衰生原同屏括樓嬰趙􅁎請迎盾與其母而納之趙衰辭而不敢􅁎曰不可夫得寵而忘舊舎義好新而嫚故無恩與人勤于隘厄富貴而不頋無禮君棄此三者何以使人雖妾亦無以侍執巾􅌨詩不云乎采葑采菲無以下體徳音莫違及尔同死與人同寒苦雖有小過猶與之同死而不去况于安新忘􅃇乎又曰讌爾新㛰不我屑以盖傷之也君其逆之無以新􅆸舊趙衰許諾乃逆叔隗與盾来􅁎以盾為賢請立為嫡子使三子下之以叔隗為内婦􅁎親下之及盾為正卿思趙􅁎之讓恩請以􅁎之中子屏括為公族大夫曰君􅁎氏之爱子也㣲君􅁎氏則臣狄人也何以至此成公許之屏括遂以其族為公族大夫君子謂趙􅁎恭而有讓詩曰温温恭人維徳之基趙􅁎之謂也頌曰趙衰􅁎氏制行分眀身雖尊貴不妬偏房躬事叔隗子盾爲嗣君子羙之厥行孔備陶荅子妻陶太夫答子妻也答子治陶三年名譽不興家富三倍其妻數諫不用居五秊從車百乗歸休宗人撃牛而賀之其妻獨抱児而泣姑怒曰何其不祥也婦曰夫子䏻薄而官大是謂嬰害無功而家昌是謂積殃昔䒦令尹子文之治國也家貧國富君敬民戴故福結于子孫名傳于後世今夫子不然貪冨務大不顧後害妾聞南山有玄豹霧雨七日而不下食者何也欲以澤其毛而成文章也故蔵而逺害犬􅇾不擇食以􅏂其身坐而須死耳今夫子治陶家富國貧君不敬民不戴敗亡之徴見矣願與少子俱脫姑怒遂棄之䖏朞年答子之家果以盗誅唯其母老以免婦乃與少子歸養姑終䘚天年君子謂答子妻􅀎以義易利雖違禮求去終以全身復禮可謂逺識矣詩曰百爾􅀁思不如我􅀁之此之謂也頌曰答子治陶家冨三倍妻諌不聴知其不改獨泣姑怒送厥母家答子逄􅍔復歸養姑栁下恵妻魯大夫柳下恵之妻也栁下恵䖏魯三黜而不去􅁨民救􅅍妻曰無乃瀆乎君子有二耻國無道而貴耻也國有道而賤耻也今當􅅍世三黜而不去亦近耻也桞下恵曰油油之民􅀅䧟于害吾􅀎以乎且彼為彼我為我彼雖祼䄇安䏻汚我油油然與之䖏仕于下位桞下既死門人􅀅誄之妻曰􅀅誄夫子之徳耶則二三子不如妾知之也乃誄曰夫子之不伐􅀆夫子之不竭亏夫子之信誠而與人無害􅀆屈柔従容不強察􅀆䝉耻救民徳弥大􅀆雖遇三黜紂不蔽􅀆愷悌君子永䏻厲􅀆嗟呼惜㢤乃下丗􅀆庻㡬遐年今遂逝􅀆嗚呼哀㢤魂神泄􅀆夫子之謐宜為恵􅀆門人従之以為誄莫䏻竄一字君子謂栁下恵妻䏻光其夫矣詩曰人知其一莫知其他此之謂也頌曰下恵之妻賢明有文柳下既死門人必存􅀅誄下恵妻為之辭陳列其行莫䏻易之魯黔婁妻魯黔婁先主之妻也先生死曽子與門人徃弔之其妻出户曽于弔之上堂見先生之尸在牗下枕􅜘席槀緼􅂁不表覆以布􅀍手􅁕不盡歛覆頭則􅁕見覆􅁕則頭見曽子曰斜引其􅀍則歛矣妻曰斜而有餘不如正而不􅁕也先生以不斜之故䏻至于此生時不邪死而邪之非先生意也曽子不䏻應遂哭之曰嗟乎先生之終也何以為謚其妻曰以康為謚曽子曰先生在時食不充口衣不盖形死則手􅁕不歛旁無酒􅁏生不得其美死不得其榮何楽于此而謚為康乎其妻曰昔先生君嘗􅁒授之政以為國相辭而不為是有餘貴也君嘗賜之粟三十鍾先生辭而不受是有餘富也彼先生者甘天下之淡味安天下之卑位不戚戚于貧賤不忻忻于富貴求仁而得仁求義而得義其謚為康不亦冝乎曽子曰唯斯人也而有斯婦君子謂黔婁妻為樂貧行道詩曰彼美㳤􅁎可與窹言此之謂也頌曰黔婁既死妻獨主䘮曽子弔焉布衣􅄄衾安賤甘淡不求豊羙尸不掩蔽猶謚曰康齊相御妻齊相晏子僕御之妻也號曰命婦晏子􅀅出命婦窺其夫為相御擁大盖䇿駟馬意氣洋洋甚自得也既歸其妻曰宜矣子之卑且賤也夫曰何也妻曰晏子長不滿三尺身相齊國名顯諸侯今者吾従門間觀其志氣恂恂自下思念深矣今子身長八尺乃為之僕御耳然子之意洋洋若自􅁕者妾是以去也其夫謝曰請自改何如妻曰是懐晏子之智而加以八尺之長也夫躬仁義事眀主其名必􅀭矣且吾聞寕榮于義而賤不虗驕以貴于是其夫乃深自責學道謙遜常若不􅁕晏子恠而問其故具以實對于是晏子賢其䏻納善自改升諸景公以爲大夫􅂋其妻以爲命婦君子謂命婦知善故賢人之􅀁以成者其道愽矣非特師􅀓朋友相與切磋也妃匹亦居多焉詩云高山仰止景行行止言當常嚮爲其善也頌曰齊相御妻匡夫以道眀言驕恭恂恂自效夫改易行學問靡巳晏子升之列于君子椘接輿妻椘狂接輿之妻也接輿躬畊以為食椘王使使者持金百鎰車二駟徃聘迎之曰王願請先生治淮南接輿􅀏而不應使者遂不得與語而去妻從市来曰先生以而為義豈􅀅老而遺之㢤門外車跡何其深也接輿曰王不知吾不肖也欲使我治淮南遣使者待金駟来聘其妻曰得無許之乎接輿曰夫富貴者人之所􅁒也子何􅁖我許之矣妻曰義士非禮不動不為貧而易操不為賤而改行妾事先生躬耕以為食親績以為衣食飽衣暖㩀義而動其樂亦自􅁕矣若受人重禄乗人堅良食人􅏂鮮而􅀅何以待之接輿曰吾不許也妻曰君使不従非忠也従之又違非義也不如去之夫􅀒釡甑妻戴紝器變名易姓而逺徙莫知􅀁之君子謂接輿妻為樂道而逺害夫安貧賤而不怠于道者唯至徳者䏻之詩曰肅肅兎􅆯椓之丁丁言不怠于道也頌曰接輿之妻亦安貧賤雖􅁒進仕見時􅁀􅅍椘聘接輿妻請避舘戴紝易姓終不遭難椘老莱妻椘老莱子之妻也莱子逃世耕扵䝉山之陽葭墻蓬室木牀蓍席衣緼食菽墾山播種人或言之椘王曰老莱賢士也王􅁒聘以璧帛􅂲不来椘王駕至老莱之門老莱方織畚王曰寡人愚陋獨守宗廟􅂅先生幸臨之老莱子曰僕山野之人不􅁕守政王復曰守國之􅀌願変先生之志老莱子曰諾王去其妻戴畚莱挟薪樵而来曰何車迹之衆也老莱子曰椘王欲使吾守國之政妻曰許之乎曰何妻曰妾聞之可食以酒􅁏者可随以鞭捶可授以官禄者可隨以鈇􅃏今先生食人酒􅁏受人官禄為人􅀁制也䏻免扵患乎妾不䏻為人􅀁制投其畚莱而去老莱子曰子還吾為子更慮遂行不顧至江南而止曰鳥獸之觧毛可績而衣之据其遺粒􅁕以食也老莱子乃随其妻而居之民従而家者一秊成落三年成聚君子謂老莱妻果扵從善詩曰衡門之下可以棲遅泌之洋洋可以療飢此之謂也頌曰老莱與妻逃世山陽蓬蒿為室莞葭為盖椘王聘之老莱􅀅行妻曰世􅅍乃遂逃亡椘於􅁜妻楚於陵子終之妻也楚王聞於􅁜子終賢􅁒以為相使使者持金百鎰徃聘迎之於􅁜子終曰僕有箕箒之妾請入與計之即入謂其妻曰椘王􅁒以我為相遣使者持金来今日為相明日結駟連􅀐食方丈于前可乎妻曰夫子織􅋰以為食非與物無治也左琴右書楽亦在其中矣夫結駟連􅀐􅀁安不過容膝食方丈扵前甘不過一􅁏今以容䣛之安一􅁏之味而懐楚􅀦之􅁨其可楽乎􅅍世多害妾􅂲先生之不保命也于是子終出謝使者而不許也遂相與逃而為人灌園君子謂扵陵妻爲有徳行詩云愔愔良人秩秩徳音此之謂也頌曰於􅁜處楚王使聘焉入與妻謀懼世􅅍煩進徃遇害不若身安左琴右書爲人灌園劉向古列女傳卷之二終
