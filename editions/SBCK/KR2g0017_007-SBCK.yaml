front:
  text: 劉向古列女傳􅃃之七
  hash: sha256:51b3bd2f11d72a4532e1cec366aee51c6808ea323449d355264de2bc3efd7e6e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_007-1a}
body:
  text: 孽嬖傳夏桀末喜末喜者夏桀之妃也羙于色薄于徳􅅍孽無道女子行丈夫心佩劍帯冠桀既棄禮義淫于婦人求美女積之扵後宫收倡優侏儒狎徒䏻為竒􅊆􅃧者聚之于旁造爛漫之樂日夜與末喜及宫女飲酒無有休時置妹喜于􅂰上聴用其言昏􅅍失道驕奢自恣為酒池可以運舟一鼓而牛飲者三千人䩭其頭而飲之于酒池􅋨而溺死者末喜笑之以為樂龍逄進諌曰君無道必亡矣桀曰日有亡乎日亡而我亡不聴以爲妖言而殺之造瓊室瑶臺以臨雲雨殚財盡幣意尚不饜召湯囚之扵夏臺已而释之諸侯大叛于是湯受命而伐之􅀾于鳴條桀師不􅀾湯遂放桀與末喜嬖妾同舟流于海死于南巣之山詩曰懿厥哲婦爲梟爲䲭此之謂也頌曰末喜配桀維􅅍驕􅀭桀既無道又重其荒姦宄是用不恤法常夏后之國遂反爲啇殷紂妲己妲己者殷紂之妃也嬖􅄑于紂材力過人手格猛獸智􅁕以距諌辨􅁕以餙非矜人臣以䏻髙天下以聲以為人皆出已之下好酒淫樂不離妲己妲己之􅀁譽貴之妲己之􅀁憎誅之作新淫之聲北鄙之舞靡靡之樂収珍物積之于後宫䛕目群女咸􅀗􅀁􅁒積糟為丘流酒為池懸􅁏為林使人祼形相逐其間為長夜之飲妲己好之百姓怨望諸侯有畔者紂乃為炮烙之法膏銅柱加之炭令有罪者行其上􅂺墮炭中妲己乃笑比干諌曰不修先王之典法而用婦言禍至無日紂怒以為妖言妲己曰吾聞聖人之心有七竅于是剖心而觀之囚箕子㣲子去之武王遂受命興師伐紂􅀾于牧野紂師倒戈紂乃登􅅒臺衣寳玉衣而自殺于是武王遂致天之罰斬妲己頭懸于小白旗以為亡紂者是女也書曰牝雞無晨牝雞之晨惟家之索詩云君子信盗􅅍是用􅁀匪其止共維王之卭此之謂也頌曰妲己配紂惑􅅍是修紂既無道又重相􅍝指􅀏炮炙諌士刳囚遂敗牧野反啇為周周幽褒姒褒姒者童妾之女周幽王之后也􅀄夏之衰也褒人之神化爲二龍伺于王庭而言曰余褒之二君也夏后卜殺之與去莫􅁻卜請其漦蔵之而吉乃布幣焉龍忽不見而蔵漦犢中乃置之郊至周莫之敢􅀤也及周厲王之末發而觀之漦流于庭不可除也王使婦人祼而譟之化爲玄蚖入後宫宫之童妾未毀而遭之既笄而孕當宣王之時産無夫而乳懼而棄之先是有童謡曰檿弧箕服寔亡周國宣王聞之後有人夫妻賣檿弧箕服之器者王使執而戮之夫妻夜逃聞童妾遭棄而夜􅃅哀而取之遂竄于褒長而美好褒人姁有獄獻之以贖幽王受而嬖之遂释褒姁故號曰褒姒既生子伯服幽王乃􅆸后申侯之女而立褒姒爲后􅆸太子宜臼而立伯服爲太子幽王惑于褒姒出入與之同乗不恤國事驅馳弋獵不時以適褒姒之意飲酒沉湎倡􅄖在前以夜􅁇晝褒姒不笑幽王乃􅁒其笑萬端故不笑幽王爲熢燧大鼓有冦至則舉諸侯悉至而無冦褒姒乃大笑幽王􅁒悅之數爲舉燧火其後不信諸侯不至忠諫者誅唯褒姒言是従上下相䛕百姓乖離申侯乃與僧西夷犬戎共攻幽王幽王舉熢燧徴兵莫至遂殺幽王于􅌐山之下虜褒姒盡取周賂而去于是諸侯乃即申侯而共立故太子冝臼是為􅊭王自是之後周與諸侯無異詩云赫赫宗周褒姒㓕之此之謂也頌曰褒神龍變寔生褒姒興配幽王􅆸后太子舉􅇏致兵笑冦不至申侯伐周果㓕其祀䘙宣公姜宣姜者齊侯之女䘙宣公之夫人也􅀄宣公夫人夷姜生伋子以爲太子又娶于齊曰宣姜生夀及朔夷姜既死宣姜􅁒立夀乃與夀弟朔謀􅌟伋子公使伋子之齊宣姜乃隂使力士待之界上而殺之曰有四馬白旄至者必要殺之夀聞之以告太子曰太子其避之伋子曰不可夫棄父之命則􅁖用子也夀度太子必行乃與太子飲奪之旄而行盗殺之伋子醒求旄不得遽徃追之夀已死矣伋子以夀爲巳死乃謂盗曰􅀁􅁒殺者乃我也此何罪請殺我盗又殺之二子既死朔遂立為太子宣公薨朔立是為恵公竟終無後􅅍及五世至戴公而後寕詩云乃如之人徳音無良此之謂也頌曰衛之宣姜謀危太子􅁒立子夀隂設力士夀乃俱死䘙果危殆五丗不寕􅅍由姜起魯桓文姜文姜者齊侯之女魯桓公之夫人也内􅅍其兄齊㐮公桓公􅀅伐鄭納厲公既行與夫人俱􅀅如齊也申繻曰不可女有家男有室無相凟也謂之有禮易此必敗且禮婦人無大故則不歸桓公不聴遂與如齊文姜與㐮公通桓公怒禁之不止文姜以告㐮公㐮公享桓公酒􅋨之使公子彭生抱而乗之因拉其脅而殺之遂死于車魯人求彭生以除恥齊人殺彭生詩曰􅅍匪降自天生自婦人此之謂也誦曰文姜淫􅅍配魯桓公與俱歸齊齊㐮淫通俾厥彭生摧幹拉􅅐維女為􅅍䘚成禍凶魯荘哀姜哀姜者齊侯之女荘公之夫人也􅀄哀姜未入時公數如齊與哀姜淫既入與其弟叔姜俱公使大夫宗用幣見大夫夏甫不忌曰婦贄不過枣栗以致禮也男贄不過玉帛禽鳥以彰物也今婦贄用幣是男女無别也男女之别國之大莭也無乃不可乎公不聴又丹其父桓公廟宫之楹刻其桷以夸哀姜哀姜驕淫通于二叔公子􅂟父公子牙哀姜􅁒立􅂟父荘公薨子般立􅂟父與哀姜謀遂殺子般于黨氏立叔姜之子是為閔公閔公既立􅂟父與哀姜淫益甚又與􅂟父謀殺閔公而立􅂟父遂使卜齮襲弑閔公于武闈将自立魯人謀之􅂟父􅂲奔莒哀姜奔邾齊桓公立僖公聞哀姜與􅂟父通以危魯乃召哀姜酖而殺之魯遂殺􅂟父詩云啜其泣矣何嗟及矣此之謂也頌曰哀姜好邪淫于魯荘延及二叔驕姤縦横􅂟父是依國適以亡齊桓征伐酖殺哀姜晉獻􅌐􅁎􅌐􅁎者􅌐戎之女晉獻公之夫人也􅀄獻公娶于齊生秦穆夫人及太子申生又娶二女于戎生公子重耳夷吾獻公伐􅌐戎克之􅀗􅌐􅁎以歸生奚齊卓子􅌐􅁎嬖于獻公齊姜先死公乃立􅌐􅁎以為夫人􅌐􅁎􅁒立奚齊乃與弟謀曰一朝不朝其間容刀逐太子與二公子而可間也于是􅌐􅁎乃說公曰曲沃君之宗邑也蒲與二屈君之境也不可以無主宗邑無主則民不畏邉境無主則開冦心夫冦生其心民慢其政國之患也若使太子主曲沃二公子主蒲與二屈則可以威民而懼冦矣遂使太子居曲沃重耳居蒲夷吾居二屈晉獻􅌐􅁎既逺太子乃夜泣公問其故對曰吾聞申生爲人甚好仁而強甚寛恵而慈于民今謂君惑于我必􅅍國無乃以國民之故行強于君君未終命而殁君其柰何胡不殺我無以一妾􅅍百姓公曰恵其民而不恵其父乎􅌐􅁎曰爲民與爲父異夫殺君利民民孰不戴苟父利而淂寵除􅅍而衆說妾不􅁒焉雖其爱君􅁒不勝也若紂有良子而先殺紂母彰其􅁖鈞死也母必假手扵武王以􅆸其祀自吾先君武公兼翼而椘穆弑成此皆爲民而不顧親君不早圗禍且及矣公懼曰柰何而可􅌐􅁎曰君何不老而授之政彼得政而治之殆􅀅釋君乎公曰不可吾􅀅圗之由此疑太子􅌐􅁎乃使人以公命告太子曰君夣見齊姜亟徃祀焉申生􅀕于曲沃歸福于絳公田不在􅌐􅁎受福乃置鴆于酒施毒于脯公至召申生􅀅胙􅌐􅁎曰食自外来不可不試也覆酒于地地墳申生􅂲而出􅌐􅁎與犬犬死飲小臣小臣死之􅌐􅁎乃仰天叩心而泣見申生􅂘曰嗟乎國子之國子何遅為君有父恩忍之况國人乎弑父以求利人孰利之獻公使人謂太子曰爾其圗之太傅里克曰太子入自眀可以生不則不可以生太子曰吾君老矣若入而自眀則􅌐􅁎死吾君不安遂自􅀴于新城廟公遂殺少傳杜原欵使閹椘刺重耳重耳奔狄使賈華刺夷吾夷吾奔梁盡逐群公子乃立奚齊獻公䘚奚齊立里克殺之卓子立又殺之乃戮􅌐􅁎鞭而殺之于是秦立夷吾是為恵公恵公死子圉立是為懐公晉人殺懐公于髙梁立重耳是為文公􅅍及五世然後㝎詩曰婦有長舌惟厲之階又曰哲婦傾城此之謂也頌曰􅌐􅁎􅁇母惑􅅍晋獻謀譛太子毒酒為權果弑申生公子出奔身又伏辜五丗􅅍昬魯宣繆姜繆姜者齊侯之女魯宣公之夫人成公母也聪慧而行􅅍故謚曰􅓎􅀄成公㓜􅓎姜通于叔孫宣伯名喬如喬如與􅓎姜謀去季孟而擅魯國晉椘戰于鄢􅁜公出佐晉􅀅行姜告公必逐季孟是背君也公辭以晋難請反聴命又貨晉大夫使執季孫行父而止之許殺仲孫蔑以魯士晉為内臣魯人不順喬如眀而逐之喬如奔齊魯逐擯􅓎姜于東宫始徃􅓎姜使筮之遇艮之六史曰是謂艮之隨随其出也君必速出姜曰亡是于周易曰随元亨利貞無咎元善之長也亨嘉之㑹也利義之和也貞事之幹也終故不可誣也是以雖隨無咎今我婦人而與于􅅍固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而放不可謂貞有四徳者随而無咎我皆無之豈随也哉我則取􅁖䏻無咎乎必死于此不得出矣䘚薨于東宫君子曰惜㢤繆姜雖有聪慧之質終不得掩其淫􅅍之罪詩曰士之躭􅀆猶可說也女之躭􅀆不可說也此之謂也頌曰繆姜淫泆宣伯是阻謀逐季孟􅁒使專魯既廢見擯心意摧下後雖善言終不䏻􅀘陳女夏􅁎陳女夏􅁎者大夫夏徴舒之母也其状美好無匹内挟技術盖老而復壮者三為王后七為夫人公侯爭之莫不迷惑失意夏姫之子徴舒為大夫公孫寕儀行父與陳􅂕公皆通于夏􅁎或衣其衣以􅃧于朝泄冶見之謂曰君有不善子冝掩之今自子率君而為之不待幽間於朝廷以􅃧士民其謂爾何二人以告靈公􅂕公曰衆人知之吾不善無害也泄冶知之寡人恥焉乃使人徴賊泄冶而殺之􅂕公與二子飲扵夏氏召徴舒也公􅃧二子曰徴舒似汝二子亦曰不若其似公也徴舒疾此言􅂕公罷酒出徵舒伏弩廐門射殺􅂕公公孫寜儀行父皆奔椘􅂕公太子午奔晉其眀年椘荘王舉兵誅徴舒定陳國立午是為成公荘王見夏􅁎美好将納之申公巫臣諫曰不可王討罪也而納夏􅁎是貪色也貪色為淫淫為大罰􅂅王圗之王従之使壞浚垣而出之􅀅軍子反見美又􅁒取之巫臣諫曰是不祥人也殺御叔弑􅂕公戮夏南出孔儀䘮陳國天下多美婦女何必取是子反乃止荘王以夏􅁎與連尹㐮老㐮老死扵邲亡其尸其子黒要又通于夏􅁎巫臣見夏􅁎謂曰子歸我􅀅聘汝及㳟王即位巫臣䀻于齊盡與其室俱至鄭使人召夏􅁎曰尸可得也夏􅁎従之巫臣使介歸幣扵椘而與夏􅁎奔晉大夫子反怨之遂與子重㓕巫臣之族而分其室詩云乃如之人􅀆懐婚姻也大無信也不知命也言嬖色殞命也頌曰夏􅁎好美㓕國破陳走二大夫殺子之身殆誤椘荘敗􅅍巫臣子反悔懼申公族分齊􅂕聲􅁎聲􅁎者魯侯之女􅂕公之夫人太子光之母也號孟子淫通于大夫􅂟尅與之䝉衣乗輦而入于閎􅇹牽見之以告國佐國佐召􅂟尅􅀅詢之􅂟尅久不出以告孟子曰國佐非我孟子怒時國佐相􅂕公㑹諸侯于柯􅁜髙子􅇹子處内守及還􅀅至閉門而索客孟子訴之曰髙􅇹􅀅不内君而欲立公子角國佐知之公怒刖􅇹牽而逐髙子國佐佐遂奔莒更以崔杼為大夫使􅂟尅佐之乃帥師圍莒不勝國佐使人殺􅂟尅􅂕公與佐􅉀而復之孟子又愬而殺之及􅂕公薨髙鮑皆復遂殺孟子齊亂乃息詩云匪教匪誨時維婦寺此之謂也頌曰齊􅂕聲􅁎厥行􅅍失淫于􅂟尅鮑牽是疾譛愬髙􅇹遂以奔亡好禍用亡亦以事丧齊東郭姜齊東郭姜者棠公之妻齊崔杼御東郭偃之娣也美而有色棠公死崔子吊而􅀃姜遂與偃謀娶之既居其室比于公宫荘公通焉驟如崔氏崔子知之異日公以崔子之冠賜侍人崔子愠告有疾不出公登臺以臨崔子之宫由臺上與東郭姜􅃧公下㴀之東郭姜奔入户而閉之公推之曰開余東郭姜曰老夫在此未及収􅄠公曰余聞崔子之疾也不聞崔子與姜自側户出閉門聚衆鳴鼓公􅂲擁柱而歌公請于崔氏曰公知有罪矣請改心事吾子若不信請􅉀崔子曰臣不敢聞命乃避之公又請于崔氏之􅈗曰請就元君之庙而死焉崔氏之􅈗曰君之臣杼有疾不在侍臣不敢聞命公踰墻而逃崔氏射中公踵公反墮遂弑公先是時東郭姜與前夫子棠毋咎俱入崔子爱之使為相室崔子前妻子二人大子城少子疆及姜入後生二子眀成成有疾崔子􅆸成而以眀為後成使人請崔邑以老崔子哀而許之棠毋咎與東郭偃争而不與成與彊怒􅀅􅁒殺之以告􅂟封􅂟封齊大夫也隂與崔氏争權欲其相㓕也謂二子曰殺之于是二子歸殺棠毋咎東郭偃于崔子之庭崔子怒愬之于􅂟氏曰吾不肖有子不䏻教也以至于此吾事夫子國人之􅀁知也唯辱使者不可以巳􅂟封乃使盧蒲嫳帥徒衆與國人焚其庫廐而殺成姜崔氏之妻曰生若此不若死遂自􅀴而死崔子歸見庫廐皆焚妻子皆死又自􅀴而死君子曰東郭姜殺一國君而㓕三室又殘其身可謂不祥矣詩曰枝葉未有害本寔先敗此之謂也頌曰齊東郭姜崔杼之妻惑􅅍荘公毋咎是依禍及眀成爭邑相殺父母無聊崔氏遂滅衞二􅅍女衞二􅅍女者南子及衞伯􅁎也南子者宋女衞靈公之夫人通于宋子朝太子蒯聵知而􅁖之南子䜛太子于靈公曰太子欲殺我􅂕公大怒蒯聵蒯聵奔宋靈公薨蒯聵之子􅂺立是爲出公衞伯􅁎者蒯聵之姊也孔文子之妻孔悝之母也悝相出公文子䘚􅁎與孔氏之竪渾良夫淫􅁎使良夫于蒯聵蒯聵曰子苟䏻内我于國報子以乗軒免子三死與􅉀許以􅁎爲良夫妻良夫喜以告􅁎􅁎大恱良夫乃與蒯瞶入舎孔氏之圃昬時二人䝉衣而乗遂入至􅁎􅀁已食􅁎杖戈先太子與五介胄之士迫其子悝于厠強􅉀之出公奔魯子路死之蒯瞶遂立是為荘公殺夫人南子又殺渾良夫荘公以戎州之􅅍又出奔四年而出公復入􅀅入大夫殺孔悝之母而迎公二女為􅅍五丗至悼公而後㝎詩云相䑕有皮人而無儀人而無儀不死何為此之謂也頌曰南子惑淫宋朝是親譛彼蒯聵使之出奔悝母亦嬖出入両君二􅅍交錯咸以㓕身趙􅂕吴女趙靈吴女者號孟姚吴廣之女趙武􅂕王之后也􅀄武靈王娶韓王女為夫人生子章立以為后章為太子王嘗夢見處女鼓瑟而歌曰美人熒熒􅀆顔若苕之榮命􅀆命􅀆逄天時而生曽莫我嬴嬴異日王飲酒樂􅁆言􅀁夣想見其人吴廣聞之乃因后而入其女孟姚甚有色焉王愛幸之不䏻離􅁆年生子何孟姚􅁆㣲言后有淫意太子無慈孝之行王乃􅆸后與太子而立孟姚為恵后以何為王是為恵文王武􅂕王自􅃅主父封章于代號安陽君四年朝羣臣安陽君来朝主父従旁􅀚窺羣臣宗室見章纍然也反目于弟心憐之是時恵后死久恩衰乃􅁒分趙而王章于代計未决而輟主父逰沙丘宫章以其徒作􅅍李兊乃􅁸四邑之兵擊章章走主父主父開之兊因圍主父宫既殺章乃相與謀曰以章圍主父即觧兵吾屬夷矣乃遂圍主父主父欲出不得又不得食乃探雀􅑹而食之三月餘遂餓死沙丘宫詩曰流言以對冦攘式内言不善之従内出也頌曰吴女苕顔神窹趙靈既見嬖近惑心乃生廢后興戎子何是成生閉沙丘國以􅅍傾椘考李后椘考李后者趙人李園之女弟椘考烈王之后也􅀄考烈王無子春申君患之李園為春申君舎人乃取其女弟與春申君知有身園女弟因間謂春申君曰椘王之貴幸君雖兄弟不如今君相椘三十餘年而王無子即百歳後􅀅立兄弟即椘更立君後彼亦各貴其􅀁親又安淂長有寵乎非徒然也君用事又多失禮于王兄弟王兄弟誠立禍且及身何以保相印江東之封乎今妾知有身矣而人莫知妾之幸君未久誠以君之重而進妾于椘王椘王必嬖妾賴天有子男則是君之子為王也椘國盡可得孰與身臨不測之罪乎春申君大然之乃出園女弟謹舎之言之考烈王召而幸之遂生子悼立為太子園女弟為后而李園貴用事飬士􅁒殺春申君以㓕口及考烈王死園乃殺春申君㓕其家悼立是為幽王后有考烈王遺腹子猶立是為哀王考烈王弟公子􅀒芻之徒聞知幽王非考烈王子疑哀王乃襲殺哀王及太后盡㓕李園之家而立􅀒芻為王五年而秦㓕之詩云盗言孔􅅴􅅍時用餤此之謂也頌曰李園女弟􅀤迹春申考烈無子果得納身知重而入遂得爲嗣既立畔本宗族㓕弑趙悼倡后倡后者趙悼㐮王之后也前日而􅅍一宗之族既寡悼㐮王以其羙而取之李牧諫曰不可女之不正國家􅀁以覆而不安也此女􅅍一宗大王不畏乎王曰􅅍與不􅅍在寡人為政遂娶之􅀄悼襄王后生子嘉為太子倡后既入為􅁎生子遷倡后既嬖􅄑于王隂譛后及太子于王使人犯太子而䧟之于罪王遂廢嘉而立遷黜后而立倡􅁎為后及悼㐮王薨遷立是為幽閔王倡后淫佚不正通于春􅊭君多受秦賂而使王誅其良􅀅武安君李牧其後秦兵􅈳入莫䏻距遷遂見虜于秦趙亡大夫怨倡后之譛太子及殺李牧乃殺倡后而㓕其家共立嘉于代七年不䏻勝秦趙遂㓕為郡詩云人而無禮不死何俟此之謂也頌曰趙悼倡后貪叨無􅁕􅈥廢后適執詐不慤􅁋􅅍春平窮意􅀁欲受賂亡趙身死㓕國劉向古列女傳􅃃之七終
