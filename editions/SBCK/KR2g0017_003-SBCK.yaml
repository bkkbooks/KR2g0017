front:
  text: 劉向古列女傳􅃃之三
  hash: sha256:ce3ea3b1967b31be406705627e76baec0cadebe60f423f2e8a01469572d82212
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_003-1a}
body:
  text: 仁智傳宻康公母密康公之母姓魏氏周共王逰于洷上康公従有三女奔之其母曰必致之王夫獸三爲群人三爲衆女三爲粲王田不取群公行下衆王御不参一族夫粲羙之物歸汝而何徳以堪之王猶不堪况尔小醜乎康公不獻王㓕宻君子謂宻母爲䏻識㣲詩云無巳太康職思其􅁨此之謂也頌曰宻康之母先識盛衰非刺康公受􅙾不歸公行下衆物滿則損俾獻不聴宻果㓕殞椘武鄧曼鄧曼者武王之夫人也王使屈瑕為􅀅伐羅屈瑕號莫敖與群帥悉楚師以行闘伯比謂其御曰莫敖必敗舉趾髙心不固矣見王曰必濟師王以告夫人鄧曼曰大夫非衆之謂也其謂君撫小民以信訓諸司以徳而威莫敖以刑也莫敖狃于蒲騷之役􅀅自用也必小羅君若不鎮撫其不設備乎扵是王使賴人追之不及莫敖令于軍中曰諌者有刑及鄢師次􅅍濟至羅羅與盧戎撃之大敗莫敖自􅀴荒谷群帥囚于治父以待刑王曰􅀌之罪也皆免之君子謂鄧曼為知人詩云曽是莫聴大命以傾此之謂也王伐隨且行告鄧曼曰余心蕩何也鄧曼曰王徳薄而禄厚施鮮而得多物盛必衰日中必移盈而蕩天之道也先王知之矣故臨武事􅀅􅀤大命而蕩王心焉若師徒毋􅉻王薨于行國之福也王遂行䘚于樠木之下君子謂鄧曼為知天道易曰日中則昃月盈則􅉻天地盈虗與時消息此之謂也頌曰椘武鄧曼見事所興謂瑕軍敗知王􅀅薨識彼天道盛而必衰終如其言君子揚称許穆夫人許穆夫人者衞懿公之女許穆公之夫人也􅀄許求之齊亦求之懿公􅀅與許女因其􅀓母而言曰古者諸侯之有女子也􅀁以苞苴玩弄繋援于大國也言今者許小而逺齊大而近若今之世強者為雄如使邉境有㓂戎之事維是四方之故赴告大國妾在不猶愈乎今舎近而就逺離大而附小一旦有車馳之難孰可與慮社稷衞侯不聴而嫁之于許其後翟人攻衞大破之而許不䏻救衞侯遂奔走渉河而南至椘丘齊桓徃而存之遂城椘丘以居衞侯扵是悔不用其言當敗之時許夫人馳驅而弔唁衞侯因疾之而作詩云載馳載馳歸唁衞侯驅馬悠悠言至于曹大夫䟦渉我心則􅁨既不我嘉不䏻旋反視爾不􅆇我思不逺君子善其慈恵而逺識也頌曰衞女未嫁謀許與齊女諷母曰齊大可依衞君不聴後果遁逃許不䏻救女作載馳曹僖氏妻曹大夫僖􅀒覊之妻也晉公子重耳亡過曹恭公不禮焉聞其駢脅近其舎伺其􅀅浴設帷薄而觀之􅀒覊之妻言于夫曰吾觀晉公子其従者三人皆􅀦相也以此三人者皆善戮力以輔人必得晉國若得反國必覇諸侯而討無禮曹必為首若曹有難子必不免子胡不早自貳焉且吾聞之不知其子者視其父不知其君者視其􅀁使今其従者皆卿相之僕也則其君必伯王之主也若加禮焉必䏻報施矣若有罪焉必䏻討過子不早圗禍至不久矣􅀒覊乃遺之壺飡加璧其上公子受飡反璧及公子反􅀦伐曹乃表􅀒覊之閭令兵士無敢入士民之扶老携㓜而赴其閭者門外成市君子謂僖氏之妻䏻逺識詩云既眀且哲以保其身此之謂也頌曰僖氏之妻亷智孔白見晉公子知其興祚使夫饋飡且以自託文伐曹國䘚獨見釋孫叔敖母椘令尹孫叔敖之母也叔敖為嬰児之時出逰見両頭蛇殺而埋之歸見其母而泣焉母問其故對曰吾聞見両頭蛇者死今者出逰見之其母曰蛇今安在對曰吾􅂲他人復見之殺而埋之矣其母曰汝不死矣夫有隂徳者陽報之徳勝不祥仁除百禍天之處髙而聴卑書不云乎皇天無親惟徳是輔爾嘿矣必興于楚及叔敖長為令尹君子謂叔敖之母知道徳之次詩云母氏聖善此之􅀃也頌曰叔敖之母深知天道叔敖見蛇両頭岐首殺而埋之泣􅂲不及母曰隂徳不死必夀晉伯宗妻晉大夫伯宗之妻也伯宗賢而好以直辨􅇒人毎朝其妻常戒之曰盗憎主人民愛其上有爱好人者必有憎妬人者夫子好直言枉者􅁖之禍必及身矣伯宗不聴朝而以喜色歸其妻曰子貌有喜色何也伯宗曰吾言于朝諸大夫皆謂我知似陽子妻曰實榖不華至言不餙今陽子華而不實言而無謀是以禍及其身子何喜焉伯宗曰吾􅁒飲諸大夫酒而與之謀爾試聴之其妻曰諾于是為大㑹與諸大夫飲既飲而問妻曰何􅀂對曰諸大夫慕子若也然而民之不䏻戴其上乆矣難必及子子之仕固不可易也且􅀦家多貳其危可立待也子何不預結賢大夫以託州犁焉伯宗曰諾乃得畢羊而交之及欒不忌之難郤害伯宗譛而殺之畢羊乃送州犂于荆遂得免焉君子謂伯宗之妻知天道詩云多􅀅熇熇不可救薬此之謂也頌曰伯宗􅇒人妻知且亡數諌伯宗厚許畢羊屬以州犂以免咎殃伯宗遇禍州犁奔荆衞靈夫人衞靈公之夫人也靈公與夫人夜坐聞車聲轔轉至􅇅而止過􅇅復有聲公問夫人曰知此謂誰夫人曰此􅕋伯玉也公曰何以知之夫人曰妾聞禮下公門式路馬􅀁以廣敬也夫忠臣與孝子不為昭昭變節不為冥冥惰行蘧伯玉衞之賢大夫也仁而有智敬以事上此其人必不以闇昧􅆸禮是以知之公使視之果伯玉也公反之以􅃧夫人曰非也夫人酌觴􅂯拜賀公公曰子何以賀寘人夫人曰始妾獨以衞為有蘧伯玉爾今衞復有與之齊者是君有二臣也􅀦多賢臣􅀦之福也妾是以賀公驚曰善㢤遂語夫人其實焉君子謂衞夫人眀于知人道夫可欺而不可罔者其眀智乎詩云我聞其聲不見其人此之謂也頌曰衞靈夜坐夫人與存有車轔轔中止􅇅門夫人知之必伯玉焉維知識賢問之信然齊靈仲子齊靈仲子者宋侯之女齊靈公之夫人也初靈公娶于魯聲姬生子光以為太子夫人仲子與其娣戎子嬖于公仲子生子牙戎子請以牙為太子代光公許之仲子曰不可夫􅆸常不祥聞諸侯之難失謀夫光之立也列于諸侯矣今無故而􅆸之是專絀諸侯而以難犯不祥也君心悔之在我而已仲子曰妾非讓也誠禍之􅎯也以死爭之公終不聴遂逐太子光而立牙為太子髙厚為􅀓靈公􅍚髙厚欲迎牙及公薨崔杼立光而殺髙厚以不用仲子之言禍至扵此君子謂仲子眀扵事理詩云聴用我謀庶無大悔仲子之謂也頌曰齊靈仲子仁智􅂋眀靈公立牙􅆸􅁎子光仲子強諫棄嫡不祥公既不聴果有禍殃魯􅆇孫母􅆇孫母者魯大夫􅆇文仲之母也文仲􅀅為魯使至齊其母送之曰汝刻而無恩好盡人力窮人以為威魯國不容子矣而使子之齊凡好􅀅作必扵変動害子者其于斯􅀤事乎汝其戒之魯與齊通壁壁隣之國也魯之寵臣多怨汝者又皆通于齊髙子國子是必使齊圗魯而拘汝㽞之難乎其免也汝必施恩布恵而後出以求􅂇焉于是文仲託于三家厚士大夫而後之齊齊果拘之而興兵􅁒􅊞魯文仲隂使人遺公書􅂲得其書乃謬其辭曰歛小器􅄬諸台食獵犬組羊裘琴之合甚思之􅆇我羊羊有母食我以同魚冠纓不􅁕帶有餘公及大夫相與議之莫䏻知之人有言􅆇孫母者世家子也君何不試召而問焉于是召而語之曰吾使􅆇子之齊今特書来云爾何也􅆇孫母泣下􅁭曰吾子拘有木治矣公曰何以知之對曰歛小器投諸台者言取郭外􅎯内之扵城中也食獵犬組羊裘者言趣饗􅀾闘之士而繕甲兵也琴之合甚思之者言思妻也􅆇我羊羊有母是善告妻善飬母也食我以同魚同者其文錯錯者􅀁以治鋸鋸者􅀁以治木也是有木治保于獄矣冠纓不􅁕帶有餘者頭􅅍不得梳飢不得食也故知吾子拘而有木治矣扵是以􅆇孫母之言軍于境上齊方遣兵􅀅以􅊞魯聞兵在境上乃還文仲而不伐魯君子謂􅆇孫母識髙見逺詩云陟彼屺􅀆瞻望母􅀆此之謂也頌曰􅆇孫之母刺子好威必且遇善使援􅀁危既厚三家果拘于齊母說其書子遂得歸晉羊叔􅁎叔􅁎者羊舌子之妻也叔向叔魚之母也一姓楊氏叔向名肹叔魚名鮒羊舌子好正不容于晉去而之三室之邑三室之邑人相與忀羊而遺之羊舌子不受叔􅁎曰夫子居晉不容去之三室之邑又不容于三室之邑是于夫子不容也不如受之羊舌子受之曰為肹與鮒亨之叔􅁎曰不可南方有鳥名曰乾吉食其子不擇􅁏子常不遂今肹與鮒童子也随大夫而化者不可食以不義之􅁏不若埋之以眀不與于是乃盛以甕埋壚隂後二年攘羊之事􅀤都吏至羊舌子曰吾受之不敢食也彂而視之則其骨存焉都吏曰君子㢤羊舌子不與攘羊之事矣君子謂叔􅁎為䏻防害逺疑詩曰無曰不􅂋莫予去覯此之謂也叔向􅁒娶于申公巫臣氏夏􅁎之女羙而有色叔􅁎不􅁒娶其族叔向曰吾母之族貴而無庶吾懲舅氏矣叔􅁎曰子靈之妻殺三夫一君一子而亡一國両卿矣爾不懲此而反懲吾族何也且吾聞之有竒福者必有竒禍而有甚羙者必有甚􅁖今是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鐘羙于是􅀅必以是大有敗也昔有仍氏生女􅄠黒而甚羙光可監人名曰玄妻楽正䕫娶之生伯封宕有豕心忿戾母期貪婪無饜謂之封豕有窮后羿滅之䕫是用不祀且三代之亡恭太子之􅆸皆是物也汝何以為㢤夫有美物􅁕以移人苟非徳義則必有禍也叔向懼而不敢娶􅊭公強使娶之生楊食我食我號曰伯碩生時侍者謁之叔􅁎曰長姒産男叔􅁎徃視之及堂聞其􅃅也而還曰􅉘狼之聲也狼子野心今􅀅㓕羊舌氏者必是子也遂不肯見及長與祁勝為􅅍晉人殺食我羊舌氏田是遂㓕君子謂叔姬為䏻推􅁼詩云如彼泉流無淪胥以敗此之謂也叔姫之始生叔魚也而視之曰是虎目而豕啄鳶眉而牛腹谿􅊤可盈是不可饜也必以賂死遂不見及叔魚長為􅀦賛理邢侯與雍子争田雍子入其女扵叔魚以求直邢侯殺叔魚與雍子于朝韓宣子患之叔向曰三姦同罪請殺其生者而戮其死者遂族邢侯氏而尸叔魚與雍子于市叔魚䘚以貪死叔􅁎可謂知矣詩云貪人敗􅁼此之謂也頌曰叔向之母察于情性知人之生以窮其命叔魚食我皆貪不正必以貨死果䘚分争晉范氏母晉范氏母者范獻子之妻也其三子逰于趙氏趙蕳子乗馬園中園中多株問三子曰奈何長者曰眀君不問不為􅅍君不問而為中者曰爱馬􅁕則無爱民力爱民力則無爱馬􅁕少者曰可以三徳使民設令伐株于山􅀅有馬為也巳而閑囿示之株夫山逺而囿近是民一悦矣夫險阻之山而伐􅊭地之株民二悦矣既畢而賤賣民三悦矣簡子従之民果三悦少子伐其謀歸以告母母喟然嘆曰終㓕范氏者必是子也夫伐功施勞鮮䏻布仁乗偽行詐莫􅀎久長其後智伯㓕范氏君子謂范氏母為知難夲詩曰無忝皇祖式救爾後此之謂也頌曰范氏之母貴徳尚信小子三悦以詐與民知其必㓕鮮䏻有仁後果逄禍身死􅀦兮魯公乗姒魯公乗姒者魯公乗子皮之姒也其族人死姒􅂘之甚悲子皮止姒曰安之吾今嫁姊矣已過時子皮不復言也魯君􅁒以子皮為相子皮問姒曰魯君􅁒以我為相為之乎姒曰勿為也子皮曰何也姒曰夫臨䘮而言嫁一何不習禮也後過時而不言一何不逹人事也子内不習禮而外不逹人事子不可以為相子皮曰姒􅁒嫁何不早言姒曰婦人之事唱而後和吾豈以􅁒嫁之故數子乎子誠不習扵禮不逹扵人事以此相一國據大政何以理之譬猶揜目而别黒白也掩目而别黒白猶無患也不逹人事而相國非有天咎必有人禍子其勿為也子皮不聴䘚受為相居未期年果誅而死君子謂公乗姒縁事而知弟之遇􅍔也可謂智矣待禮然後動不苟觸情可謂貞矣詩云籜兮籜􅀆風其吹汝叔􅀆伯􅀆唱予和汝又曰百爾􅀁思不如我􅀁之此之謂也頌曰子皮之姊眀事分禮子皮相魯知其禍􅁸姊諌子皮殆不如止子皮不聴䘚為宗恥魯􅃮室女􅃮室女者魯􅃮室邑之女也過時未適人當穆公時君老大子㓜女􅀝柱而嘯旁人聞之莫不為之􅆭者其隣人婦從之逰謂曰何嘯之悲也子􅁒嫁耶吾為子求偶􅃮室女曰嗟乎始吾以子為有知今無識也吾豈為不嫁不樂而悲哉吾憂魯君老大子㓜隣婦笑曰此乃魯大夫之憂婦人何與焉漆室女曰不然非子􅀁知也昔晉客舎吾家繋馬園中馬佚馳赱踐吾葵使我終歳不食葵鄰人女奔随人亡其家倩吾兄行追之逄霖水出溺流而死令吾終身無兄吾聞河潤九里漸洳三百歩今魯君老悖太子少愚愚偽日起夫魯國有患者君臣父子皆􅀍其辱禍及衆庶婦人獨安􅀁避乎吾甚􅁨之子乃曰婦人無與者何㢤鄰婦謝曰子之􅀁慮非妾􅀁及三年魯果􅅍齊楚攻之魯連有冦男子􅀾闘婦人轉輸不得休息君子曰逺矣􅃮室女之思也詩云知我者謂我心􅁨不知我者謂我何求此之謂也頌曰􅃮室之女計慮甚玅維魯且亂􅀝柱而嘯君老嗣㓜愚悖姦生魯果􅅰􅅍齊伐其城魏曲沃􅀒曲沃􅀒者魏大夫如耳母也秦立魏公子政為魏太子魏哀王使使者為太子納妃而羙王􅀅自納焉曲沃􅀒謂其子如耳曰王亂于無别汝胡不􅋌之方今􅀾􅀦強者為雄義者􅂋焉今魏不䏻強王又無義何以持國乎王中人也不知其為禍耳汝不言則魏必有禍矣有禍必及吾家汝言以盡忠忠以除禍不可失也如耳未遇門㑹使于齊􅀒因欵王門而上書曰曲沃之老婦也心有􅀁懐􅂅以聞扵王王召入􅀒曰妾聞男女之别國之大莭也婦人脆于志窳于心不可以邪開也是故必十五而笄二十而嫁早成其號謚􅀁以就之也聘則為妻奔則為妾􅀁以開善遏淫也節成然後許嫁親迎然後随従貞女之義也今大王為太子求妃而自納之于後宫此毀貞女之行而􅅍男子之别也自古聖王必正妃匹妃匹正則興不正則􅅍夏之興也以􅂗山亡也以末喜殷之興也以有㜪亡也以妲巳周之興也以大姒亡也以褒姒周之康王夫人晏出朝􅀜雎􅁸興思得㳤女以配君子夫雎鳩之鳥猶未嘗見乗居而匹處也夫男女之盛合之以禮則父子生焉君臣成焉故為萬物始君臣父子夫婦三者天下之大綱紀也三者治則治􅅍則􅅍今大王􅅍人道之始棄綱紀之大大國五六南有強楚西有横秦而魏􅀦居其間可謂僅存矣王不憂此而従􅅍無别父子同女妾􅂲大王之國政危矣王曰然寡人不知也遂與太子妃而賞􅀒三十鍾如耳還而爵之哀王勤行自修勞来國家而齊椘強秦不敢加兵焉君子謂魏􅀒知禮詩云敬之敬之天維􅂋思此之謂也頌曰魏􅀒聰逹非刺哀王王子納妃禮别不眀􅀒欵王門陳列紀網王䏻自􅁱䘚無敵兵趙􅀅括母趙􅀅馬服君趙奢之妻趙括之母也秦攻趙孝成王使括代亷頗為􅀅􅀅行括母上書言于王曰括不可使􅀅王曰何也曰始妾事其父父時為􅀅身􅀁奉飯者以十數􅀁友者以百數大王及宗室􅀁賜幣者盡以與軍吏士大夫受命之日不問家事今括一旦為􅀅東向而朝軍吏吏無敢仰視之者王􅀁賜金帛歸盡蔵之乃曰視便利田宅可買者王以為若其父乎父子不同執心各異􅂅勿遣王曰母置之吾計已决矣括母曰王終遣之即有不􅁛妾得無随乎王曰不也括既行代亷頗三十餘日趙兵果敗括死軍覆王以括母為仁智詩曰老夫灌灌小子矯矯匪我言耄爾用􅁨謔此之謂也頌曰孝成用括代頗拒秦括母獻書知其覆軍願止不得請罪止身括死長􅊭妻子得存劉向古列女傳􅃃之三終
