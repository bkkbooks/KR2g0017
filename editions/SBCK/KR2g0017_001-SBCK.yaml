front:
  text: 劉向古列女傳􅃃之一
  hash: sha256:222dbe2b2f64b9a82f556fc623818f4428c6f74f20d0171ec13136c49b281f13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_001-1a}
body:
  text: 母儀傳有虞二妃有虞二妃者帝尭之二女也長娥皇次女英舜父頑母嚚父號瞽叟弟曰象敖㳺扵嫚舜䏻諧柔之承事瞽叟以孝母憎舜而爱象舜猶内治靡有姦意四嶽廌之扵堯尭乃妻以二女以觀厥内二女承事舜扵畎畆之中不以天子之女故而驕盈怠嫚猶謙謙恭儉思盡婦道瞽叟與象謀殺舜使塗廪舜歸告二女曰父母使我􅂗廪我其徃二女曰徃哉舜既治廪乃􅂢階瞽􅅱焚廪舜徃飛出象復與父母謀使舜浚井舜乃告二女二女曰俞徃㢤舜徃浚井格其出入從掩舜潜出時既不䏻殺舜瞽􅅱又速舜飲酒􅋨􅀅殺之舜告二女二女乃與舜藥浴汪遂徃舜終日飲酒不􅋨舜之女弟繋怜之與二嫂諧父母欲殺舜舜猶不怨怒之不已舜徃于田號泣曰呼旻天呼父母惟害若兹思慕不己不怨其弟篤厚不怠既納于百揆賔于四門選于林木入于大麓尭試之百方每事常謀于二女舜既嗣位升為天子娥皇為后女英為妃封象于有庳事瞽􅅱猶若焉天下􅁛二妃聦眀貞仁舜陟方死于蒼梧號曰重華二妃死于江湘之間俗謂之湘君君子曰二妃徳純而行篤詩云不顯惟徳百辟其刑之此之謂也頌曰元始二妃帝尭之女嬪列有虞承舜扵下以尊事卑終䏻勞苦瞽􅅱和寜䘚享福祜棄母姜源棄母姜嫄者邰侯之女也當尭之時行見巨人跡好而􅂂之歸而有娠浸以益大心怪􅁖之卜筮禋祀以求無子終生子以為不祥而棄之隘巷牛羊避而不踐乃送之平林之中後伐􅊭林者咸廌之覆之乃取置寒氷之上飛鳥傴翼之姜嫄以為異乃􅀵以歸因命曰棄姜嫄之性清静専一好種稼穡及棄長而教之種􅀣桑麻棄之性眀而仁䏻育其教䘚􅆀其名尭使棄居稷官更國邰地遂封棄于邰號曰后稷及尭崩舜即位乃命之曰棄􅀺民阻飢汝后稷播時百榖其後世世居稷至周文武而興爲天子君子謂姜嫄静而有化詩云赫赫姜嫄其徳不囬上帝是依又曰思文后稷克配彼天立我烝民此之謂也頌曰棄母姜嫄清静專一􅂂跡而孕懼棄扵野鳥獸覆翼乃復􅀵恤䘚爲帝佐母道既畢契母簡狄􅆻母蕳狄者有娀氏之長女也當尭之時與其妹姊浴扵玄丘之水有玄鳥銜邜過而墜之五色甚好蕳狄與其妹娣競徃取之簡狄得而含之誤而吞之遂生契焉蕳狄性好人事之治上知天文樂扵施恵及􅆻長而教之理順之序契之性聪眀而仁䏻育其教䘚􅆀其名尭使為司徒封之扵亳及尭崩舜即位乃勅之曰􅆻百姓不親五品不遜汝作司徒而敬敷王教在寛其後世世居亳至殷湯興為天子君子謂蕳狄仁而有禮詩云有娀方􅀅立子生啇又曰天命玄鳥降而生啇此之謂也頌曰􅆻母蕳狄敦仁勵翼吞􅆑産子遂自􅁱餙教以事理推恩有徳契為帝輔盖母有力啟母塗山啓母者􅂗山氏長女也夏禹娶以為妃既生啓􅉝壬癸甲啓􅈱􅈱泣禹去而治水惟􅂽度土功三過其家不入其門􅂗山獨眀教訓而致其化焉及啟長化其徳而從其教䘚􅆀令名禹為天子而啟為嗣持禹之功而不殞君子謂􅂗山彊扵教誨詩云􅁵爾士女從以孫子此之謂也頌曰啟母􅂗山維配帝禹􅉝壬癸甲禹徃敷土啟􅈱􅈱泣母獨論序教訓以善䘚􅁇其父湯妃有㜪湯妃有㜪者有㜪氏之女也殷湯娶以為妃生仲壬外丙亦眀教訓致其功有㜪之妃湯也統領九嬪後宫有序咸無妬􅎱逆理之人䘚致王功君子謂妃眀而有序詩云􅆼窕淑女君子好逑言賢女䏻為君子和好衆妾其有㜪之謂也頌曰湯妃有㜪賢行聪明媵従伊尹自夏適殷勤慤治中九嬪有行化訓内外亦無愆殃周室三母三母者太姜太任太姒太姜者王季之母有吕氏之女大王娶以為妃生太伯仲雍王季貞順率道靡有過失太王謀事遷徙必與太姜君子謂太姜廣于徳教徳教本也而謀事次之詩云古公亶父来朝走馬率西水滸至扵岐下爰及姜女聿来胥宇此之謂也盖太姜淵智非常雖太王之賢聖亦與之謀其知太王仁恕必可以比國人而景附矣太任者文王之母摯任氏中女也王季娶為妃太任之性端一誠荘惟徳之行及其有娠目不視􅁖色耳不聴淫聲口不出敖言䏻以胎教溲于豕牢而生文王文王生而眀聖太任教之以一而識百君子謂太任為􅀎胎教古者婦人姙子􅆍不側坐不邉立不蹕不食邪味割不正不食席不正不坐目不視于邪色耳不聴于淫聲夜則令瞽誦詩道正事如此則生子形容端正才徳必過人矣故姙子之時必慎􅀁感感于善則善感于惡則惡人生而肖父母者皆其母感于物故形意肖之文王母可謂知肖化矣太姒者武王之母禹后有㜪姒氏之女仁而眀道文王嘉之親迎于渭造舟為梁及入太姒思媚太姜大任旦夕勤勞以進婦道太姒號曰文母文王理陽道而治外文母理隂道而治内太姒生有十男長伯邑考次則武王彂次則周公旦次則管叔鮮次則蔡叔度次則曹叔振鐸次則霍叔武次則成叔䖏次則康叔封次則􅡭季載太姒教誨十子自少及長未嘗見邪辟之事及其長文王􅁇而教之䘚成武王周公之徳武王纘太王王季文王之緒壹戎衣而有天下身不失天下之􅂋名尊為天子富有四海之内宗廟饗之子孫保之武王末受命周公成文武之徳追王太王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庻人父為大夫子為士葬以大夫􅀕以士父為士子為大夫􅁙以士􅀕以大夫期之䘮逹乎大夫三年之䘮逹乎天子父母之䘮無貴賤一也盖十子之中惟武王周公成聖要其安民以播烈光制禮以廣逹孝而言之則盛徳自然着矣若管蔡監殷而畔乃人才質不同有不可以少加重任者易曰力小而任重鮮不及矣反思其受教之時未必至扵斯也豈可以累太姒耶故君子謂太姒仁眀而有徳詩曰大􅀖有子俔天之妹文定厥祥親迎于渭造舟為梁不􅂋其光又曰太姒嗣徽音則百斯男此之謂也頌曰周室三母太姜任姒文武之興盖由斯􅁸太姒最賢號曰文母三姑之徳亦甚大矣衞姑定姜衞姑定姜者衞定公之夫人公子之母也公子既娶而死其婦無子畢三年之䘮定姜㱕其婦自送之至扵野㤙爱哀思悲心感慟立而望之揮泣垂涕乃賦詩曰燕燕于飛差池其羽之子于歸逺送于野瞻望不及泣涕如雨送去歸泣而望之又作詩曰先君之思以畜寡人君子謂定姜為慈姑過而之厚定公􅁖孫林父孫林父奔晉晉侯使郤犫為請還定公欲辭㝎姜曰不可是先君宗卿之嗣也大國又以為請而弗許􅀅亡雖􅁖之不猶愈于亡乎君其忍之夫安民而宥宗卿不亦可乎㝎公遂復之君子謂定姜䏻逺患難詩曰其儀不忒正是四國此之謂也定公䘚立敬姒之子衎為君是為獻公獻公居䘮而慢定姜既􅂘而息見獻公之不哀也不内食飲嘆曰是􅀅敗衛國必先害善人夫禍衛國也夫吾不􅀗鱄也使主社稷大夫聞之皆懼孫文子自是不敢舎其重器于衞鱄者獻公弟子鮮也賢而定姜􅁒立之而不得後獻公􅁀虐慢侮定姜䘚見逐走出亡至境使祝宗告亡且告無罪扵廟㝎姜曰不可若令無神不可誣有罪若何告無罪也且公之行舎大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾􅌨事先君而􅁀妾使余三罪也告亡而已無告無罪其後賴鱄力獻公復得反國君子謂㝎姜䏻以辭教詩云我言惟服此之謂也鄭皇耳率師侵衞孫文子卜追之獻兆于㝎姜曰兆如山林有夫出征而䘮其雄定姜曰征者䘮䧺禦㓂之利也大夫圗之衞人追之􅀗鄭皇耳于大丘君子謂定姜逹扵事情詩云左之左之君子冝之此之謂也頌曰衞姑定姜送婦作詩恩爱慈恵泣而望之數諌獻公得其罪􅀹聰眀逺識麗于文辭齊女􅀓母􅀓母者齊女之􅀓母也女為衞荘公夫人號曰荘姜姜交好始徃操行衰惰心淫泆冶容􅀓母見其婦道不正諭之云子之家世世尊荣當為民法則子之質聪逹于事當為人表式儀貌壮䴡不可不自􅁱整衣錦絅裳餙在輿馬是不貴徳也乃作詩曰碩人其頎衣錦絅衣齊侯之子衞侯之妻東宫之妹邢侯之姨譚公維私砥厲女之心以髙莭以為人君之子弟為國君之夫人􅀹不可有邪辟之行焉女遂感而自修君子善􅀓母之防未然也荘姜者東宫得臣之妹也無子姆戴媯之子桓公公子州吁嬖人之子也有寵驕而好兵荘公弗禁後州吁果殺桓公詩曰母教猱升木此之謂也頌曰齊女􅀓母防女未然􅁛列先祖莫不尊榮作詩眀指使無辱先荘姜姆妹䘚䏻􅁱身鄒孟軻母鄒孟軻之母也號孟母其舎近墓孟子之少也嬉逰爲墓間之事踴躍築埋孟母曰此非吾􅀁以居䖏子乃去舎市傍其嬉􅃧爲賈人􅃷賣之事孟母又曰此非吾􅀁以居䖏子也復徙舎學宫之傍其嬉逰乃設爼豆揖譲進退孟母曰真可以居吾子矣遂居之及孟子長學六藝䘚成大儒之名君子謂孟母善以漸化詩云彼姝者子何以予之此之謂也自孟子之少也既學而歸孟母方績問曰學􅀁至矣孟子曰自若也孟母以刀㫁其織孟子懼而問其故孟母曰子之􅆸學若吾㫁斯織也夫君子學以立名問則廣知是以居則安寕動則逺害今而􅆸之是不免于厮役而無以離于禍患也何以異于織績而食中道􅆸而不爲寕䏻衣其夫子而長不乏糧食㢤女則􅆸其􅀁食男則墮于􅁱徳不爲􅀼盗則爲虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知爲人母之道矣詩云彼姝者子何以告之此之謂也孟子既娶将入私室其婦􅃝而在内孟子不恱遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾􅀼墮在室而夫子見妾勃然不恱是客妾也婦人之義盖不客􅀫請歸父母于是孟母召孟子而謂之曰夫禮􅀅入門問孰存􅀁以致敬也􅀅上堂聲必􅀭􅀁以戒人也􅀅入户視必下􅂲見人過也今子不察扵禮而責禮扵人不亦逺乎孟子謝遂㽞其婦君子謂孟母知禮而眀扵姑母之道孟子處齊而有􅁨色孟母見之曰子若有􅁨色何也孟子曰不敏異日閒居擁楹而歎孟母見之曰鄉見子有憂色曰不也今擁楹而歎何也孟子對曰軻聞之君子􅁛身就位不為苟得而受賞不貪榮禄諸侯不聴則不逹其上聴而不用則不踐其朝今道不用扵齊􅂅行而母老是以􅁨也孟母曰夫婦人之禮精五飰􅇈酒􅄴養舅姑縫衣裳而已矣故有闥内之修而無境外之志易曰在中饋無攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三従之道也故年少則従乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒匪教此之謂也頌曰孟子之母教化列分䖏子擇藝使従大倫子學不進㫁機示焉子遂成徳為當世冠魯季敬姜魯季敬姜者莒女也􅃅戴已魯大夫公父穆伯之妻文伯之母季康子之従祖叔母也􅀶逹知禮穆伯先死敬姜守養文伯出學而還歸敬姜側目而盻之見其友上堂從後堦降而􅁍行奉劍而正􅂂若事父兄文伯自以爲成人矣敬姜召而􅁆之曰昔者武王罷朝而結絲􅙋绝左右顧無可使結之者俯而自申之故􅀎成王道桓公坐友三人諌臣五人日舉過者三十人故􅀎成伯業周公一食而三吐哺一沐而三握􅄠􅀁執贄而見扵窮閭隘巷者七十餘人故䏻存周室彼二聖一賢者皆伯王之君也而下人如此其􅀁與逰者皆過巳者也是以日益而不自知也今以子年之少而位之卑􅀁與逰者皆為服役子之不益亦以眀矣文伯乃謝罪于是乃擇􅃊師賢友而事之􅀁與逰䖏者皆黄耄􅌼齒也文伯引祍攘􅐈而親饋之敬姜曰子成人矣君子謂敬姜備于教化詩云濟濟多士文王以寜此之謂也文伯相魯敬姜謂之曰吾語汝治􅀦之要盡在􅀴矣夫幅者􅀁以正曲枉也不可不彊故幅可以為将晝者􅀁以均不均服不服也故畫可以為正物者􅀁以治蕪與莫也故物可以為都大夫持交而不失出入不絶者捆也捆可以為大行人也推而徃引而来者綜也綜可以為開内之師主多少之數者均也均可以為内史服重任行逺道正直而固者軸也䡒可以為相舒而無窮者摘也摘可以為三公文伯􅂯拜受教文伯退朝朝敬姜敬姜力績文伯曰以歜之家而主猶績懼于季孫之怒其以歜為不䏻事主乎敬姜嘆曰魯其亡乎使吾子備官而未之聞耶居吾語女昔聖王之䖏民也擇􅇤土而䖏之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則􅁖心生沃土之民不材淫也􅇤土之民嚮義勞也是故天子大采朝曰與三公九卿組織施徳日中考政與百官之政事使師尹維旅牧宣敬民事少采夕月與太史司載紏䖍天刑日入監九御使潔􅆢禘郊之粢盛而後即安諸侯朝脩天子之業令晝考其國夕省其典刑夜儆百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而講􅀠夕而習復夜而討過無憾而後即安自庶人以下眀而動晦而休無自以怠王后親織玄紞公侯之夫人加之以紘綖卿之内子為大帶命婦成􅀕服則士之妻加之以朝服自庶士以下皆衣其夫社而賦事烝而獻功男女効績否則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舎力今我寡也爾又在下位朝夕䖏事猶􅂲忘先人之業况有怠惰其何以辟吾兾而朝夕􅁱我曰必無􅆸先人爾今也曰吾不自安以是承君之官余懼穆伯之絶嗣也仲尼聞之曰弟子記之季氏之婦不淫矣詩曰婦無公事休其􅁞織言婦人以織績為公事者也休之非禮也文伯飲南宫敬叔酒以露堵父為客羞鼈焉為小堵父怒相延食鼈堵父辭曰􅀅使鼈長而食之遂出敬姜聞之怒曰吾聞之先子曰􅀕飬尸饗飬上賓鼈于人何有而使夫人怒遂逐文伯五日魯大夫辭而復之君子謂敬姜爲慎微詩曰我有旨酒嘉賓式讌以樂言尊賔也文伯䘚敬姜戒止妾曰吾聞之好内女死之好外士死之今吾子夭死吾惡其以好内聞也二三婦之辱共祀先祀者請毋􅇤色毋揮涕毋䧟􅈾毋􅁨容有降服毋加服従禮而静是昭吾子仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知矣欲眀其子之令徳詩曰君子有榖貽厥孫子此之謂也敬姜之䖏䘮也朝哭穆伯暮哭文伯仲尼聞之曰季氏之婦可謂知禮矣爱而無私上下有章敬姜嘗如季氏康子在朝與之言不應從之及􅆍門不應而入康子辭于朝而入見曰􅏂也不得聞命母乃罪耶敬姜對曰子不聞耶天子及諸侯合民事于内朝自卿大夫以下合官職于外朝合家事于内朝􅆍門之内婦人治其職焉上下同之夫外朝子􅀅業君之官職焉内朝子􅀅庀季氏之政焉皆非吾􅀁敢言也康子嘗至敬姜䦱門而與之言皆不踰閾祭悼子康子與焉酢不受徹爼不讌宗不具不繹繹不盡飲則不退仲尼謂敬姜别于男女之禮矣詩曰女也不爽此之謂也頌曰文伯之母􅃅曰敬姜通逹知禮徳行光眀匡子過失教以法理仲尼賢焉列為慈母椘子􅀤母椘􅀅子􅀤之母也子彂攻秦绝粮使人請于王因歸問其母母問使者曰士䘚得無恙乎對曰士䘚并分菽粒而食之又問􅀅軍得無恙乎對曰将軍朝夕芻豢􅁰梁子彂破秦而歸其母閉門而不内使人數之曰子不聞越王句踐之伐吴客有獻醇酒一器王使人徃江之上流使士䘚飲其下流味不及加羙而士䘚􅀾自五也異日有獻一囊糗糒者王又以賜軍士分而食之甘不踰嗌而􅀾自十也今子爲将士䘚并分菽粒而食之子獨朝夕芻豢􅁰梁何也詩不云乎好樂無荒良士休休言不失和也夫使人入于死地而自康樂于其上雖有以得勝非其術也子非吾子也無入吾門子􅀤于是謝其母然後内之君子謂子彂母􅀎以教誨詩云教誨尔子式榖似之此之謂也頌曰子彂之母刺子驕㤗􅀅軍稲梁士䘚菽粒責以無禮不得人力君子嘉焉編于母徳魯之母師母師者魯九子之寡母也臘日休作者歳祀禮事畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家㓜稚歳時禮不理吾從汝謁徃監之諸子皆頓首許諾又召諸婦曰婦人有三従之義而無専制之行少繫父母長繋于夫老繋于子今諸子許我歸視私家雖踰正禮􅂅與少子俱以俻婦人出入之制諸婦其慎房户之守吾夕而反于是使少子僕歸辨家事天隂還失早至閭外而止夕而入魯大夫従臺上見而恠之使人間視其居䖏禮節甚􅁱家事甚理使者還以状對于是大夫召母而問之曰一日従北方来至閭而止良久夕乃入吾不知其故甚怪之是以問也母對曰妾不幸早失夫獨與九子居臘月禮畢事間従諸子謁歸視私家與諸婦孺子期夕而反妾􅂲其酺䤓􅋨飽人情􅀁有也妾反太早不敢復反故止閭外期盡而入大夫羙之言于穆公賜母尊號曰毋師使明請夫人夫人諸􅁎皆師之君子謂母師􅀎以身教夫禮婦人未嫁則以父母為天既嫁則以夫為天其䘮天母則降服一等無二天之義也詩云出􅀫于濟飲餞于禰女子有行逺父母兄弟頌曰九子之母誠知禮􅀴謁歸還返不掩人情徳行既備卒䝉其榮鲁君賢之號以尊名魏芒慈母魏芒慈母者魏孟陽氏之女芒卯之後妻也有三子前妻之子有五人皆不爱慈母遇之甚異猶不爱慈母乃命其三子不得與前妻子齊衣服飲食􅁸居進退甚相逺前妻之子猶不爱于是前妻中子犯魏王令當死慈母􅁨戚悲哀帶圍减尺朝夕勤勞以救其罪人有謂慈母曰何如勤勞􅁨懼如此慈母曰如妾親子雖不爱妾猶救其禍而除其害獨扵假子而不為何以異于凡母其父為其􅀌也而使妾為其􅁇母􅁇母如母為人母不䏻愛其子可謂慈乎親其親而偏其假可謂義乎不慈且無義何以立扵世彼雖不愛妾安可以忌義乎遂說之魏安􅁵王聞之髙其義曰慈母如此可不赦其子乎乃赦其子復其家自此五子親附慈母雍雍若一慈母以禮義之漸率導八子咸為魏大夫卿士各成扵禮義君子謂慈母一心詩云尸鳩在桑其子七􅀆淑人君子其儀一􅀆其儀一􅀆心如结􅀆言心之均一也尸鳩以一心養七子君子以一儀養萬物一心可以事百君百心不可以事一君此之謂也頌曰芒􅆗之妻五子後母慈恵仁義扶養假子雖不吾愛拳拳若親􅁇母若斯亦誠可尊齊田稷母齊田稷子之母也田稷子相齊受下吏之貨金百鎰以遺其母母曰子為相三年矣禄未嘗多若此也豈􅁱士大夫之費㢤安􅀁淂此對曰誠受之于下其母曰吾聞士􅁱身潔行不為苟得竭情盡實不行詐偽非義之事不計扵心非理之利不入于家言行若一情貌相副今君設官以待子厚禄以􅆢子言行則可以報君夫為人臣而事其君猶為人子而事其父也盡力竭􅀎忠信不欺務在効忠必死􅆢命亷潔公正故遂而無患今子反是逺忠矣夫為人臣不忠是為人子不孝也不義之財非吾有也不孝之子非吾子也子起田稷子慙而出反其金自歸罪扵宣王請就誅焉宣王聞之大賞其母之義遂舎稷子之罪復其相位而以公金賜母君子謂稷母㢘而有化詩曰彼君子􅀆不素飱􅀆無功而食禄不為也况扵受金乎頌曰田稷之母㢘潔正直責子受金以為不徳忠孝之事盡材竭力君子受禄終不素食劉向古列女傳􅃃之一終
