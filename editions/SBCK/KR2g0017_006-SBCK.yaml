front:
  text: 劉向古列女傳􅃃之六
  hash: sha256:3d2ab83b7c921112efefd74288b8fca1f15feaedbd583f59101c0c17513c42dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_006-1a}
body:
  text: 辯通傳齊管妾婧妾婧者齊相管仲之妾也寗戚􅁒見桓公道無従乃爲人僕􅀅車􅀫齊東門之外桓公因出寗戚撃牛角而啇歌甚悲桓公異之使管仲迎之寗戚􅁛曰浩浩乎白水管仲不知􅀁謂不朝五日而有􅁨色其妾婧進曰今君不朝五日而有􅁨色敢問國家之事耶君之謀也管仲曰非汝􅀁知也婧曰妾聞之也毋老老毋賤賤毋少少毋弱弱管仲曰何謂也昔者太公望年七十屠牛于朝歌市八十為天子師九十而封于齊由是觀之老可老耶夫伊尹有㜪氏之媵臣也湯立以為三公天下之治太􅊭由是觀之賤可賤耶睪子生五嵗而賛禹由是觀之少可少耶駃騠生七日而超其母由是觀之弱可弱耶于是管仲乃下席而謝曰吾請語子其故昔日公使我迎寗戚寗戚曰浩浩乎白水吾不知其􅀁謂是故􅁨之其妾笑曰人也語君矣君不知識矣古有白水之詩詩不云乎浩浩白水儵儵之魚君来召我我􅀅安居國家未定従我焉如此寗戚之􅁒得仕國家也管仲大悦以報桓公桓公乃修官職齊戒五日見寗子因以為相齊國以治君子謂妾婧為可與謀詩云先民有言詢于蒭蕘此之謂也頌曰桓遇寗戚命管迎之寗􅁛白水管仲􅁨疑妾進問焉為􅀃其詩管嘉報公齊淂以治椘江乙母椘大夫江乙之母也當恭王之時乙為郢大夫有入王宫中盗者令尹以罪乙請于王而絀之䖏家無㡬何其母亡布八尋乃徃言于王曰妾夜亡布八尋令尹盗之王方在小曲之臺令尹侍焉王謂母曰令尹信盗之寡人不為其富貴而不行法焉若不盗而誣之椘國有常法母曰令尹不身盗之也乃使人盗之王曰其使人盗柰何對曰昔孫叔敖之為令尹也道不拾遺門不閉􅀜而盗賊自息今令尹之治也耳目不眀盗賊公行是故使盗得盗妾之布是與使人盗何以異也王曰令尹在上冦盗在下令尹不知有何罪焉母曰吁何大王之言過也昔者妾之子為郢大夫有盗王宫中之物者妾子坐而絀妾子亦豈知之㢤然終坐之令尹獨何人而不以是為過也昔者周武王有言曰百姓有過罪予一人上不眀則下不治相不賢則國不寕􅀁謂國無人者非無人也無理人者也王其察之王曰善非徒譏令尹又譏寡人命吏償母之布囙賜金千鎰母譲金布曰妾豈貪貨而失大王㢤怨令尹之治也遂去不肯受王曰母智若此其子必不愚乃復召江乙而用之君子謂乙母善以㣲喻詩云猷之未逺是用大諌此之謂也頌曰江乙失位乙母動心既歸家庭亡布八尋指責令尹辭甚有度王復用乙賜母金布晉弓工妻弓工妻者晉繁人之女也當􅊭公之時使其夫為弓三年乃成􅊭公引􅃓而射不穿一札􅊭公怒􅀅殺弓人􅃓人之妻請見曰繁人之子弓人之妻也􅂅有謁于君􅊭公見之妻曰君聞昔者公劉之行乎羊牛踐葭葦惻然為痛之恩及草木豈􅁒殺不辜者乎秦穆公有盗食其駿馬之􅁏反飲之以酒椘荘王臣援其夫人之衣而絶纓與飲大樂此三君者仁着于天下䘚享其報名垂至今昔帝堯茅茨不剪采椽不斵土階三等猶以為為之者勞居之者逸也今妾之夫治造此弓其為之亦勞其幹生于太山之阿一日三覩隂三覩陽傳以燕牛之角纒以荆䴢之筋糊以阿魚之膠此四者皆天下之妙選也而君不䏻以穿一札是君不䏻射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手􅀤之左手不知此盖射之道也􅊭公以其言而射穿七札繁人之夫立得出而賜金三鎰君子謂弓工妻可與䖏難詩曰敦于既堅舎矢既鈞言射有法也頌曰晉􅊭作弓三年乃成公怒弓工􅀅加以刑妻徃􅀃公陳其幹材列其勞苦公遂釋之齊傷槐女齊傷槐女者傷槐衍之女也名婧景公有􅀁爱槐使人守之植木懸之下令曰犯槐者刑傷槐者死于是衍􅋨而傷槐景公聞之曰是先犯我令使吏拘之且加罪焉婧懼乃造于相晏子之門曰賤妾不勝其􅁒􅂅得俻􅁆于下晏子聞之笑曰嬰有淫色乎何為老而見奔殆有􅀃内之至㢤既入門晏子望見之曰怪㢤有深憂進而問焉對曰妾父衍幸淂充城郭為公民見隂陽不調風雨不時五榖不滋之故禱祠于名山神女不勝麴孽之味先犯君令􅋨至于此罪固當死妾聞眀君之蒞國也不損禄而加刑又不以私恚害公法不爲六畜傷民人不爲野草傷禾苗昔者宋景公之時大旱三年不雨召太上而卜之曰當以人祀景公乃降堂北面稽首曰吾􅀁以請兩者乃爲吾民也今必當以人祀寡人請自當之言未䘚天大雨方千里􅀁以然者何也以䏻順天慈民也今吾君􅀣槐令犯者死􅁒槐之故殺婧之父􅀌妾之身妾􅂲傷執政之法而害眀君之義也鄰國聞之皆謂君爱􅀣而賊人其可乎晏子􅅥然而悟眀日朝謂景公曰嬰聞之窮民財力謂之暴崇玩好􅃊威令謂之逆刑殺不正謂之賊夫三者守國之大殃也今君窮民財力以美飲食之具繁鐘鼓之樂極宫室之觀行􅁀之大者也崇玩好􅃊威令是逆民之眀者也犯槐者刑傷槐者死刑殺不正是賊民之深者也公曰寡人敬受命晏子出景公即時命罷守槐之􅃥㧞植懸之木􅆸傷槐之法出犯槐之囚君子曰傷槐女䏻以辭免詩云是䆒是圗亶其然乎此之謂也頌曰景公爱槐民􅋨折傷景公将殺其女悼惶奔告晏子稱説先王晏子為言遂免父亡椘野辯女椘野辯女者昭氏之妻也鄭蕳公使大夫聘于荆至于狭路有一婦人乗車與大夫轂撃而折大夫車軸大夫怒􅀅執而鞭之婦人曰君子不遷怒不貳過今于狭路之中妾已極矣而子大夫之僕不肯少引是以敗子夫夫之車而反執妾豈不遷怒㢤既不怒僕而反怨妾豈不貳過㢤周書曰無侮鰥寡而畏髙眀今子列大夫而不為之表而遷怒貳過释僕執妾鞭其㣲弱豈可謂不侮鰥寡乎吾鞭則鞭耳惜子大夫之䘮善也大夫慙而無以應遂释之而問之對曰妾椘野之鄙人也大夫曰盍従我于鄭乎對曰既有狂夫昭氏在内矣遂去君子曰辯女䏻以辭免詩云惟號斯言有倫有脊此之謂也頌曰辯女獨乗遇鄭使者鄭使折軸執女忿怒女陳其􅁈亦有其序鄭使慙去不敢談語阿谷䖏女阿谷䖏女者阿谷之隧浣者也孔子南逰過阿谷之隧見䖏子珮瑱而浣孔子謂子貢曰彼浣者其可與言乎抽觴以授子貢曰為之辭以􅀚其志子貢曰我北鄙之人也自北徂南􅀅􅁒之椘逢天之暑我思譚譚􅂅乞一飲以伏我心䖏子曰阿谷之隧隠曲之地其水一清一濁流入于海欲飲則飲何問乎婢子授子貢觴迎流而挹之投而棄之從流而挹之滿而溢之跪置沙上曰禮不親授子貢還報其辭孔子曰丘已知之矣抽琴去其軫以授子貢曰為之辭子貢徃曰嚮者聞子之言穆如清風不拂不窹私復我心有琴無軫􅂅借子調其音䖏子曰我鄙野之人也陋固無心五音不知安䏻調琴子貢以報孔子孔子曰丘已知之矣過賢則賔抽絺綌五両以授子貢曰為之辭子貢徃曰吾北鄙之人也自北徂南􅀅􅁒之椘有絺綌五両非敢以當子之身也􅂅注之水旁䖏子曰行客之人嗟然永久分其資財棄于野鄙妾年甚少何敢受子子不早命切有狂夫名之者矣子貢以告孔子孔子曰丘巳知之矣斯婦人逹于人情而知禮詩云南有喬木不可休息漢有逰女不可求思此之謂也頌曰孔子出逰阿谷之南異其處子􅁒觀其風子貢三反女辭辯深子曰逹情知禮不淫趙津女姢趙津女姢者趙河津之女趙蕳子之夫人也􅀄簡子南撃椘與津吏期簡子至津吏􅋨卧不䏻渡簡子􅁒殺之姢懼持檝而赱簡子曰女子走何為對曰津吏息女妾父聞主君来渡不測之水恐風波之起水神動駭故禱祠九江三淮之神供具偹禮御􅁵受福不勝玉祝杯酌餘􅅹􅋨至于此君􅁒殺之妾􅂅以鄙軀易父之死蕳子曰非女子之罪也姢曰主君欲因其􅋨而殺之妾􅂲其身之不知痛而心不知罪也若不知罪殺之是殺不辜也願醒而殺之使知其罪簡子曰善遂釋不誅簡子􅀅渡用檝者少一人姢攘􅃃操檝而請曰妾􅂅備父持檝蕳子曰不榖􅀅行選士大夫齋戒沐浴義不與婦人同舟而渡也姢對曰妾聞昔者湯伐夏左􅆖牝􅌐右驂牝靡而遂放桀武王伐殷左驂牝騏右驂牝䮲而遂克紂至于華山之陽主君不􅁒渡則已與妾同舟又何傷乎簡子恱遂與渡中流為蕳子􅀤河激之歌其辭曰升彼阿􅀆面􅀚清水􅀭波􅀆杳冥禱求福􅀆􅋨不醒誅􅀅加􅀆妾心驚罰既釋􅀆凟乃清妾持檝􅀆操其維蛟龍􅂇􅀆主将歸浮来擢􅀆行勿疑蕳子大恱曰昔者不榖夢娶妻豈此女乎􅀅使人祝祓以為夫人姢乃􅂯拜而辭曰夫婦人之禮非媒不嫁嚴親在内不敢聞命遂辭而去簡子歸乃納幣于父母而立以為夫人君子曰女姢通逹而有辭詩云来逰来歌以矢其音此之謂也頌曰趙蕳渡河津吏􅋨荒􅀅􅁒加誅女姢􅂲惶操檝進􅀃父淂不䘮維久難蔽終遂􅀤􅀭趙佛肹母趙佛肹母者趙之中牟宰佛肹之母也佛肹以中牟畔趙之法以城畔者身死家収佛肹之母􅀅論自言我死不當士長問其故母曰為我通于主君乃言不通則老婦死而已士長為之言于㐮子㐮子問其故母曰不得見主君則不言于是襄子見而問之曰不當死何也母曰妾之當死亦何也㐮子曰而子反母曰子反母何為當死㐮子曰母不䏻教子故使至于反母何為不當死也母曰吁以主君殺妾為有説也乃以母無教耶妾之職盡久矣此乃在于主君妾聞子少而慢者母之罪也長而不䏻使者父之罪也今妾之子少而不慢長又䏻使妾何􅀒㢤妾聞之子少則為子長則為友夫死従子妾䏻為君長子君自擇以為臣妾之子與在論中此君之臣非妾之子君有􅁀臣妾無􅁀子是以言妾無罪也㐮子曰善夫佛肹之反寡人之罪也遂释之君子曰佛肹之母一言而發㐮子之意使行不遷怒之徳以免其身詩云既見君子我心冩􅀆此之謂也頌曰佛肹既叛其母任理􅀅就于論自言襄子陳列母職子長在君㐮子􅀃之遂释不論齊威虞姬虞􅁎者名姢之齊威王之􅁎也威王即位九年不治委政大臣佞臣周破胡專權擅􅀔嫉賢姤䏻即􅇘大夫賢而曰毁之阿大夫不肖反曰譽之虞􅁎謂王曰破胡讒䛕之臣也不可不退齊有北郭先生者賢眀有道可置左右破胡聞之乃􅁖虞􅁎曰其㓜弱在于閭巷之時嘗與北郭先生通王疑之乃閉虞􅁎于九層之臺而使有司即窮騐問破胡賂執事者使竟其罪執事者誣其詞而上之王視其詞不合于意乃召虞􅁎而自問焉虞􅁎對曰妾姢之幸淂䝉先人之遺體生于天壌之間去􅅾廬之下侍眀王之讌昵附王著廌床蔽席供執掃除掌奉湯沐至今十餘年矣惓惓之心兾幸􅀘一言而為讒臣􅀁擠湮于百重之下不意大王乃復見與之語妾聞玉石墜泥不為汙柳下覆寒女不為􅅍積之于大雅故不見疑也􅀴􅀲田不納􅂂過李園不整冠妾不避此罪一也既䧟難中有司受賂聴用邪人䘚見覆冐不䏻自眀妾聞寡婦哭城城為之崩亡士嘆市市為之罷誠信􅀤内感動城市妾之􅁈明于白日雖䘖號于九層之内而衆人莫為毫􅁵妾之罪二也既有汙名而加此二罪義固不可以生􅀁以生者為莫白妾之汙名也且自古有之伯竒放野申生􅀍患孝順至眀反以為殘妾既當死不復重陳然􅂅戒大王羣臣為邪破胡最甚王不執政國殆危矣于是王大寤出虞􅁎􅂋之于朝市封即墨大夫以萬户烹阿大夫與周破胡遂􅁸兵収故侵地齊國震懼人知烹阿大夫不敢餙非務盡其職齊國大治君子謂虞􅁎好善詩云既見君子我心則降此之謂也頌曰齊威惰政不治九年虞􅁎譏刺反害其身􅁎列其事上指皇天威王􅁴窹䘚距強秦齊鍾離春鍾離春者齊無塩邑之女宣王之正后也其為人極醜無􅀟臼頭深目長指大莭印鼻結喉肥項少􅄠折腰出胞皮膚若􅃮年四十無􅀁容入衒嫁不售流棄莫執于是乃拂拭短􅄄自詣宣王謂謁者曰妾齊之不售女也聞君王之聖徳􅂅借後宫之埽除頓首司馬門外唯王幸許之謁者以聞宣王方置酒于漸臺左右聞之莫不掩口大笑曰此天下強顔女子也豈不異㢤于是宣王乃召見之謂曰昔者先王為寡人娶妃匹皆巳俻有列位矣今女子不容于郷里布衣而􅁒于萬乗之主亦有何竒䏻㢤鍾離春對曰無有特􅀼慕大王之美象耳王曰雖然何喜良久曰􅀼嘗喜隠宣王曰􅀮固寡人之􅀁􅂅也試一行之言未䘚忽然不見宣王大驚立􅀤􅀮書而讀之退而推之又未䏻得眀日又更召而問之不以隠對但􅀭目銜齒舉手拊􅂰曰殆㢤殆㢤如此者四宣王曰􅂅遂聞命鍾離春對曰今大王之君國也西有衡秦之患南有強椘之讐外有二國之難内聚奸臣衆人不附春秋四十壮男不立不務衆子而務衆婦尊􅀁好忽􅀁時一旦山􅁜崩弛社稷不㝎此一殆也漸臺五重黄金白玉琅玕籠䟽翡翠珠璣幕絡連餙萬民罷極此二殆也賢者匿于山林謟䛕強于左右邪偽立于本朝諫者不得通入此三殆也飲酒沉湎以夜􅁇晝女樂俳􅄖縦横大笑外不修諸侯之禮内不秉國家之治此四殆也故曰殆㢤殆㢤于是宣王喟然而嘆曰痛㢤無􅐭君之言乃今一聞于是折漸臺罷女樂退謟䛕去雕琢選兵馬實府庫四辟公門招進直言延及側陋卜擇吉日立太子進慈母拜無􅐭君為后而齊國大安者醜女之力也君子謂鍾離春正而有辭詩云既見君子我心則喜此之謂也頌曰無􅐭之女干説齊宣分别四殆􅁛國􅅍煩宣王㴀之四辟公門遂立太子拜無􅐭君齊􅀫瘤女􅀫瘤女者齊東郭採桑之女閔王之后也項有大瘤故號曰宿瘤初閔王出逰至東郭百姓盡觀宿瘤採桑如故王怪之召問曰寡人出逰車騎甚衆百姓無少長皆棄事来觀汝採桑道旁曽不一視何也對曰妾受父母教採桑不受教觀大王王曰此竒女也惜㢤􅀫瘤女曰婢妾之職屬之不二予之不忌中心謂何􅀫瘤何傷王大悅之曰此賢女也命後乗載之女曰頼大王之力父母在内使妾不受父母之教而随大王是奔女也大王又安用之王大慙曰寡人失之又曰貞女一禮不備雖死不從于是王遣㱕使使者以金百鎰徃聘迎之父母驚惶􅁒洗沐加衣裳女曰如是見王則變容更服不見識也請死不徃于是如故隨使者閔王㱕見諸夫人告曰今日出逰淂一聖女今至斥汝屬矣諸夫人皆恠之盛服而䘙遅其至也􅀫瘤駭宫中諸夫人皆掩口而􅀏左右失貌不䏻自止王大慙曰且無􅀏不餙耳夫餙與不餙固相去十百也女曰夫餙相去千萬尚不􅁕言何獨十百也王曰何以言之對曰性相近習相逺也昔者尭舜桀紂俱天子也尭舜自餙以仁義雖為天子安于節儉茅茨不剪采椽不斵後宫衣不重采食不重味至今數千歳天下歸善焉桀紂不自餙以仁義習為苛文造為髙臺深池後宫蹈綺縠弄珠玉意非有饜時也身死國亡為天下􅀏至今千餘嵗天下歸􅁖焉由是觀之餙與不餙相去千萬尚不􅁕言何獨十百也于是諸夫人皆大慙閔王大感瘤女以為后出令卑宫室填池澤損膳减樂後宫不得重采期月之間化行鄰國諸侯朝之侵三晉懼秦椘一立帝號閔王至于此也􅀫瘤女有力焉及女死之後燕遂屠齊閔王逃亡而弑死于外君子謂􅀫瘤女通而有禮詩云菁菁者莪在彼中阿既見君子樂且有儀此之謂也頌曰齊女宿癅東郭採桑閔王出逰不為變常王召與語諫辭甚眀䘚升后位名聲光榮齊􅀌逐女􅀌逐女者齊即墨之女齊相之妻也􅀄逐女􅀌無父母状甚醜三逐于郷五逐于里過時無􅀁容齊相婦死逐女造襄王之門而見謁者曰妾三逐于郷五逐于里􅀌無父母擯棄于野無􅀁容止􅂅當君王之盛顔盡其愚辭左右復于王王輟食􅄍哺而􅁸左右曰三逐于郷者不忠也五逐于里者少禮也不忠少禮之人王何為􅃍王曰子不識也夫牛鳴而馬不􅀿非不聞牛聲也異􅀋故也此人必有與人異者矣遂見與之語三日始一日曰大王知國之柱乎王曰不知逐女曰柱相國是也夫柱不正則棟不安棟不安則榱橑堕榱橑墮則屋㡬覆矣王則棟矣庶民榱橑也國家屋也夫屋堅與不堅在乎柱國家安與不安在乎相今大王既有眀哲而國相不可不審也王曰諾其一日王曰吾國相奚若對曰王之國相比目之魚也外比内比然後䏻成其事就其功王曰何謂也逐女對曰朋其左右賢其夫妻是外比内比也其三日王曰吾相其可易乎逐女對曰中才也求之未可得也如有過之者何為不可也今則未有妾聞眀王之用人也推一而用之故椘用虞丘子而得孫叔敖燕用郭隗而得樂毅大王誠䏻厲之則此可用矣王曰吾用之柰何逐女對曰昔者齊桓公尊九九之人而有道之士歸之越王敬螳蜋之怒而勇士死之葉公好龍而龍為􅁀下物之􅀁徴固不須頃王曰善遂尊相敬而事之以逐女妻之齊國以治詩云既見君子並坐鼓瑟此之謂也頌曰齊􅀌逐女造㐮王門女雖五逐王猶見焉譚國之政亦甚有文與語三日遂配相君椘䖏荘姪椘䖏荘姪者椘頃㐮王之夫人縣邑之女也􅀄頃㐮王好臺榭出入不時行年四十不立太子諌者蔽塞屈原放逐國既殆矣秦􅁒襲其􅀦乃使張儀間之使其左右謂王曰南逰于唐五百里有樂焉王􅀅徃是時荘姪年十二謂其母曰王好淫樂出入不時春秋既盛不立太子今秦又使人重賂左右以惑我王使逰五百里外以觀其􅀔王已出姦臣必倍敵國而彂謀王必不淂反國姪􅂅徃諌之其母曰汝嬰児也安知諌不遣姪乃逃以緹竿為幟姪持幟㐲南郊道旁王車至姪舉其幟王見之而止使人徃問之使者報曰有一女童伏于幟下􅂅有謁于王王曰召之姪至王曰女何為者也姪對曰妾縣邑之女也􅁒言􅀮事于王恐壅閼蔽塞而不淂見聞大王出逰五百里因以幟見王曰子何以戒寡人姪對曰大魚失水有龍無尾墙􅁒内崩而王不視王曰不知也姪對曰大魚失水者王離國五百里也樂之扵前不思禍之起于後也有龍無尾者年既四十無太子也國無弼輔必且殆也墻􅁒内崩而王不視者禍􅅍且成而王不改也王曰何謂也姪曰王好臺榭不恤衆庻出入不時耳目不聪眀春秋四十不立太子國無強輔外内崩壤強秦使人内間王左右使王不改滋曰以甚今禍且搆王逰于五百里之外王必遂徃國非王之國也王曰何也姪曰王之致此三難也以五患王曰何謂五患姪曰宫室相望城郭濶逹一患也宫垣衣繡民人無􅄄二患也奢侈無度國且虗竭三患也百姓􅏇餓馬有餘秣四患也邪臣在側賢者不逹五患也王有五患故及三難王曰善命後車載之立還反國門已閉反者已㝎王乃彂鄢郢之師以擊之僅䏻勝之乃立姪為夫人立在鄭子䄂之右為王陳莭儉爱民之事椘國復強君子謂荘姪雖違于禮而終守以正詩云北風其喈雨雪霏霏恵而好我携手同歸此之謂也頌曰椘䖏荘姪雖為女童以幟見王陳國禍凶設王三難五患累重王載以歸終䘚有功齊女徐吾齊女徐吾者齊東海上貧婦人也與鄰婦李吾之属㑹燭相従夜績徐吾最貧而燭數不属李吾與其属曰徐吾燭數不属請無與夜也徐吾曰是何言與妾以貧燭不属之故􅁸常先息常後􅎈掃陳席以待来者自與蔽薄坐常處下凡為貧燭不屬故也夫一室之中益一人燭不為暗損一人燭不為眀何爱東壁之餘光不使貧妾得䝉見哀之恩長為妾役之事使諸君常有恵施于妾不亦可乎李吾莫䏻應遂復與夜終無後言君子曰婦人以辭不見棄于隣則辭安可以已乎㢤詩云辭之輯矣民之恊矣此之謂也頌曰齊女徐吾㑹績獨貧夜託燭眀李吾絶焉徐吾自列辭語甚分䘚淂容入終􅃿後言齊太倉女齊太倉女者漢太倉令淳于公之少女也名緹萦淳于公無男有女五人孝文皇帝時淳于公有罪當刑是時􅁏刑尚在詔獄繫長安當行㑹逮公罵其女曰生子不生男緩急非有益緹縈自悲泣而随其父至長安上書曰妾父爲吏齊中皆􅁛亷􅊭今坐法當刑妾傷夫死者不可復生刑者不可復属雖􅁒改過自新其道無由也妾􅂅入身爲官婢以贖父罪使得自新書奏天子憐悲其意乃下詔曰盖聞有虞之時畫衣冠異章服以爲示而民不犯何其至治也今法有􅁏刑五而姦不止其咎安在非朕徳薄而教之不眀歟吾甚自媿夫訓道不純而愚民䧟焉詩云愷悌君子民之父母今人有過教未施而刑已加焉或􅁒改行爲善而其道無繇朕甚憐之夫刑者至㫁支體􅈓肌膚終身不息何其痛而不徳也豈􅁛爲民父母之意㢤其除􅁏刑自是之後鑿顛者髠抽脅者笞刖􅁕者鉗淳于公遂淂免焉君子謂緹縈一言􅀤聖主之意可謂得事之冝矣詩云辭之懌矣民之莫矣此之謂也頌曰緹縈訟父亦孔有識推誠上書文雅甚備小女之言乃感聖意終除􅁏刑以免父事劉向古列女傳􅃃之六終
