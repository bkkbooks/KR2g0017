front:
  text: 劉向古列女傳卷之八
  hash: sha256:bb275ba0b706f89d045bd1f447f6709b46b6af14fef58f4ba813e416d7e13a39
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_008-1a}
body:
  text: 周郊婦人周郊婦人者周大夫尹固所遇于郊之婦人也周赧王之時王子朝怙寵為亂與敬王争立敬王不得入尹固與召伯盈原伯魯附于子朝春秋魯昭二年六月晉師納王尹固與子朝奉周之典藉出奔之數日道還周郊婦人遇郊尤之曰䖏則勸人為禍行則數日而反是其過三歳乎至昭公二十九年京師果殺尹固君子謂周郊婦人悪尹氏之助亂知天道之不祐示以大期終如其言詩云取辟不逺昊天不忒此之謂也陳辯女辯女者陳國採桑之女也晉大夫觧居甫使于宋道過陳遇採桑之女止而戲之曰女為我歌我将舎汝採桑女乃為之歌曰墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣大夫又曰為我歌其二女曰墓門有梅有鶚萃止夫也不良歌以訊止訊予不顧顛倒思予大夫曰其梅則有其鶚安在女曰陳小國也攝乎大國之間因之以飢餓加之以師旅其人且亡而况鶚乎大夫乃服而释之君子謂辯女貞正而有辭柔順而有守詩云既見君子樂且有儀此之謂也聶政姊齊勇士聶政之姊也聶政母既終獨有姊在及為濮陽嚴仲子刺韓相侠累所殺者數十人恐禍及姊因自披其面抉其目自屠刎而死韓暴其尸于市購問以千金莫知為誰姊曰弟至賢爱妾之軀㓕吾之弟名非弟意也乃之韓哭聶政尸謂吏曰殺韓相者妾之弟軹深井里聶政也亦自殺于尸下晉趙椘衛聞之曰非獨聶政之勇乃其姊者烈女也君子謂聶政姊仁而有勇不去死以㓕名詩云死䘮之威兄弟孔懐言死可畏之事唯兄弟甚相懐此之謂也王孫氏母王孫氏母者齊大夫王孫賈之母也賈年十五事齊閔王國亂閔王出見弑國人不討賊王孫母謂賈曰汝朝出而晚来則吾倚門而望汝汝暮出而不還則吾倚閭而望汝今汝事王王出赱汝不知其處汝尚何歸乎王孫賈乃入市中而令百姓曰淖齒亂齊國弑閔王欲與我誅之者袒右市人従者四百人與之誅淖齒刺而殺之君子謂王孫母義而䏻教詩云教誨爾子式榖似之此之謂也陳嬰母漢棠邑侯陳嬰之母也始嬰為東陽令大居縣素信為長者秦二世之時東陽少年殺縣令相聚數千人欲立長帥未有所用乃請陳嬰嬰謝不䏻遂強立之縣中㴀之得二萬人𣣔立嬰為王嬰母曰我為子家婦聞先故不甚貴今暴淂大名不祥不如以兵有所屬事成猶得封侯敗則易以亡可無為人所指名也嬰従其言以兵屬項梁梁以為上柱國後項氏敗嬰歸漢以功封棠邑侯君子曰嬰母知天命又䏻守先故之業流祚後世謀慮深矣詩曰貽厥孫謀以燕翼子此之謂也王陵母漢丞相安國侯王陵之母也陵始為縣邑豪髙祖㣲時兄事陵及髙祖𧺫沛陵亦聚黨數千以兵屬漢王項羽與漢為敵國得陵母置軍中陵使至則東嚮坐陵母欲以招陵陵母既而私送使者泣曰為老妾語陵善事漢王漢王長者無以老妾故懐二心言妾已死也乃伏劒而死以固勉陵項羽怒烹之陵志益感終與髙祖定天下位至丞相封侯專爵五世君子謂王陵母䏻棄身立義以成其子詩云我躬不閱遑恤我後終身之仁也陵母之仁及五丗矣張湯母漢御史大夫張湯之母也湯以文法事漢孝武帝為御史大夫好勝陵人母數責怒性不䏻悛改後果為丞相嚴青翟及三長史所怨㑹趙王上書言湯罪繫廷尉丞相及三長史共致其罪遂自殺昆弟諸子𣣔厚葬之母曰湯為天子大臣𬒳悪言而死亦何厚葬載以牛車有棺而無槨天子聞之曰非此母不生此子乃盡案誅三長史丞相嚴青翟自殺君子謂張湯母䏻克已感悟時主詩云彼羙孟姜徳音不忘此之謂也雋不疑母漢京兆尹雋不疑之母也仁而善教為京兆尹行縣録囚徒還其母輒問所􅊭反母喜笑飲食言語異于他時或無所出母怒為之不食由是故不疑為吏不嚴不殘君子謂不疑母䏻以仁教詩云昊天疾威敷于下土言天道好生疾威虐之行于下土也楊夫人楊夫人者漢丞相安平侯楊敞之妻也漢昭帝崩昌邑王賀即帝位淫亂大将軍霍光與車騎将軍張安丗謀𣣔廢賀更立帝議已定使大司農田延年報敞敞驚懼不知所言汗出浃背徒曰唯唯而已延年出更衣夫人遽従東廂謂敞曰此國之大事今大将軍議已㝎使九卿来報君侯君侯不疾應與大将軍同心猶與無决先事誅矣延年従更衣還敞夫人與延年参語許諾請奉大将軍教令遂共廢昌邑王立宣帝居月餘敞薨益封三千五百户君子謂敞夫人可謂知事之機者矣詩云辰彼碩女令徳来教此之謂也霍夫人顯霍夫人顯者漢大将軍愽陸侯霍光之妻也奢淫虐害不循軌度光以忠慎受孝武皇帝遺詔輔翼少主當孝宣帝時又以立帝之功甚見尊寵人臣無二顯有小女字成君欲貴之其道無由㑹宣帝許后當産疾顯乃謂女監淳于衍曰婦人㝃乳大故十死一生今皇后當㝃身可因投薬去之使我女得為后冨貴共之衍承其言擣附子碎太醫大丸中持入遂藥弑許后事急顯以情告光光驚愕業已治衍奏因令上署勿論顯遂為成君衣𥙷治入宫具果立為后是時許后之子以正適立為太子顯怒嘔血不食曰此乃帝在民間時子安得為太子即我女有子反當為王耶復教皇后令毒殺太子皇后數召太子食保阿輒先甞之光既薨子禹嗣為愽陸侯顯改更光時所造塋而侈大之築神道為輦閤幽閉良人奴婢又治第宅作乗輿輦畫繡絪黃金塗為薦輪侍婢以五采絲輓顯逰戲又與監奴馮子都淫亂禹等縦弛日甚宣帝既聞霍氏不道又弑許后事泄顯恐怖乃謀為逆欲廢天子而立禹發覺霍氏中外皆腰斬而顯棄市后廢䖏昭臺宫詩云廢為殘賊莫知其尤言肆扵嚴延年母河南大守東海嚴延年之母也生五男皆有吏材至二千石東海號曰萬石嚴嫗延年為河南太守所在名為嚴䏻冬月傳属縣囚論府下流血數里河南號曰屠伯其母常従東海来𣣔就延年臘到洛陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母閉閤不見延年免冠頓首閤下母乃見之因責數延年曰幸偹郡守專治千里不聞仁義教化有以全安愚民顧乗刑罰多刑殺人𣣔以致威豈為民父母之意㢤延年服罪頓首謝因為御歸府舎母畢正席已謂延年曰天道神明人不可獨殺我不自意老當見壮子𬒳刑戮也行矣去汝東海掃除墓地耳遂去歸郡見昆弟宗族復為言之後歳餘為府丞所章結延年罪名十事下御史案騐遂棄延年于市東海莫不稱母賢智君子謂嚴母仁智信道詩云心之憂矣寜自今矣其嚴母之謂也漢馮昭儀漢馮昭儀者孝元帝之昭儀右将軍光禄勲馮奉丗之女也元帝二年昭儀以選入後宫始為長使數月為羙人生男是為中山孝王羙人為婕妤建昭中上幸虎圈鬪獸後宫皆従㷱逸出圈攀檻𣣔上殿左右貴人傳昭儀皆驚走而馮婕妤直當㷱而立左右格殺㷱天子問婕妤人情皆驚懼何故當㷱對曰妾聞猛獸得人而止妾恐至御坐故以身當之元帝嗟嘆以此敬重焉傳昭儀䓁皆慙眀年中山王封乃立婕妤為昭儀随王之國號中山太后君子謂昭儀勇而慕義詩云公之媚子従公于狩論語曰見義不為無勇也昭儀兼之矣王章妻女王章妻女漢京兆尹王仲卿之妻及其女也仲卿為書生學于長安獨與妻居疾病無𬒳卧牛衣中與妻訣泣涕妻呵怒曰仲卿尊貴在朝廷誰愈于仲卿者今疾病困厄不自激昻乃反涕泣何鄙也後章仕宦至京兆尹成帝舅大将軍王鳯秉政專榷章雖為鳯所舉意不肯附㑹有日食之變章上封事言鳯不可任用事成當上妻止之曰人當知足獨不念牛衣中流涕時耶章曰非女子所知書遂上天子不忍退鳯章由是為鳯所䧟事至大逆収繫下獄章有小女年十二夜號哭曰􅊭日坐獄上聞呼囚數常至九今八而止我君素剛先死者必我君也眀日問之果死妻子皆徙合浦鳯薨後成都侯王啇為大将軍閔章無罪白還其妻子財産田宅衆庶給之君子謂王章妻知卷舒之節詩云昊天巳威予慎無罪言王為威虐之政則無罪而遘咎也班婕妤班婕妤者左曹越騎班况之女漢孝成皇帝之婕妤也賢才通辨始選入後宫為少使俄而大幸為婕妤成帝逰于後庭嘗欲與婕妤同輦辭曰觀古圗画賢聖之君皆有名臣在側三代之末主乃有女嬖今𣣔同輦得無似之乎上善其言而止太后聞而喜曰古有樊姬今有班婕妤毎誦詩及窈窕徳象女師之萹必三復之毎進見上䟽依古禮自鴻嘉之後成帝稍隆于女寵婕妤進侍者李􅊭􅊭得幸立為婕妤帝曰始䘙皇后亦従㣲𧺫乃賜􅊭姓曰䘙所謂䘙婕妤也其後趙飛燕姊妹有寵驕妬譛訴婕妤云挟邪詛祝考問班婕妤曰妾聞死生有命富貴在天修正尚未䝉福為邪𣣔以何望且使鬼神有知不受不臣之訴如其無知訴之何益故弗為也上善其對而憐閔之賜黄金百斤時飛燕驕姤婕妤恐久見危求供養皇太后于長信宫上許焉婕妤退䖏東宫作賦自傷曰承祖考之遺徳兮荷性命之㳤靈登薄軀于宫闕兮充下陳于後庭䝉聖皇之渥恵兮當日月之盛眀揚光烈之翕赫兮奉隆寵于増成既過幸于非位兮竊庶㡬乎嘉時毎寤寐而累息兮申佩襍以自思陳女圗而鏡鑑兮顧女史而問詩悲晨婦之作戒兮哀褒豔之爲尤羙皇英之女舜兮榮任姒之母周雖愚陋其靡及兮敢舎心而忘兹歴年嵗而悼懼兮閔繁華之不滋痛陽禄與祐館兮仍襁褓而離災豈一人之殃咎兮将天命之不可求白日忽以移光兮遂奄莫而昧幽猶𬒳覆載之厚徳兮不廢捐于罪郵奉供養于東宫兮託長信之未流供􅎈掃于帷幄兮永終死以爲期碩歸骨于山足兮依松栢之餘休重曰潜玄宫兮幽以清應門閉兮禁闥扃華殿塵兮玉階苔中庭萋兮緑草生廣屋䕃兮帷幄暗房櫳虗兮風冷冷感帷裳兮發紅羅紛綷縩兮紈素聲神眇眇兮宻龍䖏君不御兮誰為荣俯視兮丹墀思君兮履綦仰視兮雲屋雙涕下兮横流顧左右兮和顔酌羽觴兮消憂惟人生兮一世忽一過兮若浮已獨嚮兮髙眀䖏生民兮極休勉娱精兮極樂與福禄兮無期禄衣白華自古兮有之至成帝崩婕妤充奉園陵薨因葬園中君子謂班婕妤辭同輦之言盖宣后之志也進李􅊭于同列樊姬之徳也释詛祝之譛定姜之知也求供養于東宫寡李之行也及其作賦哀而不傷歸命不怨詩云有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可諠兮其班嫥妤之謂也趙飛燕姊娣趙飛燕姊娣者成陽侯趙臨之女孝成皇帝之寵姬飛燕𥘉生父母不舉三日不死乃収養之成帝嘗㣲行出過河陽主樂作上見飛燕而悦之召入宫大幸有女弟復召入俱爲婕妤貴傾後宫乃封父臨爲成陽侯有頃立飛燕爲皇后其弟爲昭儀飛燕爲后而寵衰昭儀寵無比居昭陽舎其中廷彤朱殿上􅃮砌皆銅沓黄金塗白玉階璧徃徃爲黄金釭函藍田璧玊眀珠翠羽餙之後宫未嘗有焉姊娣専寵而悉無子嬌媚不遜嫉姤後宫帝幸許羙人有子昭儀聞之謂帝曰常紿我従中宫来今許羙人子何従生懟以手自擣以頭撃柱従床上自投地涕泣不食曰今當安置我𣣔歸爾帝曰我故語之反怒為亦不食昭儀曰陛下自如是不食謂何陛下常言約不負汝今許羙人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏之上者無憂也乃詔許氏夫人令殺所生児革篋盛緘之帝與昭儀共視復緘封以御史中丞印出埋獄垣下中宫史曹宫字偉䏻御幸生子帝復用昭儀之言勿問男女殺之宫未殺昭儀怒掖庭獄丞藉武因中黄門奏事曰陛下無繼嗣子無貴賤唯留意帝不聴時児生八九日遂取去殺之昭儀與偉䏻書及藥令自死偉䏻得書曰果欲姊娣擅天下且我児額上有壮髮似元帝今児安在巳殺之乎乃飲藥死自後御幸有子者輒死或飲藥自墮由是使成帝無嗣成帝既崩援立外藩仍不繁育君子謂趙昭儀之凶嬖與褒姒同行成帝之惑亂與周幽王同風詩云池之竭矣不云自濱泉之竭矣不云自中成帝之時舅氏擅外趙氏專内其自竭極盖亦池泉之勢也漢孝􅊭王后漢孝􅊭王后者安漢公太傅大司馬王莾之女孝􅊭皇帝之后也為人婉淑有莭行􅊭帝即位后年九歳莾秉政欲只依霍光故事以女配帝設詐以成其禮諷皇太后遣長楽少府宗正尚書令納采太師大司徒大司空以下四十人皮弁素積而告宗廟眀年春遣司徒司空左右将軍奉乗輿法駕迎皇后于安漢公第司徒授璽綬登車稱警蹕時自上林延夀門入未央前殿群臣就位行禮畢大赦天下賜公卿下至趨宰執事皆有差后立歳餘􅊭帝崩後數年莾篡漢位后年十八自劉氏廢嘗稱疾不朝㑹莾敬惮哀傷意𣣔嫁之令立國将軍孫建世子豫将醫徃問疾后大怒笞鞭旁侍御因廢疾不肯𧺫莾遂不敢強也及漢兵誅莾燔燒未央宫曰何面目以見漢家自投火中而死君子謂􅊭后體自然貞淑之行不為存亡改意可謂莭行不虧汚者矣詩曰髧彼両髦實惟我儀之死矢靡他此之謂也更始韓夫人漢更始韓夫人者更始皇帝劉聖公之夫人也佞謟邪媚嗜酒無禮𥘉王莾之末更始以新市􅊭林下江之衆𧺫自立為更始将軍兵威日盛遂自立為帝以紹漢統及申屠建討莾首詣宛更始視之曰不如此當與霍光䓁韓夫人曰不如此帝那得之其佞巧得更始意如此更始既惰于政事而韓夫人嗜酒淫色日與更始醉飽沉湎乃令侍中于幃幕之内詐為更始與群臣語群臣知非更始聲莫不怨恨尚書奏事韓夫人曰帝方對我飲樂正用是時来奏事由是綱紀不攝諸侯離叛赤眉入關不䏻制乃将妻子奉天子璽綬降于赤眉為赤眉所殺詩云彼昬不知一醉日富其更始與韓夫人之謂也梁鴻妻梁鴻妻者右扶風梁伯淳之妻同郡孟氏之女其姿貌甚醜而徳行甚修鄉里多求者而女輒不肯行年三十父母問其所𣣔對曰𣣔莭操如梁鴻者時鴻未娶扶風世家多碩妻者亦不許聞孟氏女賢遂求納之孟氏盛餙入門七日而禮不成妻跪問曰竊聞夫子髙義斥數妻妾亦巳偃蹇數夫今来而見擇請問其故鴻曰吾欲得衣裘褐之人與共遁世避時今若衣綺綉傳黛墨非鴻所碩也妻曰竊恐夫子不堪妾幸有隠居之具矣乃更麄衣椎䯻而前鴻喜曰如此者誠鴻妻也字之曰徳曜名孟光自名曰運期字俟光共遯逃覇陵山中此時王莾新敗之後也鴻與妻深隱耕耘織作以供衣食誦書弹琴忘富貴之樂後復相将至㑹稽賃舂為事雖襍庸保之中妻毎進食舉案齊眉不敢正視以禮修身所在敬而慕之君子謂梁鴻妻好道安貧不汲汲于榮樂論語曰不義而富且貴扵我如浮雲此之謂也眀徳馬后眀徳馬后者漢眀帝之后伏波将軍新息忠成侯馬援之女也少有岐嶷之性年十三以選入太子家接待同列以承至尊先人後已彂于至誠由此見寵時及政事后推心以對無不當理意有所未安則眀陳其故是時後宫未有妊育者常言繼嗣當時而立廌逹左右如恐弗及其後宫有進見者輒奉養慰納之其寵益進者與之愈隆是時宫中尚無人事皆自爲舞衣袿裁成手皆瘃裂終未嘗與侍御者私語防僮御襍繒或因有所訢恐萬分見于顔色故預絶其漸其慎㣲如是永􅊭三年有司奏立長秋官以率八妾上未有所言皇太后曰馬貴人徳冠後宫即其人也遂登后位身衣大練御者秃裙不縁率皆羗胡倭越未嘗請舊人僮使諸王親家朝請望見后𫀆極麄䟽反以為綺就視乃笑后曰此繒染色好故用之耳老人知者無不嗟息性不喜出入㳺觀未嘗臨御忩又不好音樂上時幸苑囿離宫以故希従輒戒言不冝晨𧺫及禽因陳風邪霧露之戒辭意甚備上納焉誦易經習詩論春秋略說大義讀椘辭不竟賦誦過耳疾浮華聴言觀論輙擿發其要讀光武皇帝本紀至扵獻千里馬寳劒者上以馬駕鼓車劒賜騎士手不持珠玉后未嘗不嘆息時有椘獄因證相引繋者甚多后恐有卑詞妄相覆冐承間為上言之惻然感動于是上衣夜起彷徨思論所納非臣下得聞后志在克巳輔佐不以私家干朝廷兄為虎賁中郎弟黄門侍郎訖永􅊭世不遷當眀帝體不安召黄門侍郎防奉参醫薬夙夜勤勞及帝崩后作起居注省去防参醫藥事公卿諸侯上書言冝遵舊典封舅氏太后詔曰外戚横恣為丗所傳永􅊭中常自簡練知舅氏不可恣不令在樞機之位今水旱連年民流滿道至有飢餓而施封拜失宜不可且先帝言諸王財今半椘淮陽王吾子不當與先武帝子䓁今柰何欲以馬氏比隂氏乎吾自束脩異𣣔上不負先帝下不虧先人之徳身服大練縑裙食不求所丼左右旁人皆無香薫之餙但布帛耳如是者𣣔身帥衆也以為外親見之當傷心自克但反共言太后素自喜儉前過濯龍門上見外家問起居車如流水馬如㳺龍蒼頭衣緑褠領䄂正白顧視旁御者逺不及也亦不譴怒但絶其歳用兾以黙止讙耳知臣莫若君况親屬乎人之所以𣣔封侯者𣣔以禄食飬其親奉脩祭祀身温飽祭祀則受大官之牲郡國既珍司農黍稷身則衣御府之餘繒尚未足耶必當得一縣上令長楽宫有負言之責内亦不愧于世俗乎先是時城門越騎校尉治母䘮起墳㣲大後大后以為言惶懼即時削减成墳上下相承俱奉法度王主諸家莫敢犯禁廣􅊭鉅鹿樂成王入問起居見車騎鞍勒皆純黒無金銀采餙馬不踰六尺章帝縁太后意白賜錢五百萬新􅊭主衣紺縞直領讁以不得厚賜于是親戚𬒳服如一教化不嚴而從以躬親率先之故也置織室蚕室濯龍中后親徃来占視于内以為娱楽教諸小王試其誦論衎衎和樂日夕論道以終厥身其視養章帝過所生章帝奉之竭盡孝道君子謂徳后在家則可為衆女師範在國則可為母后表儀詩云惟此恵君民人所瞻秉心宣猷考慎其相此之謂也梁夫人媳梁夫人媳者梁竦之女樊調之妻漢孝和皇帝之姨恭懐皇后之同産姊也𥘉恭懐后以選入掖庭進御于孝章皇帝有寵生和帝立為太子竇后母養焉和帝之生梁氏喜相慶賀聞竇后竇后驕恣欲專恣害外家乃誣䧟梁氏時竦在本郡安㝎詔書収殺之家屬移九真後和帝立竇后崩諸竇以罪悪誅放媳従民間上書自訟曰妾同産女弟貴人前充後宫䝉先帝厚㤙得見龍乘皇天授命育生眀聖托體陛下為竇憲兄弟所譛訴而破亡父竦冤死年獄體骨不掩耳今老母孤弟逺徙萬里獨妾脫身竄伏草野嘗恐殁命無由自逹今遭陛下神聖之徳攬統萬里憲兄弟奸悪伏誅海内黯然各得其所妾幸蘇息我目更視敢昧死自陳父既湮沒不可復生母垂年七十弟棠䓁逺在絶域不知死生碩乞母弟還本郡收葬竦枯骨妾聞文帝即位薄氏䝉逹宣弟紀統史氏復興妾自悲既有薄史之親獨不得䝉外戚餘㤙章䟽上天子感悟使中常侍掖庭令襍訊問知事眀審引見應對上泣涕賞賜義姊媳既羙有節行又首追比事上甚善之稱梁夫人擢媳夫樊調為郎中遷羽林郎将恭懐后䘮乃改殯于承光宫葬為陵追謚竦為褒親愍侯徴還母及弟䓁及既到乃封侯食邑三千户君子謂梁夫人以哀辭發家開悟時主榮父之媿還母萬里為家門興三國之祚使天子成母子之禮詩云世之不顯厥猶翼翼思皇多士生此王國此之謂也劉向古列女傳卷之八終
