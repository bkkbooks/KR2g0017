front:
  text: 劉向古列女傳卷之五莭義傳
  hash: sha256:e31f1a6c24c4cf2c4df486d5a3bb6017c33beb2c51d7f59e1a52c32c956e4a91
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_005-1a}
body:
  text: 魯孝義保孝義保者魯孝公稱之保母臧氏之寡也𥘉孝公父武公與其二子長子括中子戲朝周宣王宣王立戲為魯太子武公薨戲立是為懿公孝公時號公子稱最少義保與其子俱入宫養公子稱括之子伯御與魯人作亂攻殺懿公而自立求公子稱于宫将殺之義保聞伯御将殺稱乃衣其子以稱之衣卧于稱之䖏伯御殺之義保遂抱稱以出遇稱舅魯大夫于外舅問稱死乎義保曰不死在此舅曰何以得免義保曰以吾子代之義保遂以逃十一年魯大夫皆知稱之在保于是請周天子殺伯御立稱是為孝公魯人髙之論語曰可以託六尺之孤其義保之謂也頌曰伯御作亂由魯宫𧺫孝公乳保臧氏之母逃匿孝公易以其子保母若斯亦誠足恃椘成鄭瞀鄭瞀者鄭女之嬴媵椘成王之夫人也𥘉成王登臺臨後宫宫人皆傾觀子瞀直行不顧徐歩不變王曰行者顧子瞀不顧王曰顧吾以女為夫人子瞀復不顧王曰顧吾又與女千金而封若父兄子瞀遂不顧于是王下臺而問曰夫人重位也封爵厚禄也一顧可以得之可得而遂不顧何也子瞀曰妾聞婦人以端正和顔為容今者大王在臺上而妾顧則是失儀莭也不顧告以夫人之尊示以封爵之重而後顧則是妾貪貴樂利以忘義理也苟忘義理何以事王王曰善遂立以為夫人䖏期年王将立公子啇臣以為太子王問之于令尹子上子上曰君之齒未也而又多寵子既置而黜之必為亂矣且其人蠭目而豺聲忍人也不可立也王退而問于夫人子瞀曰令尹之言信可従也王不聴遂立之其後啇臣以子上救蔡之事譛子上而殺之子瞀謂其保曰吾聞婦人之事在于饋食之間而巳雖然心之所見吾不䏻蔵夫昔者子上言太子之不可立也太子怨之譛而殺之王不眀察遂辜無罪是白黒顛倒上下錯􅍝也王多寵子皆𣣔得國太子貪忍恐失其所王又不眀無以照之庶嫡分争禍必興焉後王又𣣔立公子職職啇臣庶弟也子瞀退而與其保言曰吾聞信不見疑今者王必将以職易太子吾懼禍亂之作也而言之于王王不應其以太子為非吾子疑吾譛之者乎夫見疑而生衆人孰知其不然與其無義而生不如死以眀之且王聞吾死必寤太子之不可釋也遂自殺保毋以其言通于王是時太子知王之𣣔廢之也遂興師作亂圍王宫王請食㷱蟠而死不可得也遂自經君子曰非至仁孰䏻以身試詩曰舎命不渝此之謂也頌曰子瞀先識執莭有常興于不顧䘚配成王知啇臣亂言之甚強自嫌非子以殺身盟晉圉懐嬴懐嬴者秦穆公之女晉恵公太子之妃也圉質于秦穆公以嬴妻之六秊圉将逃㱕謂嬴氏曰吾去國數年子父之接忘而秦晉之友不加親也夫鳥飛反鄉狐死首丘我其首晉而死子其與我行乎嬴氏對曰子晉太子也辱于秦子之𣣔去不亦宜乎雖然寡君使婢子侍執巾􅌨以固子也今吾不足以結子是吾不肖也從子而歸是棄君也言子之謀是負妻之義也三者無一可行雖吾不從子也子行矣吾不敢泄言亦不敢從也子圉遂逃歸君子謂懐嬴善䖏夫婦之間頌曰晉圉質秦配以懐嬴圉将與逃嬴不肯聴亦不泄言操心甚平不告所從無所阿傾椘昭越姬椘昭越姬者越王勾踐之女椘昭王之姬也昭王燕遊蔡姬在左越姬参右王親乗駟以馳逐遂登附社之臺以望雲夣之囿觀士大夫逐者既驩乃頋謂二姬曰樂乎蔡姬對曰樂王曰吾碩與子生若此死又若此蔡姬曰昔敝邑寡君固以衆黎民之役事君王之馬足故一婢子之身爲苞苴玩好今乃比于妃嬪固碩生俱樂死同時王頋謂史書之蔡姬許従孤死矣乃復謂越姬越姬對曰樂則樂矣然而不可久也王曰吾碩與子生若此死若此其不可得乎越姬對曰昔者吾先君荘王淫樂三年不聴政事終而䏻改䘚霸天下妾以君王為䏻法吾先君将改斯樂而勤於政也今則不然而要婢子以死其可得乎且君王以束帛乗馬取婢子于弊邑寡君受之太廟也不約死妾聞之諸姑婦人以死彰君之善益君之寵不聞其以苟従其闇死為榮妾不敢聞命于是王寤敬越姬之言而猶親嬖蔡姬也居二十五年王救陳越姬従王病在軍中有赤雲夹日如飛鳥王問周史史曰是害王身然可移移于将相将相聞之将請以身禱于神王曰将相之扵孤猶股肱也今移禍焉庸為去是身乎不聽越姬曰大哉君王之徳以是妾碩従王矣昔日之逰燕樂也是以不敢許及君王復于禮國人皆将為君王死而况于妾乎請碩先驅狐狸于地下王曰昔之逰樂吾戲耳若将必死是彰孤之不徳也越姬曰昔者妾雖口不言心既許之矣妾聞信者不負其心義者不虗設其事妾死王之義不死王之好也遂自殺王病甚讓位于三弟三弟不聴王薨于軍中蔡姬竟不䏻死王弟子閭與子西子期謀曰母信者其子必仁乃伏師閉壁迎越姬之子㷱章立是為恵王然後罷兵歸葬昭王君子謂越姬信䏻死義詩曰徳音莫違及爾同死越姬之謂也頌曰椘昭逰樂要姬従死蔡姬許王越姬執禮終獨死莭群臣嘉美維斯両姬其徳不比盖将之妻盖之偏将丘子之妻也戎伐盖殺其君令于盖群臣曰敢有自殺者妻子盡誅丘子自殺人救之不淂死既歸其妻謂之曰吾聞将節勇而不果生故士民盡力而不畏死是以戦勝攻取故䏻存國安君夫戦而忘勇非孝也君亡不死非忠也今軍敗君死子獨可生忠孝忘于身何忍以歸丘子曰盖小戎大吾力畢䏻盡君不幸而死吾固自殺也以救故不淂死其妻曰曩日有救今又何也丘子曰吾非爱身也戎令曰自殺者誅及妻子是以不死死又何益于君其妻曰吾聞之主憂臣辱主辱臣死今君死而子不死可謂義乎多殺士民不䏻存國而自活可謂仁乎憂妻子而忘仁義背故君而事強暴可謂忠乎人無忠臣之道仁義之行可謂賢乎周書曰先君而後臣先父母而後兄弟先兄弟而後交友先交友而後妻子妻子私愛也事君公義也今子以妻子之故失人臣之節無事君之禮棄忠臣之公道營妻子之私愛偷生茍活妾䓁恥之况于子乎吾不䏻與子䝉恥而生焉遂自殺戎君賢之祠以大牢而以将禮葬之賜其弟金百鎰以為卿而使别治盖君子謂盖将之妻㓗而好義詩曰淑人君子其徳不囘此之謂也頌曰盖将之妻據莭銳情戎既㓕盖丘子獨生妻恥不死陳設五榮爲夫先死䘚遺顯名魯義姑姊魯義姑姊者魯野之婦人也齊攻魯至郊望見一婦人抱一児携一児而行軍且及之棄其所抱抱其所携而走山児隨而啼婦人遂行不顧齊将問児曰走者爾母耶曰是也母所抱者誰也曰不知也齊将乃追之軍士引弓将射之曰止不止吾将射爾婦人乃還齊将問所抱者誰也所棄者誰也對曰所抱者妾兄之子也所棄者妾之子也見軍之至力不䏻両護故棄妾之子齊将曰子之于母其親爱也痛甚于心今释之而反抱兄之子何也婦人曰已之子私爱也兄之子公義也夫背公義而嚮私爱亡兄子而存妾子幸而得幸則魯君不吾畜大夫不吾養庶民國人不吾與也夫如是則脅肩無所容而累足無所履也子雖痛乎獨謂義何故忍棄子而行義不䏻無義而視魯國于是齊将按兵而止使人言于齊君曰魯未可伐也乃至于境山澤之婦人耳猶知持莭行義不以私害公而况于朝臣士大夫乎請還齊君許之魯君聞之賜婦人束帛百端號曰義姑姊公正誠信果于行義夫義其大㢤雖在匹婦國猶頼之兄以禮義治國乎詩云有覺徳行四國順之此之謂也頌曰齊君攻魯義姑有莭見軍走山棄子抱姪齊将問之賢其推理號婦為義齊兵遂止代趙夫人代趙夫人者趙簡子之女襄子之姊代王之夫人也簡子既葬襄子未除服馳登夏屋誘代王使厨人持斗以食代王及従者行斟隂令宰人各以一斗撃殺代王及従者因舉兵􅊭代地而迎其姊趙夫人夫人曰吾受先君之命事代王今十有餘年矣代無大故而主君殘之今代巳亡吾将奚歸且吾聞之婦人執義無二夫吾豈有二夫㢤𣣔迎我何之以弟慢夫非義也以夫怨弟非仁也吾不敢怨然亦不歸遂泣而呼天自殺于磨笄之地代人皆懐之君子謂趙夫人善䖏夫婦之間詩云不僣不賊鮮不為則此之謂也頌曰惟趙襄子代夫人弟􅊞㓕代王迎取其姊姊引義理稱説節禮不歸不怨遂㽞野死齊義继母齊義继母者齊二子之母也當宣王時有人闘死于道者吏訊之𬒳一創二子兄弟立其傍吏問之兄曰我殺之弟曰非兄也乃我殺之期年吏不䏻决言之于相相不䏻决言之于王王曰今皆赦之是縦有罪也皆殺之是誅無辜也寡人度其母䏻知子善悪試問其母聴其所𣣔殺活相召其母問之曰母之子殺人兄弟欲相代死吏不䏻决言之于王王有仁恵故問母何所𣣔殺活其母泣而對曰殺其少者相受其言因而問之曰夫少子者人之所爱也今𣣔殺之何也其母對曰少者妾之子也長者前妻之子也其父疾且死之時屬之于妾曰善飬視之妾曰諾今既受人之託許人以諾豈可以忌人之託而不信其諾耶且殺兄活弟是以私爱廢公義也背言忌信是欺死者也夫言不約束已諾不分何以居于世㢤子雖痛乎獨謂行何泣下沾襟相入言于王王美其義髙其行皆赦不殺而尊其母號曰義母君子謂義母信而好義㓗而有讓詩曰愷悌君子四方爲則此之謂也頌曰義繼信誠公正知禮親假有罪相讓不巳吏不䏻决王以問母據信行義䘚免二子魯秋潔婦㓗婦者魯秋胡子妻也既納之五日去而官于陳五年乃㱕未至家見路傍婦人採桑秋胡子恱之下車謂曰若曝採桑吾行道逺碩託桑䕃下飡下齎休焉婦人採桑不輟秋胡子謂曰力田不如逄豊年力桑不如見國卿吾有金碩以與夫人婦人曰嘻夫採桑力作紡績織絍以供衣食奉二親飬夫子吾不碩金所碩卿無有外意妾亦無淫佚之志収子之齎與笥金秋胡子遂去至家奉金遺母使人喚婦至乃向採桑者也秋胡子慙婦曰子束髮辭親徃仕五年乃還當所悅馳驟揚塵疾至今也乃悦路傍婦人下子之糧以金予之是忘母也忘母不孝好色淫佚是汚行也汚行不義夫事親不孝則事君不忠䖏家不義則治官不理孝義並忘必不遂矣妾不忍見子改娶矣妾亦不嫁遂去而東赱投河而死君子曰潔婦精于善夫不孝莫大于不爱其親而愛其人秋胡子有之矣君子曰見善如不及見不善如探湯秋胡子婦之謂也詩云惟是𥚹心是以爲刺此之謂也頌曰秋胡西仕五年乃歸遇妻不識心有淫思妻執無二㱕而相知恥夫無義遂東赴河周主忠妾周主忠妾者周大夫妻之媵妾也大夫號主父自衞仕于周二年且㱕其妻淫于鄰人恐主父覺其淫者憂之妻曰無憂也吾為毒酒封以待之矣三日主父至其妻曰吾為子勞封酒相待使媵婢取酒而進之媵婢心知其毒酒也計念進之則殺主父不義言之又殺主母不忠猶豫因陽僵覆酒主大怒而笞之既已妻恐媵婢言之因以他過笞𣣔殺之媵知将死終不言主父弟聞其事具以告主父主父驚乃免媵婢而笞殺其妻使人隂問媵婢曰汝知其事何以不言而反㡬死乎媵婢曰殺主以自生又有辱主之名吾死則死耳豈言之㢤主父髙其義貴其意将納以為妻媵婢辭曰主辱而死而妾獨生是無禮也代主之䖏是逆禮也無禮逆禮有一猶愈今盡有之難以生矣𣣔自殺主聞之乃厚幣而嫁之四鄰爭娶之君子謂忠妾為仁厚夫名無細而不聞行無隠而不彰詩云無言不醻無徳不報此之謂也頌曰周主忠妾慈恵有序主妻淫僻藥酒毒主使妾奉進僵以除賊忠全其主終䝉其福魏莭乳母魏莭乳母者魏公子之乳母秦攻魏破之殺魏主瑕誅諸公子而一公子不得令魏國曰得公子者賜金千鎰匿之者罪至夷莭乳母與公子俱逃魏之故臣見乳母而識之曰乳母無恙乎乳母曰嗟乎吾柰公子何故臣曰今公子安在吾聞秦令者有䏻得公子者賜金千鎰匿之者罪至夷乳母儻言之則可以得千金知而不言則昆弟無類矣乳母曰吁我不知公子之䖏故臣曰我聞公子與乳母俱逃母曰吾雖知之亦終不可以言故臣曰今魏國亦破亡族已㓕子匿之尚誰為乎母吁而言曰夫見利而反上者逆也畏死而棄義者亂也今持逆亂而以求利吾不為之且夫凡為人養子者務生之非為殺之也豈可利嘗畏誅之故廢正義而行逆節㢤妾不䏻生而令公子擒也遂抱公子逃于深澤之中故臣以告秦軍秦軍追見争射之乳母以身為公子蔽矢著身者數十與公子俱死秦王聞之貴其守忠死義乃以卿禮葬之祠以大牢寵其兄為五大夫賜金百鎰君子謂莭乳母慈恵敦厚重義輕財禮為孺子室于宫擇諸母及阿者必求其寛仁慈恵温良恭敬慎而寡言者使為子師次為慈母次為保母皆居子室以飬全之他人無事不得徃夫慈故䏻爱乳狗搏人伏鷄搏狸恩出于中心也詩云行有死人尚或墐之此之謂也頌曰秦既㓕魏購其子孫公子乳母與俱遁逃守莭執事不為利違遂死不顧名號顯遺梁節姑姊梁節姑姊者梁之婦人也因失火兄子與其巳子在大中欲取兄子輙得其子獨不得兄子火盛不得復入婦人将自趣火其人止之曰子本𣣔取兄之子惶恐䘚悮得爾子中心謂何何至自赴火婦人曰梁國豈可户告人曉也𬒳不義之名何面目以見兄弟國人㢤吾𣣔復投吾子為失母之恩吾勢不可以生遂赴火而死君子謂節姑姊㓗而不汚詩曰彼其之子舎命不渝此之謂也頌曰梁節姑姊㩀義執理子姪同内火大發𧺫𣣔出其姪輒得厥子火盛自投眀不私巳珠崖二義二義者珠崖令之後妻及前妻之女也女名𥘉年十三珠崖多珠繼母連大珠以為繋臂及令死當送䘮法内珠入于關者死継母棄其繋臂珠其子男年九歳好而取之置之母鏡奩中皆莫之知遂奉䘮歸至海關關候士吏捜索淂珠十枚于繼母鏡奩中吏曰嘻此值法無可柰何誰當坐者𥘉在左右顧心恐母云置鏡奩中乃曰𥘉當坐之吏曰其状何如對曰君不幸夫人觧繋臂棄之𥘉心惜之取而置夫人鏡奩中夫人不知也繼母聞之遽􅍚行問𥘉𥘉曰夫人所棄珠𥘉復取之置夫人奩中𥘉當坐之母意亦以𥘉為實然憐之乃因謂吏曰碩且待幸無劾児児誠不知也此珠妾之繋臂也君不幸妾觧去之而置奩中迫奉䘮道逺與弱小俱忽然忘之妾當坐之𥘉固曰實初取之繼母又曰児但譲耳實妾取之因涕泣不䏻自禁女亦曰夫人哀初之孤欲強活初身夫人實不知也又因哭泣泣下交頸送葬者盡哭哀慟傍人莫不為酸鼻揮涕關吏執筆書劾不䏻就一字關候垂泣終日不䏻忍决乃曰母子有義如此吾寕坐之不忍加文且又相譲安知孰是遂棄珠而遣之既去後乃知男獨取之也君子謂二義慈孝論語曰父為子隠子為父隠直在其中矣若繼母與假女推讓争死哀感傍人可謂直耳頌曰珠崖夫人甚有母恩假繼相讓維女亦賢納珠于關各有伏愆二義如此為丗所傳邰陽友姊友娣者邰陽邑任延夀之妻也字季児有三子季児兄季宗與延夀争葬父事延夀與其友田建隂殺季宗建獨坐死夀㑹赦乃以告季児季児曰嘻獨今乃語我乎遂振衣𣣔去問曰所與共殺吾兄者為誰延夀曰田建田建已死獨我當坐之汝殺我而巳季児曰殺夫不義事兄之讐亦不義延夀曰吾不敢㽞汝碩以車馬及家中財物盡以送汝聴汝所之季児曰吾當安之兄死而讐不執與子同枕席而使殺吾兄内不䏻和夫家又縦兄之讐何面目以生而戴天復地乎延夀慙而去不敢見季児季児乃告其大女曰汝父殺吾兄義不可以㽞又終不復嫁矣吾去汝而死善視汝両弟遂以身自經而死馮翊王讓聞之大其義令縣復其三子而表其墓君子謂友姊善復兄讐詩曰不僣不賊鮮不爲則季児可以爲則矣頌曰季児樹義夫殺其兄欲復兄讐義不可行不留不去遂以自殃馮翊表墓嘉其義明京師節女京師節女者長安大昌里人之妻也其夫有讐人𣣔報其夫而無道徑聞其妻之仁孝有義乃刼其妻之父使要其女為中譎父呼其女告之女計念不聴之則殺父不孝聴之則殺夫不義不孝不義雖生不可以行于世𣣔以身當之乃且許諾曰旦日在楼上新沐東首卧則是矣妾請開户牖待之還其家乃告其夫使卧他所因自沐居楼上東首開户牖而卧夜半讐家果至㫁頭持去眀而視之乃其妻之頭也讐人哀痛之以為有義遂释不殺其夫君子謂節女仁孝厚扵㤙義也夫重仁義輕死亡行之髙者也論語曰君子殺身以成仁無求生以害仁此之謂也頌曰京師莭女夫讐刼父要女問之不敢不許期處既成乃易其所殺身成仁義冠天下
