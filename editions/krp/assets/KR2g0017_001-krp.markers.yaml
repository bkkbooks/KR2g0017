  - {type: variant, offset: 2841, length: 758, content: 鄒孟軻母鄒孟軻之母也號孟母其舎近墓孟子之少也嬉逰爲墓間之事踴躍築埋孟母曰此非吾所以居䖏子乃去舎市傍其嬉戲爲賈人衒賣之事孟母又曰此非吾所以居䖏子也復徙舎學宫之傍其嬉逰乃設爼豆揖譲進退孟母曰真可以居吾子矣遂居之及孟子長學六藝䘚成大儒之名君子謂孟母善以漸化詩云彼姝者子何以予之此之謂也自孟子之少也既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀㫁其織孟子懼而問其故孟母曰子之廢學若吾㫁斯織也夫君子學以立名問則廣知是以居則安寕動則逺害今而廢之是不免于厮役而無以離于禍患也何以異于織績而食中道廢而不爲寕䏻衣其夫子而長不乏糧食㢤女則廢其所食男則墮于脩徳不爲竊盗則爲虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知爲人母之道矣詩云彼姝者子何以告之此之謂也孟子既娶将入私室其婦袒而在内孟子不恱遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊墮在室而夫子見妾勃然不恱是客妾也婦人之義盖不客宿請歸父母于是孟母召孟子而謂之曰夫禮将入門問孰存所以致敬也将上堂聲必揚所以戒人也将入户視必下恐見人過也今子不察扵禮而責禮扵人不亦逺乎孟子謝遂㽞其婦君子謂孟母知禮而眀扵姑母之道孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敏異日閒居擁楹而歎孟母見之曰鄉見子有憂色曰不也今擁楹而歎何也孟子對曰軻聞之君子稱身就位不為苟得而受賞不貪榮禄諸侯不聴則不逹其上聴而不用則不踐其朝今道不用扵齊碩行而母老是以憂也孟母曰夫婦人之禮精五飰羃酒漿養舅姑縫衣裳而已矣故有闥内之修而無境外之志易曰在中饋無攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三従之道也故年少則従乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒匪教此之謂也頌曰孟子之母教化列分䖏子擇藝使従大倫子學不進㫁機示焉子遂成徳為當世冠, WYG: ''}
