  - {type: variant, offset: 5323, length: 1, content: 徳, WYG: 德鄒孟軻母鄒孟軻之母也號孟母其舍近墓孟子之少也嬉逰為墓間之事踴躍築埋孟母曰此非吾所以居處子乃去舎市傍其嬉戱為賈人衒賣之事孟母又曰此非吾所以居處子也復徙舎學宫之旁其嬉逰乃設俎豆揖譲進退孟母曰真可以居吾子矣遂居及孟子長學六藝卒成大儒之名君子謂孟母善以漸化詩云彼姝者子何以予之此之謂也孟子之少也既學而歸孟母方績問曰學所至矣孟子曰自若也孟母以刀斷其織孟子懼而問其故孟母曰子之廢學若吾㫁斯織也夫君子學以立名問則廣知是以居則安寧動則逺害今而廢之是不免於厮役而無以離於禍患也何以異於織績而食中道廢而不為寧能衣其夫子而長不乏粮食哉女則廢其所食男則墮於修德不為竊盗則為虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知為人母之道矣詩云彼姝者子何以告之此之謂也孟子既娶将入私室其婦􅃝而在内孟子不悅遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊惰在室而夫子見妾勃然不恱是客妾也婦人之義盖不客宿請歸父母於是孟母召孟子而謂之曰夫禮将入門問孰存所以致敬也将上堂聲必揚所以戒人也将入户視必下恐見人過也今子不察於禮而責禮於人不亦逺乎孟子謝遂留其婦君子謂孟母知禮而眀於姑母之道孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敢異日閒居擁楹而嘆孟母見之曰鄉見子有憂色曰不也今擁楹而嘆何也孟子對曰軻聞之君子稱身而就位不為茍得而受賞不貪榮禄諸侯不聽則不達其土聽而不用則不踐其朝今道不用於齊願行而母老是以憂也孟母曰夫婦人之禮精五飰羃酒漿養舅姑縫衣裳而巳矣故有閨内之修而無境外之志易曰在中饋无攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三從之道也故年少則從乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒伊教此之謂也頌曰孟子之母教化列分處子擇藝使從大倫子學不進斷機示焉子遂成德為當世冠}
