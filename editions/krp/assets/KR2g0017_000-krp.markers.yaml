  - {type: variant, offset: 285, length: 0, content: '', WYG: 夏桀末喜殷紂妲巳周幽襃姒衛宣公姜魯桓文姜魯荘哀姜晉獻驪姬魯宣穆姜陳女夏姬齊靈聲姬齊東郭姬衛二亂女趙靈吳女楚考李后趙悼倡女巻八續列女傳周郊婦人續仁智第十二陳國辯女續辯通第七聶政之姊續節義第十三王孫氏母續節義第十四陳嬰之母續賢明第十六王陵之母續節義第十九張湯之母續仁智第十八雋不疑母續母儀第十七漢楊夫人續賢明第十八漢霍夫人綺孽嬖第十七嚴延年母續仁智第十七漢馮昭儀續節義第十八右十二傳漢成帝前人而無頌王章妻女續仁智第十九班女媫妤續辯通第十七漢趙飛燕續孽嬖第四孝平王后續貞順第十一更始夫人續孽嬖第十八梁鴻之妻續賢明第十七明德馬后續母儀第七梁夫人嬺續辯通第十八右三傳成帝同時人五傳後時人而皆班氏前人或同時人並無頌崇文總目序右列女傳劉向撰後漢班氏注按向作列女傳八篇一曰母儀二曰賢明三曰仁智四曰貞順五曰節義六曰辯通七曰孽嬖八曰傳頌}
