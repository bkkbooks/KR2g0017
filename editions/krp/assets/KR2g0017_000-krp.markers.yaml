  - {type: variant, offset: 6, length: 0, content: '', WYG: 序劉向列女傳宋嘉定間閩中所刋圖書並列殆古遺製大内有顧愷之女史箴圖旁書箴文即董其昌所刻入鴻堂帖者不知蘇子容所見列女傳畫為墨跡耶抑刻本也乾隆甲子秋九月欽定四庫全書史部七古列女傳傳記𩔖三總錄之屬提要臣等謹案古列女傳七巻續一巻列女傳漢劉向撰向字子政本名更生楚元王之後以父任為輦郎厯中壘校尉事蹟具漢書本傳漢書藝文志儒家𩔖傳向所序六十七篇注曰新序説苑世説列女傳頌圖也隋書經籍志雜傳𩔖載列女傳十五巻註曰劉向撰曹大家注其書屡經傳寫至宋代已非復古本故曽鞏序錄稱曹大家所注離其七篇為十四與頌義凡十五篇而益以陳嬰毋及東漢以來凡十六事非向本書然也嘉祐中集賢校理蘇頌始以頌義篇次復定其書為八篇與十五篇者並藏於館閣是鞏校錄時已有二本也又王回序曰此書有母儀賢明仁智貞節慎義辨通嬖孽等目而各頌其義圖其狀總為卒篇傳如太史公記頌如詩之四言而圖為屏風然世所行向書乃分傳毎篇上下併頌為十五巻其十二巻無頌三傳同時人五傳其後人通題曰向撰題其頌曰向子歆撰與漢史不合故崇文總目以陳嬰母等十六傳為後人所附予以頌考之毎篇皆十五傳耳則凡無頌者宜皆非向所奏書不特自陳嬰母為斷也向所序書多散亡獨此幸存而復為他手所亂故併錄其目而以頌證之刪為八篇號古列女傳餘十二傳其文亦奥雅可喜故又以時次之别為一篇號續列女傳又稱直秘閣吕縉叔集賢校理蘓子容象山令林次中各言嘗見母儀賢明四傳於江南人家其書為古佩服而各題其頌像側是回所見一本所聞一本所刪定又一本也錢曽讀書敏求記曰此本始於有虞二妃至趙悼后號古列女傳周郊婦人至東漢梁嬺等以時次之别為一篇號續列女傳頌義大序列於目錄前}
