  - {type: variant, offset: 8, length: 0, content: '', WYG: 七篇散見目錄中間頌見各人傳後而傳各有圖巻首標題晉大司馬參軍顧愷之圖畫蘓子容嘗見江南人家舊本其畫為古佩服各題其頌像側者與此恰相符合定為古本無疑云云此本即曽家舊物題識印記並存騐其板式紙色確為宋槧誠希覯之珍笈惟蘇頌等所見江南本在王回刪定以前而此本八篇之數與回本合古列女傳續列女傳之目亦與回本合即嘉祐八年回所重編之本曽據以為江南舊本則稍失之耳其頌本向所作曽鞏及回所言不誤而晁公武讀書志乃執隋志之文詆其誤信顔籀之註不知漢志舊註凡稱師古曰者乃籀註其不題姓氏者皆班固之自註以頌圖屬向乃固説非籀説也考顔氏家訓稱列女傳劉向所造其子歆又作頌是訛傳頌為歆作始於六朝修隋志時去之推僅四五十年襲其誤耳豈可遽以駁漢書乎續傳一巻曽鞏以為班眧作其説無證特以意為之晁公武竟以為項原作舛謬彌甚隋志載項原列女後傳十巻非一巻也必牽引旁文曲相符㑹則隋志又有趙母註列女傳七巻髙氏列女傳八巻皇甫謐列女傳六巻綦母䆳列女傳七巻又有曹植列女傳頌一巻繆襲列女讃一巻將續傳亦可牽為趙母等頌亦可牽為曹植等矣又豈止劉歆班昭項原乎今前七巻及頌題向名續傳一巻則不署撰人庶㡬核其實而闕所疑焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書古列女傳目録巻一}
