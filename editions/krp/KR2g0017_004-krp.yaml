front:
  text: 劉向古列女傳卷之四
  hash: sha256:f17fb77a39cb481a44dc6e31cfcec943e5cc5fb17e0320133d8a3668786d1616
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_004-1a}
body:
  text: 貞順傳召南申女召南申女者申人之女也既許嫁于鄷夫家禮不備而𣣔迎之女與其人言以為夫婦者人倫之始也不可不正傳曰正其本則萬物理失之毫釐差之千里是以本立而道生源潔而流清故嫁娶者所以傳重承業継續先祖為宗廟主也夫家輕禮違制不可以行遂不肯徃夫家訟之于理致之于獄女終以一物不具一禮不備守莭持義必死不徃而作詩曰雖速我獄室家不足言夫家之禮不備足也君子以為淂婦道之儀故舉而揚之傳而法之以絶無禮之求防淫慾之行焉又曰雖速我訟亦不女從此之謂也頌曰召南申女貞一脩容夫禮不備終不肯從要以必死遂至獄訟作詩眀意後丗稱誦宋恭伯姬伯姬者魯宣公之女成公之妹也其母曰􅓎姜嫁伯姬于宋恭公恭公不親迎伯姬迫于父母之命而行既入宋三月廟見當行夫婦之道伯姬以恭公不親迎故不肯聴命宋人告魯魯使大夫季文子如宋致命于伯姬還復命公享之繆姜出于房再拜曰大夫勤勞于逺道辱送小子不忘先君以及後嗣使下而有知先君猶有望也敢再拜大夫之辱伯姬既嫁于恭公十年恭公䘚伯姬寘至景公時伯姬嘗遇夜失火左右曰夫人少避火伯姬曰婦人之義保傳不俱夜不下堂待保傳来也保母至矣傳母未至也左右又曰夫人少避火伯姬曰婦人之義傳母不至夜不可下堂越義而生不如守義而死遂逮于火而死春秋詳録其事為賢伯姬以為婦人以貞為行者也伯姬之婦道盡矣當此之時諸侯聞之莫不悼痛以為死者不可以生財物猶可復故相與聚㑹于澶淵償宋之所䘮春秋善之君子曰禮婦人不得傳母夜不下堂行必以燭伯姬之謂也詩云淑慎爾止不愆于儀伯姬可謂不失儀矣頌曰伯姬心専守禮一意宫夜失火保傳不備逮火而死厥心靡悔春秋賢之詳録其事衞宣夫人夫人者齊侯之女也嫁于衞至城門而衞君死保母曰可以還矣女不聴遂入持三年之䘮畢弟立請曰衞小國也不容二庖請碩同庖終不聴衞君使人愬子齊兄弟齊兄弟皆𣣔與君使人告女女終不聴乃作詩曰我心匪石不可轉也我心匪席不可卷也厄窮而不憫勞辱而不苟然後能自致也言不失也然後可以濟難矣詩曰威儀棣不可選也言其左右無賢臣皆順其君之意也君子羙其貞一故舉而列之于詩也頌曰齊女嫁衞厥至城門公薨不反遂入三年後君欲同女終不渾作詩譏刺䘚守死君蔡人之妻蔡人之妻者宋人之女也既嫁于蔡而夫有悪􅍚其母将改嫁之女曰夫之不幸乃妾之不幸也柰何去之適人之道一與之醮終身不改不幸遇悪疾不改其意且夫采采芣苢之草雖其臭悪猶始于捋采之終于懐襭之浸以益親况于夫婦之道乎彼無大故又不遣妾何以得去終不聴其母乃作芣苢之詩君子曰宋女之意甚貞而一也頌曰宋女専慤持心不碩夫有悪疾意猶一精母勸去歸作詩不聴詩人美之以為順貞黎荘夫人黎荘夫人者衞侯之女黎荘公之夫人也既徃而不同𣣔所務者異未嘗得見甚不得意其傳母閔夫人賢公反不納憐其失意又恐其已見遣而不以時去謂夫人曰夫婦之道有義則合無義則去今不得意胡不去乎乃作詩曰式㣲式㣲胡不歸夫人曰婦人之道一而巳矣彼雖不吾以吾何可以離于婦道乎乃作詩曰㣲君之故胡爲乎中露終執貞一不違婦道以俟君命君子故序之以編詩頌曰黎荘夫人執行不衰荘公不偶行節及乖傳母勸去作詩式㣲夫人守一終不肯歸齊孝孟姬孟姬者華氏之長女齊孝公之夫人也好禮貞一過時不嫁齊中求之禮不備終不徃躡男席語不及外逺别避嫌齊中莫䏻備禮求焉齊國称其貞孝公聞之乃脩禮親迎于華氏之室父母送孟姬不下堂母醮房之中結其衿縭戒之曰必敬必戒無違宫事父誡之東階之上曰必夙興夜寐無違命其有大妨于王命者亦勿従也諸母誡之両階之間曰敬之敬之必終父母之命夙夜無怠爾之衿縭父母之言謂何姑姊妹誡之門内曰夙夜無愆爾之衿鞶無忘父母之言孝公親迎孟姬于其父母三顧而出親迎之綏自御輪三曲顧姬與遂納于宫三月廟見而後行夫婦之道既居久之公逰于琅邪華孟姬従車奔姬墮車碎孝公使駟馬立車載姬以歸姬使侍御者舒帷以自障蔽而使傳母應使者曰妾聞妃后踰閾必乗安車輜軿下堂則従傳母保阿進退則鳴玉環佩内餙則結紐綢繆野處則帷裳擁蔽所以正心一意自歛制也今立車無軿非所敢受命也野䖏無衞非所敢久居也三者失禮多矣夫無禮而生不若早死使者馳以告公更取安車比其反也則自絰矣傳母救之不絶傳母曰使者至輜軿已具姬氏蘇然後乗而歸君子謂孟姬好禮禮婦人出必輜軿衣服綢繆既嫁歸問女見弟不問男昆弟所以逺别也詩曰彼君子女綢直如髮此之謂也頌曰孟姬好禮執節甚公避嫌逺别終不冶容輦不並乗非禮不従君子嘉焉自古寡同息君夫人夫人者息君之夫人也楚伐息破之虜其君使守門将妻其夫人而納之于宫椘王出逰夫人遂出見息君謂之曰人生要一死而已何至自苦妾無須臾而忘君也終不以身更貳醮生離于地上豈如死歸于地下㢤乃作詩曰榖則異室死則同穴有如不信死如曒日息君止之夫人不聴遂自殺息君亦自殺同日俱死椘王賢其夫人守莭有義乃以諸侯之禮合而葬之君子謂夫人説于行善故序之于詩夫義動君子利動小人息君夫人不為利動矣詩云徳音莫違及尔同死此之謂也頌曰椘虜息君納其適妃夫人持固弥久不衰作詩同穴思故忘新遂死不顧列于貞賢齊杞梁妻齊𣏌梁殖之妻也荘公􅊞莒殖戦而死荘公歸遇其妻使使者弔之于路𣏌梁妻曰今殖有罪君何辱命焉若令殖免于罪則賤妾有先人之弊廬在下妾不得與郊弔于是荘公乃還車詣其室成禮然後去𣏌梁之妻無子内外皆無五屬之親既無所㱕乃枕其夫之屍于城下而哭内諴動人道路過者莫不為之揮俤十日而城為之崩既葬曰吾何歸矣夫婦人必有所倚者也父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子内無所依以見吾誠外無所倚以立吾莭吾豈能更二哉亦死而已遂赴溜水而死君子謂𣏌梁之妻貞而知禮詩云我心傷悲聊與子同歸此之謂也頌曰𣏌梁戦死其妻収丧齊荘道弔避不敢當哭夫于城城為之崩自以無親赴淄而薨椘􅊭伯嬴伯嬴者秦穆公之女椘􅊭王之夫人昭王之母也當昭王時椘與吴為伯莒之戦吴勝椘入至郢昭王亡吴王闔閭盡妻其後宫次至伯嬴伯嬴持刀曰妾聞天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失莭則其國危夫婦之道固人倫之始王教之端是以眀王之制使男女不親授受坐不同席食不共器殊椸枷異巾􅌨所以逺之也若諸侯外淫者絶卿大夫外淫者放士庶人外淫者宫割夫然者以為仁失可復以義義失可復以禮男女之失亂亡興焉夫造亂亡之端公侯之所絶天子之所誅也今君王棄儀表之行縦亂亡之欲犯誅絶之事何以行令訓民且妾聞生而辱不若死而榮若使君王棄其儀表則無以臨國妾有淫端則無以生世一舉而両辱妾以死守之不敢承命且凡所𣣔妾者為楽也近妾而死何楽之有如先殺妾又何益于君王于是吴王慙遂退舎伯嬴與其保阿閉永巷之門皆不释兵三旬秦救至昭王乃復矣君子謂伯嬴勇而精一詩曰莫莫葛纍施于條枚豈弟君子求福不囘此之謂也頌曰闔閭勝椘入厥宫室盡妻後宫莫不戦慄伯嬴自守堅固専一君子美之以為有莭椘昭貞姜貞姜者齊侯之女椘昭王之夫人也王出逰留夫人漸臺之上而去王聞江水大至使使者迎夫人忌持其符使者至請夫人出夫人曰王與宫人約令召宫人必以符今使者不持符妾不敢從使者行使者曰今水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不犯約勇者不畏死守一節而已妾知従使者必生留必死然棄約越義而求生不若留而死耳于是使者取符則水大至臺崩夫人流而死王曰嗟夫守義死莭不為苟生䖏約持信以成其貞乃號之曰貞姜君子謂貞姜有婦莭詩云淑人君子其儀不忒此之謂也頌曰椘昭出逰㽞姜漸臺江水大至無符不来夫人守莭流死不疑君子序焉上配伯姬椘白貞姬貞姬者椘白公勝之妻也白公死其妻紡績不嫁吴王聞其羙且有行使大夫持金百鎰白璧一雙以聘焉以輜軿三十乘迎之将以為夫人致幣白妻辭之曰白公生之時妾幸淂充後宫執箕箒掌衣履拂枕席託為妃匹白公不幸而死妾願守其墳墓以終天年今王賜金璧之聘夫人之位非愚妾之所聞也且夫棄義從𣣔者汚也見利忘死者貪也夫貪汚之人王何以為㢤妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此㢤于死者亦然妾既不仁不䏻従死今又去而嫁不亦太甚乎遂辭聘而不行吴王賢其守莭有義號曰貞姬椘君子謂貞姬㢘㓗而誠信夫任重而道逺仁以為巳任不亦重乎死而後巳不亦逺乎詩云彼美孟姜徳音不忘此之謂也頌曰白公之妻守寡紡績吴王美之聘以金璧妻操固行雖死不易君子大之美其嘉績衞宗二順衞宗二順者衞宗室靈王之夫人而及其傳妾也秦㓕衞君乃封靈王世家使奉其祀靈王死夫人無子而守寡傳妾有子傳妾事夫人八年不衰供飬愈謹夫人謂傳妾曰孺子養我甚謹子奉祀而妾事我我不聊也且吾聞主君之母不妾事人今我無子于禮斥絀之人也而得㽞以盡其節是我幸也今又煩孺子不改故莭我甚内慙吾碩出居外以時相見我甚便之傳妾泣而對曰夫人𣣔使靈氏受三不祥耶不幸早終是一不祥也夫人無子而婢妾有子是二不祥也夫人𣣔出居外使婢子居内是三不祥也妾聞忠臣下君無怠􅌒時孝子養親患無日也妾豈敢以小貴之故変妾之莭㢤供養固妾之職也夫人又何勤乎夫人曰無子之人而辱主君之母雖子𣣔爾衆人謂我不知禮也吾終碩居外而已傳妾退而謂其子曰吾聞君子䖏順奉上下之儀脩先古之禮此順道也今夫人難我将𣣔居外使我居内此逆也䖏逆而生豈若守順而死㢤遂𣣔自殺其子泣而守之不聴夫人聞之􅌚遂許傳妻留終年供養不衰君子曰二女相譲亦誠君子可謂行成于内而名立于夫世矣詩云我心匪后不可轉也此之謂也頌曰衞宗二順執行咸固妾子雖代供養如故夫人慙辭請求出舎終不肯聴禮甚有度魯寡陶嬰陶嬰者魯陶門之女也少寡飬㓜孤無強昆弟紡織為産魯人或聞其義将求焉嬰聞之恐不得兔作歌眀已之不更二也其歌曰黄鵠之早寡兮七年不雙鵷􅖪獨宿兮不與衆同夜半悲鳴想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼㢤兮死者不可忘飛鳥尚然兮况于貞良雖有賢匹兮終不重行魯人聞之曰斯女不可得巳遂不敢復求嬰寡終身不改君子謂陶嬰貞一而思詩云心之憂矣我歌且謡此之謂也頌曰陶嬰少寡紡績養子或𣣔取焉乃自修理作歌自眀求者乃止君子稱揚以為女紀梁寡高行高行者梁之寡婦也其為人榮于色而美于行夫死早寡不嫁梁貴人多争𣣔娶之者不䏻得梁王聞之使相聘焉髙行曰妾夫不幸早死先狗馬填溝􅊤妾守飬其孤㓜曽不得專意貴人多求妾者幸而得免今王又重之妾聞婦人之義一徃而不改以全貞信之莭念忘死而趨生是不信也貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刀以割其鼻曰妾巳刑矣所以不死者不忍㓜弱之重孤也王之求妾者以其色也今刑餘之人殆可釋矣于是相以報王大其義髙其行乃復其身尊其號曰髙行君子謂髙行莭禮專精詩云謂予不信有如皎日此之謂也頌曰髙行䖏梁貞専精純不貪行貴務在一信不受梁聘劓鼻刑身君子髙之顯示後人陳寡孝婦孝婦者陳之少寡婦也年十六而嫁未有子其夫當行戍夫且行時囑孝媍曰我生死未可知幸有老母無他兄弟備吾不還汝肯養吾母乎媍應曰諾夫果死不還婦飬姑不衰慈爱愈固紡績以為家業終無嫁意居䘮三年其父母哀其年少無子而早寡也将取而嫁之孝婦曰妾聞之信者人之幹也義者行之莭也妾幸淂離襁褓受嚴命而事夫夫且行時屬妾以其老母既許諾之夫受人之託豈可棄㢤棄託不信背死不義不可也母曰吾憐女少年早寡也孝婦曰妾聞寜載于義而死不載于地而生且夫養人老母而不䏻䘚許人以諾而不䏻信将何以立于丗夫為人婦固養其舅姑者也夫不幸先死不淂盡為人子之禮今又使妾去之莫飬老母是眀夫之不肖而著妾之不孝不孝不信且無義何以生㢤因𣣔自殺其父母懼而不敢嫁也遂使飬其姑二十八年姑死葬之終奉祭祀淮陽大守以聞漢孝文皇帝髙其義貴其信羙其行使者賜之黄金四十斤復之終身號曰孝婦君子謂孝婦備于婦道詩云匪直也人秉心塞淵此之謂也頌曰孝婦䖏陳夫死無子母将嫁之終不聴母專心養姑一醮不改聖王嘉之號曰孝婦劉向古列女傳卷之四終
