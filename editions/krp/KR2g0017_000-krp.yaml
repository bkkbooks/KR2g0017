front:
  text: 劉向古列女傳小序
  hash: sha256:0cd9c602ffa7948ed94ba4c2b2441fda1426872896960336748db0efa272a5ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0017_SBCK_000-1a}
body:
  text: 母儀傳惟若母儀賢聖有智行為儀表言則中義胎飬子孫以漸教化既成以徳致其功業姑母察此不可不法賢明傳惟若賢眀亷正以方動作有莭言成文章咸曉事理知丗紀綱盾法興居終身無殃妃后賢焉名號必揚仁智傳惟若仁智豫識難易原度天理禍福所移歸義従安危險必避專專小心永懼匪懈夫人省兹榮名必利貞順傳惟若貞順修道正進避嫌逺别為必可信終不更二天下之俊勤正㓗行精專謹慎諸姬觀之以為法訓莭義傳惟若莭義必死無避好善慕莭終不背義誠信勇敢何有險詖義之所在赴之不疑姜姒法斯以為丗基辯通傳惟若辯通文詞可從連類引譬以投禍凶推摧一切後不復重終䏻一心開意甚公妻妾則焉為世所誦孽嬖傳惟若孽嬖亦甚嫚易淫如熒惑背莭棄義指是為非終𬒳禍敗謹按列女傳頌義大序小序及頌或者皆以為劉向子劉歆作攷之隋書崇文縂目及本朝曽校書序則非歆作眀矣然崇文縂目則以續二十傳無頌附入向七篇中分上下為一十四篇并傳頌一篇共成一十五篇今人則以向所撰列女傳七篇并續列女傳二十傳為一篇共計八篇今止依此将頌義大序列于目録前小序七篇散見目録中間頌見各人傳後觀者冝詳察焉劉向古列女傳目録一卷母儀有虞二妃棄母姜嫄契母蕳狄啟母塗山湯妃有㜪周室三母衞姑定姜齊女傳母鄒孟軻母魯季敬姜椘子發母魯之母師魏芒慈母齊田稷母二卷賢眀周宣姜后晉文齊姜椘荘樊姬秦穆公姬齊桓衞姬周南之妻宋鮑女宗晉趙衰妻陶荅子妻桞下恵妻魯黔婁妻齊相御妻椘接輿妻椘老莱妻椘於陵妻三卷仁智宻康公母椘武鄧曼許穆夫人曹僖氏妻孫叔敖母晉伯宗妻衞靈夫人齊靈仲子魯臧孫母晉羊叔姬晉范氏母魯公乗姒魯漆室女魏曲沃婦趙将括母四卷貞順召南申女宋恭伯姬衞宣夫人蔡人妻黎荘夫人齊孝孟姬息君夫人齊𣏌梁妻椘􅊭伯嬴椘昭貞姜椘白貞姬衞宗二順魯寡陶嬰梁寡髙行陳寡孝婦五卷莭義魯孝義保椘成鄭瞀晉圉懐嬴椘昭越姬盖将妻魯義姑娣代趙夫人齊義繼母魯秋潔婦周主忠妾魏節乳母梁莭姑姊珠厓二義邰陽友姊京師節女上谷魏母六卷辯通齊管妾婧椘江乙母晉弓工女齊傷槐女椘野辯女阿谷䖏女趙津女姢趙佛肹母齊威虞姬齊鍾離春齊宿瘤女齊孤逐女椘䖏荘姪齊女徐吾齊太倉女七卷孽嬖夏桀末喜殷紂妲己周幽褒姒衞宣公姜魯桓文姜魯荘哀姜晉獻􅌐姬魯宣繆姜陳女夏姬齊靈聲姬齊東郭姜衛一亂女趙靈吴女椘考李后趙悼倡后右七卷俱有頌八卷續列女傳周郊婦人仁智陳辯女辯通聶政姊節義王孫氏母節義陳嬰母賢眀王陵母節義張湯母仁智雋不疑母母儀楊夫人賢明嚴延年母仁智霍夫人顯嬖孽漢馮昭儀莭義王章妻女仁智班婕妤辯通趙飛燕姊娣孽嬖漢孝􅊭王后貞順更始夫人孽嬖梁鴻妻賢明眀徳馬后母儀梁夫人媳辯通右二十傳皆班氏前人或同時人並無頌古列女傳目録終
