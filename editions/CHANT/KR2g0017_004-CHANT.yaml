body:
  text: 貞順傳第四惟若貞順修道正進避嫌遠別為必可信終不更二天下之俊勤正潔行精專謹慎諸姬觀之以為法訓召南申女召南申女者申人之女也既許嫁于酆夫家禮不備而欲迎之女與其人言以為夫婦者人倫之始也不可不正傳曰正其本則萬物理失之毫釐差之千里是以本立而道生源潔而流清故嫁娶者所以傳重承業繼續先祖為宗廟主也夫家輕禮違制不可以行遂不肯往夫家訟之于理致之于獄女終以一物不具一禮不備守節持義必死不往而作詩曰雖速我獄室家不足言夫家之禮不備足也君子以為得婦道之儀故舉而揚之傳而法之以絕無禮之求防淫慾之行焉又曰雖速我訟亦不女從此之謂也頌曰召南申女貞一脩容夫禮不備終不肯從要以必死遂至獄訟作詩明意後世稱誦宋恭伯姬伯姬者魯宣公之女成公之妹也其母曰繆姜嫁伯姬于宋恭公恭公不親迎伯姬迫于父母之命而行既入宋三月廟見當行夫婦之道伯姬以恭公不親迎故不肯聽命宋人告魯魯使大夫季文子如宋致命于伯姬還復命公享之繆姜出于房再拜曰大夫勤勞于遠道辱送小子不忘先君以及後嗣使下而有知先君猶有望也敢再拜大夫之辱伯姬既嫁于恭公十年恭公卒伯姬寡至景公時伯姬嘗遇夜失火左右曰夫人少避火伯姬曰婦人之義保傅不俱夜不下堂待保傅來也保母至矣傅母未至也左右又曰夫人少避火伯姬曰婦人之義傅母不至夜不可下堂越義而生不如守義而死遂逮于火而死春秋詳錄其事為賢伯姬以為婦人以貞為行者也伯姬之婦道盡矣當此之時諸侯聞之莫不悼痛以為死者不可以生財物猶可復故相與聚會于澶淵償宋之所喪春秋善之君子曰禮婦人不得傅母夜不下堂行必以燭伯姬之謂也詩云淑慎爾止不愆于儀伯姬可謂不失儀矣頌曰伯姬心專守禮一意宮夜失火保傅不備逮火而死厥心靡悔春秋賢之詳錄其事衛寡夫人夫人者齊侯之女也嫁于衛至城門而衛君死保母曰可以還矣女不聽遂入持三年之喪畢弟立請曰衛小國也不容二庖願請願同庖終不聽衛君使人愬于齊兄弟齊兄弟皆欲與君使人告女女終不聽乃作詩曰我心匪石不可轉也我心匪席不可卷也厄窮而不憫勞辱而不苟然後能自致也言不失也然後可以濟難矣詩曰威儀棣棣不可選也言其左右無賢臣皆順其君之意也君子美其貞一故舉而列之于詩也頌曰齊女嫁衛厥至城門公薨不反遂入三年後君欲同女終不渾作詩譏刺卒守死君蔡人之妻蔡人之妻者宋人之女也既嫁于蔡而夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸也柰何去之適人之道一與之醮終身不改不幸遇惡疾不改其意且夫采采芣苡之草雖其臭惡猶始于捋采之終于懷襭之浸以益親況于夫婦之道乎彼無大故又不遣妾何以得去終不聽其母乃作芣苡之詩君子曰宋女之意甚貞而一也頌曰宋女專愨持心不頃夫有惡疾意猶一精母勸去歸作詩不聽詩人美之以為順貞黎莊夫人黎莊夫人者衛侯之女黎莊公之夫人也既往而不同欲所務者異未嘗得見甚不得意其傅母閔夫人賢公反不納憐其失意又恐其已見遣而不以時去謂夫人曰夫婦之道有義則合無義則去今不得意胡不去乎乃作詩曰式微式微胡不歸夫人曰婦人之道一而已矣彼雖不吾以吾何可以離于婦道乎乃作詩曰微君之故胡為乎中露終執貞一不違婦道以俟君命君子故序之以編詩頌曰黎莊夫人執行不衰莊公不偶行節反乖傅母勸去作詩式微夫人守一終不肯歸齊孝孟姬孟姬者華氏之長女齊孝公之夫人也好禮貞一過時不嫁齊中求之禮不備終不往躡男席語不及外遠別避嫌齊中莫能備禮求焉齊國稱其貞孝公聞之乃脩禮親迎于華氏之室父母送孟姬不下堂母醮房之中結其衿縭戒之曰必敬必戒無違宮事父誡之東階之上曰必夙興夜寐無違命其有大妨于王命者亦勿從也諸母誡之兩階之間曰敬之敬之必終父母之命夙夜無怠爾之衿縭父母之言謂何姑姊妹誡之門內曰夙夜無愆爾之衿鞶無忘父母之言孝公親迎孟姬於其父母三顧而出親迎之綏自御輪三曲顧姬與遂納于宮三月廟見而後行夫婦之道既居久之公遊于琅邪華孟姬從車奔姬墮車碎孝公使駟馬立車載姬以歸姬使侍御者舒帷以自障蔽而使傅母應使者曰妾聞妃后踰閾必乘安車輜軿下堂則從傅母保阿進退則鳴玉環佩內飾則結紐綢繆野處則帷裳擁蔽所以正心一意自歛制也今立車無軿非所敢受命也野處無衛非所敢久居也三者失禮多矣夫無禮而生不若早死使者馳以告公更取安車比其反也則自經矣傅母救之不絕傅母曰使者至輜軿已具姬氏蘇然後乘而歸君子謂孟姬好禮禮婦人出必輜軿衣服綢繆既嫁歸問女昆弟不問男昆弟所以遠別也詩曰彼君子女綢直如髮此之謂也頌曰孟姬好禮執節甚公避嫌遠別終不冶容輦不並乘非禮不從君子嘉焉自古寡同息君夫人夫人者息君之夫人也楚伐息破之虜其君使守門將妻其夫人而納之于宮楚王出遊夫人遂出見息君謂之曰人生要一死而已何至自苦妾無須臾而忘君也終不以身更貳醮生離于地上豈如死歸于地下哉乃作詩曰穀則異室死則同穴謂予不信有如皦日息君止之夫人不聽遂自殺息君亦自殺同日俱死楚王賢其夫人守節有義乃以諸侯之禮合而葬之君子謂夫人說于行善故序之于詩夫義動君子利動小人息君夫人不為利動矣詩云德音莫違及爾同死此之謂也頌曰楚虜息君納其適妃夫人持固彌久不衰作詩同穴思故忘新遂死不顧列于貞賢齊杞梁妻齊杞梁殖之妻也莊公襲莒殖戰而死莊公歸遇其妻使使者弔之于路杞梁妻曰今殖有罪君何辱命焉若令殖免于罪則賤妾有先人之弊廬在下妾不得與郊弔于是莊公乃還車詣其室成禮然後去杞梁之妻無子內外皆無五屬之親既無所歸乃就其夫之屍于城下而哭之內諴動人道路過者莫不為之揮涕十日而城為之崩既葬曰吾何歸矣夫婦人必有所倚者也父在則倚父夫在則倚夫子在則倚子今吾上則無父中則無夫下則無子內無所依以見吾誠外無所倚以立吾節吾豈能更二哉亦死而已遂赴淄水而死君子謂杞梁之妻貞而知禮詩云我心傷悲聊與子同歸此之謂也頌曰杞梁戰死其妻收喪齊莊道弔避不敢當哭夫于城城為之崩自以無親赴淄而薨楚平伯嬴伯嬴者秦穆公之女楚平王之夫人昭王之母也當昭王時楚與吳為伯莒之戰吳勝楚遂入至郢昭王亡吳王闔閭盡妻其後宮次至伯嬴伯嬴持刀曰妾聞天子者天下之表也公侯者一國之儀也天子失制則天下亂諸侯失節則其國危夫婦之道固人倫之始王教之端是以明王之制使男女不親授坐不同席食不共器殊椸枷異巾櫛所以遠之也若諸侯外淫者絕卿大夫外淫者放士庶人外淫者宮割夫然者以為仁失可復以義義失可復以禮男女之失亂亡興焉夫造亂亡之端公侯之所絕天子之所誅也今君王棄儀表之行縱亂亡之欲犯誅絕之事何以行令訓民且妾聞生而辱不若死而榮若使君王棄其儀表則無以臨國妾有淫端則無以生世一舉而兩辱妾以死守之不敢承命且凡所欲妾者為樂也近妾而死何樂之有如先殺妾又何益于君王于是吳王慚遂退舍伯嬴與其保阿閉永巷之門皆不釋兵三旬秦救至昭王乃復矣君子謂伯嬴勇而精一詩曰莫莫葛纍施于條枚豈弟君子求福不回此之謂也頌曰闔閭勝楚入厥宮室盡妻後宮莫不戰慄伯嬴自守堅固專一君子美之以為有節楚昭貞姜貞姜者齊侯之女楚昭王之夫人也王出遊留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符使者至請夫人出夫人曰王與宮人約令召宮人必以符今使者不持符妾不敢從使者行使者曰今水方大至還而取符則恐後矣夫人曰妾聞之貞女之義不犯約勇者不畏死守一節而已妾知從使者必生留必死然棄約越義而求生不若留而死耳于是使者反取符還則水大至臺崩夫人流而死王曰嗟夫守義死節不為苟生處約持信以成其貞乃號之曰貞姜君子謂貞姜有婦節詩云淑人君子其儀不忒此之謂也頌曰楚昭出遊留姜漸臺江水大至無符不來夫人守節流死不疑君子序焉上配伯姬楚白貞姬貞姬者楚白公勝之妻也白公死其妻紡績不嫁吳王聞其美且有行使大夫持金百鎰白璧一雙以聘焉以輜軿三十乘迎之將以為夫人大夫致幣白妻辭之曰白公生之時妾幸得充後宮執箕帚掌衣履拂枕席託為妃匹白公不幸而死妾願守其墳墓以終天年今王賜金璧之聘夫人之位非愚妾之所聞也且夫棄義從欲者污也見利忘死者貪也夫貪污之人王何以為哉妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉于死者亦然妾既不仁不能從死今又去而嫁不亦太甚乎遂辭聘而不行吳王賢其守節而有義號曰楚白貞姬君子謂貞姬廉潔而誠信夫任重而道遠仁以為己任不亦重乎死而後已不亦遠乎詩云彼美孟姜德音不忘此之謂也頌曰白公之妻守寡紡績吳王美之聘以金璧妻操固行雖死不易君子大之美其嘉績衛宗二順衛宗二順者衛宗室靈王之夫人及其傅妾也秦滅衛君角封靈王世家使奉其祀靈王死夫人無子而守寡傅妾有子傅妾事夫人八年不衰供養愈謹夫人謂傅妾曰孺子養我甚謹子奉祭祀而妾事我我不聊也且吾聞主君之母不妾事人今我無子于禮斥絀之人也而得留以盡其節是我幸也今又煩孺子不改故節我甚內慚吾願出居外以時相見我甚便之傅妾泣而對曰夫人欲使靈氏受三不祥耶公不幸早終是一不祥也夫人無子而婢妾有子是二不祥也夫人欲出居外使婢子居內是三不祥也妾聞忠臣事君無怠倦時孝子養親患無日也妾豈敢以小貴之故變妾之節哉供養固妾之職也夫人又何勤乎夫人曰無子之人而辱主君之母雖子欲爾眾人謂我不知禮也吾終願居外而已傅妾退而謂其子曰吾聞君子處順奉上下之儀脩先古之禮此順道也今夫人難我將欲居外使我居內此逆也處逆而生豈若守順而死哉遂欲自殺其子泣而止之不聽夫人聞之懼遂許傅妾留終年供養不衰君子曰二女相讓亦誠君子可謂行成于內而名立于後世矣詩云我心匪石不可轉也此之謂也頌曰衛宗二順執行咸固妾子雖代供養如故夫人慚辭請求出舍終不肯聽禮甚有度魯寡陶嬰陶嬰者魯陶門之女也少寡養幼孤無強昆弟紡織為產魯人或聞其義將求焉嬰聞之恐不得免作歌明己之不更二也其歌曰黃鵠之早寡兮七年不雙鵷頸獨宿兮不與眾同夜半悲鳴兮想其故雄天命早寡兮獨宿何傷寡婦念此兮泣下數行嗚呼悲兮死者不可忘飛鳥尚然兮況于貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得已遂不敢復求嬰寡終身不改君子謂陶嬰貞一而思詩云心之憂矣我歌且謠此之謂也頌曰陶嬰少寡紡績養子或欲取焉乃自修理作歌自明求者乃止君子稱揚以為女紀梁寡高行高行者梁之寡婦也其為人榮于色而美于行夫死早寡不嫁梁貴人多爭欲娶之者不能得梁王聞之使相聘焉高行曰妾夫不幸早死先狗馬填溝壑守養其孤幼曾不得專意妾宜以身薦其棺槨貴人多求妾者幸而得免今王又重之妾聞婦人之義一往而不改以全貞信之節今忘死而趨生是不信也見貴而忘賤是不貞也棄義而從利無以為人乃援鏡持刀以割其鼻曰妾已刑矣所以不死者不忍幼弱之重孤也王之求妾者以其色也今刑餘之人殆可釋矣于是相以報王大其義高其行乃復其身尊其號曰高行君子謂高行節禮專精詩云謂予不信有如皎日此之謂也頌曰高行處梁貞專精純不貪行貴務在一信不受梁聘劓鼻刑身君子高之顯示後人陳寡孝婦孝婦者陳之少寡婦也年十六而嫁未有子其夫當行戍夫且行時囑孝婦曰我生死未可知幸有老母無他兄弟借吾不還汝肯養吾母乎婦應曰諾夫果死不還婦養姑不衰慈愛愈固紡績以為家業終無嫁意居喪三年其父母哀其年少無子而早寡也將取而嫁之孝婦曰妾聞之信者人之幹也義者行之節也妾幸得離襁褓受嚴命而事夫夫且行時屬妾以其老母既許諾之夫受人之託豈可棄哉棄託不信背死不義不可也母曰吾憐女少年早寡也孝婦曰妾聞寧載于義而死不載于地而生且夫養人老母而不能卒許人以諾而不能信將何以立于世夫為人婦固養其舅姑者也夫不幸先死不得盡為人子之禮今又使妾去之莫養老母是明夫之不肖而著妾之不孝不孝不信且無義何以生哉因欲自殺其父母懼而不敢嫁也遂使養其姑二十八年姑死葬之終奉祭祀淮陽太守以聞漢孝文皇帝高其義貴其信美其行使使者賜之黃金四十斤復之終身號曰孝婦君子謂孝婦備于婦道詩云匪直也人秉心塞淵此之謂也頌曰孝婦處陳夫死無子母將嫁之終不聽母專心養姑一醮不改聖王嘉之號曰孝婦
