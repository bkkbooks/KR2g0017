body:
  text: 孽嬖傳第七惟若孽嬖亦甚嫚易淫妬熒惑背節棄義指是為非終被禍敗夏桀末喜末喜者夏桀之妃也美于色薄于德亂孽無道女子行丈夫心佩劍帶冠桀既棄禮義淫于婦人求美女積之於後宮收倡優侏儒狎徒能為奇偉戲者聚之于旁造爛漫之樂日夜與末喜及宮女飲酒無有休時置妹喜于膝上聽用其言昏亂失道驕奢自恣為酒池可以運舟一鼓而牛飲者三千人羈其頭而飲之于酒池醉而溺死者末喜笑之以為樂龍逢進諫曰君無道必亡矣桀曰日有亡乎日亡而我亡不聽以為妖言而殺之造瓊室瑤臺以臨雲雨殫財盡幣意尚不饜召湯囚之於夏臺已而釋之諸侯大叛于是湯受命而伐之以臨雲雨殫財盡幣意尚不饜召湯囚之於夏臺戰于鳴條桀師不戰湯遂放桀與末喜嬖妾同舟流于海死于南巢之山詩曰懿厥哲婦為梟為鴟此之謂也頌曰末喜配桀維亂驕揚桀既無道又重其荒姦宄是用不恤法常夏后之國遂反為商殷紂妲己妲己者殷紂之妃也嬖幸于紂紂材力過人手格猛獸智足以距諫辨足以飾非矜人臣以能高天下以聲以為人皆出己之下好酒淫樂不離妲己妲己之所譽貴之妲己之所憎誅之作新淫之聲北鄙之舞靡靡之樂收珍物積之于後宮諛臣群女咸獲所欲積糟為丘流酒為池懸肉為林使人裸形相逐其間為長夜之飲妲己好之百姓怨望諸侯有畔者紂乃為炮格之法膏銅柱加之炭令有罪者行其上輒墮炭中妲己乃笑比干諫曰不修先王之典法而用婦言禍至無日紂怒以為妖言妲己曰吾聞聖人之心有七竅于是剖心而觀之囚箕子微子去之武王遂受命興師伐紂戰于牧野紂師倒戈紂乃登廩臺衣寶玉衣而自殺于是武王遂致天之罰斬妲己頭懸于小白旗以為亡紂者是女也書曰牝雞無晨牝雞之晨惟家之索於是武王遂致天之罰斬妲己頭懸於小白旗以為亡紂者是女也書曰牝雞無晨詩云君子信盜亂是用暴匪其止共維王之邛此之謂也頌曰妲己配紂惑亂是修紂既無道又重相謬指笑炮炙諫士刳囚遂敗牧野反商為周周幽褒姒褒姒者童妾之女周幽王之后也初夏之衰也褒人之神化為二龍伺于王庭而言曰余褒之二君也夏后卜殺之與去莫吉卜請其漦而藏之而吉乃布幣焉龍忽不見而藏漦櫝中乃置之郊至周莫之敢發也及周厲王之末發而觀之漦流于庭不可除也王使婦人裸而譟之化為玄蚖入後宮宮之童妾未毀齒而遭之既笄而孕當宣王之時産無夫而乳懼而棄之先是有童謠曰檿弧箕服實亡周國宣王聞之後有人夫妻賣檿弧箕服之器者王使執而戮之夫妻夜逃聞童妾遭棄而夜號也哀而取之遂竄于褒長而美好褒人姁有獄獻之以贖幽王受而嬖之遂釋褒姁故號曰褒姒既生子伯服幽王乃廢后申侯之女而立褒姒為后廢太子宜臼而立伯服為太子幽王惑于褒姒出入與之同乘不恤國事驅馳弋獵不時以適褒姒之意飲酒沉湎倡優在前以夜繼晝褒姒不好笑幽王乃欲其笑萬端故不笑幽王為熢燧大鼓有寇至則舉諸侯悉至至而無寇褒姒乃大笑幽王欲悅之數為舉燧火其後不信諸侯不至忠諫者誅唯褒姒言是從上下相諛百姓乖離申侯乃與繒西夷犬戎共攻幽王幽王舉熢燧徵兵莫至遂殺幽王于驪山之下虜褒姒盡取周賂而去于是諸侯乃即申侯而共立故太子宜臼是為平王自是之後周與諸侯無異詩云赫赫宗周褒姒滅之此之謂也頌曰褒神龍變實生褒姒興配幽王廢后太子舉烽致兵笑寇不至申侯伐周果滅其祀伋子醒求旄不得遽往追之壽已死矣伋子痛壽為己死乃謂盜曰所欲殺者乃我也此何罪請殺我衛宣公薑宣薑者齊侯之女衛宣公之夫人也初宣公夫人夷薑生伋子以為太子又娶于齊曰宣薑生壽及朔夷薑既死宣薑欲立壽乃與壽弟朔謀構伋子公使伋子之齊宣薑乃陰使力士待之界上而殺之曰有四馬白旄至者必要殺之壽聞之以告太子曰太子其避之伋子曰不可夫棄父之命則惡用子也壽度太子必行乃與太子飲奪之旄而行盜殺之伋子醒求旄不得遽往追之壽已死矣伋子以壽為己死乃謂盜曰所欲殺者乃我也此何罪請殺我盜又殺之二子既死朔遂立為太子宣公薨朔立是為惠公竟終無後亂及五世至戴公而後寧詩云乃如之人德音無良此之謂也頌曰衛之宣薑謀危太子欲立子壽陰設力士壽乃俱死衛果危殆五世不寧亂由薑起魯桓文薑文薑者齊侯之女魯桓公之夫人也內亂其兄齊襄公桓公將伐鄭納厲公既行與夫人俱將如齊也申繻曰不可女有家男有室無相瀆也謂之有禮易此必敗且禮婦人無大故則不歸桓公不聽遂與如齊文薑與襄公通桓公怒禁之不止文薑以告襄公襄公享桓公酒醉之使公子彭生抱而乘之因拉其脅而殺之遂死于車魯人求彭生以除恥齊人殺彭生詩曰亂匪降自天生自婦人此之謂也頌曰文薑淫亂配魯桓公與俱歸齊齊襄淫通俾厥彭生摧幹拉胸維女為亂卒成禍凶魯莊哀薑哀薑者齊侯之女莊公之夫人也初哀薑未入時公數如齊與哀薑淫既入與其弟叔薑俱公使大夫宗婦用幣見大夫夏甫不忌曰婦贄不過棗栗以致禮也男贄不過玉帛禽鳥以彰物也今婦贄用幣是男女無別也男女之別國之大節也無乃不可乎公不聽又丹其父桓公廟宮之楹刻其桷以夸哀薑哀薑驕淫通于二叔公子慶父公子牙哀薑欲立慶父莊公薨子般立慶父與哀薑謀遂殺子般于黨氏立叔薑之子是為閔公閔公既立慶父與哀薑淫益甚又與慶父謀殺閔公而立慶父遂使卜齮襲弒閔公于武闈將自立魯人謀之慶父恐奔莒哀薑奔邾齊桓公立僖公聞哀薑與慶父通以危魯乃召哀薑鴆而殺之魯遂殺慶父詩云啜其泣矣何嗟及矣此之謂也頌曰哀薑好邪淫于魯莊延及二叔驕妬縱橫慶父是依國適以亡齊桓征伐鴆殺哀薑晉獻驪姬驪姬者驪戎之女晉獻公之夫人也初獻公娶于齊生秦穆夫人及太子申生又娶二女于戎生公子重耳夷吾獻公伐驪戎克之獲驪姬以歸生奚齊卓子驪姬嬖于獻公齊薑先死公乃立驪姬以為夫人驪姬欲立奚齊乃與弟謀曰一朝不朝其間容刀逐太子與二公子而可間也于是驪姬乃説公曰曲沃君之宗邑也蒲與二屈君之境也不可以無主宗邑無主則民不畏邊境無主則開寇心夫寇生其心民慢其政國之患也若使太子主曲沃二公子主蒲與二屈則可以威民而懼寇矣遂使太子居曲沃重耳居蒲夷吾居二屈晉獻驪姬既遠太子乃夜泣公問其故對曰吾聞申生為人甚好仁而強甚寬惠而慈于民今謂君惑于我必亂國無乃以國民之故行強于君君未終命而歿君其奈何胡不殺我無以一妾亂百姓公曰夫豈惠其民而不惠其父乎驪姬曰為民與為父異夫殺君利民民孰不戴苟父利而得寵除亂而衆説妾不欲焉雖其愛君欲不勝也今夫以君為紂若紂有良子而先殺紂毋彰其惡而厚其敗鈞之死也毋必假手於武王以廢其祀至于今吾豈知紂之善否哉自吾先君武公兼翼而楚穆弒成此皆為民而不顧親君不早圖禍且及矣公懼曰奈何而可驪姬曰君何不老而授之政彼得政而治之殆將釋君乎公曰不可吾將圖之由此疑太子驪姬乃使人以公命告太子曰君夢見齊薑亟往祀焉申生祭于曲沃歸福于絳公田不在驪姬受福乃置鴆于酒施毒于脯公至召申生將胙驪姬曰食自外來不可不試也覆酒于地地墳申生恐而出驪姬與犬犬死飲小臣小臣死之驪姬乃仰天叩心而泣見申生哭曰嗟乎國子之國子何遲為君有父恩忍之況國人乎弒父以求利人孰利之獻公使人謂太子曰爾其圖之太傅里克曰太子入自明可以生不則不可以生太子曰吾君老矣若入而自明則驪姬死吾君不安遂自經于新城廟公遂殺少傅杜原款使閹楚刺重耳重耳奔狄使賈華刺夷吾夷吾奔梁盡逐群公子乃立奚齊獻公卒奚齊立里克殺之卓子立又殺之乃戮驪姬鞭而殺之于是秦立夷吾是為惠公惠公死子圉立是為懷公晉人殺懷公于高梁立重耳是為文公亂及五世然後定詩曰婦有長舌惟厲之階又曰哲婦傾城此之謂也頌曰驪姬繼母惑亂晉獻謀譖太子毒酒為權果弒申生公子出奔身又伏辜五世亂昏魯宣繆薑繆薑者齊侯之女魯宣公之夫人成公母也聰慧而行亂故諡曰繆初成公幼繆薑通于叔孫宣伯名喬如喬如與繆薑謀去季孟而擅魯國晉楚戰于鄢陵公出佐晉將行薑告公必逐季孟是背君也公辭以晉難請反聽命又貨晉大夫使執季孫行父而止之許殺仲孫蔑以魯士晉為內臣魯人不順喬如明而逐之喬如奔齊魯遂擯繆薑于東宮始往繆薑使筮之遇艮之六史曰是謂艮之隨隨其出也君必速出薑曰亡是于周易曰隨元亨利貞無咎元善之長也亨嘉之會也利義之和也貞事之幹也終故不可誣也是以雖隨無咎今我婦人而與于亂固在下位而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而放不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死于此不得出矣卒薨于東宮君子曰惜哉繆薑雖有聰慧之質終不得掩其淫亂之罪詩曰士之耽兮猶可説也女之耽兮不可説也此之謂也頌曰繆薑淫泆宣伯是阻謀逐季孟欲使專魯既廢見擯心意摧下後雖善言終不能補陳女夏姬陳女夏姬者陳大夫夏徵舒之母御叔之妻也其狀美好無匹內挾技術蓋老而復壯者三為王后七為夫人公侯爭之莫不迷惑失意夏姬之子徵舒為大夫公孫寧儀行父與陳靈公皆通于夏姬或衣其衣或裝其幡以戲于朝泄冶見之謂曰君有不善子宜掩之今自子率君而為之不待幽間於朝廷以戲士民其謂爾何二人以告靈公靈公曰衆人知之吾不善無害也泄冶知之寡人恥焉乃使人徵賊泄冶而殺之靈公與二子飲於夏氏召徵舒也公戲二子曰徵舒似汝二子亦曰不若其似公也徵舒疾此言靈公罷酒出徵舒伏弩廄門射殺靈公公孫寧儀行父皆奔楚靈公太子午奔晉其明年楚莊王舉兵誅徵舒定陳國立午是為成公莊王見夏姬美好將納之申公巫臣諫曰不可王討罪也而納夏姬是貪色也貪色為淫淫為大罰願王圖之王從之使壞後垣而出之將軍子反見美又欲取之巫臣諫曰是不祥人也殺御叔弒靈公戮夏南出孔儀喪陳國天下多美婦女何必取是子反乃止莊王以夏姬與連尹襄老襄老死於邲亡其尸其子黑要又通于夏姬巫臣見夏姬謂曰子歸我將聘汝及恭王即位巫臣聘于齊盡與其室俱至鄭使人召夏姬曰尸可得也夏姬從之巫臣使介歸幣於楚而與夏姬奔晉大夫子反怨之遂與子重滅巫臣之族而分其室詩云乃如之人兮懷婚姻也大無信也不知命也言嬖色殞命也頌曰夏姬好美滅國破陳走二大夫殺子之身殆誤楚莊敗亂巫臣子反悔懼申公族分齊靈聲姬聲姬者魯侯之女靈公之夫人太子光之母也號孟子淫通于大夫慶剋與之蒙衣乘輦而入于閎鮑牽見之以告國佐國佐召慶剋將詢之慶剋久不出以告孟子曰國佐非我孟子怒時國佐相靈公會諸侯于柯陵高子鮑子處內守及還將至閉門而索客孟子訴之曰高鮑將不內君而欲立公子角國佐知之公怒刖鮑牽而逐高子國佐佐遂奔莒更以崔杼為大夫使慶剋佐之乃帥師圍莒不勝國佐使人殺慶剋靈公與佐盟而復之孟子又訴而殺之及靈公薨高鮑皆復遂殺孟子齊亂乃息詩云匪教匪誨時維婦寺此之謂也頌曰齊靈聲姬厥行亂失淫于慶剋鮑牽是疾譖訴高鮑遂以奔亡好禍用亡亦以事喪齊東郭薑齊東郭薑者棠公之妻齊崔杼御東郭偃之姊也美而有色棠公死崔子弔而説薑遂與偃謀娶之既居其室比于公宮莊公通焉驟如崔氏崔子知之異日公以崔子之冠賜侍人崔子慍告有疾不出公登臺以臨崔子之宮由臺上與東郭薑戲公下從之東郭薑奔入戶而閉之公推之曰開余東郭薑曰老夫在此未及收髮公曰余聞崔子之疾也不聞崔子與薑自側戶出閉門聚衆鳴鼓公恐擁柱而歌公請于崔氏曰公知有罪矣請改心事吾子若不信請盟崔子曰臣不敢聞命乃避之公又請于崔氏之宰曰請就先君之廟而死焉崔氏之宰曰君之臣杼有疾不在侍臣不敢聞命公踰墻而逃崔氏射公中踵公反墮遂弒公先是時東郭薑與前夫子棠毋咎俱入崔子愛之使為相室崔子前妻子二人大子城少子強及薑入後生二子明成有疾崔子廢成而以明為後成使人請崔邑以老崔子哀而許之棠毋咎與東郭偃爭而不與成與強怒將欲殺之以告慶封慶封齊大夫也陰與崔氏爭權欲其相滅也謂二子曰殺之于是二子歸殺棠毋咎東郭偃于崔子之庭崔子怒訴之于慶氏曰吾不肖有子不能教也以至于此吾事夫子國人之所知也唯辱使者不可以已慶封乃使盧蒲嫳帥徒衆與國人焚其庫廄而殺成強崔氏之妻曰生若此不若死遂自經而死崔子歸見庫廄皆焚妻子皆死又自經而死君子曰東郭薑殺一國君而滅三室又殘其身可謂不祥矣詩曰枝葉未有害本實先敗此之謂也頌曰齊東郭薑崔杼之妻惑亂莊公毋咎是依禍及明成爭邑相殺父母無聊崔氏遂滅衛二亂女衛二亂女者南子及衛伯姬也南子者宋女衛靈公之夫人通于宋子朝太子蒯瞶知而惡之南子讒太子于靈公曰太子欲殺我靈公大怒蒯瞶蒯瞶奔宋靈公薨蒯瞶之子輒立是為出公衛伯姬者蒯瞶之姊也孔文子之妻孔悝之母也悝相出公文子卒姬與孔氏之豎渾良夫淫姬使良夫于蒯瞶蒯瞶曰子苟能內我于國報子以乘軒免子三死與盟許以姬為良夫妻良夫喜以告姬姬大悅良夫乃與蒯瞶入舍孔氏之圃昏時二人蒙衣而乘遂入至姬所已食姬杖戈先太子與五介胄之士迫其子悝于廁強盟之出公奔魯子路死之蒯瞶遂立是為莊公殺夫人南子又殺渾良夫莊公以戎州之亂又出奔四年而出公復入將入大夫殺孔悝之母而迎公二女為亂五世至悼公而後定詩云相鼠有皮人而無儀人而無儀不死何為此之謂也頌曰南子惑淫宋朝是親譖彼蒯瞶使之出奔悝母亦嬖出入兩君二亂交錯咸以滅身趙靈吳女趙靈吳女者號孟姚吳廣之女趙武靈王之后也初武靈王娶韓王女為夫人生子章立以為后章為太子王嘗夢見處女鼓瑟而歌曰美人熒熒兮顏若苕之榮命兮命兮逢天時而生曾莫我嬴嬴異日王飲酒樂數言所夢想見其人吳廣聞之乃因后而入其女孟姚甚有色焉王愛幸之不能離數年生子何孟姚數微言后有淫意太子無慈孝之行王乃廢后與太子而立孟姚為惠后以何為王是為惠文王武靈王自號主父封章于代號安陽君四年朝群臣安陽君來朝主父從旁觀窺群臣宗室之禮見章纍然也反北面為臣詘于其弟心憐之是時惠后死久恩衰乃欲分趙而王章于代計未決而輟主父遊沙丘宮章以其徒作亂李兌乃起四邑之兵擊章章走主父主父開之兌因圍主父宮既殺章乃相與謀曰以章圍主父即解兵吾屬夷矣乃遂圍主父主父欲出不得又不得食乃探雀鷇而食之三月餘遂餓死沙丘宮詩曰流言以對寇攘式內言不善之從內出也頌曰吳女苕顏神窹趙靈既見嬖近惑心乃生廢后興戎子何是成主閉沙丘國以亂傾楚考李后楚考李后者趙人李園之女弟楚考烈王之后也初考烈王無子春申君患之李園為春申君舍人乃取其女弟與春申君知有身園女弟因間謂春申君曰楚王之貴幸君雖兄弟不如今君相楚三十餘年而王無子即百歲後將更立兄弟即楚更立君後彼亦各貴其故所親又安得長有寵乎非徒然也君貴用事久多失禮于王兄弟王兄弟誠立禍且及身何以保相印江東之封乎今妾自知有身矣而人莫知妾之幸君未久誠以君之重而進妾于楚王楚王必嬖妾妾賴天有子男則是君之子為王也楚國盡可得孰與身臨不測之罪乎春申君大然之乃出園女弟謹舍之言之考烈王考烈王召而幸之遂生子悼立為太子以園女弟為后而李園貴用事養士欲殺春申君以滅口及考烈王死園乃殺春申君滅其家悼立是為幽王后有考烈王遺腹子猶立是為哀王考烈王弟公子負芻之徒聞知幽王非考烈王子疑哀王乃襲殺哀王及太后盡滅李園之家而立負芻為王五年而秦滅之詩云盜言孔甘亂是用餤此之謂也頌曰李園女弟發迹春申考烈無子果得納身知重而入遂得為嗣既立畔本宗族滅弒趙悼倡后倡后者邯鄲之倡趙悼襄王之后也前日而亂一宗之族既寡悼襄王以其美而取之李牧諫曰不可女之不正國家所以覆而不安也此女亂一宗大王不畏乎王曰亂與不亂在寡人為政遂娶之初悼襄王后生子嘉為太子倡后既入為姬生子遷倡后既嬖幸于王陰譖后及太子于王使人犯太子而陷之于罪王遂廢嘉而立遷黜后而立倡姬為后及悼襄王薨遷立是為幽閔王倡后淫佚不正通于春平君多受秦賂而使王誅其良將武安君李牧其後秦兵徑入莫能距遷遂見虜于秦趙亡大夫怨倡后之譖太子及殺李牧乃殺倡后而滅其家共立嘉于代七年不能勝秦趙遂滅為郡詩云人而無禮不死何俟此之謂也頌曰趙悼倡后貪叨無足隳廢后適執詐不愨淫亂春平窮意所欲受賂亡趙身死滅國
