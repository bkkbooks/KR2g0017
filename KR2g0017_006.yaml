body:
  text: 辨通傳第六惟若辨通文詞可從連類引譬以投禍凶推摧一切後不復重終能一心開意甚公妻妾則焉為世所誦齊管妾婧妾婧者齊相管仲之妾也寧戚欲見桓公道無從乃為人僕將車宿齊東門之外桓公因出寧戚擊牛角而商歌甚悲桓公異之使管仲迎之寧戚稱曰浩浩乎白水管仲不知所謂不朝五日而有憂色其妾婧進曰今君不朝五日而有憂色敢問國家之事耶君之謀也管仲曰非汝所知也婧曰妾聞之也毋老老毋賤賤毋少少毋弱弱管仲曰何謂也昔者太公望年七十屠牛于朝歌市八十為天子師九十而封于齊由是觀之老可老耶夫伊尹有姺氏之媵臣也湯立以為三公天下之治太平由是觀之賤可賤耶睪子生五歲而贊禹由是觀之少可少耶駃騠生七日而超其母由是觀之弱可弱耶于是管仲乃下席而謝曰吾請語子其故昔日公使我迎寧戚寧戚曰浩浩乎白水吾不知其所謂是故憂之其妾笑曰人已語君矣君不知識矣古有白水之詩詩不云乎浩浩白水倏倏之魚君來召我我將安居國家未定從我焉如此寧戚之欲得仕國家也管仲大悅以報桓公桓公乃修官職齊戒五日見寧子因以為相齊國以治君子謂妾婧為可與謀詩云先民有言詢于芻蕘此之謂也頌曰桓遇寧戚命管迎之寧稱白水管仲憂疑妾進問焉為説其詩管嘉報公齊得以治楚江乙母楚大夫江乙之母也當恭王之時乙為郢大夫有入王宮中盜者令尹以罪乙請于王而絀之處家無幾何其母亡布八尋乃往言于王曰妾夜亡布八尋令尹盜之王方在小曲之臺令尹侍焉王謂母曰令尹信盜之寡人不為其富貴而不行法焉若不盜而誣之楚國有常法母曰令尹不身盜之也乃使人盜之王曰其使人盜奈何對曰昔孫叔敖之為令尹也道不拾遺門不閉關而盜賊自息今令尹之治也耳目不明盜賊公行是故使盜得盜妾之布是與使人盜何以異也王曰令尹在上寇盜在下令尹不知有何罪焉母曰吁何大王之言過也昔者妾之子為郢大夫有盜王宮中之物者妾子坐而絀妾子亦豈知之哉然終坐之令尹獨何人而不以是為過也昔者周武王有言曰百姓有過罪豫一人上不明則下不治相不賢則國不寧所謂國無人者非無人也無理人者也王其察之王曰善非徒譏令尹又譏寡人命吏償母之布因賜金千鎰母讓金布曰妾豈貪貨而干大王哉怨令尹之治也遂去不肯受王曰母智若此其子必不愚乃復召江乙而用之君子謂乙母善以微喻詩云猷之未遠是用大諫此之謂也頌曰江乙失位乙母動心既歸家處亡布八尋指責令尹辭甚有度王復用乙賜母金布晉弓工妻弓工妻者晉繁人之女也當平公之時使其夫為弓三年乃成平公引弓而射不穿一札平公怒將殺弓人弓人之妻請見曰繁人之子弓人之妻也願有謁于君平公見之妻曰君聞昔者公劉之行乎羊牛踐葭葦惻然為民痛之恩及草木豈欲殺不辜者乎秦穆公有盜食其駿馬之肉反飲之以酒楚莊王臣援其夫人之衣而絶纓與飲大樂此三君者仁著于天下卒享其報名垂至今昔帝堯茅茨不剪采椽不斫土階三等猶以為為之者勞居之者逸也今妾之夫治造此弓其為之亦勞矣其幹生于太山之阿一日三覩陰三覩陽傅以燕牛之角纏以荊麋之筋糊以河魚之膠此四者皆天下之妙選也而君不能以穿一札是君之不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒石右手如附枝右手發之左手不知此蓋射之道也平公以其言為儀而射穿七札繁人之夫立得出而賜金三鎰君子謂弓工妻可與處難詩曰敦弓既堅舍矢既鈞言射有法也頌曰晉平作弓三年乃成公怒弓工將加以刑妻往説公陳其幹材列其勞苦公遂釋之齊傷槐女齊傷槐女者傷槐衍之女也名婧景公有所愛槐使人守之植木懸之下令曰犯槐者刑傷槐者死于是衍醉而傷槐景公聞之曰是先犯我令使吏拘之且加罪焉婧懼乃造于相晏子之門曰賤妾不勝其欲願得備數于下陳晏子聞之笑曰嬰其有淫色乎何為老而見奔殆有説內之至哉既入門晏子望見之曰怪哉有深憂進而問焉曰所憂何也對曰妾父衍幸得充城郭為公民見陰陽不調風雨不時五穀不滋之故禱祠于名山神水不勝麴糱之味先犯君令醉至于此罪固當死妾聞明君之蒞國也不損祿而加刑又不以私恚害公法不為六畜傷民人不為野草傷禾苗昔者宋景公之時大旱三年不雨召太卜而卜之曰當以人祀之景公乃降堂北面稽首曰吾所以請雨者乃為吾民也今必當以人祀寡人請自當之言未卒天大雨方千里所以然者何也以能順天慈民也今吾君樹槐令犯者死欲以槐之故殺婧之父孤妾之身妾恐傷執政之法而害明君之義也鄰國聞之皆謂君愛樹而賤人其可乎晏子惕然而悟明日朝謂景公曰嬰聞之窮民財力謂之暴崇玩好嚴威令謂之逆刑殺不正謂之賊夫三者守國之大殃也今君窮民財力以美飲食之具繁鐘鼓之樂極宮室之觀行暴之大者也崇玩好嚴威令是逆民之明者也犯槐者刑傷槐者死刑殺不正是賊民之深者也公曰寡人敬受命晏子出景公即時命罷守槐之役拔植懸之木廢傷槐之法出犯槐之囚君子曰傷槐女能以辭免詩云是究是圖亶其然乎此之謂也頌曰景公愛槐民醉折傷景公將殺其女悼惶奔告晏子稱説先王晏子為言遂免父亡楚野辨女楚野辨女者昭氏之妻也鄭簡公使大夫聘于荊至于狹路有一婦人乘車與大夫遇轂擊而折大夫車軸大夫怒將執而鞭之婦人曰妾聞君子不遷怒不二過今于狹路之中妾之避已極矣而子大夫之僕不肯少引是以敗子大夫之車而反執妾豈不遷怒哉既不怒僕而反怨妾豈不二過哉周書曰無侮鰥寡而畏高明今子列大夫而不為之表而遷怒二過釋僕執妾輕其微弱豈可謂不侮鰥寡乎吾鞭則鞭耳惜子大夫之喪善也大夫慚而無以應遂釋之而問之對曰妾楚野之鄙人也大夫曰盍從我于鄭乎對曰既有狂夫昭氏在內矣遂去君子曰辨女能以辭免詩云惟號斯言有倫有脊此之謂也頌曰辨女獨乘遇鄭使者鄭使折軸執女忿怒女陳其冤亦有其序鄭使慚去不敢談語阿谷處女阿谷處女者阿谷之隧浣者也孔子南遊適楚過阿谷之隧見處子珮瑱而浣孔子謂子貢曰彼浣者其可與言乎抽觴以授子貢曰為之辭以觀其志子貢曰我北鄙之人也自北徂南將欲之楚逢天之暑我思談談願乞一飲以伏我心處子曰阿谷之隧隱曲之地其水一清一濁流入于海欲飲則飲何問乎婢子受子貢觴迎流而挹之投而棄之從流而挹之滿而溢之跪置沙上曰禮不親授子貢還報其辭孔子曰丘已知之矣抽琴去其軫以授子貢曰為之辭子貢往曰嚮者聞子之言穆如清風不拂不寤私復我心有琴無軫願借子以調其音處子曰我鄙野之人也陋固無心五音不知安能調琴子貢以報孔子孔子曰丘已知之矣過賢則賓抽絺綌五兩以授子貢曰為之辭子貢往曰吾北鄙之人也自北徂南將欲之楚有絺綌五兩非敢以當子之身也願注之水旁處子曰行客之人嗟然永久分其資財棄于野鄙妾年甚少何敢受子子不早命竊有狂夫名之者矣子貢以告孔子孔子曰丘已知之矣斯婦人達于人情而知禮詩云南有喬木不可休息漢有遊女不可求思此之謂也頌曰孔子出遊阿谷之南異其處子欲觀其風子貢三反女辭辨深子曰達情知禮不淫趙津女娟趙津女娟者趙河津吏之女趙簡子之夫人也初簡子南擊楚與津吏期簡子至津吏醉臥不能渡簡子怒欲殺之娟懼持楫而走簡子曰女子走何為對曰津吏息女妾父聞主君來渡不測之水恐風波之起水神動駭故禱祠九江三淮之神供具備禮御釐受福不勝王祝杯酌餘瀝醉至于此君欲殺之妾願以鄙軀易父之死簡子曰非女之罪也娟曰主君欲因其醉而殺之妾恐其身之不知痛而心不知罪也若不知罪殺之是殺不辜也願醒而殺之使知其罪簡子曰善遂釋不誅簡子將渡用楫者少一人娟攘卷操楫而請曰妾居河濟之間世習舟楫之事願備員持楫簡子曰不穀將行選士大夫齋戒沐浴義不與婦人同舟而渡也娟對曰妾聞昔者湯伐夏左驂牝驪右驂牝靡而遂放桀武王伐殷左驂牝騏右驂牝騜而遂克紂至于華山之陽主君不欲渡則已與妾同舟又何傷乎簡子悅遂與渡中流為簡子發河激之歌其辭曰升彼阿兮面觀清水揚波兮杳冥冥禱求福兮醉不醒誅將加兮妾心驚罰既釋兮瀆乃清妾持楫兮操其維蛟龍助兮主將歸呼來擢兮行勿疑簡子大悅曰昔者不穀夢娶妻豈此女乎將使人祝祓以為夫人娟乃再拜而辭曰夫婦人之禮非媒不嫁嚴親在內不敢聞命遂辭而去簡子歸乃納幣于父母而立以為夫人君子曰女娟通達而有辭詩云來遊來歌以矢其音此之謂也頌曰趙簡渡河津吏醉荒將欲加誅女娟恐惶操楫進説父得不喪維久難蔽終遂發揚趙佛肹母趙佛肹母者趙之中宰佛肹之母也佛肹以中畔趙之法以城畔者身死家收佛肹之母將論自言曰我死不當士長問其故母曰為我通于主君乃言不通則老婦死而已士長為之言于襄子襄子出問其故母曰不得見主君則不言于是襄子見而問之曰不當死何也母曰妾之當死亦何也襄子曰而子反母曰子反母何為當死襄子曰母不能教子故使至于反母何為不當死也母曰吁以主君殺妾為有説也乃以母無教耶妾之職盡久矣此乃在于主君妾聞子少而慢者母之罪也長而不能使者父之罪也今妾之子少而不慢長又能使妾何負哉妾聞之子少則為子長則為友夫死從子妾能為君長子君自擇以為臣妾之子與在論中此君之臣非妾之子君有暴臣妾無暴子是以言妾無罪也襄子曰善夫佛肹之反寡人之罪也遂釋之君子曰佛肹之母一言而發襄子之意使行不遷怒之德以免其身詩云既見君子我心寫兮此之謂也頌曰佛肹既叛其母任理將就于論自言襄子陳列母職子長在君襄子説之遂釋不論齊威虞姬虞姬者名娟之齊威王之姬也威王即位九年不治委政大臣諸侯並侵之其佞臣周破胡專權擅勢嫉賢妬能即墨大夫賢而日毀之阿大夫不肖反日譽之虞姬謂王曰破胡讒諛之臣也不可不退齊有北郭先生者賢明有道可置左右虞姬謂王曰破胡讒諛之臣也不可不退齊有北郭先生者賢明有道可置左右破胡聞之乃惡虞姬曰其幼弱在于閭巷之時嘗與北郭先生通王疑之乃閉虞姬于九層之臺而使有司即窮驗問破胡賂執事者使竟其罪執事者誣其詞而上之王視其詞不合于意乃召虞姬而自問焉虞姬對曰妾娟之幸得蒙先人之遺體生于天壤之間去蓬廬之下侍明王之宴昵附王著薦床蔽席供執掃除掌奉湯沐至今十餘年矣惓惓之心冀幸補一言而為讒臣所擠湮于百重之下不意大王乃復見而與之語妾聞玉石墜泥不為汙柳下覆寒女不為亂積之于素雅故不見疑也經瓜田不納履過李園不整冠妾不避此罪一也既陷難中有司受賂聽用邪人卒見覆冒不能自明妾聞寡婦哭城城為之崩亡士嘆市市為之罷誠信發內感動城市妾之冤明于白日雖銜號于九層之內而衆人莫為毫釐此妾之罪二也既有汙名而加此二罪義固不可以生所以生者為莫白妾之汙名也且自古有之伯奇放野申生被患孝順至明反以為殘妾既當死不復重陳然願戒大王群臣為邪破胡最甚王不執政國殆危矣于是王大寤出虞姬顯之于朝市封即墨大夫以萬戶烹阿大夫與周破胡遂起兵收故侵地齊國震懼人知烹阿大夫不敢飾非務盡其職齊國大治君子謂虞姬好善詩云既見君子我心則降此之謂也頌曰齊威惰政不治九年虞姬譏刺反害其身姬列其事上指皇天威王覺窹卒距強秦齊鍾離春鍾離春者齊無鹽邑之女宣王之正后也其為人極醜無雙臼頭深目長指大節卬鼻結喉肥項少髮折腰出胸皮膚若漆行年四十無所容入衒嫁不售流棄莫執于是乃拂拭短褐自詣宣王願乞一見謂謁者曰妾齊之不售女也聞君王之聖德願備後宮之掃除頓首司馬門外唯王幸許之謁者以聞宣王方置酒于漸臺左右聞之莫不掩口大笑曰此天下強顏女子也豈不異哉于是宣王乃召見之謂曰昔者先王為寡人娶妃匹皆已備有列位矣今女子不容于鄉里布衣而欲干萬乘之主亦有何奇能哉鍾離春對曰無有特竊慕大王之美義耳王曰雖然何喜良久曰竊嘗喜隱宣王曰隱固寡人之所願也試一行之言未卒忽然不見宣王大驚立發隱書而讀之退而推之又未能得明日又更召而問之又不以隱對但揚目銜齒舉手拊膝曰殆哉殆哉如此者四宣王曰願遂聞命鍾離春對曰今大王之君國也西有衡秦之患南有強楚之讎外有二國之難內聚姦臣衆人不附春秋四十壯男不立不務衆子而務衆婦尊所好而忽所恃一旦山陵崩弛社稷不定此一殆也漸臺五重黃金白玉琅玕籠疏翡翠珠璣幕絡連飾萬民罷極此二殆也賢者伏匿于山林諂諛強于左右邪偽立于本朝諫者不得通入此三殆也飲酒沉湎以夜繼晝女樂俳優縱橫大笑外不修諸侯之禮內不秉國家之治此四殆也故曰殆哉殆哉于是宣王喟然而嘆曰痛哉無鹽君之言吾乃今一聞寡人之殆寡人之殆幾不全于是拆漸臺罷女樂退諂諛去雕琢選兵馬實府庫四辟公門招進直言延及側陋卜擇吉日立太子進慈母拜無鹽君為后而齊國大安者醜女之力也君子謂鍾離春正而有辭詩云既見君子我心則喜此之謂也頌曰無鹽之女干説齊宣分別四殆稱國亂煩宣王從之四辟公門遂立太子拜無鹽君齊宿瘤女宿瘤女者齊東郭採桑之女閔王之后也項有大瘤故號曰宿瘤初閔王出遊至東郭百姓盡觀宿瘤女採桑如故王怪之召問曰寡人出遊車騎甚衆百姓無少長皆棄事來觀汝採桑道旁曾不一視何也對曰妾受父母教採桑不受教觀大王王曰此奇女也惜哉宿瘤女曰婢妾之職屬之不二豫之不忘中心謂何宿瘤何傷王大悅之曰此賢女也命後乘載之女曰賴大王之力父母在內使妾不受父母之教而隨大王是奔女也大王又安用之王大慚曰寡人失之又曰貞女一禮不備雖死不從于是王遣歸使使者以金百鎰往聘迎之父母驚惶欲洗沐加衣裳女曰如是見王則變容更服不見識也請死不往于是如故隨使者閔王歸見諸夫人告曰今日出遊得一聖女今至斥汝屬矣諸夫人皆怪之盛服而衛遲其至也宿瘤駭宮中諸夫人皆掩口而笑左右失貌不能自止王大慚曰且無笑不飾耳夫飾與不飾固相去十百也女曰夫飾與不飾相去千萬尚不足言何獨十百也王曰何以言之對曰性相近習相遠也昔者堯舜桀紂俱天子也堯舜自飾以仁義雖為天子安于節儉茅茨不剪采椽不斫後宮衣不重采食不重味至今數千歲天下歸善焉桀紂不自飾以仁義習為苛文造為高臺深池後宮蹈綺縠弄珠玉意非有饜時也身死國亡為天下笑至今千餘歲天下歸惡焉由是觀之飾與不飾相去千萬尚不足言何獨十百也于是諸夫人皆大慚閔王大感立瘤女以為后出令卑宮室填池澤損膳減樂後宮不得重采期月之間化行鄰國諸侯朝之侵三晉懼秦楚立帝號閔王至于此也宿瘤女有力焉及女死之後燕遂屠齊閔王逃亡而弒死于外君子謂宿瘤女通而有禮詩云菁菁者莪在彼中阿既見君子樂且有儀此之謂也頌曰齊女宿瘤東郭採桑閔王出遊不為變常王召與語諫辭甚明卒升后位名聲光榮齊孤逐女孤逐女者齊即墨之女齊相之妻也初逐女孤無父母狀甚醜三逐于鄉五逐于里過時無所容齊相婦死逐女造襄王之門而見謁者曰妾三逐于鄉五逐于里孤無父母擯棄于野無所容止願當君王之盛顏盡其愚辭左右復于王王輟食吐哺而起左右曰三逐于鄉者不忠也五逐于里者少禮也不忠少禮之人王何為遽王曰子不識也夫牛鳴而馬不應非不聞牛聲也異類故也此人必有與人異者矣遂見與之語三日始一日曰大王知國之柱乎王曰不知也逐女曰柱相國是也夫柱不正則棟不安棟不安則榱橑墮榱橑墮則屋幾覆矣王則棟矣庶民榱橑也國家屋也夫屋堅與不堅在乎柱國家安與不安在乎相今大王既有明哲而國相不可不審也王曰諾其二日王曰吾國相奚若對曰王之國相比目之魚也外比內比然後能成其事就其功王曰何謂也逐女對曰朋其左右賢其妻子是外比內比也其三日王曰吾相其可易乎逐女對曰中才也求之未可得也如有過之者何為不可也今則未有妾聞明王之用人也推一而用之故楚用虞丘子而得孫叔敖燕用郭隗而得樂毅大王誠能厲之則此可用矣王曰吾用之奈何逐女對曰昔者齊桓公尊九九之人而有道之士歸之越王敬螳蜋之怒而勇士死之葉公好龍而龍為暴下物之所徵固不須頃王曰善遂尊相敬而事之以逐女妻之居三日四方之士多歸於齊而國以治也詩云既見君子並坐鼓瑟此之謂也頌曰齊逐孤逐女造襄王門女雖五逐王猶見焉談國之政亦甚有文與語三日遂配相君楚處莊姪楚處莊姪者楚頃襄王之夫人縣邑之女也初頃襄王好臺榭出入不時行年四十不立太子諫者蔽塞屈原放逐國既殆矣秦欲襲其國乃使張儀間之使其左右謂王曰南遊于唐五百里有樂焉王將往是時莊姪年十二謂其母曰王好淫樂出入不時春秋既盛不立太子秦欲襲其國乃使張儀間之使其左右謂王曰南遊於唐五百里有樂焉王將往是時莊姪年十二謂其母曰王好淫樂出入不時春秋既盛不立太子今秦又使人重賂左右以惑我王使遊五百里之外以觀其勢王已出姦臣必倚敵國而發謀王必不得反國姪願往諫之其母曰汝嬰兒也安知諫不遣姪乃逃以緹竿為幟姪持幟伏南郊道旁王車至姪舉其幟王見之而止使人往問之使者報曰有一女童伏于幟下願有謁于王王曰召之姪至王曰女何為者也姪對曰妾縣邑之女也欲言隱事于王恐壅閼蔽塞而不得見聞大王出遊五百里因以幟見王曰子何以戒寡人姪對曰大魚失水有龍無尾墻欲內崩而王不視王曰不知也姪對曰大魚失水者王離國五百里也樂之於前不思禍之起于後也有龍無尾者年既四十無太子也國無弼輔必且殆也墻欲內崩而王不視者禍亂且成而王不改也王曰何謂也姪曰王好臺榭不恤衆庶出入不時耳目不聰明春秋四十不立太子國無強輔外內崩壞強秦使人內間王左右使王不改日以滋甚今禍且搆王遊于五百里之外王必遂往國非王之國也王曰何也姪曰王之致此三難也以五患王曰何謂五患姪曰宮室相望城郭闊達一患也宮垣衣繡民人無褐二患也奢侈無度國且虛竭三患也百姓飢餓馬有餘秣四患也邪臣在側賢者不達五患也王有五患故及三難王曰善命後車載之立還反國門已閉反者已定王乃發鄢郢之師以擊之僅能勝之乃立姪為夫人立在鄭子袖之右為王陳節儉愛民之事楚國復強君子謂莊姪雖違于禮而終守以正詩云北風其喈雨雪霏霏惠而好我攜手同歸此之謂也頌曰楚處莊姪雖為女童以幟見王陳國禍凶設王三難五患纍重王載以歸終卒有功齊女徐吾齊女徐吾者齊東海上貧婦人也與鄰婦李吾之屬會燭相從夜績徐吾最貧而燭數不屬李吾謂其屬曰徐吾燭數不屬請無與夜也徐吾曰是何言與妾以貧燭不屬之故起常先息常後灑掃陳席以待來者自與蔽薄坐常處下凡為貧燭不屬故也夫一室之中益一人燭不為暗損一人燭不為明何愛東壁之餘光不使貧妾得蒙見哀之恩長為妾役之事使諸君常有惠施于妾不亦可乎李吾莫能應遂復與夜終無後言君子曰婦人以辭不見棄于鄰則辭安可以已乎哉詩云辭之輯矣民之協矣此之謂也頌曰齊女徐吾會績獨貧夜託燭明李吾絶焉徐吾自列辭語甚分卒得容入終沒後言齊太倉女齊太倉女者漢太倉令淳于公之少女也名緹縈淳于公無男有女五人孝文皇帝時淳于公有罪當刑是時肉刑尚在詔獄繫長安當行會逮公罵其女曰生子不生男有緩急非有益也緹縈自悲泣而隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖復欲改過自新其道無由也妾願入身為官婢以贖父罪使得自新書奏天子憐悲其意乃下詔曰蓋聞有虞之時畫衣冠異章服以為示而民不犯何則其至治也今法有肉刑五而姦不止其咎安在非朕德薄而教之不明歟吾甚自愧故夫訓道不純而愚民陷焉詩云愷悌君子民之父母今人有過教未施而刑已加焉或欲改行為善而其道無繇也朕甚憐之夫刑者至斷支體刻肌膚終身不息何其楚痛而不德也豈稱為民父母之意哉其除肉刑自是之後鑿顛者髡抽脅者笞刖足者鉗淳于公遂得免焉君子謂緹縈一言發聖主之意可謂得事之宜矣詩云辭之懌矣民之莫矣此之謂也齊太倉女齊太倉女者漢太倉令淳于公之少女也名緹縈淳于公無男有女五人頌曰緹縈訟父亦孔有識推誠上書文雅甚備小女之言乃感聖意終除肉刑以免父事
