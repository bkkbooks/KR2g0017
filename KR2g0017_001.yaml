body:
  text: 母儀傳第一惟若母儀賢聖有智行為儀表言則中義胎養子孫以漸教化既成以德致其功業姑母察此不可不法有虞二妃有虞二妃者帝堯之二女也長娥皇次女英舜父頑母嚚父號瞽叟弟曰象敖游於嫚舜能諧柔之承事瞽叟以孝母憎舜而愛象舜猶內治靡有姦意四嶽薦之於堯堯乃妻以二女以觀厥內二女承事舜於畎畝之中不以天子之女故而驕盈怠嫚猶謙謙恭儉思盡婦道瞽叟與象謀殺舜使塗廩舜歸告二女曰父母使我塗廩我其往二女曰往哉舜既治廩乃捐階瞽叟焚廩舜往飛出象復與父母謀使舜浚井舜乃告二女二女曰俞往哉舜往浚井格其出入從掩舜潛出時既不能殺舜瞽叟又速舜飲酒醉將殺之舜告二女二女乃與舜藥浴汪遂往舜終日飲酒不醉舜之女弟繫憐之與二嫂諧父母欲殺舜舜猶不怨怒之不已舜往于田號泣日呼旻天呼父母惟害若茲思慕不已不怨其弟篤厚不怠既納于百揆賓于四門選于林木入于大麓堯試之百方每事常謀于二女舜既嗣位升為天子娥皇為后女英為妃封象于有庳事瞽叟猶若初焉天下稱二妃聰明貞仁舜陟方死于蒼梧號曰重華二妃死于江湘之間俗謂之湘君君子曰二妃德純而行篤詩云不顯惟德百辟其刑之此之謂也頌曰元始二妃帝堯之女嬪列有虞承舜於下以尊事卑終能勞苦瞽叟和寧卒享福祜棄母姜源棄母姜嫄者邰侯之女也當堯之時行見巨人跡好而履之歸而有娠浸以益大心怪惡之卜筮禋祀以求無子終生子以為不祥而棄之隘巷牛羊避而不踐乃送之平林之中後伐平林者咸薦之覆之乃取置寒冰之上飛鳥傴翼之姜嫄以為異乃收以歸因命曰棄姜嫄之性清靜專一好種稼穡及棄長而教之種樹桑麻棄之性明而仁能育其教卒致其名堯使棄居稷官更國邰地遂封棄于邰號曰后稷及堯崩舜即位乃命之曰棄黎民阻飢汝后稷播時百穀其後世世居稷至周文武而興為天子君子謂姜嫄靜而有化詩云赫赫姜嫄其德不回上帝是依又曰思文后稷克配彼天立我蒸民此之謂也頌曰棄母姜嫄清靜專一履跡而孕懼棄於野鳥獸覆翼乃復收恤卒為帝佐母道既畢契母簡狄契母簡狄者有娀氏之長女也當堯之時與其妹娣浴於玄丘之水有玄鳥銜卵過而墜之五色甚好簡狄與其妹娣競往取之簡狄得而含之誤而吞之遂生契焉簡狄性好人事之治上知天文樂於施惠及契長而教之理順之序契之性聰明而仁能育其教卒致其名堯使為司徒封之於亳及堯崩舜即位乃敕之曰契百姓不親五品不遜汝作司徒而敬敷五教在寬其後世世居亳至殷湯興為天子君子謂簡狄仁而有禮詩云有娀方將立子生商又曰天命玄鳥降而生商此之謂也頌曰契母簡狄敦仁勵翼吞卵産子遂自修飾教以事理推恩有德契為帝輔蓋母有力啓母塗山啓母者塗山氏長女也夏禹娶以為妃既生啓辛壬癸甲啓呱呱泣禹去而治水惟荒度土功三過其家不入其門塗山獨明教訓而致其化焉及啓長化其德而從其教卒致令名禹為天子而啓為嗣持禹之功而不殞君子謂塗山彊於教誨詩云釐爾士女從以孫子此之謂也頌曰啓母塗山維配帝禹辛壬癸甲禹往敷土啓呱呱泣母獨論序教訓以善卒繼其父湯妃有㜪湯妃有㜪者有㜪氏之女也殷湯娶以為妃生仲壬外丙亦明教訓致其功有㜪之妃湯也統領九嬪後宮有序咸無妬媢逆理之人卒致王功君子謂妃明而有序詩云窈窕淑女君子好逑言賢女能為君子和好衆妾其有㜪之謂也頌曰湯妃有㜪質行聰明媵從伊尹自夏適殷勤愨治中九嬪有行化訓內外亦無愆殃周室三母三母者太姜太任太姒太姜者王季之母有台氏之女大王娶以為妃生太伯仲雍王季貞順率道靡有過失太王謀事遷徙必與太姜君子謂太姜廣于德教德教本也而謀事次之詩云古公亶父來朝走馬率西水滸至於岐下爰及姜女聿來胥宇此之謂也蓋太姜淵智非常雖太王之賢聖亦與之謀其知太王仁恕必可以比國人而景附矣太任者文王之母摯任氏中女也王季娶為妃太任之性端一誠莊惟德之行及其有娠目不視惡色耳不聽淫聲口不出敖言能以胎教溲于豕牢而生文王文王生而明聖太任教之以一而識百卒為周宗君子謂太任為能胎教古者婦人妊子寢不側坐不邊立不蹕不食邪味割不正不食席不正不坐目不視于邪色耳不聽于淫聲夜則令瞽誦詩道正事如此則生子形容端正才德必過人矣故妊子之時必慎所感感于善則善感于惡則惡人生而肖父母者皆其母感于物故形意肖之文王母可謂知肖化矣太姒者武王之母禹后有莘姒氏之女仁而明道文王嘉之親迎于渭造舟為梁及入太姒思媚太姜太任旦夕勤勞以進婦道太姒號曰文母文王理陽道而治外文母理陰道而治內太姒生有十男長伯邑考次則武王發次則周公旦次則管叔鮮次則蔡叔度次則曹叔振鐸次則霍叔武次則成叔處次則康叔封次則聃季載太姒教誨十子自少及長未嘗見邪辟之事及其長文王繼而教之卒成武王周公之德武王纘太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之武王末受命周公成文武之德追王太王王季上祀先公以天子之禮斯禮也達乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪達乎大夫三年之喪達乎天子父母之喪無貴賤一也蓋十子之中惟武王周公成聖要其安民以播烈光制禮以廣達孝而言之則盛德自然著矣若管蔡監殷而畔乃人才質不同有不可以少加重任者易曰力小而任重鮮不及矣反思其受教之時未必至於斯也豈可以纍太姒耶故君子謂太姒仁明而有德詩曰大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光又曰太姒嗣徽音則百斯男此之謂也頌曰周室三母太姜任姒文武之興蓋由斯起太姒最賢號曰文母三姑之德亦甚大矣衛姑定姜衛姑定姜者衛定公之夫人公子之母也公子既娶而死其婦無子畢三年之喪定姜歸其婦自送之至於野恩愛哀思悲心感慟立而望之揮泣垂涕乃賦詩曰燕燕于飛差池其羽之子于歸遠送于野瞻望不及泣涕如雨送去歸泣而望之又作詩曰先君之思以畜寡人君子謂定姜為慈姑過而之厚定公惡孫林父孫林父奔晉晉侯使郤犨為請還定公欲辭定姜曰不可是先君宗卿之嗣也大國又以為請而弗許將亡雖惡之不猶愈于亡乎君其忍之夫安民而宥宗卿不亦可乎定公遂復之君子謂定姜能遠患難詩曰其儀不忒正是四國此之謂也定公卒立敬姒之子衎為君是為獻公獻公居喪而慢定姜既哭而息見獻公之不哀也不內食飲嘆曰是將敗衛國必先害善人天禍衛國也夫吾不獲鱄也使主社稷大夫聞之皆懼孫文子自是不敢舍其重器于衛鱄者獻公弟子鮮也賢而定姜欲立之而不得後獻公暴虐慢侮定姜卒見逐走出亡至境使祝宗告亡且告無罪於廟定姜曰不可若令無神不可誣有罪若何告無罪也且公之行舍大臣而與小臣謀一罪也先君有冢卿以為師保而蔑之二罪也余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪其後賴鱄力獻公復得反國君子謂定姜能以辭教詩云我言惟服此之謂也鄭皇耳率師侵衛孫文子卜追之獻兆于定姜曰兆如山陵有夫出征而喪其雄定姜曰征者喪雄禦寇之利也大夫圖之衛人追之獲鄭皇耳于犬丘君子謂定姜達於事情詩云左之左之君子宜之此之謂也頌曰衛姑定姜送婦作詩恩愛慈惠泣而望之數諫獻公得其罪尤聰明遠識麗于文辭齊女傅母傅母者齊女之傅母也女為衛莊公夫人號曰莊姜姜交好始往操行衰惰有冶容之行淫泆之心傅母見其婦道不正諭之云子之家世世尊榮當為民法則子之質聰達于事當為人表式儀貌壯麗不可不自修整衣錦絅裳飾在輿馬是不貴德也乃作詩曰碩人其頎衣錦絅衣齊侯之子衛侯之妻東宮之妹邢侯之姨談公維私砥厲女之心以高節以為人君之子弟為國君之夫人尤不可有邪辟之行焉女遂感而自修君子善傅母之防未然也莊姜者東宮得臣之妹也無子姆戴媯之子桓公公子州吁嬖人之子也有寵驕而好兵莊公弗禁後州吁果殺桓公詩曰毋教猱升木此之謂也頌曰齊女傅母防女未然稱列先祖莫不尊榮作詩明指使無辱先莊姜姆妹卒能修身鄒孟軻母鄒孟軻之母也號孟母其舍近墓孟子之少也嬉遊為墓間之事踴躍築埋孟母曰此非吾所以居處子也乃去舍市傍其嬉戲為賈人衒賣之事孟母又曰此非吾所以居處子也復徙舍學宮之傍其嬉遊乃設俎豆揖讓進退孟母曰真可以居吾子矣遂居之及孟子長學六藝卒成大儒之名君子謂孟母善以漸化詩云彼姝者子何以豫之此之謂也自孟子之少也既學而歸孟母方績問曰學何所至矣孟子曰自若也孟母以刀斷其織孟子懼而問其故孟母曰子之廢學若吾斷斯織也夫君子學以立名問則廣知是以居則安寧動則遠害今而廢之是不免于厮役而無以離于禍患也何以異于織績而食中道廢而不為寧能衣其夫子而長不乏糧食哉女則廢其所食男則墮于修德不為竊盜則為虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知為人母之道矣詩云彼姝者子何以告之此之謂也孟子既娶將入私室其婦袒而在內孟子不悅遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊墮在室而夫子見妾勃然不悅是客妾也婦人之義蓋不客宿請歸父母于是孟母召孟子而謂之曰夫禮將入門問孰存所以致敬也將上堂聲必揚所以戒人也將入戶視必下恐見人過也今子不察於禮而責禮於人不亦遠乎孟子謝遂留其婦君子謂孟母知禮而明於姑母之道孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敏異日閒居擁楹而歎孟母見之曰鄉見子有憂色曰不也今擁楹而歎何也孟子對曰軻聞之君子稱身而就位不為苟得而受賞不貪榮祿諸侯不聽則不達其上聽而不用則不踐其朝今道不用於齊願行而母老是以憂也孟母曰夫婦人之禮精五飯冪酒漿養舅姑縫衣裳而已矣故有閨內之修而無境外之志易曰在中饋無攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三從之道也故年少則從乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒匪教此之謂也頌曰孟子之母教化列分處子擇藝使從大倫子學不進斷機示焉子遂成德為當世冠魯季敬姜魯季敬姜者莒女也號戴己魯大夫公父穆伯之妻文伯之母季康子之從祖叔母也博達知禮穆伯先死敬姜守養文伯出學而還歸敬姜側目而盼之見其友上堂從後階降而卻行奉劍而正履若事父兄文伯自以為成人矣敬姜召而數之曰昔者武王罷朝而結絲𥿉絶左右顧無可使結之者俯而自申之故能成王道桓公坐友三人諫臣五人日舉過者三十人故能成伯業周公一食而三吐哺一沐而三握髮所執贄而見於窮閭隘巷者七十餘人故能存周室彼二聖一賢者皆伯王之君也而下人如此其所與遊者皆過己者也是以日益而不自知也今以子年之少而位之卑所與遊者皆為服役子之不益亦以明矣文伯乃謝罪于是乃擇嚴師賢友而事之所與遊處者皆黃耄倪齒也文伯引衽攘捲而親饋之敬姜曰子成人矣君子謂敬姜備于教化詩云濟濟多士文王以寧此之謂也文伯相魯敬姜謂之曰吾語汝治國之要盡在經矣夫幅者所以正曲枉也不可不彊故幅可以為將畫者所以均不均服不服也故畫可以為正物者所以治蕪與莫也故物可以為都大夫持交而不失出入不絶者捆也捆可以為大行人也推而往引而來者綜也綜可以為關內之師主多少之數者均也均可以為內史服重任行遠道正直而固者軸也軸可以為相舒而無窮者摘也摘可以為三公文伯再拜受教文伯退朝朝敬姜敬姜方績文伯曰以歜之家而主猶績懼干季孫之怒其以歜為不能事主乎敬姜嘆曰魯其亡乎使吾子備官而未之聞耶居吾語女昔聖王之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民嚮義勞也是故天子大采朝日與三公九卿組織施德日中考政與百官之政事使師尹維旅牧相宣敘民事少采夕月與太史司載糾虔天刑日入監九御使潔奉禘郊之粢盛而後即安諸侯朝修天子之業令晝考其國職夕省其典刑夜警百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而講肄夕而習復夜而討過無憾而後即安自庶人以下明而動晦而休無自以怠王后親織玄紞公侯之夫人加之以紘綖卿之內子為大帶命婦成祭服列士之妻加之以朝服自庶士以下皆衣其夫社而賦事蒸而獻功男女效績否則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力今我寡也爾又在下位朝夕處事猶恐忘先人之業況有怠惰其何以辟吾冀而朝夕修我曰必無廢先人爾今也曰胡不自安以是承君之官余懼穆伯之絶嗣也仲尼聞之曰弟子記之季氏之婦不淫矣詩曰婦無公事休其蠶織言婦人以織績為公事者也休之非禮也文伯飲南宮敬叔酒以露堵父為客羞鱉焉為小堵父怒相延食鱉堵父辭曰將使鱉長而食之遂出敬姜聞之怒曰吾聞之先子曰祭養尸饗養上賓鱉于人何有而使夫人怒遂逐文伯五日魯大夫辭而復之君子謂敬姜為慎微詩曰我有旨酒嘉賓式宴以樂言尊賓也文伯卒敬姜戒其妾曰吾聞之好內女死之好外士死之今吾子夭死吾惡其以好內聞也二三婦之辱共祀先祀者請毋瘠色毋揮涕毋陷膺毋憂容有降服毋加服從禮而靜是昭吾子仲尼聞之曰女知莫如婦男知莫如夫公父氏之婦知矣欲明其子之令德詩曰君子有穀貽厥孫子此之謂也敬姜之處喪也朝哭穆伯暮哭文伯仲尼聞之曰季氏之婦可謂知禮矣愛而無私上下有章敬姜嘗如季氏康子在朝與之言不應從之及寢門不應而入康子辭于朝而入見曰肥也不得聞命毋乃罪耶敬姜對曰子不聞耶天子及諸侯合民事于外朝合神事于內朝自卿大夫以下合官職于外朝合家事于內朝寢門之內婦人治其職焉上下同之夫外朝子將業君之官職焉內朝子將庀季氏之政焉皆非吾所敢言也康子嘗至敬姜䦱門而與之言皆不踰閾祭悼子康子與焉酢不受徹俎不宴宗不具不繹繹不盡飲則不退仲尼謂敬姜別于男女之禮矣詩曰女也不爽此之謂也頌曰文伯之母號曰敬姜通達知禮德行光明匡子過失教以法理仲尼賢焉列為慈母楚子發母楚將子發之母也子發攻秦絶糧使人請于王因歸問其母母問使者曰士卒得無恙乎對曰士卒并分菽粒而食之又問將軍得無恙乎對曰將軍朝夕芻豢黍梁子發破秦而歸其母閉門而不內使人數之曰子不聞越王句踐之伐吳耶客有獻醇酒一器者王使人注江之上流使士卒飲其下流味不及加美而士卒戰自五也異日有獻一囊糗糒者王又以賜軍士分而食之甘不踰嗌而戰自十也今子為將士卒并分菽粒而食之子獨朝夕芻豢黍梁何也詩不云乎好樂無荒良士休休言不失和也夫使人入于死地而自康樂于其上雖有以得勝非其術也子非吾子也無入吾門子發于是謝其母然後內之君子謂子發母能以教誨詩云教誨爾子式穀似之此之謂也頌曰子發之母刺子驕泰將軍稻梁士卒菽粒責以無禮不得人力君子嘉焉編于母德鄒孟軻母鄒孟軻之母也號孟母其舍近墓孟子之少也嬉遊為墓間之事踴躍築埋孟母曰此非吾所以居處子也乃去舍市傍其嬉戲為賈人衒賣之事孟母又曰此非吾所以居處子也復徙舍學宮之傍其嬉遊乃設俎豆揖讓進退孟母曰真可以居吾子矣遂居之及孟子長學六藝卒成大儒之名君子謂孟母善以漸化詩云彼姝者子何以豫之此之謂也孟子之少也既學而歸孟母方績問曰學何所至矣孟子曰自若也孟母以刀斷其織孟子懼而問其故孟母曰子之廢學若吾斷斯織也夫君子學以立名問則廣知是以居則安寧動則遠害今而廢之是不免於廝役而無以離於禍患也何以異於織績而食中道廢而不為寧能衣其夫子而長不乏糧食哉女則廢其所食男則墮於修德不為竊盜則為虜役矣孟子懼旦夕勤學不息師事子思遂成天下之名儒君子謂孟母知為人母之道矣詩云彼姝者子何以告之此之謂也孟子既娶將入私室其婦袒而在內孟子不悅遂去不入婦辭孟母而求去曰妾聞夫婦之道私室不與焉今者妾竊墮在室而夫子見妾勃然不悅是客妾也婦人之義蓋不客宿請歸父母於是孟母召孟子而謂之曰夫禮將入門問孰存所以致敬也將上堂聲必揚所以戒人也將入戶視必下恐見人過也今子不察於禮而責禮於人不亦遠乎孟子謝遂留其婦君子謂孟母知禮而明於姑母之道孟子處齊而有憂色孟母見之曰子若有憂色何也孟子曰不敏異日閒居擁楹而歎孟母見之曰鄉見子有憂色曰不也今擁楹而歎何也孟子對曰軻聞之君子稱身而就位不為苟得而受賞不貪榮祿諸侯不聽則不達其上聽而不用則不踐其朝今道不用於齊願行而母老是以憂也孟母曰夫婦人之禮精五飰酒漿養舅姑縫衣裳而已矣故有閨內之修而無境外之志易曰在中饋攸遂詩曰無非無儀惟酒食是議以言婦人無擅制之義而有三從之道也故年少則從乎父母出嫁則從乎夫夫死則從乎子禮也今子成人也而我老矣子行乎子義吾行乎吾禮君子謂孟母知婦道詩云載色載笑匪怒匪教此之謂也頌曰孟子之母教化列分處子擇藝使從大倫子學不進斷機示焉子遂成德為當世冠魯之母師母師者魯九子之寡母也臘日休作者歲祀禮事畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多幼稚歲時禮不理吾從汝謁往監之諸子皆頓首許諾又召諸婦曰婦人有三從之義而無專制之行少繫於父母長繫于夫老繫于子今諸子許我歸視私家雖踰正禮願與少子俱以備婦人出入之制諸婦其慎房戶之守吾夕而反于是使少子僕歸辨家事天陰還失早至閭外而止待夕而入魯大夫從臺上見而怪之使人間視其居處禮節甚修家事甚理使者還以狀對于是大夫召母而問之曰一日從北方來至閭外而止良久夕乃入吾不知其故甚怪之是以問也母對曰妾不幸早失夫獨與九子居臘日禮畢事間從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽人情所有也妾反太早不敢復反故止閭外期盡而入大夫美之言于穆公穆公賜母尊號曰母師使朝謁夫人夫人諸姬皆師之君子謂母師能以身教夫禮婦人未嫁則以父母為天既嫁則以夫為天其喪父母則降服一等無二天之義也詩云出宿于濟飲餞于禰女子有行遠父母兄弟頌曰九子之母誠知禮經謁歸還返不掩人情德行既備卒蒙其榮魯君賢之號以尊名魏芒慈母魏芒慈母者魏孟陽氏之女芒卯之後妻也有三子前妻之子有五人皆不愛慈母遇之甚異猶不愛慈母乃命其三子不得與前妻子齊衣服飲食起居進退甚相遠前妻之子猶不愛于是前妻中子犯魏王令當死慈母憂戚悲哀帶圍減尺朝夕勤勞以救其罪人有謂慈母曰人不愛母至甚也何如勤勞憂懼如此慈母曰如妾親子雖不愛妾猶救其禍而除其害獨於假子而不為何以異于凡母其父為其孤也而使妾為其繼母繼母如母為人母而不能愛其子可謂慈乎親其親而偏其假可謂義乎不慈且無義何以立於世彼雖不愛妾安可以忘義乎遂說之魏安釐王聞之高其義曰慈母如此可不赦其子乎乃赦其子復其家自此五子親附慈母雍雍若一慈母以禮義之漸率導八子咸為魏大夫卿士各成於禮義君子謂慈母一心詩云尸鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮言心之均一也尸鳩以一心養七子君子以一儀養萬物一心可以事百君百心不可以事一君此之謂也頌曰芒卯之妻五子後母慈惠仁義扶養假子雖不吾愛拳拳若親繼母若斯亦誠可尊齊田稷母齊田稷子之母也田稷子相齊受下吏之貨金百鎰以遺其母母曰子為相三年矣祿未嘗多若此也豈修士大夫之費哉安所得此對曰誠受之于下其母曰吾聞士修身潔行不為苟得竭情盡實不行詐僞非義之事不計於心非理之利不入于家言行若一情貌相副今君設官以待子厚祿以奉子言行則可以報君夫為人臣而事其君猶為人子而事其父也盡力竭能忠信不欺務在效忠必死奉命廉潔公正故遂而無患今子反是遠忠矣夫為人臣不忠是為人子不孝也不義之財非吾有也不孝之子非吾子也子起田稷子慚而出反其金自歸罪於宣王請就誅焉宣王聞之大賞其母之義遂舍稷子之罪復其相位而以公金賜母君子謂稷母廉而有化詩曰彼君子兮不素飱兮無功而食祿不為也況於受金乎頌曰田稷之母廉潔正直責子受金以為不德忠孝之事盡材竭力君子受祿終不素食
